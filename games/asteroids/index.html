<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroids — Select Version</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #05060a;
    font-family: "Courier New", monospace;
    color: #cfe8ff;
    overflow: hidden;
  }
  #stars { position: fixed; inset: 0; z-index: 0; display: block; }
  /* CRT scanline vibe on the menu */
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 50;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px, transparent 2px, transparent 3px);
    opacity: 0.35;
  }
  #select {
    position: fixed; inset: 0; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 26px; padding: 30px; box-sizing: border-box;
    background: radial-gradient(circle at center, rgba(10,14,26,0.35), rgba(5,6,10,0.62));
    overflow-y: auto;
  }
  #select h1 {
    margin: 0; font-size: 56px; letter-spacing: 12px;
    text-shadow: 0 0 24px rgba(120,200,255,0.7);
  }
  #select .sub { opacity: 0.55; font-size: 13px; letter-spacing: 3px; margin-top: -18px; }

  /* mode toggle */
  .modebar { display: flex; align-items: center; gap: 14px; font-size: 13px; letter-spacing: 2px; }
  .modebar .lbl { opacity: 0.6; }
  #modeToggle {
    font-family: inherit; font-size: 13px; letter-spacing: 2px;
    padding: 8px 18px; border-radius: 22px; cursor: pointer;
    border: 1px solid rgba(120,200,255,0.4); background: rgba(20,30,50,0.4); color: #cfe8ff;
    transition: all 0.15s ease;
  }
  #modeToggle.speedrun {
    border-color: #ffd166; color: #ffd166; box-shadow: 0 0 16px rgba(255,209,102,0.4);
  }
  #modeToggle:hover { transform: translateY(-1px); }
  .modehint { font-size: 11px; opacity: 0.45; letter-spacing: 1px; min-height: 14px; }
  .audiobar { display: flex; align-items: center; gap: 10px; font-size: 12px; letter-spacing: 2px; flex-wrap: wrap; justify-content: center; }
  .audiobar .lbl { opacity: 0.6; }
  .audiobar button { font-family: inherit; font-size: 12px; letter-spacing: 2px; padding: 6px 14px; border-radius: 18px; cursor: pointer; border: 1px solid rgba(120,200,255,0.4); background: rgba(20,30,50,0.4); color: #cfe8ff; }
  .audiobar button:hover { border-color: #9fe8ff; }
  .audiobar button.off { opacity: 0.45; }
  .audiobar .vol { opacity: 0.7; }
  .audiobar .vol input { vertical-align: middle; }

  #cards { display: flex; flex-direction: column; gap: 12px; align-items: center; max-width: 1100px; }
  .row-label { font-size: 12px; letter-spacing: 3px; opacity: 0.45; margin-top: 8px; }
  .crow { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
  .card {
    width: 250px; padding: 22px 20px;
    border: 2px solid rgba(120,200,255,0.3);
    border-radius: 14px;
    background: rgba(20,30,50,0.55);
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    text-align: left;
  }
  .card:hover, .card:focus {
    transform: translateY(-6px);
    border-color: #9fe8ff;
    box-shadow: 0 0 28px rgba(120,200,255,0.4);
    outline: none;
  }
  .card .tag {
    display: inline-block; font-size: 10px; letter-spacing: 2px;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
  }
  .card .tag.CLASSIC { background: rgba(120,255,170,0.16); color: #7fffb0; }
  .card .tag.ROGUELITE { background: rgba(255,200,120,0.16); color: #ffc878; }
  .card h2 { margin: 0 0 8px; font-size: 18px; letter-spacing: 0.5px; line-height: 1.2; }
  .card p { margin: 0; font-size: 12px; line-height: 1.55; opacity: 0.72; }
  .card .best { margin-top: 12px; font-size: 11px; letter-spacing: 1px; color: #ffd166; opacity: 0.9; }
  .card .goal { margin-top: 6px; font-size: 11px; color: #9fe8ff; opacity: 0; }
  .card .goal.show { opacity: 0.7; }

  #frameWrap { position: fixed; inset: 0; display: none; background: #05060a; z-index: 60; }
  #frameWrap iframe { width: 100%; height: 100%; border: 0; display: block; }
  #back {
    position: fixed; bottom: 16px; right: 18px; z-index: 70;
    display: none; align-items: center; gap: 9px;
    font-family: "Courier New", monospace; font-size: 13px; letter-spacing: 2px;
    color: #cfe8ff; background: rgba(10,16,30,0.8);
    border: 1px solid rgba(120,200,255,0.45); border-radius: 10px; padding: 9px 15px;
    cursor: pointer;
  }
  #back:hover { border-color: #9fe8ff; box-shadow: 0 0 14px rgba(120,200,255,0.4); }
  #back .ham { display: inline-flex; flex-direction: column; gap: 3px; }
  #back .ham span { display: block; width: 16px; height: 2px; background: #9fe8ff; border-radius: 2px; }
  .resetbtn {
    font-family: inherit; font-size: 11px; letter-spacing: 2px;
    padding: 6px 14px; border-radius: 16px; cursor: pointer;
    border: 1px solid rgba(255,120,120,0.35); background: transparent; color: rgba(255,150,150,0.7);
  }
  .resetbtn:hover { border-color: #ff8f8f; color: #ff8f8f; box-shadow: 0 0 12px rgba(255,120,120,0.3); }
  .footer { font-size: 11px; opacity: 0.35; letter-spacing: 2px; }
</style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div id="select">
    <h1>ASTEROIDS</h1>
    <div class="sub">select version</div>

    <div class="modebar">
      <span class="lbl">MODE</span>
      <button id="modeToggle">NORMAL</button>
    </div>
    <div class="modehint" id="modehint">Endless — survive and rack up the highest score.</div>

    <div class="audiobar">
      <span class="lbl">AUDIO</span>
      <button id="sfxToggle">SFX: ON</button>
      <label class="vol">SFX <input type="range" id="sfxVol" min="0" max="1" step="0.05" value="0.6"></label>
      <button id="musicToggle">MUSIC: ON</button>
      <label class="vol">MUS <input type="range" id="musVol" min="0" max="1" step="0.05" value="0.5"></label>
    </div>

    <div class="cards" id="cards"></div>
    <button id="resetBtn" class="resetbtn">RESET BEST SCORES</button>
    <div class="footer">↑/W thrust · ←→/A D rotate · SPACE shoot · ESC pause</div>
  </div>

  <div id="frameWrap"><iframe id="frame" title="Asteroids"></iframe></div>
  <button id="back"><span class="ham"><span></span><span></span><span></span></span> MENU</button>

  <script src="levels.js"></script>
  <script>
    const select = document.getElementById('select');
    const frameWrap = document.getElementById('frameWrap');
    const frame = document.getElementById('frame');
    const back = document.getElementById('back');
    const cardsEl = document.getElementById('cards');
    const modeToggle = document.getElementById('modeToggle');
    const modehint = document.getElementById('modehint');

    let speedrun = false;

    // ---- starfield background (same twinkle as the games) ----
    const sky = document.getElementById('stars');
    const sctx = sky.getContext('2d');
    let SW, SH, stars = [];
    function buildStars() {
      stars = [];
      const n = Math.floor((SW * SH) / 6000);
      for (let i = 0; i < n; i++) stars.push({ x: Math.random()*SW, y: Math.random()*SH, r: Math.random()*1.4+0.2, a: Math.random()*0.6+0.2, tw: Math.random()*Math.PI*2, ts: Math.random()*0.04+0.01 });
    }
    function resizeSky() { SW = sky.width = window.innerWidth; SH = sky.height = window.innerHeight; buildStars(); }
    window.addEventListener('resize', resizeSky);
    function drawSky() {
      sctx.clearRect(0, 0, SW, SH);
      for (const s of stars) { s.tw += s.ts; const a = s.a*(0.6+0.4*Math.sin(s.tw)); sctx.fillStyle = 'rgba(200,225,255,'+a+')'; sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, Math.PI*2); sctx.fill(); }
      requestAnimationFrame(drawSky);
    }
    resizeSky(); drawSky();

    // ---- audio (same procedural engine as the games; powers menu music) ----
    const SND = (() => {
      let ac, master, sfxG, musG, mt=null;
      function num(k,d){ try{ const v=localStorage.getItem(k); return v==null?d:parseFloat(v); }catch(e){ return d; } }
      const opt = {
        get music(){ try{ return localStorage.getItem('asteroids_music')!=='0'; }catch(e){ return true; } },
        get musvol(){ return num('asteroids_musvol',0.5); },
      };
      function ensure(){ if(ac!==undefined) return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC){ ac=null; return; }
        ac=new AC(); master=ac.createGain(); master.gain.value=1; master.connect(ac.destination); musG=ac.createGain(); musG.gain.value=opt.musvol; musG.connect(master); }
      const scale=[220,277.18,329.63,440,329.63,277.18]; let step=0;
      function mtick(){ if(!ac||!opt.music) return; const f=scale[step%scale.length]*(Math.floor(step/6)%2?0.5:1); const o=ac.createOscillator(),v=ac.createGain(); o.type='triangle'; o.frequency.value=f; v.gain.value=0; v.gain.linearRampToValueAtTime(0.16,ac.currentTime+0.03); v.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.4); o.connect(v); v.connect(musG); o.start(); o.stop(ac.currentTime+0.45); step++; }
      return {
        startMusic(){ ensure(); if(!ac||mt) return; if(ac.state==='suspended') ac.resume(); mt=setInterval(mtick,250); },
        stopMusic(){ if(mt){ clearInterval(mt); mt=null; } },
        refresh(){ ensure(); if(musG) musG.gain.value=opt.musvol; if(!opt.music) this.stopMusic(); },
        opt,
      };
    })();
    let gestured = false;
    function kickMenuMusic() { if (gestured) return; gestured = true; if (SND.opt.music) SND.startMusic(); }
    window.addEventListener('pointerdown', kickMenuMusic);
    window.addEventListener('keydown', kickMenuMusic);

    // localStorage keys are by file basename (stable across the levels/ move)
    function base(file) { return file.split('/').pop(); }
    function fmtTime(ms) {
      const m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000), cs = Math.floor((ms % 1000) / 10);
      return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0') + '.' + String(cs).padStart(2,'0');
    }
    function readNum(key) {
      try { const v = localStorage.getItem(key); return v != null ? parseInt(v, 10) : null; }
      catch (e) { return null; }
    }

    function makeCard(v) {
      const card = document.createElement('div');
      card.className = 'card';
      card.tabIndex = 0;
      const b = base(v.file);
      let bestLine;
      if (speedrun) {
        const t = readNum('asteroids_best_' + b);
        bestLine = 'BEST ' + (t != null ? fmtTime(t) : '—');
      } else {
        const sc = readNum('asteroids_score_' + b);
        const wv = readNum('asteroids_wave_' + b);
        bestLine = sc != null
          ? ('BEST ' + sc + ' pts' + (v.tag === 'ROGUELITE' && wv != null ? ' · wave ' + wv : ''))
          : 'BEST —';
      }
      card.innerHTML =
        '<span class="tag ' + v.tag + '">' + v.tag + '</span>' +
        '<h2>' + v.title + '</h2>' +
        '<p>' + v.desc + '</p>' +
        '<div class="goal' + (speedrun ? ' show' : '') + '">GOAL: ' + v.goal + '</div>' +
        '<div class="best">' + bestLine + '</div>';
      const go = () => play(v.file);
      card.addEventListener('click', go);
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); }
      });
      return card;
    }

    // one row per family: Classic on top, Roguelite below
    function renderCards() {
      cardsEl.innerHTML = '';
      const all = window.LEVELS || [];
      ['CLASSIC', 'ROGUELITE'].forEach(tag => {
        const vs = all.filter(v => v.tag === tag);
        if (!vs.length) return;
        const label = document.createElement('div');
        label.className = 'row-label';
        label.textContent = tag;
        const row = document.createElement('div');
        row.className = 'crow';
        vs.forEach(v => row.appendChild(makeCard(v)));
        cardsEl.appendChild(label);
        cardsEl.appendChild(row);
      });
    }

    function setMode(sr) {
      speedrun = sr;
      modeToggle.textContent = sr ? 'SPEEDRUN' : 'NORMAL';
      modeToggle.classList.toggle('speedrun', sr);
      modehint.textContent = sr
        ? 'Race the clock — reach each version’s goal as fast as you can. Best times are saved.'
        : 'Endless — survive and rack up the highest score.';
      renderCards();
    }

    function play(file) {
      SND.stopMusic();                 // game plays its own music
      frame.src = file + (speedrun ? '?speedrun=1' : '');
      select.style.display = 'none';
      frameWrap.style.display = 'block';
      back.style.display = 'inline-flex';
      frame.focus();
    }
    function toMenu() {
      frame.src = 'about:blank';
      frameWrap.style.display = 'none';
      back.style.display = 'none';
      select.style.display = 'flex';
      renderCards(); // refresh best stats
      if (gestured && SND.opt.music) SND.startMusic();
    }

    // ---- audio settings (shared localStorage; games read these on load) ----
    const sfxToggle = document.getElementById('sfxToggle');
    const musicToggle = document.getElementById('musicToggle');
    const sfxVol = document.getElementById('sfxVol');
    const musVol = document.getElementById('musVol');
    function getS(k, d) { try { const v = localStorage.getItem(k); return v == null ? d : v; } catch (e) { return d; } }
    function setS(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
    function refreshAudioUI() {
      const sfx = getS('asteroids_sfx', '1') !== '0';
      const music = getS('asteroids_music', '1') !== '0';
      sfxToggle.textContent = 'SFX: ' + (sfx ? 'ON' : 'OFF'); sfxToggle.classList.toggle('off', !sfx);
      musicToggle.textContent = 'MUSIC: ' + (music ? 'ON' : 'OFF'); musicToggle.classList.toggle('off', !music);
      sfxVol.value = getS('asteroids_sfxvol', '0.6');
      musVol.value = getS('asteroids_musvol', '0.5');
    }
    sfxToggle.addEventListener('click', () => { setS('asteroids_sfx', getS('asteroids_sfx','1') !== '0' ? '0' : '1'); refreshAudioUI(); });
    musicToggle.addEventListener('click', () => {
      const on = getS('asteroids_music','1') !== '0';
      setS('asteroids_music', on ? '0' : '1'); refreshAudioUI();
      if (on) SND.stopMusic(); else { gestured = true; SND.startMusic(); }
    });
    sfxVol.addEventListener('input', () => setS('asteroids_sfxvol', sfxVol.value));
    musVol.addEventListener('input', () => { setS('asteroids_musvol', musVol.value); SND.refresh(); });
    refreshAudioUI();

    // ---- reset all saved bests (times, scores, waves) ----
    document.getElementById('resetBtn').addEventListener('click', () => {
      if (!window.confirm('Reset all best scores and times for every version?')) return;
      (window.LEVELS || []).forEach(v => {
        const b = base(v.file);
        ['asteroids_best_', 'asteroids_score_', 'asteroids_wave_'].forEach(p => {
          try { localStorage.removeItem(p + b); } catch (e) {}
        });
      });
      renderCards();
    });

    modeToggle.addEventListener('click', () => setMode(!speedrun));
    back.addEventListener('click', toMenu);
    // in-game "Quit to menu" buttons post this message from inside the iframe
    window.addEventListener('message', (e) => { if (e.data === 'asteroids:menu') toMenu(); });

    setMode(false);
  </script>
</body>
</html>
