<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroids — Select Version</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #05060a;
    font-family: "Courier New", monospace;
    color: #cfe8ff;
    overflow: hidden;
  }
  #select {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 34px;
    background: radial-gradient(circle at center, rgba(10,14,26,0.7), rgba(5,6,10,0.96));
  }
  #select h1 {
    margin: 0; font-size: 58px; letter-spacing: 12px;
    text-shadow: 0 0 24px rgba(120,200,255,0.7);
  }
  #select .sub { opacity: 0.55; font-size: 14px; letter-spacing: 2px; margin-top: -22px; }
  .cards { display: flex; gap: 26px; flex-wrap: wrap; justify-content: center; }
  .card {
    width: 280px; padding: 28px 24px;
    border: 2px solid rgba(120,200,255,0.35);
    border-radius: 14px;
    background: rgba(20,30,50,0.35);
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    text-align: left;
  }
  .card:hover, .card:focus {
    transform: translateY(-6px);
    border-color: #9fe8ff;
    box-shadow: 0 0 28px rgba(120,200,255,0.4);
    outline: none;
  }
  .card .tag {
    display: inline-block; font-size: 11px; letter-spacing: 2px;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 14px;
  }
  .card.vanilla .tag { background: rgba(120,255,170,0.18); color: #7fffb0; }
  .card.latest .tag { background: rgba(255,200,120,0.18); color: #ffc878; }
  .card h2 { margin: 0 0 10px; font-size: 22px; letter-spacing: 1px; }
  .card p { margin: 0; font-size: 13px; line-height: 1.6; opacity: 0.75; }

  #frameWrap { position: fixed; inset: 0; display: none; background: #05060a; }
  #frameWrap iframe { width: 100%; height: 100%; border: 0; display: block; }
  #back {
    position: fixed; bottom: 16px; right: 18px;
    z-index: 10;
    font-family: "Courier New", monospace;
    font-size: 13px; letter-spacing: 1px;
    color: #cfe8ff; background: rgba(10,16,30,0.7);
    border: 1px solid rgba(120,200,255,0.4);
    border-radius: 8px; padding: 8px 14px;
    cursor: pointer;
    display: none;
  }
  #back:hover { border-color: #9fe8ff; box-shadow: 0 0 14px rgba(120,200,255,0.4); }
</style>
</head>
<body>
  <div id="select">
    <h1>ASTEROIDS</h1>
    <div class="sub">select version</div>
    <div class="cards">
      <div class="card vanilla" tabindex="0" data-src="vanilla.html">
        <span class="tag">FROZEN</span>
        <h2>Vanilla First Draft</h2>
        <p>The original build, preserved exactly as it was. Never changes.</p>
      </div>
      <div class="card latest" tabindex="0" data-src="latest.html">
        <span class="tag">UPDATED</span>
        <h2>Latest</h2>
        <p>Same game, plus every update applied in later sessions. Pause, extra start keys, weapon upgrades, and more to come.</p>
      </div>
    </div>
  </div>

  <div id="frameWrap"><iframe id="frame" title="Asteroids"></iframe></div>
  <button id="back">‹ versions</button>

  <script>
    const select = document.getElementById('select');
    const frameWrap = document.getElementById('frameWrap');
    const frame = document.getElementById('frame');
    const back = document.getElementById('back');

    function play(src) {
      frame.src = src;
      select.style.display = 'none';
      frameWrap.style.display = 'block';
      back.style.display = 'block';
      frame.focus();
    }
    function toMenu() {
      frame.src = 'about:blank';
      frameWrap.style.display = 'none';
      back.style.display = 'none';
      select.style.display = 'flex';
    }

    document.querySelectorAll('.card').forEach(card => {
      const go = () => play(card.dataset.src);
      card.addEventListener('click', go);
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); }
      });
    });
    back.addEventListener('click', toMenu);
  </script>
</body>
</html>
