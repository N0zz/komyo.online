<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Classic Asteroids — Enhanced</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../../../game-kit.css">
<script src="../../../game-kit.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; background:#05060a; overflow:hidden; font-family:"Courier New",monospace; color:#cfe8ff; }
  #game { display:block; width:100vw; height:100vh; }
  #topHud { position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:5; display:flex; gap:26px; flex-wrap:wrap; justify-content:center; align-items:center; max-width:calc(100vw - 240px); padding:5px 18px; border-radius:10px; background:rgba(8,12,20,0.55); border:1px solid rgba(120,200,255,0.22); text-shadow:0 0 8px rgba(120,200,255,0.6); pointer-events:none; user-select:none; text-align:center; }
  #hud { font-size:22px; letter-spacing:2px; }
  #hud .label { opacity:0.6; font-size:13px; }
  #weapon { font-size:13px; margin-top:4px; color:#ffc878; opacity:0.85; }
  #lives { font-size:22px; letter-spacing:4px; color:#7fffb0; text-shadow:0 0 8px rgba(120,255,170,0.6); }
  #timer { position:fixed; top:16px; left:50%; transform:translateX(-50%); font-size:26px; letter-spacing:3px; color:#ffd166; text-shadow:0 0 10px rgba(255,209,102,0.7); pointer-events:none; user-select:none; display:none; z-index:5; }
  @media (max-width:560px) { #topHud { top:50px; max-width:calc(100vw - 16px); gap:8px 18px; } }
  /* short screens (landscape phones): slim the HUD so it doesn't eat the playfield */
  @media (max-height:560px) { #topHud { padding:2px 12px; gap:14px; } #hud { font-size:16px; } #hud .label { font-size:9px; } #weapon { font-size:10px; margin-top:1px; } #lives { font-size:16px; } }
  #timer .goal { font-size:11px; opacity:0.6; letter-spacing:2px; text-align:center; }
  #flash { position:fixed; top:30%; left:0; right:0; text-align:center; font-size:30px; letter-spacing:6px; color:#ffc878; text-shadow:0 0 18px rgba(255,200,120,0.8); pointer-events:none; user-select:none; opacity:0; transition:opacity 0.3s ease; }
  #overlay { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; background:radial-gradient(circle at center, rgba(10,14,26,0.6), rgba(5,6,10,0.92)); gap:14px; user-select:none; }
  #overlay h1 { margin:0; font-size:64px; letter-spacing:10px; color:#cfe8ff; text-shadow:0 0 22px rgba(120,200,255,0.7); }
  #overlay h1.win { color:#ffd166; text-shadow:0 0 22px rgba(255,209,102,0.8); }
  #overlay p { margin:4px; font-size:16px; opacity:0.85; line-height:1.7; }
  #overlay .hint { opacity:0.55; font-size:14px; }
  .blink { animation:blink 1.1s steps(2,start) infinite; }
  @keyframes blink { to { opacity:0.25; } }
  @media (max-height: 540px) { #overlay { gap: 8px; overflow-y: auto; } #overlay h1 { font-size: 34px; letter-spacing: 5px; } #overlay p { font-size: 13px; line-height: 1.4; } }
  .btn { font-family:inherit; font-size:14px; letter-spacing:2px; padding:10px 22px; border-radius:10px; cursor:pointer; border:1px solid rgba(120,200,255,0.5); background:rgba(20,30,50,0.6); color:#cfe8ff; margin:4px; }
  .btn:hover { border-color:#9fe8ff; box-shadow:0 0 14px rgba(120,200,255,0.4); }
  .ashare { display:flex; gap:10px; justify-content:center; align-items:center; margin-top:10px; flex-wrap:wrap; }
  .ashare .albl { font-size:11px; letter-spacing:2px; opacity:0.5; margin-right:2px; }
  .asbtn { display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; padding:0; cursor:pointer; border-radius:10px; border:1px solid rgba(120,200,255,0.45); background:rgba(20,30,50,0.6); color:#cfe8ff; }
  .asbtn svg { width:18px; height:18px; fill:currentColor; display:block; }
  .asbtn:hover { border-color:#9fe8ff; box-shadow:0 0 12px rgba(120,200,255,0.4); }
  .asbtn.ok { color:#7fe0a0; border-color:#7fe0a0; }
  .row { display:flex; gap:10px; justify-content:center; margin-top:6px; }
  .settings { display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; margin-top:6px; }
  .settings .vol { font-size:12px; letter-spacing:1px; opacity:0.8; } .settings .vol input { vertical-align:middle; }
  .hidden { display:none !important; }
  /* mobile touch controls (only shown on touch devices) */
  #tcontrols { position:fixed; inset:0; z-index:7; pointer-events:none; }
  .tc-zone { position:absolute; left:0; top:0; width:50%; height:100%; pointer-events:auto; touch-action:none; }
  .tc-joy { position:absolute; width:116px; height:116px; border-radius:50%; border:2px solid rgba(120,200,255,0.5); background:rgba(20,30,50,0.4); pointer-events:none; display:none; opacity:0.5; }
  .tc-knob { position:absolute; left:50%; top:50%; width:54px; height:54px; margin:-27px 0 0 -27px; border-radius:50%; background:rgba(159,232,255,0.55); box-shadow:0 0 16px rgba(120,200,255,0.6); }
  .tc-fire { position:absolute; right:24px; bottom:34px; width:96px; height:96px; border-radius:50%; border:2px solid rgba(255,150,150,0.6); background:rgba(80,20,20,0.45); color:#ffc0c0; font:bold 15px "Courier New",monospace; letter-spacing:2px; pointer-events:auto; touch-action:none; display:flex; align-items:center; justify-content:center; opacity:0.5; }
  .tc-pause { position:absolute; right:16px; top:14px; width:46px; height:46px; border-radius:10px; border:1px solid rgba(120,200,255,0.4); background:rgba(10,16,30,0.6); color:#cfe8ff; font:bold 15px "Courier New",monospace; pointer-events:auto; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="topHud"><div id="hud"><div class="label">SCORE</div><div id="score">0</div><div id="weapon">WEAPON I</div></div><div id="lives"></div></div>
<div id="timer"><div id="timerVal">00:00.00</div><div class="goal" id="timerGoal"></div></div>
<div id="flash"></div>

<div id="overlay">
  <h1>ASTEROIDS</h1>
  <p><strong>&larr;&rarr;</strong> / <strong>A&nbsp;D</strong> rotate &middot; <strong>&uarr;</strong> / <strong>W</strong> thrust &middot; <strong>SPACE</strong> shoot &middot; <strong>ESC</strong> pause</p>
  <p class="hint" id="modeHint">Fly around them or blast them apart. Score to upgrade your weapon.</p>
  <p class="blink">press ENTER or SPACE to start</p>
</div>

<script>
(() => {
  const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
  const scoreEl=document.getElementById('score'), weaponEl=document.getElementById('weapon');
  const livesEl=document.getElementById('lives'), overlay=document.getElementById('overlay'), flashEl=document.getElementById('flash');
  const timerEl=document.getElementById('timer'), timerVal=document.getElementById('timerVal'), timerGoal=document.getElementById('timerGoal');
  const modeHint=document.getElementById('modeHint');

  // ---- Speedrun ----
  const SPEEDRUN = new URLSearchParams(location.search).has('speedrun');
  const SR_TARGET_SCORE = 2000;
  const BEST_KEY = 'asteroids_best_classic-enhanced.html';
  const now = () => (window.performance && performance.now) ? performance.now() : Date.now();
  let srElapsed=0, srPrev=0, srDone=false;
  function fmtTime(ms){ const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), cs=Math.floor((ms%1000)/10); return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(cs).padStart(2,'0'); }
  function saveBest(ms){ try{ const p=localStorage.getItem(BEST_KEY); if(p==null||ms<parseInt(p,10)){ localStorage.setItem(BEST_KEY,String(Math.floor(ms))); return true; } }catch(e){} return false; }
  const SCORE_KEY='asteroids_score_classic-enhanced.html';
  function saveBestScore(v){ try{ const p=localStorage.getItem(SCORE_KEY); if(p==null||v>parseInt(p,10)){ localStorage.setItem(SCORE_KEY,String(v)); return true; } }catch(e){} return false; }
  if (SPEEDRUN){ timerEl.style.display='block'; timerGoal.textContent='GOAL: '+SR_TARGET_SCORE+' PTS'; modeHint.textContent='SPEEDRUN — reach '+SR_TARGET_SCORE+' points as fast as you can.'; const th=document.getElementById('topHud'); if(th) th.style.top='58px'; }


  // ---- Audio: SFX go through the game-kit shared sound engine (site-wide SFX mute/volume);
  //      music stays a local procedural engine whose master gain is driven by the kit's Music channel. ----
  const KIT = (typeof window !== 'undefined' && window.gamekit) ? window.gamekit : null;
  if (KIT) KIT.sound.define({
    shoot:({tone})=>tone(660,0.07,'square',0.08), pop:({tone})=>tone(320,0.06,'square',0.06), explode:({noise})=>noise(0.3,0.35), hit:({tone})=>tone(170,0.12,'sawtooth',0.22),
    pickup:({tone})=>{tone(880,0.07);setTimeout(()=>tone(1320,0.1),55);}, level:({tone})=>[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,0.12,'triangle',0.18),i*70)),
    boss:({tone})=>tone(90,0.7,'sawtooth',0.3), over:({tone})=>[440,330,220].forEach((f,i)=>setTimeout(()=>tone(f,0.25,'sawtooth',0.18),i*150)),
  });
  const SND = (() => {
    let ac, master, musG, mt=null;
    function ensure(){ if(ac!==undefined) return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC){ ac=null; return; }
      ac=new AC(); master=ac.createGain(); master.gain.value=1; master.connect(ac.destination);
      musG=ac.createGain(); musG.gain.value=(KIT?KIT.music.gain():0.5); musG.connect(master); }
    const scale=[220,277.18,329.63,440,329.63,277.18]; let step=0;
    function mtick(){ if(!ac) return; const f=scale[step%scale.length]*(Math.floor(step/6)%2?0.5:1); const o=ac.createOscillator(),v=ac.createGain(); o.type='triangle'; o.frequency.value=f; v.gain.value=0; v.gain.linearRampToValueAtTime(0.16,ac.currentTime+0.03); v.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.4); o.connect(v); v.connect(musG); o.start(); o.stop(ac.currentTime+0.45); step++; }
    return {
      play(n){ if(KIT) KIT.sound.play(n); },
      startMusic(){ ensure(); if(!ac||mt) return; if(ac.state==='suspended') ac.resume(); mt=setInterval(mtick,250); },
      stopMusic(){ if(mt){ clearInterval(mt); mt=null; } },
      setGain(g){ ensure(); if(musG) musG.gain.value=g; },
    };
  })();
  if (KIT) KIT.music.subscribe(s => SND.setGain(s.gain));

  let W,H;
  function resize(){ const m=Math.min(window.innerWidth,window.innerHeight); const S=m<640?Math.min(2.6,900/m):1; W=canvas.width=Math.round(window.innerWidth*S); H=canvas.height=Math.round(window.innerHeight*S); buildStars(); }
  (window.gamekit && window.gamekit.layout) ? window.gamekit.layout.on(resize) : window.addEventListener('resize', resize);

  let stars=[];
  function buildStars(){ stars=[]; const count=Math.floor((W*H)/6000); for(let i=0;i<count;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.2,a:Math.random()*0.6+0.2,tw:Math.random()*Math.PI*2,ts:Math.random()*0.04+0.01}); }

  const keys={};
  window.addEventListener('keydown',(e)=>{
    if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
    keys[e.key.length===1?e.key.toLowerCase():e.key]=true;
    if((e.key==='Enter'||e.key===' ') && state!=='playing' && state!=='paused') startGame();
    if(e.key==='Escape'){ if(state==='playing') pauseGame(); else if(state==='paused') resumeGame(); }
  });
  window.addEventListener('keyup',(e)=>{ keys[e.key.length===1?e.key.toLowerCase():e.key]=false; });

  let state='menu'; // menu | playing | paused | dead | won
  let score=0, lives=3, level=1;
  let ship, asteroids=[], bullets=[], particles=[];
  let shootCooldown=0, invuln=0, weaponLevel=1, flashTimer=0;

  const WEAPONS=[
    {level:1,score:0,cooldown:12,label:'WEAPON I'},
    {level:2,score:500,cooldown:11,label:'WEAPON II — TWIN'},
    {level:3,score:1500,cooldown:9,label:'WEAPON III — SPREAD'},
  ];

  function startGame(){ score=0; lives=3; level=1; weaponLevel=1; asteroids=[]; bullets=[]; particles=[];
    spawnShip(); spawnWave(4); state='playing'; overlay.classList.add('hidden'); updateHud();
    srElapsed=0; srPrev=now(); srDone=false; SND.startMusic(); }
  function pauseGame(){ state='paused'; overlay.innerHTML='<h1>PAUSED</h1><p class="hint">score '+score+' &middot; wave '+level+'</p><div class="row"><button class="btn" id="resumeBtn">RESUME (ESC)</button>'+MENU_BTN+'</div>'; overlay.classList.remove('hidden'); wireOverlay(); }
  function resumeGame(){ state='playing'; srPrev=now(); overlay.classList.add('hidden'); }
  function spawnShip(){ ship={x:W/2,y:H/2,vx:0,vy:0,angle:-Math.PI/2,r:14}; invuln=120; }
  function updateHud(){ scoreEl.textContent=score; livesEl.textContent='▲ '.repeat(Math.max(0,lives)).trim(); weaponEl.textContent=WEAPONS[weaponLevel-1].label; }
  function flash(msg){ flashEl.textContent=msg; flashEl.style.opacity='1'; flashTimer=90; }
  function quitToMenu(){ if(!SPEEDRUN && (state==='playing'||state==='paused')) saveBestScore(score); try{ if(window.parent && window.parent!==window) window.parent.postMessage('asteroids:menu','*'); }catch(e){} }
  function wireOverlay(){ const mb=document.getElementById('menuBtn'); if(mb) mb.addEventListener('click', quitToMenu); const rb=document.getElementById('resumeBtn'); if(rb) rb.addEventListener('click', resumeGame); }
  const MENU_BTN = '<button class="btn" id="menuBtn">QUIT TO MENU</button>';
  // end-screen share row is built by the game-kit into this placeholder
  const SHARE_ROW = '<div id="shareRow"></div>';
  function wireShareRow(finalScore) {
    if (KIT) KIT.shareRow(document.getElementById('shareRow'), { slug: 'asteroids', title: 'Asteroids', message: () => KIT.shareText({ score: finalScore, game: 'Asteroids', emoji: '🛸', mode: 'Classic+', extra: ['level ' + level] }), params: () => ({ play: 'classic-enhanced.html' }) });
  }
  function checkWeaponUpgrade(){ const nx=WEAPONS[weaponLevel]; if(nx && score>=nx.score){ weaponLevel=nx.level; flash('WEAPON UPGRADED'); updateHud(); } }

  function makeAsteroid(x,y,size){ const r=size===3?56:size===2?34:18; const verts=[]; const n=9+Math.floor(Math.random()*4);
    for(let i=0;i<n;i++){ const ang=(i/n)*Math.PI*2; verts.push({ang,d:r*(0.65+Math.random()*0.5)}); }
    const speed=(1.1+Math.random()*0.9)*(4-size)*0.55; const dir=Math.random()*Math.PI*2;
    return {x,y,size,r,vx:Math.cos(dir)*speed,vy:Math.sin(dir)*speed,rot:Math.random()*Math.PI*2,vrot:(Math.random()-0.5)*0.03,verts,hue:200+Math.random()*40}; }
  function spawnWave(count){ for(let i=0;i<count;i++){ let x,y; if(Math.random()<0.5){ x=Math.random()<0.5?-60:W+60; y=Math.random()*H; } else { x=Math.random()*W; y=Math.random()<0.5?-60:H+60; } asteroids.push(makeAsteroid(x,y,3)); } }
  function burst(x,y,color,n,spread){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, sp=Math.random()*spread+0.5; particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:Math.random()*0.025+0.012,color,size:Math.random()*2+1}); } }
  function wrap(o){ if(o.x<-o.r)o.x=W+o.r; if(o.x>W+o.r)o.x=-o.r; if(o.y<-o.r)o.y=H+o.r; if(o.y>H+o.r)o.y=-o.r; }

  function fireBullet(angle){ bullets.push({ x:ship.x+Math.cos(angle)*ship.r, y:ship.y+Math.sin(angle)*ship.r, vx:Math.cos(angle)*8+ship.vx, vy:Math.sin(angle)*8+ship.vy, life:70, r:2 }); }
  function shoot(){
    if(weaponLevel===1){ fireBullet(ship.angle); }
    else if(weaponLevel===2){ const perp=ship.angle+Math.PI/2, off=6, ox=Math.cos(perp)*off, oy=Math.sin(perp)*off;
      [[ox,oy],[-ox,-oy]].forEach(([dx,dy])=>{ bullets.push({ x:ship.x+Math.cos(ship.angle)*ship.r+dx, y:ship.y+Math.sin(ship.angle)*ship.r+dy, vx:Math.cos(ship.angle)*8+ship.vx, vy:Math.sin(ship.angle)*8+ship.vy, life:70, r:2 }); }); }
    else { [-0.18,0,0.18].forEach(da=>fireBullet(ship.angle+da)); }
    burst(ship.x+Math.cos(ship.angle)*ship.r, ship.y+Math.sin(ship.angle)*ship.r, '180,230,255', 3, 1.5); SND.play('shoot');
  }
  function hitAsteroid(idx){ const a=asteroids[idx]; score+=a.size===3?20:a.size===2?50:100; burst(a.x,a.y,'120,200,255',a.size*8,a.size*1.4);
    if(a.size>1){ asteroids.push(makeAsteroid(a.x,a.y,a.size-1)); asteroids.push(makeAsteroid(a.x,a.y,a.size-1)); }
    asteroids.splice(idx,1); SND.play('pop'); updateHud(); checkWeaponUpgrade();
    if(SPEEDRUN && !srDone && score>=SR_TARGET_SCORE) winRun();
    if(asteroids.length===0){ level++; spawnWave(3+level); } }
  function killShip(){ SND.play('hit'); burst(ship.x,ship.y,'255,160,120',40,4); lives--; updateHud(); if(lives<=0){ state='dead'; showGameOver(); } else spawnShip(); }
  function winRun(){ srDone=true; state='won'; SND.stopMusic(); SND.play('level'); const isBest=saveBest(srElapsed);
    overlay.innerHTML='<h1 class="win">COMPLETE</h1><p>Time: <strong>'+fmtTime(srElapsed)+'</strong>'+(isBest?'  ★ NEW BEST':'')+'</p><p class="hint">'+SR_TARGET_SCORE+' points reached</p><p class="blink">press ENTER or SPACE to run again</p><div class="row">'+MENU_BTN+'</div>'+SHARE_ROW;
    overlay.classList.remove('hidden'); wireOverlay(); wireShareRow(score); }
  function showGameOver(){ SND.stopMusic(); SND.play('over'); const best=!SPEEDRUN&&saveBestScore(score); if(window.gamekit&&window.gamekit.recordResult)window.gamekit.recordResult('asteroids',{mode:SPEEDRUN?'speedrun':'',score:score,time:SPEEDRUN?srElapsed:0,stats:{wave:level}}); overlay.innerHTML='<h1>GAME OVER</h1><p>Final score: <strong>'+score+'</strong>'+(best?'  ★ NEW BEST':'')+'</p>'+(SPEEDRUN?'<p class="hint">run failed at '+fmtTime(srElapsed)+'</p>':'<p class="hint">reached wave '+level+'</p>')+'<p class="blink">press ENTER or SPACE to play again</p><div class="row">'+MENU_BTN+'</div>'+SHARE_ROW; overlay.classList.remove('hidden'); wireOverlay(); wireShareRow(score); }

  function update(){
    applyTouch();
    if(flashTimer>0){ flashTimer--; if(flashTimer===0) flashEl.style.opacity='0'; }
    // speedrun clock — only advances while actively playing
    const t=now(); if(state==='playing' && !srDone) srElapsed+=t-srPrev; srPrev=t;
    if(SPEEDRUN) timerVal.textContent=fmtTime(srElapsed);

    if(state==='playing'){
      if(keys['ArrowLeft']||keys['a']) ship.angle-=0.07;
      if(keys['ArrowRight']||keys['d']) ship.angle+=0.07;
      let thrusting=false;
      if(keys['ArrowUp']||keys['w']){ ship.vx+=Math.cos(ship.angle)*0.16; ship.vy+=Math.sin(ship.angle)*0.16; thrusting=true; }
      ship.vx*=0.99; ship.vy*=0.99; const sp=Math.hypot(ship.vx,ship.vy), max=9;
      if(sp>max){ ship.vx=ship.vx/sp*max; ship.vy=ship.vy/sp*max; }
      ship.x+=ship.vx; ship.y+=ship.vy; wrap(ship);
      if(thrusting && Math.random()<0.8){ const bx=ship.x-Math.cos(ship.angle)*ship.r, by=ship.y-Math.sin(ship.angle)*ship.r;
        particles.push({x:bx,y:by,vx:-Math.cos(ship.angle)*(Math.random()*2+1)+(Math.random()-0.5),vy:-Math.sin(ship.angle)*(Math.random()*2+1)+(Math.random()-0.5),life:1,decay:0.06,color:'255,180,90',size:Math.random()*2+1}); }
      if(shootCooldown>0) shootCooldown--;
      if(keys[' '] && shootCooldown===0){ shoot(); shootCooldown=WEAPONS[weaponLevel-1].cooldown; }
      if(invuln>0) invuln--;
    }
    if(state!=='paused'){
      for(const a of asteroids){ a.x+=a.vx; a.y+=a.vy; a.rot+=a.vrot; wrap(a); }
      for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i]; b.x+=b.vx; b.y+=b.vy; b.life--; wrap(b);
        if(b.life<=0){ bullets.splice(i,1); continue; }
        for(let j=asteroids.length-1;j>=0;j--){ const a=asteroids[j]; if(Math.hypot(a.x-b.x,a.y-b.y)<a.r){ bullets.splice(i,1); hitAsteroid(j); break; } } }
      if(state==='playing' && invuln===0){ for(let j=0;j<asteroids.length;j++){ const a=asteroids[j]; if(Math.hypot(a.x-ship.x,a.y-ship.y)<a.r+ship.r*0.7){ hitAsteroid(j); killShip(); break; } } }
      for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.96; p.vy*=0.96; p.life-=p.decay; if(p.life<=0) particles.splice(i,1); }
    }
  }

  function drawStars(){ for(const s of stars){ s.tw+=s.ts; const a=s.a*(0.6+0.4*Math.sin(s.tw)); ctx.fillStyle='rgba(200,225,255,'+a+')'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); } }
  function drawShip(){ if(state!=='playing'&&state!=='paused') return; if(invuln>0 && Math.floor(invuln/6)%2===0) return;
    ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(ship.angle); ctx.strokeStyle='#9fe8ff'; ctx.lineWidth=2; ctx.shadowColor='rgba(120,200,255,0.9)'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.moveTo(16,0); ctx.lineTo(-12,-10); ctx.lineTo(-6,0); ctx.lineTo(-12,10); ctx.closePath(); ctx.stroke(); ctx.restore(); }
  function drawAsteroids(){ for(const a of asteroids){ ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.rot); ctx.strokeStyle='hsl('+a.hue+',60%,70%)'; ctx.lineWidth=2; ctx.shadowColor='hsla('+a.hue+',80%,60%,0.5)'; ctx.shadowBlur=8;
    ctx.beginPath(); a.verts.forEach((v,i)=>{ const px=Math.cos(v.ang)*v.d, py=Math.sin(v.ang)*v.d; if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); }); ctx.closePath(); ctx.stroke(); ctx.restore(); } }
  function drawBullets(){ ctx.shadowColor='rgba(180,230,255,0.9)'; ctx.shadowBlur=8; ctx.fillStyle='#dff3ff'; for(const b of bullets){ ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); } }
  function drawParticles(){ for(const p of particles){ ctx.fillStyle='rgba('+p.color+','+p.life+')'; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill(); } }
  function render(){ ctx.clearRect(0,0,W,H); ctx.shadowBlur=0; drawStars(); drawParticles(); drawAsteroids(); drawBullets(); drawShip(); ctx.shadowBlur=0; }
  const STEP_MS = 1000/60; let _accT = 0, _lastT = now();
  function loop(){ requestAnimationFrame(loop); try { let _t=now(), _el=_t-_lastT; _lastT=_t; if(window.gamekit&&window.gamekit.isPaused&&window.gamekit.isPaused()){ render(); return; } if(_el>250) _el=250; _accT+=_el; let _g=0; while(_accT>=STEP_MS && _g<5){ update(); _accT-=STEP_MS; _g++; } render(); } catch(e){ if(window.console) console.error(e); } }

  // ---- Touch controls (mobile): aim-and-go joystick + fire; desktop is unaffected ----
  const HAS_PAUSE = false; // no on-screen pause button (it sat behind the kit's top-right buttons); Esc still pauses on desktop
  const isTouch = (typeof matchMedia!=='undefined' && matchMedia('(pointer:coarse)').matches) || ('ontouchstart' in window);
  let joyActive=false, joyAngle=0, joyMag=0, joyId=null, fireBtn=null;
  function applyTouch(){ if(!isTouch||!ship) return;
    keys['ArrowLeft']=false; keys['ArrowRight']=false; keys['ArrowUp']=false; // joystick drives the ship directly (aim-and-go)
    if(joyActive){ ship.angle=joyAngle; const th=0.45; if(joyMag>th){ const acc=(ship.accel||0.16)*Math.min(1,(joyMag-th)/(1-th)); ship.vx+=Math.cos(joyAngle)*acc; ship.vy+=Math.sin(joyAngle)*acc; } }
    if(fireBtn) fireBtn.style.display = ship.auto ? 'none' : 'flex'; }
  function buildTouch(){
    const wrap=document.createElement('div'); wrap.id='tcontrols';
    const zone=document.createElement('div'); zone.className='tc-zone';
    const joy=document.createElement('div'); joy.className='tc-joy'; const knob=document.createElement('div'); knob.className='tc-knob'; joy.appendChild(knob);
    fireBtn=document.createElement('button'); fireBtn.className='tc-fire'; fireBtn.textContent='FIRE';
    wrap.appendChild(zone); wrap.appendChild(joy); wrap.appendChild(fireBtn);
    if(HAS_PAUSE){ const pb=document.createElement('button'); pb.className='tc-pause'; pb.textContent='II'; pb.addEventListener('click',()=>{ if(state==='playing') pauseGame(); else if(state==='paused') resumeGame(); }); wrap.appendChild(pb); }
    document.body.appendChild(wrap);
    const R=58; let ox=0, oy=0;
    function getT(e){ for(const x of e.changedTouches) if(x.identifier===joyId) return x; return null; }
    function jset(t){ const dx=t.clientX-ox, dy=t.clientY-oy; const dist=Math.hypot(dx,dy)||0.0001; const cl=Math.min(dist,R); joyAngle=Math.atan2(dy,dx); joyMag=cl/R; knob.style.transform='translate('+(Math.cos(joyAngle)*cl)+'px,'+(Math.sin(joyAngle)*cl)+'px)'; }
    // floating joystick: spawns wherever the first touch lands in the left half
    zone.addEventListener('touchstart',e=>{ if(joyId!==null) return; const t=e.changedTouches[0]; joyId=t.identifier; ox=t.clientX; oy=t.clientY; joy.style.left=(ox-R)+'px'; joy.style.top=(oy-R)+'px'; joy.style.display='block'; joyActive=true; joyMag=0; knob.style.transform='translate(0,0)'; e.preventDefault(); },{passive:false});
    zone.addEventListener('touchmove',e=>{ const t=getT(e); if(t){ jset(t); e.preventDefault(); } },{passive:false});
    const rel=e=>{ if(getT(e)){ joyActive=false; joyId=null; joyMag=0; joy.style.display='none'; } };
    zone.addEventListener('touchend',rel); zone.addEventListener('touchcancel',rel);
    fireBtn.addEventListener('touchstart',e=>{ keys[' ']=true; e.preventDefault(); },{passive:false});
    fireBtn.addEventListener('touchend',e=>{ keys[' ']=false; e.preventDefault(); },{passive:false});
    fireBtn.addEventListener('touchcancel',()=>{ keys[' ']=false; });
  }
  // tap the start / game-over / win / pause screen instead of a key
  overlay.addEventListener('click',(e)=>{ if(e.target && e.target.closest && e.target.closest('button')) return; if(state==='menu'||state==='dead'||state==='won') startGame(); else if(HAS_PAUSE && state==='paused') resumeGame(); });
  if(isTouch){ document.body.classList.add('touch'); buildTouch(); }

  // game-kit nav: top-left ‹ Menu (quits to the launcher) + top-right sound menu (SFX + Music + Reset)
  if (KIT) KIT.nav({ music: true, reset: 'asteroids_', home: '../../../', onMenu: () => { quitToMenu(); } });

  resize(); spawnWave(4); updateHud(); loop();
})();
</script>
