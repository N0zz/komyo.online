<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Roguelite: Auto Level-Up</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
  html, body { margin:0; padding:0; height:100%; background:#05060a; overflow:hidden; font-family:"Courier New",monospace; color:#cfe8ff; }
  #game { display:block; width:100vw; height:100vh; }
  body::after { content:""; position:fixed; inset:0; pointer-events:none; z-index:5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0.16) 0px, rgba(0,0,0,0.16) 1px, transparent 2px, transparent 3px); opacity:0.3; }
  .hud { position:fixed; z-index:6; pointer-events:none; user-select:none; text-shadow:0 0 8px rgba(120,200,255,0.6); }
  #hudL { top:16px; left:20px; font-size:20px; letter-spacing:2px; }
  #hudL .label { opacity:0.55; font-size:12px; letter-spacing:2px; }
  #hudL #wave { margin-top:6px; font-size:14px; color:#9fe8ff; }
  #hudL #credits { margin-top:6px; font-size:14px; color:#ffd166; }
  #hudR { top:16px; right:20px; text-align:right; }
  #hp { font-size:22px; letter-spacing:3px; color:#ff7b7b; text-shadow:0 0 8px rgba(255,120,120,0.6); }
  #shield { font-size:16px; letter-spacing:3px; color:#7fd0ff; margin-top:4px; }
  #timer { top:14px; left:50%; transform:translateX(-50%); font-size:24px; letter-spacing:3px; color:#ffd166; text-shadow:0 0 10px rgba(255,209,102,0.7); display:none; text-align:center; }
  #timer .goal { font-size:11px; opacity:0.6; letter-spacing:2px; }
  #xpwrap { left:50%; transform:translateX(-50%); bottom:18px; width:min(620px,70vw); }
  #xpbar { height:10px; border:1px solid rgba(180,140,255,0.5); border-radius:6px; background:rgba(40,20,70,0.5); overflow:hidden; }
  #xpfill { height:100%; width:0%; background:linear-gradient(90deg,#9b6bff,#d9a7ff); box-shadow:0 0 12px rgba(180,120,255,0.7); transition:width 0.1s linear; }
  #xplabel { text-align:center; font-size:12px; letter-spacing:2px; color:#d9b8ff; margin-top:4px; }
  #flash { position:fixed; z-index:6; top:26%; left:0; right:0; text-align:center; font-size:28px; letter-spacing:5px; color:#ffc878; text-shadow:0 0 18px rgba(255,200,120,0.8); pointer-events:none; user-select:none; opacity:0; transition:opacity 0.3s ease; }
  #overlay { position:fixed; inset:0; z-index:8; display:flex; flex-direction:column; align-items:center; justify-content:safe center; text-align:center;
    background:radial-gradient(circle at center, rgba(10,14,26,0.62), rgba(5,6,10,0.93)); gap:14px; user-select:none; padding:24px 20px; box-sizing:border-box; overflow-y:auto; }
  #overlay h1 { margin:0; font-size:54px; letter-spacing:8px; color:#cfe8ff; text-shadow:0 0 22px rgba(120,200,255,0.7); }
  #overlay h1.win { color:#ffd166; text-shadow:0 0 22px rgba(255,209,102,0.8); }
  #overlay h1.level { color:#d9a7ff; text-shadow:0 0 22px rgba(180,120,255,0.8); }
  #overlay p { margin:2px; font-size:15px; opacity:0.85; line-height:1.6; }
  #overlay .hint { opacity:0.55; font-size:13px; }
  .blink { animation:blink 1.1s steps(2,start) infinite; }
  @keyframes blink { to { opacity:0.25; } }
  .cards { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; max-width:840px; }
  /* compact grid for the wave shop, which lists many upgrades — fits without fullscreen */
  .cards.shop { gap:10px; max-width:920px; }
  .cards.shop .ucard { width:150px; padding:10px 12px; }
  .cards.shop .ucard h3 { font-size:14px; margin:4px 0 5px; }
  .cards.shop .ucard p { font-size:11px; line-height:1.4; }
  .cards.shop .ucard .lvl { margin-top:6px; }
  .cards.shop .ucard .price { margin-top:5px; font-size:12px; }
  .ucard { width:210px; padding:18px 16px; border:2px solid rgba(180,140,255,0.45); border-radius:12px; background:rgba(30,20,55,0.55);
    cursor:pointer; text-align:left; transition:transform 0.12s, box-shadow 0.12s, border-color 0.12s; }
  .ucard:hover, .ucard.sel { transform:translateY(-5px); border-color:#d9a7ff; box-shadow:0 0 24px rgba(180,120,255,0.5); }
  .ucard .k { font-size:11px; opacity:0.5; letter-spacing:2px; }
  .ucard h3 { margin:6px 0 8px; font-size:17px; color:#eddcff; }
  .ucard p { margin:0; font-size:12px; line-height:1.5; opacity:0.8; }
  .ucard .lvl { margin-top:10px; font-size:11px; color:#ffd166; letter-spacing:1px; }
  .ucard .price { margin-top:8px; font-size:13px; color:#ffd166; }
  .ucard.disabled { opacity:0.4; cursor:not-allowed; border-color:rgba(120,120,140,0.4); }
  .ucard.disabled:hover { transform:none; box-shadow:none; border-color:rgba(120,120,140,0.4); }
  #shopFoot { margin-top:8px; }
  .btn { font-family:inherit; font-size:14px; letter-spacing:2px; padding:10px 24px; border-radius:10px; cursor:pointer;
    border:1px solid rgba(120,200,255,0.5); background:rgba(20,30,50,0.6); color:#cfe8ff; }
  .btn:hover { border-color:#9fe8ff; box-shadow:0 0 14px rgba(120,200,255,0.4); }
  .btn.sel { border-color:#ffd166; color:#ffd166; box-shadow:0 0 16px rgba(255,209,102,0.5); }
  .credits-big { font-size:26px; color:#ffd166; letter-spacing:3px; text-shadow:0 0 14px rgba(255,209,102,0.7); margin:-4px 0 2px; }
  .settings { display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; margin-top:6px; }
  .settings .vol { font-size:12px; letter-spacing:1px; opacity:0.8; } .settings .vol input { vertical-align:middle; }
  .hidden { display:none !important; }
  /* mobile touch controls (only shown on touch devices) */
  #tcontrols { position:fixed; inset:0; z-index:7; pointer-events:none; }
  .tc-zone { position:absolute; left:0; top:0; width:50%; height:100%; pointer-events:auto; touch-action:none; }
  .tc-joy { position:absolute; width:116px; height:116px; border-radius:50%; border:2px solid rgba(120,200,255,0.5); background:rgba(20,30,50,0.4); pointer-events:none; display:none; opacity:0.5; }
  .tc-knob { position:absolute; left:50%; top:50%; width:54px; height:54px; margin:-27px 0 0 -27px; border-radius:50%; background:rgba(159,232,255,0.55); box-shadow:0 0 16px rgba(120,200,255,0.6); }
  .tc-fire { position:absolute; right:24px; bottom:34px; width:96px; height:96px; border-radius:50%; border:2px solid rgba(255,150,150,0.6); background:rgba(80,20,20,0.45); color:#ffc0c0; font:bold 15px "Courier New",monospace; letter-spacing:2px; pointer-events:auto; touch-action:none; display:flex; align-items:center; justify-content:center; opacity:0.5; }
  .tc-pause { position:absolute; right:16px; top:14px; width:46px; height:46px; border-radius:10px; border:1px solid rgba(120,200,255,0.4); background:rgba(10,16,30,0.6); color:#cfe8ff; font:bold 15px "Courier New",monospace; pointer-events:auto; }
  body.touch #hudR, body.touch #lives { top: 60px; }
  body.touch #xpwrap { bottom: 172px; width: min(420px, 60vw); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud" id="hudL"><div class="label">SCORE</div><div id="score">0</div><div id="wave">WAVE 1</div><div id="credits" style="display:none">◈ 0</div></div>
<div class="hud" id="hudR"><div id="hp">♥♥♥</div><div id="shield"></div></div>
<div class="hud" id="timer"><div id="timerVal">00:00.00</div><div class="goal" id="timerGoal"></div></div>
<div class="hud" id="xpwrap"><div id="xpbar"><div id="xpfill"></div></div><div id="xplabel">LV 1</div></div>
<div id="flash"></div>

<div id="overlay">
  <h1>ASTEROIDS</h1>
  <p id="modeTitle">ROGUELITE — AUTO LEVEL-UP</p>
  <p><strong>&larr;&rarr;</strong> / <strong>A&nbsp;D</strong> rotate &middot; <strong>&uarr;</strong> / <strong>W</strong> thrust &middot; <strong>SPACE</strong> shoot &middot; <strong>ESC</strong> pause</p>
  <p class="hint" id="modeHint">Destroy enemies, collect XP gems, level up and pick upgrades. Survive the waves.</p>
  <p class="blink">press ENTER or SPACE to start</p>
</div>

<script>
(() => {
  // ============ PROGRESSION MODE (the only line that differs between the 3 roguelite builds) ============
  const PROGRESSION = 'levelup'; // 'levelup' | 'milestones' | 'shop'
  // =====================================================================================================

  const $ = id => document.getElementById(id);
  const canvas=$('game'), ctx=canvas.getContext('2d');
  const overlay=$('overlay'), flashEl=$('flash');
  const scoreEl=$('score'), waveEl=$('wave'), creditsEl=$('credits'), hpEl=$('hp'), shieldEl=$('shield');
  const timerEl=$('timer'), timerVal=$('timerVal'), timerGoal=$('timerGoal');
  const xpwrap=$('xpwrap'), xpfill=$('xpfill'), xplabel=$('xplabel');
  const modeHint=$('modeHint'), modeTitle=$('modeTitle');

  // ---- Speedrun ----
  const SPEEDRUN = new URLSearchParams(location.search).has('speedrun');
  const SR_TARGET_WAVE = 5; // clear wave 5 (first boss)
  const FILE = ({levelup:'roguelite-levelup.html', milestones:'roguelite-milestones.html', shop:'roguelite-shop.html'})[PROGRESSION];
  const BEST_KEY = 'asteroids_best_' + FILE;
  const now = () => (window.performance && performance.now) ? performance.now() : Date.now();
  let srElapsed=0, srPrev=0, srDone=false;

  // ---- Audio (procedural Web Audio — no asset files; inert when AudioContext is absent) ----
  const SND = (() => {
    let ac, master, sfxG, musG, mt=null;
    function num(k,d){ try{ const v=localStorage.getItem(k); return v==null?d:parseFloat(v); }catch(e){ return d; } }
    const opt = {
      get sfx(){ try{ return localStorage.getItem('asteroids_sfx')!=='0'; }catch(e){ return true; } },
      get music(){ try{ return localStorage.getItem('asteroids_music')!=='0'; }catch(e){ return true; } },
      get sfxvol(){ return num('asteroids_sfxvol',0.6); },
      get musvol(){ return num('asteroids_musvol',0.5); },
    };
    function ensure(){ if(ac!==undefined) return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC){ ac=null; return; }
      ac=new AC(); master=ac.createGain(); master.gain.value=1; master.connect(ac.destination);
      sfxG=ac.createGain(); sfxG.gain.value=opt.sfxvol; sfxG.connect(master); musG=ac.createGain(); musG.gain.value=opt.musvol; musG.connect(master); }
    function tone(f,d,type,g){ if(!ac) return; const o=ac.createOscillator(),v=ac.createGain(); o.type=type||'square'; o.frequency.value=f; v.gain.value=g||0.18; v.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+d); o.connect(v); v.connect(sfxG); o.start(); o.stop(ac.currentTime+d); }
    function noise(d,g){ if(!ac) return; const n=ac.createBufferSource(),b=ac.createBuffer(1,Math.max(1,ac.sampleRate*d),ac.sampleRate),dt=b.getChannelData(0); for(let i=0;i<dt.length;i++) dt[i]=(Math.random()*2-1)*(1-i/dt.length); n.buffer=b; const v=ac.createGain(); v.gain.value=g||0.3; const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1400; n.connect(f); f.connect(v); v.connect(sfxG); n.start(); }
    const SFX={ shoot:()=>tone(660,0.07,'square',0.08), pop:()=>tone(320,0.06,'square',0.06), explode:()=>noise(0.3,0.35), hit:()=>tone(170,0.12,'sawtooth',0.22),
      pickup:()=>{tone(880,0.07);setTimeout(()=>tone(1320,0.1),55);}, level:()=>[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,0.12,'triangle',0.18),i*70)),
      boss:()=>tone(90,0.7,'sawtooth',0.3), over:()=>[440,330,220].forEach((f,i)=>setTimeout(()=>tone(f,0.25,'sawtooth',0.18),i*150)) };
    const scale=[220,277.18,329.63,440,329.63,277.18]; let step=0;
    function mtick(){ if(!ac||!opt.music) return; const f=scale[step%scale.length]*(Math.floor(step/6)%2?0.5:1); const o=ac.createOscillator(),v=ac.createGain(); o.type='triangle'; o.frequency.value=f; v.gain.value=0; v.gain.linearRampToValueAtTime(0.16,ac.currentTime+0.03); v.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.4); o.connect(v); v.connect(musG); o.start(); o.stop(ac.currentTime+0.45); step++; }
    return {
      play(n){ ensure(); if(!ac) return; if(ac.state==='suspended') ac.resume(); if(opt.sfx)(SFX[n]||(()=>{}))(); },
      startMusic(){ ensure(); if(!ac||mt) return; mt=setInterval(mtick,250); },
      stopMusic(){ if(mt){ clearInterval(mt); mt=null; } },
      refresh(){ ensure(); if(sfxG) sfxG.gain.value=opt.sfxvol; if(musG) musG.gain.value=opt.musvol; if(!opt.music) this.stopMusic(); },
      opt,
    };
  })();
  function fmtTime(ms){ const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), cs=Math.floor((ms%1000)/10); return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(cs).padStart(2,'0'); }
  function saveBest(ms){ try{ const p=localStorage.getItem(BEST_KEY); if(p==null||ms<parseInt(p,10)){ localStorage.setItem(BEST_KEY,String(Math.floor(ms))); return true; } }catch(e){} return false; }

  // mode-specific copy
  if (PROGRESSION==='levelup'){ modeTitle.textContent='ROGUELITE — AUTO LEVEL-UP'; modeHint.textContent='Destroy enemies, collect XP gems, level up and pick upgrades. Survive the waves.'; }
  if (PROGRESSION==='milestones'){ modeTitle.textContent='ROGUELITE — SCORE MILESTONES'; modeHint.textContent='Cross score milestones to pick upgrades. Survive the waves.'; xpwrap.style.display='none'; }
  if (PROGRESSION==='shop'){ modeTitle.textContent='ROGUELITE — WAVE SHOP'; modeHint.textContent='Earn credits, then spend them in the shop between waves. Survive.'; xpwrap.style.display='none'; creditsEl.style.display='block'; }
  if (SPEEDRUN){ timerEl.style.display='block'; timerGoal.textContent='GOAL: CLEAR WAVE '+SR_TARGET_WAVE; modeHint.textContent='SPEEDRUN — clear wave '+SR_TARGET_WAVE+' (first boss) as fast as you can.'; }

  let W,H;
  function resize(){ const m=Math.min(window.innerWidth,window.innerHeight); const S=m<640?Math.min(2.6,900/m):1; W=canvas.width=Math.round(window.innerWidth*S); H=canvas.height=Math.round(window.innerHeight*S); buildStars(); }
  window.addEventListener('resize', resize);

  let stars=[];
  function buildStars(){ stars=[]; const c=Math.floor((W*H)/6000); for(let i=0;i<c;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.2,a:Math.random()*0.6+0.2,tw:Math.random()*Math.PI*2,ts:Math.random()*0.04+0.01}); }

  // ---- Upgrade pool ----
  const ALL_UPGRADES = [
    { id:'rapid',  name:'Rapid Fire',     desc:'Shoot faster (-cooldown).',        max:5, price:16 },
    { id:'spread', name:'Spread Shot',    desc:'+1 projectile in a wider arc.',    max:4, price:22 },
    { id:'heavy',  name:'Heavy Rounds',   desc:'+1 bullet damage.',                max:5, price:18 },
    { id:'long',   name:'Long Shot',      desc:'+range and +bullet speed.',        max:3, price:13 },
    { id:'pierce', name:'Piercing',       desc:'Bullets pass through +1 enemy.',   max:3, price:20 },
    { id:'shield', name:'Shield',         desc:'+1 regenerating shield layer.',    max:3, price:20 },
    { id:'hull',   name:'Reinforced Hull',desc:'+1 max HP (and heal 1).',          max:4, price:18 },
    { id:'thrust', name:'Thrusters',      desc:'+turn rate and acceleration.',     max:3, price:12 },
    { id:'orbital',name:'Orbital Shard',  desc:'+1 shard orbiting your ship.',     max:4, price:26 },
    { id:'drone',  name:'Drone',          desc:'+1 auto-firing escort drone.',     max:3, price:28 },
    { id:'nova',   name:'Nova Pulse',     desc:'Periodic shockwave damages nearby.',max:3, price:24 },
    { id:'auto',   name:'Auto-Fire',      desc:'Ship fires by itself — no holding Space.', max:1, price:14 },
    { id:'magnet', name:'Magnet',         desc:'Wider XP pickup radius.',          max:4, price:10, levelupOnly:true },
  ];
  function pool(){ return ALL_UPGRADES.filter(u => PROGRESSION==='levelup' || !u.levelupOnly); }

  // ---- Input ----
  const keys={};
  window.addEventListener('keydown',(e)=>{
    if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
    const low = e.key.length===1?e.key.toLowerCase():e.key;
    keys[low]=true;
    // WASD mirror the arrow keys everywhere (steering AND menu navigation)
    const k = ({a:'ArrowLeft', d:'ArrowRight', w:'ArrowUp', s:'ArrowDown'})[low] || e.key;
    if((e.key==='Enter'||e.key===' ') && (state==='menu'||state==='dead'||state==='won')){ startGame(); return; }
    if(e.key==='Escape'){ if(state==='playing') pauseGame(); else if(state==='paused') resumeGame(); return; }
    if(state==='levelup'){
      if(k==='ArrowLeft'){ selIdx=(selIdx+pickOptions.length-1)%pickOptions.length; renderPicker(); }
      else if(k==='ArrowRight'){ selIdx=(selIdx+1)%pickOptions.length; renderPicker(); }
      else if(k==='Enter'||k===' ') pickByIndex(selIdx);
      else if(/^[1-9]$/.test(k)) pickByIndex(parseInt(k,10)-1);
      return;
    }
    if(state==='shop'){
      const n=pool().length; // selection runs over the items only
      if(k==='ArrowLeft'){ selIdx=(selIdx+n-1)%n; renderShop(); }
      else if(k==='ArrowRight'){ selIdx=(selIdx+1)%n; renderShop(); }
      else if(k==='ArrowUp'){ selIdx=(selIdx+n-4)%n; renderShop(); }
      else if(k==='ArrowDown'){ selIdx=(selIdx+4)%n; renderShop(); }
      else if(k==='Enter'){ closeShop(); }            // Enter always continues to next wave
      else if(k===' '){ buyByIndex(selIdx); }          // Space buys the highlighted item
      else if(/^[1-9]$/.test(k)) buyByIndex(parseInt(k,10)-1);
      return;
    }
  });
  window.addEventListener('keyup',(e)=>{ keys[e.key.length===1?e.key.toLowerCase():e.key]=false; });

  // ---- State ----
  let state='menu'; // menu | playing | paused | levelup | shop | dead | won
  let score=0, wave=1, credits=0;
  let ship, asteroids=[], hunters=[], sentries=[], boss=null;
  let bullets=[], ebullets=[], gems=[], particles=[], drones=[], novas=[], pickups=[];
  let up={}, level=1, xp=0, xpNext=12;
  let shootCd=0, invuln=0, noHit=0, orbAngle=0, orbCd=[], novaTimer=0, flashTimer=0;
  let waveBreak=0, pendingPicks=0, milestoneNext=500, milestoneStep=500, selIdx=0;

  function resetRun(){
    score=0; wave=1; credits=0;
    asteroids=[]; hunters=[]; sentries=[]; boss=null;
    bullets=[]; ebullets=[]; gems=[]; particles=[]; drones=[]; novas=[]; pickups=[];
    up={}; level=1; xp=0; xpNext=12;
    shootCd=0; invuln=0; noHit=0; orbAngle=0; orbCd=[]; novaTimer=0; flashTimer=0;
    waveBreak=0; pendingPicks=0; milestoneNext=500; milestoneStep=500;
    spawnShip(); recalc(); ship.hp=ship.maxHp; ship.shield=ship.shieldMax;
  }
  function startGame(){ resetRun(); startWave(1); state='playing'; overlay.classList.add('hidden');
    srElapsed=0; srPrev=now(); srDone=false; SND.startMusic(); updateHud(); }
  function pauseGame(){ state='paused'; overlay.innerHTML='<h1>PAUSED</h1><p class="hint">wave '+wave+' &middot; score '+score+'</p>'+settingsHTML()+'<div id="shopFoot"><button class="btn" id="resumeBtn">RESUME (ESC)</button> '+MENU_BTN+'</div>'; overlay.classList.remove('hidden'); wireOverlay(); }
  function resumeGame(){ state='playing'; srPrev=now(); overlay.classList.add('hidden'); }
  function spawnShip(){ ship={x:W/2,y:H/2,vx:0,vy:0,angle:-Math.PI/2,r:14,hp:3,maxHp:3,shield:0,shieldMax:0,frenzy:0}; invuln=120; }

  function recalc(){
    const u=up;
    ship.fireCd   = Math.max(4, 14 - 2*(u.rapid||0));
    ship.proj     = 1 + (u.spread||0);
    ship.dmg      = 1 + (u.heavy||0);
    ship.bLife    = 70 + 25*(u.long||0);
    ship.bSpeed   = 8 + 2*(u.long||0);
    ship.pierce   = (u.pierce||0);
    ship.turn     = 0.07 + 0.02*(u.thrust||0);
    ship.accel    = 0.16 + 0.05*(u.thrust||0);
    ship.maxHp    = 3 + (u.hull||0);
    ship.shieldMax= (u.shield||0);
    ship.magnet   = 110 + 70*(u.magnet||0);
    ship.orbN     = (u.orbital||0);
    ship.droneN   = (u.drone||0);
    ship.novaLv   = (u.nova||0);
    ship.auto     = (u.auto||0)>0;
    if(ship.hp>ship.maxHp) ship.hp=ship.maxHp;
    if(ship.shield>ship.shieldMax) ship.shield=ship.shieldMax;
    while(drones.length<ship.droneN) drones.push({x:ship.x,y:ship.y,cd:0});
    orbCd.length = ship.orbN;
    for(let i=0;i<orbCd.length;i++) if(orbCd[i]==null) orbCd[i]=0;
  }
  function applyUpgrade(id){ up[id]=(up[id]||0)+1; if(id==='hull') ship.hp=Math.min(99,ship.hp+1); if(id==='shield') ship.shield=(up.shield); recalc(); SND.play('level'); flash(ALL_UPGRADES.find(u=>u.id===id).name.toUpperCase()); updateHud(); }

  function updateHud(){
    scoreEl.textContent=score; const left=enemiesLeft(); waveEl.textContent='WAVE '+wave+(left>0?(' · '+left+' left'):'');
    hpEl.textContent='♥'.repeat(Math.max(0,ship?ship.hp:0)) || '—';
    shieldEl.textContent = (ship&&ship.shieldMax>0) ? ('◇'.repeat(ship.shield)+'·'.repeat(Math.max(0,ship.shieldMax-ship.shield))) : '';
    if(PROGRESSION==='levelup'){ xpfill.style.width=Math.min(100,(xp/xpNext)*100)+'%'; xplabel.textContent='LV '+level; }
    if(PROGRESSION==='shop'){ creditsEl.textContent='◈ '+credits; }
  }
  function flash(msg){ flashEl.textContent=msg; flashEl.style.opacity='1'; flashTimer=80; }
  function quitToMenu(){ if(!SPEEDRUN && (state==='playing'||state==='paused'||state==='levelup'||state==='shop')){ saveStat('asteroids_score_'+FILE,score); saveStat('asteroids_wave_'+FILE,wave); } try{ if(window.parent && window.parent!==window) window.parent.postMessage('asteroids:menu','*'); }catch(e){} }
  function settingsHTML(){ return '<div class="settings"><button class="btn" id="sfxBtn">SFX: '+(SND.opt.sfx?'ON':'OFF')+'</button><label class="vol">SFX <input type="range" id="sfxVol" min="0" max="1" step="0.05" value="'+SND.opt.sfxvol+'"></label><button class="btn" id="musicBtn">MUSIC: '+(SND.opt.music?'ON':'OFF')+'</button><label class="vol">MUS <input type="range" id="musVol" min="0" max="1" step="0.05" value="'+SND.opt.musvol+'"></label></div>'; }
  function wireSettings(){ const sb=$('sfxBtn'); if(sb) sb.addEventListener('click',()=>{ const v=!SND.opt.sfx; try{localStorage.setItem('asteroids_sfx',v?'1':'0');}catch(e){} sb.textContent='SFX: '+(v?'ON':'OFF'); if(v) SND.play('pop'); });
    const mb=$('musicBtn'); if(mb) mb.addEventListener('click',()=>{ const v=!SND.opt.music; try{localStorage.setItem('asteroids_music',v?'1':'0');}catch(e){} mb.textContent='MUSIC: '+(v?'ON':'OFF'); if(v) SND.startMusic(); else SND.stopMusic(); });
    const sv=$('sfxVol'); if(sv) sv.addEventListener('input',()=>{ try{localStorage.setItem('asteroids_sfxvol',sv.value);}catch(e){} SND.refresh(); }); const mv=$('musVol'); if(mv) mv.addEventListener('input',()=>{ try{localStorage.setItem('asteroids_musvol',mv.value);}catch(e){} SND.refresh(); }); }
  function wireOverlay(){ const mb=$('menuBtn'); if(mb) mb.addEventListener('click', quitToMenu); const rb=$('resumeBtn'); if(rb) rb.addEventListener('click', resumeGame); const sb=$('startBtn'); if(sb) sb.addEventListener('click', startGame); wireSettings(); }
  const MENU_BTN = '<button class="btn" id="menuBtn">QUIT TO MENU</button>';

  // ---- Spawning / waves ----
  function edgePos(){ let x,y; if(Math.random()<0.5){ x=Math.random()<0.5?-50:W+50; y=Math.random()*H; } else { x=Math.random()*W; y=Math.random()<0.5?-50:H+50; } return {x,y}; }
  function makeAsteroid(x,y,size){ const r=size===3?56:size===2?34:18; const verts=[]; const n=9+Math.floor(Math.random()*4);
    for(let i=0;i<n;i++){ const ang=(i/n)*Math.PI*2; verts.push({ang,d:r*(0.65+Math.random()*0.5)}); }
    const speed=(1.0+Math.random()*0.9)*(4-size)*0.5*(1+wave*0.045); const dir=Math.random()*Math.PI*2;
    return {x,y,size,r,hp:size+Math.floor(wave/3),vx:Math.cos(dir)*speed,vy:Math.sin(dir)*speed,rot:Math.random()*Math.PI*2,vrot:(Math.random()-0.5)*0.03,verts,hue:200+Math.random()*40}; }
  function makeHunter(x,y){ return {x,y,r:13,hp:2+Math.floor(wave/4),vx:0,vy:0,rot:0}; }
  function makeSentry(x,y){ return {x,y,r:16,hp:3+Math.floor(wave/3),vx:(Math.random()-0.5)*1.2,vy:(Math.random()-0.5)*1.2,fireCd:90+Math.random()*60,rot:0}; }
  // boss HP ramps hard past wave 8 so the wave-10/15/20 bosses are real walls
  function makeBoss(w){ const hp=Math.round(90 + w*20 + Math.max(0,w-6)*w*4.5); return {x:W/2,y:140,r:70,hp,maxHp:hp,vx:1.4,vy:0.9,fireCd:Math.max(40,85-w*2),spawnCd:Math.max(100,190-w*4),rot:0}; }

  function startWave(n){
    wave=n; waveBreak=0;
    bullets=[]; ebullets=[]; // clear leftover shots so a new wave starts clean
    if(n%5===0){ boss=makeBoss(n); SND.play('boss'); flash('⚠ WAVE '+n+' — BOSS'); }
    else {
      const ast=3+Math.floor(n*1.45);
      for(let i=0;i<ast;i++){ const p=edgePos(); asteroids.push(makeAsteroid(p.x,p.y, Math.random()<0.55+n*0.03?3:2)); }
      const nH = n>=3 ? Math.floor(n*0.6) : 0;
      for(let i=0;i<nH;i++){ const p=edgePos(); hunters.push(makeHunter(p.x,p.y)); }
      const nS = n>=4 ? Math.floor((n-2)/2) : 0;
      // sentries don't home, so spawn them on-screen (not at the edge) — an edge spawn
      // could get trapped just off-screen by the bounce and become unkillable.
      for(let i=0;i<nS;i++){ sentries.push(makeSentry(80+Math.random()*(W-160), 80+Math.random()*(H-160))); }
      flash('WAVE '+n);
    }
    updateHud();
  }
  function enemiesLeft(){ return asteroids.length+hunters.length+sentries.length+(boss?1:0); }
  function nearestEnemy(x,y){ let best=null,bd=Infinity; const consider=arr=>{ for(const e of arr){ const d=Math.hypot(e.x-x,e.y-y); if(d<bd){ bd=d; best=e; } } }; consider(asteroids); consider(hunters); consider(sentries); if(boss){ const d=Math.hypot(boss.x-x,boss.y-y); if(d<bd){ bd=d; best=boss; } } return best; }

  // ---- Effects ----
  function burst(x,y,color,n,spread){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, sp=Math.random()*spread+0.5; particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:Math.random()*0.025+0.012,color,size:Math.random()*2+1}); } }
  function wrap(o){ if(o.x<-o.r)o.x=W+o.r; if(o.x>W+o.r)o.x=-o.r; if(o.y<-o.r)o.y=H+o.r; if(o.y>H+o.r)o.y=-o.r; }

  // ---- Combat ----
  function fireBullet(angle,offx,offy){ bullets.push({ x:ship.x+Math.cos(ship.angle)*ship.r+(offx||0), y:ship.y+Math.sin(ship.angle)*ship.r+(offy||0),
    vx:Math.cos(angle)*ship.bSpeed+ship.vx, vy:Math.sin(angle)*ship.bSpeed+ship.vy, life:ship.bLife, r:2, dmg:ship.dmg, pierce:ship.pierce }); }
  function shoot(){
    const n=ship.proj;
    if(n===1){ fireBullet(ship.angle); }
    else { const arc=0.16; for(let i=0;i<n;i++){ const da=(i-(n-1)/2)*arc; fireBullet(ship.angle+da); } }
    burst(ship.x+Math.cos(ship.angle)*ship.r, ship.y+Math.sin(ship.angle)*ship.r, '180,230,255', 2, 1.2); SND.play('shoot');
  }

  function dropRewards(x,y,kind){
    const tbl={ ast3:{sc:20,xp:1,cr:1}, ast2:{sc:50,xp:2,cr:1}, ast1:{sc:100,xp:3,cr:2}, hunter:{sc:75,xp:4,cr:4}, sentry:{sc:150,xp:6,cr:8}, boss:{sc:1000,xp:30,cr:45} };
    const r=tbl[kind]; score+=r.sc; credits+=r.cr;
    if(PROGRESSION==='levelup'){ const ng=Math.min(5,1+Math.floor(r.xp/2)); for(let i=0;i<ng;i++) gems.push({x:x+(Math.random()-0.5)*20,y:y+(Math.random()-0.5)*20,vx:(Math.random()-0.5),vy:(Math.random()-0.5),xp:Math.max(1,Math.round(r.xp/ng))}); }
    maybeDropPickup(x,y,kind);
    updateHud();
    if(PROGRESSION==='milestones'){ while(score>=milestoneNext){ pendingPicks++; milestoneStep+=250; milestoneNext+=milestoneStep; } if(pendingPicks>0 && state==='playing') openPicker(); }
  }

  // random map pickups — health regen + a couple of power drops (since +max HP alone
  // is useless without a way to heal).
  const PICKUPS={ repair:{glyph:'+',color:'120,255,150'}, shieldcell:{glyph:'◇',color:'120,200,255'}, frenzy:{glyph:'≫',color:'255,210,90'}, pulse:{glyph:'✸',color:'255,140,90'} };
  const MAX_PICKUPS = 4;
  function maybeDropPickup(x,y,kind){
    if(pickups.length >= MAX_PICKUPS) return;      // cap how many sit on the map
    const boss = kind==='boss';
    const wantHeal0 = ship.hp < ship.maxHp;
    // low base; a bit better when hurt so a repair can show up
    const chance = (wantHeal0 ? 0.11 : 0.045) * (kind==='sentry'?1.5:kind==='hunter'?1.2:1);
    if(!boss && Math.random() > chance) return;
    let type;
    const wantHeal = ship.hp < ship.maxHp;
    const wantShield = ship.shieldMax>0 && ship.shield<ship.shieldMax;
    const r=Math.random();
    if(boss) type = wantHeal ? 'repair' : 'pulse';
    else if(wantHeal && r<0.45) type='repair';
    else if(wantShield && r<0.6) type='shieldcell';
    else type = r<0.8 ? 'frenzy' : 'pulse';
    pickups.push({ x, y, type, vx:(Math.random()-0.5)*0.8, vy:(Math.random()-0.5)*0.8, life:540 });
  }
  function collectPickup(p){
    if(p.type==='repair'){ ship.hp=Math.min(ship.maxHp, ship.hp+1); flash('REPAIR +1 HP'); }
    else if(p.type==='shieldcell'){ ship.shield=ship.shieldMax; flash('SHIELD RESTORED'); }
    else if(p.type==='frenzy'){ ship.frenzy=420; flash('FRENZY!'); }
    else if(p.type==='pulse'){ novas.push({x:ship.x,y:ship.y,r:0,max:Math.max(W,H)*0.6,dmg:6}); flash('PULSE'); }
    burst(p.x,p.y,PICKUPS[p.type].color,12,2); SND.play('pickup'); updateHud();
  }

  function killAsteroid(idx){ const a=asteroids[idx]; const kind='ast'+a.size; burst(a.x,a.y,'120,200,255',a.size*7,a.size*1.3);
    if(a.size>1){ asteroids.push(makeAsteroid(a.x,a.y,a.size-1)); asteroids.push(makeAsteroid(a.x,a.y,a.size-1)); }
    asteroids.splice(idx,1); SND.play('pop'); dropRewards(a.x,a.y,kind); }
  function killHunter(idx){ const h=hunters[idx]; burst(h.x,h.y,'255,150,220',12,2); hunters.splice(idx,1); SND.play('pop'); dropRewards(h.x,h.y,'hunter'); }
  function killSentry(idx){ const s=sentries[idx]; burst(s.x,s.y,'150,255,200',16,2.5); sentries.splice(idx,1); SND.play('pop'); dropRewards(s.x,s.y,'sentry'); }
  function killBoss(){ const b=boss; burst(b.x,b.y,'255,180,120',60,5); const wb=wave; boss=null; SND.play('explode'); dropRewards(b.x,b.y,'boss');
    if(SPEEDRUN && !srDone && wb>=SR_TARGET_WAVE){ winRun(); } }

  function damageShip(){
    if(invuln>0) return;
    if(ship.shield>0){ ship.shield--; burst(ship.x,ship.y,'120,200,255',14,3); invuln=40; noHit=0; updateHud(); return; }
    ship.hp--; SND.play('hit'); burst(ship.x,ship.y,'255,120,120',26,3.5); invuln=110; noHit=0; updateHud();
    if(ship.hp<=0) die();
  }
  function saveStat(key,v){ try{ const p=localStorage.getItem(key); if(p==null||v>parseInt(p,10)){ localStorage.setItem(key,String(v)); return true; } }catch(e){} return false; }
  function die(){ state='dead'; if(SPEEDRUN) srDone=true; burst(ship.x,ship.y,'255,160,120',50,5);
    SND.stopMusic(); SND.play('over'); let best=false; if(!SPEEDRUN){ best=saveStat('asteroids_score_'+FILE,score); saveStat('asteroids_wave_'+FILE,wave); }
    overlay.innerHTML='<h1>GAME OVER</h1><p>Score <strong>'+score+'</strong>'+(best?'  ★ NEW BEST':'')+' &middot; reached wave '+wave+'</p>'+(SPEEDRUN?'<p class="hint">run failed at '+fmtTime(srElapsed)+'</p>':'')+'<p class="blink">press ENTER or SPACE to play again</p><div id="shopFoot">'+MENU_BTN+'</div>';
    overlay.classList.remove('hidden'); wireOverlay(); }
  function winRun(){ srDone=true; state='won'; SND.stopMusic(); SND.play('level'); const best=saveBest(srElapsed);
    overlay.innerHTML='<h1 class="win">WAVE '+SR_TARGET_WAVE+' CLEARED</h1><p>Time <strong>'+fmtTime(srElapsed)+'</strong>'+(best?'  ★ NEW BEST':'')+'</p><p class="hint">score '+score+'</p><p class="blink">press ENTER or SPACE to run again</p><div id="shopFoot">'+MENU_BTN+'</div>';
    overlay.classList.remove('hidden'); wireOverlay(); }

  // ---- Picker (levelup + milestones) ----
  let pickOptions=[];
  function rollPicks(){ const avail=pool().filter(u=>(up[u.id]||0)<u.max); const out=[]; const cp=avail.slice();
    while(out.length<3 && cp.length){ const i=Math.floor(Math.random()*cp.length); out.push(cp.splice(i,1)[0]); } return out; }
  function openPicker(){ state='levelup'; pickOptions=rollPicks(); selIdx=0;
    if(pickOptions.length===0){ pendingPicks=0; state='playing'; return; }
    renderPicker();
  }
  function renderPicker(){
    const ttl = PROGRESSION==='levelup' ? ('LEVEL '+level) : 'CHOOSE UPGRADE';
    let html='<h1 class="level">'+ttl+'</h1><p class="hint">choose an upgrade ('+pendingPicks+' pending) — ←/→ then ENTER, or press 1-3</p><div class="cards">';
    pickOptions.forEach((u,i)=>{ const lv=up[u.id]||0; html+='<div class="ucard'+(i===selIdx?' sel':'')+'" data-i="'+i+'"><div class="k">'+(i+1)+'</div><h3>'+u.name+'</h3><p>'+u.desc+'</p><div class="lvl">'+(lv>0?('LV '+lv+' → '+(lv+1)):'NEW')+'</div></div>'; });
    html+='</div>'; overlay.innerHTML=html; overlay.classList.remove('hidden');
    overlay.querySelectorAll('.ucard').forEach(c=>c.addEventListener('click',()=>pickByIndex(parseInt(c.dataset.i,10))));
  }
  function pickByIndex(i){ if(state!=='levelup'||!pickOptions[i]) return; applyUpgrade(pickOptions[i].id); pendingPicks--; if(pendingPicks>0){ openPicker(); } else { state='playing'; srPrev=now(); overlay.classList.add('hidden'); } }

  // ---- Shop (between waves) ----
  // each tier costs a bit more than the last: base, +50%, +100%, ...
  function shopCost(u){ const lv=up[u.id]||0; return Math.round(u.price*(1+0.5*lv)); }
  function openShop(){ state='shop'; selIdx=0; renderShop(); overlay.classList.remove('hidden'); }
  function renderShop(){
    const items=pool();
    let html='<h1 class="win">DRYDOCK</h1>'+
      '<div class="credits-big">◈ '+credits+' CREDITS</div>'+
      '<p class="hint">wave '+wave+' cleared &middot; ←/→/↑/↓ to highlight &middot; SPACE / number / click to buy &middot; ENTER to continue</p><div class="cards shop">';
    items.forEach((u,i)=>{ const lv=up[u.id]||0; const maxed=lv>=u.max; const cost=shopCost(u); const afford=credits>=cost && !maxed;
      html+='<div class="ucard'+(afford?'':' disabled')+(i===selIdx?' sel':'')+'" data-i="'+i+'"><div class="k">'+(i+1)+'</div><h3>'+u.name+'</h3><p>'+u.desc+'</p><div class="lvl">'+(maxed?'MAX':('LV '+lv+'/'+u.max))+'</div><div class="price">'+(maxed?'—':('◈ '+cost))+'</div></div>'; });
    html+='</div><div id="shopFoot"><button class="btn" id="continueBtn">CONTINUE ▶ (ENTER)</button> '+MENU_BTN+'</div>';
    overlay.innerHTML=html;
    overlay.querySelectorAll('.ucard').forEach(c=>c.addEventListener('click',()=>buyByIndex(parseInt(c.dataset.i,10))));
    $('continueBtn').addEventListener('click', closeShop);
    wireOverlay();
  }
  function buyByIndex(i){ if(state!=='shop') return; const items=pool(); const u=items[i]; if(!u) return; const lv=up[u.id]||0;
    const cost=shopCost(u); if(lv>=u.max || credits<cost) return; credits-=cost; applyUpgrade(u.id); renderShop(); }
  function closeShop(){ state='playing'; srPrev=now(); overlay.classList.add('hidden'); startWave(wave+1); }

  // ---- Wave completion ----
  function onWaveCleared(){
    if(SPEEDRUN && !srDone && wave>=SR_TARGET_WAVE){ /* boss handled win; non-boss target N/A since 5 is boss */ }
    if(PROGRESSION==='shop'){ openShop(); }
    else { waveBreak=90; } // brief pause then next wave
  }

  // ---- Update ----
  function update(){
    applyTouch();
    if(flashTimer>0){ flashTimer--; if(flashTimer===0) flashEl.style.opacity='0'; }
    const t=now(); if(state==='playing' && !srDone) srElapsed+=t-srPrev; srPrev=t;
    if(SPEEDRUN) timerVal.textContent=fmtTime(srElapsed);

    if(state==='playing'){
      // ship control
      if(keys['ArrowLeft']||keys['a']) ship.angle-=ship.turn;
      if(keys['ArrowRight']||keys['d']) ship.angle+=ship.turn;
      let thrusting=false;
      if(keys['ArrowUp']||keys['w']){ ship.vx+=Math.cos(ship.angle)*ship.accel; ship.vy+=Math.sin(ship.angle)*ship.accel; thrusting=true; }
      ship.vx*=0.99; ship.vy*=0.99; const sp=Math.hypot(ship.vx,ship.vy), max=9.5;
      if(sp>max){ ship.vx=ship.vx/sp*max; ship.vy=ship.vy/sp*max; }
      ship.x+=ship.vx; ship.y+=ship.vy; wrap(ship);
      if(thrusting && Math.random()<0.8){ const bx=ship.x-Math.cos(ship.angle)*ship.r, by=ship.y-Math.sin(ship.angle)*ship.r;
        particles.push({x:bx,y:by,vx:-Math.cos(ship.angle)*(Math.random()*2+1)+(Math.random()-0.5),vy:-Math.sin(ship.angle)*(Math.random()*2+1)+(Math.random()-0.5),life:1,decay:0.06,color:'255,180,90',size:Math.random()*2+1}); }
      if(shootCd>0) shootCd--;
      if(ship.frenzy>0) ship.frenzy--;
      if((keys[' ']||ship.auto) && shootCd===0){ shoot(); shootCd = ship.frenzy>0 ? Math.max(3,Math.floor(ship.fireCd/2)) : ship.fireCd; }
      if(invuln>0) invuln--; noHit++;
      // shield regen
      if(ship.shieldMax>0 && ship.shield<ship.shieldMax && noHit>200 && noHit%40===0){ ship.shield++; updateHud(); }
      // nova
      if(ship.novaLv>0){ if(novaTimer>0) novaTimer--; else { novaTimer=Math.floor(300/ship.novaLv); novas.push({x:ship.x,y:ship.y,r:0,max:160+ship.novaLv*30,dmg:1+ship.novaLv}); } }
      // wave break countdown
      if(waveBreak>0){ waveBreak--; if(waveBreak===0) startWave(wave+1); }
    }

    const active = (state==='playing');

    // orbitals
    if(active && ship.orbN>0){ orbAngle+=0.06; for(let k=0;k<orbCd.length;k++) if(orbCd[k]>0) orbCd[k]--; }
    function orbPositions(){ const arr=[]; for(let k=0;k<ship.orbN;k++){ const a=orbAngle+k*(Math.PI*2/ship.orbN); arr.push({x:ship.x+Math.cos(a)*60,y:ship.y+Math.sin(a)*60,k}); } return arr; }

    // drones
    if(active){ for(const d of drones){ const ang=Math.atan2(ship.y-d.y,ship.x-d.x); const dist=Math.hypot(ship.x-d.x,ship.y-d.y);
      const tx=ship.x-Math.cos(ang)*70, ty=ship.y-Math.sin(ang)*70; d.x+=(tx-d.x)*0.06; d.y+=(ty-d.y)*0.06;
      if(d.cd>0) d.cd--; else { const tgt=nearestEnemy(d.x,d.y); if(tgt){ const a=Math.atan2(tgt.y-d.y,tgt.x-d.x); bullets.push({x:d.x,y:d.y,vx:Math.cos(a)*7,vy:Math.sin(a)*7,life:60,r:2,dmg:1,pierce:0}); d.cd=45; } } } }

    if(active || state==='paused'){ /* enemies frozen on pause */ }

    if(active){
      // asteroids
      for(const a of asteroids){ a.x+=a.vx; a.y+=a.vy; a.rot+=a.vrot; wrap(a); }
      // hunters home toward ship
      for(const h of hunters){ const a=Math.atan2(ship.y-h.y,ship.x-h.x); h.vx+=Math.cos(a)*0.06; h.vy+=Math.sin(a)*0.06; h.vx*=0.97; h.vy*=0.97; h.x+=h.vx; h.y+=h.vy; h.rot+=0.05; wrap(h); }
      // sentries drift + fire
      for(const s of sentries){ s.x+=s.vx; s.y+=s.vy; if((s.x<40&&s.vx<0)||(s.x>W-40&&s.vx>0)) s.vx*=-1; if((s.y<40&&s.vy<0)||(s.y>H-40&&s.vy>0)) s.vy*=-1; s.rot+=0.02;
        if(s.fireCd>0) s.fireCd--; else { const bs=4; const dist=Math.hypot(ship.x-s.x,ship.y-s.y); const tt=dist/bs; const ax=ship.x+ship.vx*tt, ay=ship.y+ship.vy*tt; const a=Math.atan2(ay-s.y,ax-s.x); ebullets.push({x:s.x,y:s.y,vx:Math.cos(a)*bs,vy:Math.sin(a)*bs,life:200,r:3}); s.fireCd=110+Math.random()*50; } }
      // boss
      if(boss){ boss.x+=boss.vx; boss.y+=boss.vy; if(boss.x<80||boss.x>W-80) boss.vx*=-1; if(boss.y<80||boss.y>H*0.7) boss.vy*=-1; if(boss.y<80) boss.vy=Math.abs(boss.vy); boss.rot+=0.01;
        if(boss.fireCd>0) boss.fireCd--; else { const a=Math.atan2(ship.y-boss.y,ship.x-boss.x); for(const da of [-0.25,0,0.25]) ebullets.push({x:boss.x,y:boss.y,vx:Math.cos(a+da)*3.4,vy:Math.sin(a+da)*3.4,life:240,r:4}); boss.fireCd=90; }
        if(boss.spawnCd>0) boss.spawnCd--; else { const p=edgePos(); hunters.push(makeHunter(p.x,p.y)); boss.spawnCd=200; } }

      // gems (levelup)
      for(let i=gems.length-1;i>=0;i--){ const g=gems[i]; const d=Math.hypot(ship.x-g.x,ship.y-g.y);
        if(d<ship.magnet){ const a=Math.atan2(ship.y-g.y,ship.x-g.x); const pull=Math.min(8,(ship.magnet-d)*0.08+1.5); g.x+=Math.cos(a)*pull; g.y+=Math.sin(a)*pull; }
        else { g.x+=g.vx; g.y+=g.vy; g.vx*=0.98; g.vy*=0.98; }
        if(d<ship.r+8){ xp+=g.xp; gems.splice(i,1); while(xp>=xpNext){ xp-=xpNext; level++; xpNext=Math.floor(xpNext*1.35+6); pendingPicks++; } updateHud(); if(pendingPicks>0) openPicker(); } }

      // pickups (health + power drops) — drift, get pulled by the magnet, collected on contact
      for(let i=pickups.length-1;i>=0;i--){ const p=pickups[i]; const d=Math.hypot(ship.x-p.x,ship.y-p.y);
        if(d<ship.magnet){ const a=Math.atan2(ship.y-p.y,ship.x-p.x); const pull=Math.min(7,(ship.magnet-d)*0.06+1); p.x+=Math.cos(a)*pull; p.y+=Math.sin(a)*pull; }
        else { p.x+=p.vx; p.y+=p.vy; p.vx*=0.98; p.vy*=0.98; }
        p.life--;
        if(d<ship.r+12){ collectPickup(p); pickups.splice(i,1); continue; }
        if(p.life<=0) pickups.splice(i,1); }

      // player bullets vs enemies
      for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i]; b.x+=b.vx; b.y+=b.vy; b.life--; wrap(b);
        if(b.life<=0){ bullets.splice(i,1); continue; }
        let consumed=false;
        for(let j=asteroids.length-1;j>=0;j--){ const a=asteroids[j]; if(Math.hypot(a.x-b.x,a.y-b.y)<a.r){ a.hp-=b.dmg; if(a.hp<=0) killAsteroid(j); consumed=true; break; } }
        if(!consumed){ for(let j=hunters.length-1;j>=0;j--){ const h=hunters[j]; if(Math.hypot(h.x-b.x,h.y-b.y)<h.r){ h.hp-=b.dmg; if(h.hp<=0) killHunter(j); consumed=true; break; } } }
        if(!consumed){ for(let j=sentries.length-1;j>=0;j--){ const s=sentries[j]; if(Math.hypot(s.x-b.x,s.y-b.y)<s.r){ s.hp-=b.dmg; if(s.hp<=0) killSentry(j); consumed=true; break; } } }
        if(!consumed && boss){ if(Math.hypot(boss.x-b.x,boss.y-b.y)<boss.r){ boss.hp-=b.dmg; burst(b.x,b.y,'255,200,150',2,1); if(boss.hp<=0) killBoss(); consumed=true; } }
        if(consumed){ if(b.pierce>0){ b.pierce--; } else { bullets.splice(i,1); } }
      }

      // orbital collisions
      if(ship.orbN>0){ const ops=orbPositions(); for(const op of ops){ if(orbCd[op.k]>0) continue;
        let hit=false;
        for(let j=asteroids.length-1;j>=0;j--){ const a=asteroids[j]; if(Math.hypot(a.x-op.x,a.y-op.y)<a.r+10){ a.hp-=2; if(a.hp<=0) killAsteroid(j); hit=true; break; } }
        if(!hit) for(let j=hunters.length-1;j>=0;j--){ const h=hunters[j]; if(Math.hypot(h.x-op.x,h.y-op.y)<h.r+10){ h.hp-=2; if(h.hp<=0) killHunter(j); hit=true; break; } }
        if(!hit) for(let j=sentries.length-1;j>=0;j--){ const s=sentries[j]; if(Math.hypot(s.x-op.x,s.y-op.y)<s.r+10){ s.hp-=2; if(s.hp<=0) killSentry(j); hit=true; break; } }
        if(!hit && boss && Math.hypot(boss.x-op.x,boss.y-op.y)<boss.r+10){ boss.hp-=2; if(boss.hp<=0) killBoss(); hit=true; }
        if(hit) orbCd[op.k]=18;
      } }

      // novas
      for(let i=novas.length-1;i>=0;i--){ const nv=novas[i]; nv.r+=6; if(nv.r>=nv.max){ novas.splice(i,1); continue; }
        const damageRing=(arr,killer)=>{ for(let j=arr.length-1;j>=0;j--){ const e=arr[j]; const d=Math.hypot(e.x-nv.x,e.y-nv.y); if(d<nv.r && d>nv.r-30){ e.hp-=nv.dmg; if(e.hp<=0) killer(j); } } };
        damageRing(asteroids,killAsteroid); damageRing(hunters,killHunter); damageRing(sentries,killSentry);
        if(boss){ const d=Math.hypot(boss.x-nv.x,boss.y-nv.y); if(d<nv.r && d>nv.r-30){ boss.hp-=nv.dmg; if(boss.hp<=0) killBoss(); } }
      }

      // enemy bullets vs ship
      for(let i=ebullets.length-1;i>=0;i--){ const b=ebullets[i]; b.x+=b.vx; b.y+=b.vy; b.life--; if(b.life<=0||b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){ ebullets.splice(i,1); continue; }
        if(Math.hypot(b.x-ship.x,b.y-ship.y)<ship.r){ ebullets.splice(i,1); damageShip(); } }

      // enemy bodies vs ship
      if(invuln===0){
        for(const a of asteroids){ if(Math.hypot(a.x-ship.x,a.y-ship.y)<a.r+ship.r*0.7){ damageShip(); break; } }
        if(invuln===0) for(const h of hunters){ if(Math.hypot(h.x-ship.x,h.y-ship.y)<h.r+ship.r*0.7){ damageShip(); break; } }
        if(invuln===0) for(const s of sentries){ if(Math.hypot(s.x-ship.x,s.y-ship.y)<s.r+ship.r*0.7){ damageShip(); break; } }
        if(invuln===0 && boss && Math.hypot(boss.x-ship.x,boss.y-ship.y)<boss.r+ship.r*0.7){ damageShip(); }
      }

      // wave cleared?
      if(state==='playing' && waveBreak===0 && enemiesLeft()===0){ onWaveCleared(); }
    }

    // particles always
    for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.96; p.vy*=0.96; p.life-=p.decay; if(p.life<=0) particles.splice(i,1); }
  }

  // ---- Render ----
  function drawStars(){ for(const s of stars){ s.tw+=s.ts; const a=s.a*(0.6+0.4*Math.sin(s.tw)); ctx.fillStyle='rgba(200,225,255,'+a+')'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); } }
  function poly(x,y,rot,verts,stroke,glow){ ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.strokeStyle=stroke; ctx.lineWidth=2; ctx.shadowColor=glow; ctx.shadowBlur=8;
    ctx.beginPath(); verts.forEach((v,i)=>{ const px=Math.cos(v.ang)*v.d, py=Math.sin(v.ang)*v.d; if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); }); ctx.closePath(); ctx.stroke(); ctx.restore(); }
  function drawShip(){ if(state==='menu'||state==='dead'||state==='won') return; if(invuln>0 && Math.floor(invuln/6)%2===0) return;
    ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(ship.angle); ctx.strokeStyle='#9fe8ff'; ctx.lineWidth=2; ctx.shadowColor='rgba(120,200,255,0.9)'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.moveTo(16,0); ctx.lineTo(-12,-10); ctx.lineTo(-6,0); ctx.lineTo(-12,10); ctx.closePath(); ctx.stroke();
    if(ship.shield>0){ ctx.strokeStyle='rgba(120,200,255,'+(0.25+0.15*ship.shield)+')'; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(0,0,ship.r+8,0,Math.PI*2); ctx.stroke(); }
    ctx.restore();
    // orbitals
    if(ship.orbN>0){ for(let k=0;k<ship.orbN;k++){ const a=orbAngle+k*(Math.PI*2/ship.orbN), ox=ship.x+Math.cos(a)*60, oy=ship.y+Math.sin(a)*60;
      ctx.fillStyle='#bfe9ff'; ctx.shadowColor='rgba(120,200,255,0.9)'; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(ox,oy,4,0,Math.PI*2); ctx.fill(); } }
  }
  function drawDrones(){ for(const d of drones){ ctx.save(); ctx.translate(d.x,d.y); ctx.fillStyle='#9ad0ff'; ctx.shadowColor='rgba(120,200,255,0.8)'; ctx.shadowBlur=8; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill(); ctx.restore(); } }
  function drawAsteroids(){ for(const a of asteroids) poly(a.x,a.y,a.rot,a.verts,'hsl('+a.hue+',60%,70%)','hsla('+a.hue+',80%,60%,0.5)'); }
  function drawHunters(){ for(const h of hunters){ ctx.save(); ctx.translate(h.x,h.y); ctx.rotate(h.rot); ctx.strokeStyle='#ff8fd6'; ctx.lineWidth=2; ctx.shadowColor='rgba(255,120,210,0.6)'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(10,8); ctx.lineTo(0,3); ctx.lineTo(-10,8); ctx.closePath(); ctx.stroke(); ctx.restore(); } }
  function drawSentries(){ for(const s of sentries){ ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.rot); ctx.strokeStyle='#8effc0'; ctx.lineWidth=2; ctx.shadowColor='rgba(120,255,180,0.6)'; ctx.shadowBlur=8;
    ctx.beginPath(); for(let i=0;i<6;i++){ const a=i/6*Math.PI*2; const px=Math.cos(a)*s.r, py=Math.sin(a)*s.r; if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); } ctx.closePath(); ctx.stroke(); ctx.restore(); } }
  function drawBoss(){ if(!boss) return; ctx.save(); ctx.translate(boss.x,boss.y); ctx.rotate(boss.rot); ctx.strokeStyle='#ffb070'; ctx.lineWidth=3; ctx.shadowColor='rgba(255,160,90,0.7)'; ctx.shadowBlur=16;
    ctx.beginPath(); for(let i=0;i<8;i++){ const a=i/8*Math.PI*2; const rr=boss.r*(i%2?0.8:1); const px=Math.cos(a)*rr, py=Math.sin(a)*rr; if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); } ctx.closePath(); ctx.stroke(); ctx.restore();
    // boss hp bar
    const bw=200, x=boss.x-bw/2, y=boss.y-boss.r-18; ctx.shadowBlur=0; ctx.fillStyle='rgba(60,30,20,0.7)'; ctx.fillRect(x,y,bw,6); ctx.fillStyle='#ffb070'; ctx.fillRect(x,y,bw*Math.max(0,boss.hp/boss.maxHp),6); }
  function drawGems(){ for(const g of gems){ ctx.fillStyle='#c79bff'; ctx.shadowColor='rgba(180,120,255,0.9)'; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(g.x,g.y,3,0,Math.PI*2); ctx.fill(); } }
  function drawPickups(){ ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='bold 14px "Courier New",monospace';
    for(const p of pickups){ const def=PICKUPS[p.type]; const blink=p.life<120 && Math.floor(p.life/8)%2===0; if(blink) continue;
      ctx.save(); ctx.shadowColor='rgba('+def.color+',0.9)'; ctx.shadowBlur=12; ctx.strokeStyle='rgba('+def.color+',0.9)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(p.x,p.y,9,0,Math.PI*2); ctx.stroke(); ctx.fillStyle='rgb('+def.color+')'; ctx.fillText(def.glyph,p.x,p.y+1); ctx.restore(); } ctx.textAlign='start'; ctx.textBaseline='alphabetic'; }
  function drawBullets(){ ctx.shadowColor='rgba(180,230,255,0.9)'; ctx.shadowBlur=8; ctx.fillStyle='#dff3ff'; for(const b of bullets){ ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); }
    ctx.fillStyle='#ff9a9a'; ctx.shadowColor='rgba(255,120,120,0.9)'; for(const b of ebullets){ ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); } }
  function drawNovas(){ for(const nv of novas){ ctx.strokeStyle='rgba(180,220,255,'+(1-nv.r/nv.max)+')'; ctx.lineWidth=3; ctx.shadowColor='rgba(150,200,255,0.6)'; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(nv.x,nv.y,nv.r,0,Math.PI*2); ctx.stroke(); } }
  function drawParticles(){ for(const p of particles){ ctx.fillStyle='rgba('+p.color+','+p.life+')'; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill(); } }
  function render(){ ctx.clearRect(0,0,W,H); ctx.shadowBlur=0; drawStars(); drawParticles(); drawNovas(); drawGems(); drawPickups(); drawAsteroids(); drawHunters(); drawSentries(); drawBoss(); drawDrones(); drawBullets(); drawShip(); ctx.shadowBlur=0; }

  function loop(){ requestAnimationFrame(loop); try { update(); render(); } catch(e){ if(window.console) console.error(e); } }

  // ---- Test hook (harmless; used by headless test harness) ----
  window.__test = {
    get state(){ return state; }, get score(){ return score; }, get wave(){ return wave; }, get level(){ return level; },
    get hp(){ return ship?ship.hp:0; }, get enemies(){ return enemiesLeft(); }, get credits(){ return credits; },
    get upgrades(){ return JSON.parse(JSON.stringify(up)); }, get progression(){ return PROGRESSION; }, get speedrun(){ return SPEEDRUN; },
    get picks(){ return pickOptions.map(o=>o.id); }, get sel(){ return selIdx; }, get magnet(){ return ship?ship.magnet:0; },
    get bossY(){ return boss?boss.y:null; }, get waveLabel(){ return waveEl.textContent; },
    get strandedEnemies(){ const out=e=>e.x<-12||e.x>W+12||e.y<-12||e.y>H+12; return sentries.filter(out).length + hunters.filter(out).length; },
    get bulletCount(){ return bullets.length; }, shopCostOf(id){ const u=ALL_UPGRADES.find(x=>x.id===id); return u?shopCost(u):0; },
    get pickupCount(){ return pickups.length; }, get autoFire(){ return ship?!!ship.auto:false; }, get bossHp(){ return boss?boss.maxHp:0; }, get shipAngle(){ return ship?ship.angle:null; },
    spawnPickup(type){ pickups.push({x:ship.x,y:ship.y,type,vx:0,vy:0,life:540}); },
    quitToMenu, hasMenuBtn(){ return !!$('menuBtn'); },
    start:startGame, clearEnemies(){ asteroids=[]; hunters=[]; sentries=[]; boss=null; },
    addScore(n){ score+=n; credits+=Math.floor(n/10); updateHud(); if(PROGRESSION==='milestones'){ while(score>=milestoneNext){ pendingPicks++; milestoneStep+=250; milestoneNext+=milestoneStep; } if(pendingPicks>0&&state==='playing') openPicker(); } },
    setScore(n){ score=n; updateHud(); },
    addCredits(n){ credits+=n; updateHud(); },
    forcePick(){ pendingPicks++; if(state==='playing') openPicker(); },
    giveUpgrade(id){ applyUpgrade(id); },
    gotoWave(n){ asteroids=[]; hunters=[]; sentries=[]; boss=null; waveBreak=0; startWave(n); },
    killBossNow(){ if(boss) killBoss(); },
    hurt(){ invuln=0; damageShip(); },
    pick(i){ pickByIndex(i); }, buy(i){ buyByIndex(i); }, continueShop:closeShop,
  };

  // ---- Touch controls (mobile): aim-and-go joystick + fire; desktop is unaffected ----
  const HAS_PAUSE = true;
  const isTouch = (typeof matchMedia!=='undefined' && matchMedia('(pointer:coarse)').matches) || ('ontouchstart' in window);
  let joyActive=false, joyAngle=0, joyMag=0, joyId=null, fireBtn=null;
  function applyTouch(){ if(!isTouch||!ship) return;
    keys['ArrowLeft']=false; keys['ArrowRight']=false; keys['ArrowUp']=false; // joystick drives the ship directly (aim-and-go)
    if(joyActive){ ship.angle=joyAngle; const th=0.45; if(joyMag>th){ const acc=(ship.accel||0.16)*Math.min(1,(joyMag-th)/(1-th)); ship.vx+=Math.cos(joyAngle)*acc; ship.vy+=Math.sin(joyAngle)*acc; } }
    if(fireBtn) fireBtn.style.display = ship.auto ? 'none' : 'flex'; }
  function buildTouch(){
    const wrap=document.createElement('div'); wrap.id='tcontrols';
    const zone=document.createElement('div'); zone.className='tc-zone';
    const joy=document.createElement('div'); joy.className='tc-joy'; const knob=document.createElement('div'); knob.className='tc-knob'; joy.appendChild(knob);
    fireBtn=document.createElement('button'); fireBtn.className='tc-fire'; fireBtn.textContent='FIRE';
    wrap.appendChild(zone); wrap.appendChild(joy); wrap.appendChild(fireBtn);
    if(HAS_PAUSE){ const pb=document.createElement('button'); pb.className='tc-pause'; pb.textContent='II'; pb.addEventListener('click',()=>{ if(state==='playing') pauseGame(); else if(state==='paused') resumeGame(); }); wrap.appendChild(pb); }
    document.body.appendChild(wrap);
    const R=58; let ox=0, oy=0;
    function getT(e){ for(const x of e.changedTouches) if(x.identifier===joyId) return x; return null; }
    function jset(t){ const dx=t.clientX-ox, dy=t.clientY-oy; const dist=Math.hypot(dx,dy)||0.0001; const cl=Math.min(dist,R); joyAngle=Math.atan2(dy,dx); joyMag=cl/R; knob.style.transform='translate('+(Math.cos(joyAngle)*cl)+'px,'+(Math.sin(joyAngle)*cl)+'px)'; }
    // floating joystick: spawns wherever the first touch lands in the left half
    zone.addEventListener('touchstart',e=>{ if(joyId!==null) return; const t=e.changedTouches[0]; joyId=t.identifier; ox=t.clientX; oy=t.clientY; joy.style.left=(ox-R)+'px'; joy.style.top=(oy-R)+'px'; joy.style.display='block'; joyActive=true; joyMag=0; knob.style.transform='translate(0,0)'; e.preventDefault(); },{passive:false});
    zone.addEventListener('touchmove',e=>{ const t=getT(e); if(t){ jset(t); e.preventDefault(); } },{passive:false});
    const rel=e=>{ if(getT(e)){ joyActive=false; joyId=null; joyMag=0; joy.style.display='none'; } };
    zone.addEventListener('touchend',rel); zone.addEventListener('touchcancel',rel);
    fireBtn.addEventListener('touchstart',e=>{ keys[' ']=true; e.preventDefault(); },{passive:false});
    fireBtn.addEventListener('touchend',e=>{ keys[' ']=false; e.preventDefault(); },{passive:false});
    fireBtn.addEventListener('touchcancel',()=>{ keys[' ']=false; });
  }
  // tap the start / game-over / win / pause screen instead of a key
  overlay.addEventListener('click',(e)=>{ if(e.target && e.target.closest && e.target.closest('button')) return; if(state==='menu'||state==='dead'||state==='won') startGame(); else if(HAS_PAUSE && state==='paused') resumeGame(); });
  if(isTouch){ document.body.classList.add('touch'); buildTouch(); }

  resize(); updateHud(); loop();
})();
</script>
</body>
