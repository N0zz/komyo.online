      g.fillRect(mx, ty0 - 6, (tw / 4) - 5, 8);
    }
    g.strokeStyle = '#6a4a28'; g.lineWidth = 2;
    g.beginPath(); g.moveTo(tx0 + tw + 2, ty0 - 20); g.lineTo(tx0 + tw + 2, ty0 + 4); g.stroke();
    const bg4 = g.createLinearGradient(tx0 + tw + 3, ty0 - 18, tx0 + tw + 22, ty0 - 8);
    bg4.addColorStop(0, '#54a844'); bg4.addColorStop(1, '#2c6a24');
    g.fillStyle = bg4;
    g.beginPath(); g.moveTo(tx0 + tw + 3, ty0 - 18);
    g.quadraticCurveTo(tx0 + tw + 13, ty0 - 17, tx0 + tw + 22, ty0 - 13);
    g.quadraticCurveTo(tx0 + tw + 12, ty0 - 10, tx0 + tw + 3, ty0 - 8);
    g.closePath(); g.fill();
    // the king on top (crown + catchlights; his hammer is drawn live, over the cache)
    const kgy = ty0 - r * 0.22;
    const kg2 = g.createRadialGradient(kx - r * 0.1, kgy - r * 0.1, 1, kx, kgy, r * 0.35);
    kg2.addColorStop(0, '#79c455'); kg2.addColorStop(0.6, '#5da741'); kg2.addColorStop(1, '#3e7a2c');

    g.fillStyle = '#fff';
    g.beginPath(); g.arc(kx - r * 0.13, kgy - r * 0.2, r * 0.1, 0, 7); g.fill();
    g.beginPath(); g.arc(kx + r * 0.13, kgy - r * 0.2, r * 0.1, 0, 7); g.fill();
    g.fillStyle = '#222';
    g.beginPath(); g.arc(kx - r * 0.13, kgy - r * 0.19, r * 0.045, 0, 7); g.fill();
    g.beginPath(); g.arc(kx + r * 0.13, kgy - r * 0.19, r * 0.045, 0, 7); g.fill();
    g.fillStyle = 'rgba(255,255,255,0.95)';
    g.beginPath(); g.arc(kx - r * 0.155, kgy - r * 0.22, r * 0.022, 0, 7); g.fill();
    g.beginPath(); g.arc(kx + r * 0.105, kgy - r * 0.22, r * 0.022, 0, 7); g.fill();
    const cr2 = g.createLinearGradient(kx - r * 0.18, kgy - r * 0.5, kx + r * 0.18, kgy - r * 0.3);
    cr2.addColorStop(0, '#ffe9a0'); cr2.addColorStop(0.5, '#ffd166'); cr2.addColorStop(1, '#d9a63e');
    g.fillStyle = cr2;
    g.beginPath();
    g.moveTo(kx - r * 0.18, kgy - r * 0.3); g.lineTo(kx - r * 0.18, kgy - r * 0.46); g.lineTo(kx - r * 0.09, kgy - r * 0.36);
    g.lineTo(kx, kgy - r * 0.5); g.lineTo(kx + r * 0.09, kgy - r * 0.36); g.lineTo(kx + r * 0.18, kgy - r * 0.46); g.lineTo(kx + r * 0.18, kgy - r * 0.3);
    g.closePath(); g.fill();
  }
  function menuBackdrop(g, w, h) {
    if (!mbScenery || mbSw !== w || mbSh !== h) {
      try {
        const c = document.createElement('canvas');
        c.width = Math.max(1, Math.round(w * dpr)); c.height = Math.max(1, Math.round(h * dpr));
        const sg = c.getContext('2d');
        sg.setTransform(dpr, 0, 0, dpr, 0, 0);
        mbPaintScenery(sg, w, h);
        mbScenery = c; mbSw = w; mbSh = h;
      } catch (e) { mbScenery = null; mbSw = w; mbSh = h; }
    }
    if (mbScenery) g.drawImage(mbScenery, 0, 0, w, h);
    else mbPaintScenery(g, w, h);
    // the SAME hammer he wields in-game — reads the equipped 🎨 skin live, so it's not cached
    const kx = w * 0.16, r = Math.min(w, h) * 0.12;
    const kgy = h * 0.66 - r * 0.5 - r * 1.1 - r * 0.22;
    drawHammer(g, kx + r * 0.5, kgy + r * 0.08, 0.55, r / 80);
    // hatted frogs hopping around like zen mode (one sim tick per painted frame)
    if (!mbFrogs || mbW !== w || mbH !== h) mbInit(w, h);
    mbStep(w, h);
    for (const f of mbFrogs) mbFrog(g, f);
    // texture pass: the same grade + vignette as in-game (cheap: two gradient fills)
    const mg2 = g.createLinearGradient(0, 0, w, h);
    mg2.addColorStop(0, 'rgba(255,210,140,0.10)');
    mg2.addColorStop(0.5, 'rgba(0,0,0,0)');
    mg2.addColorStop(1, 'rgba(60,60,140,0.12)');
    g.fillStyle = mg2; g.fillRect(0, 0, w, h);
    const mv = g.createRadialGradient(w / 2, h / 2, h * 0.4, w / 2, h / 2, h * 0.9);
    mv.addColorStop(0, 'rgba(20,12,40,0)');
    mv.addColorStop(1, 'rgba(20,12,40,0.24)');
    g.fillStyle = mv; g.fillRect(0, 0, w, h);
  }
  function pvScene(g, w, h, frogsN, ring) {
    g.fillStyle = '#5da741'; g.fillRect(0, 0, w, h);
    g.fillStyle = '#8fce5e'; g.fillRect(0, 0, w, h * 0.4);
    const kx = w / 2, ky = h * 0.52, r = w * 0.11;
    if (ring) { g.strokeStyle = 'rgba(70,140,220,0.6)'; g.lineWidth = 5; g.beginPath(); g.arc(kx, ky, r * 2.4, 0, 7); g.stroke(); }
    g.fillStyle = '#a8a4b8'; g.fillRect(kx - r, ky - r * 1.5, r * 2, r * 2.2);
    g.fillStyle = '#6a4a28'; g.beginPath(); g.arc(kx, ky + r * 0.7, r * 0.5, Math.PI, 0); g.fill();
    for (let i = 0; i < frogsN; i++) {
      const a = i * (6.28 / frogsN) + 0.5, d = r * 3 + (i % 2) * 8;
      const fx = kx + Math.cos(a) * d, fy = ky + Math.sin(a) * d * 0.7;
      g.fillStyle = '#3f7a2e'; g.beginPath(); g.ellipse(fx, fy, 6, 5, 0, 0, 7); g.fill();
      g.fillStyle = '#fff'; g.beginPath(); g.arc(fx - 2, fy - 4, 1.7, 0, 7); g.fill(); g.beginPath(); g.arc(fx + 2, fy - 4, 1.7, 0, 7); g.fill();
    }
  }
  function pvZen(g, w, h) {
    g.fillStyle = '#6ab88a'; g.fillRect(0, 0, w, h);
    g.fillStyle = '#8fce9e'; g.fillRect(0, 0, w, h * 0.4);
    const kx = w / 2, ky = h * 0.55;
    g.fillStyle = '#5da741'; g.beginPath(); g.ellipse(kx, ky, 14, 11, 0, 0, 7); g.fill();
    g.fillStyle = '#fff'; g.beginPath(); g.arc(kx - 5, ky - 9, 4, 0, 7); g.fill(); g.beginPath(); g.arc(kx + 5, ky - 9, 4, 0, 7); g.fill();
    g.fillStyle = '#222'; g.beginPath(); g.arc(kx - 5, ky - 9, 1.8, 0, 7); g.fill(); g.beginPath(); g.arc(kx + 5, ky - 9, 1.8, 0, 7); g.fill();
    g.strokeStyle = 'rgba(0,0,0,0.4)'; g.lineWidth = 1.5; g.beginPath(); g.arc(kx, ky + 1, 6, 0.4, Math.PI - 0.4); g.stroke();
    for (let i = 0; i < 5; i++) {
      const fx = (i + 0.5) * w / 5, fy = h * 0.85;
      g.fillStyle = ['#ffd7e6', '#fff2b0', '#e8d0ff'][i % 3];
      for (let p = 0; p < 5; p++) { const a = p * 1.257; g.beginPath(); g.ellipse(fx + Math.cos(a) * 3, fy + Math.sin(a) * 3, 2.5, 2.5, 0, 0, 7); g.fill(); }
      g.fillStyle = '#ffb03a'; g.beginPath(); g.arc(fx, fy, 2, 0, 7); g.fill();
    }
  }

  const urlParams = st => ({ mode: st.mode, diff: st.diff });
  function showStartMenu() {
    state = 'ready';
    if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    KIT.music.play('castle');
    if (!KIT) return;
    KIT.menu.show({ kind: 'start', theme: MENU_THEME, title: t('game.frog-bonk.menuTitle', { def: 'FROG BONK' }), backdrop: menuBackdrop, backdropAnimate: true,
      groups: [
        { id: 'mode', label: t('game.common.modeLabel', { def: 'MODE' }), style: 'cards', default: gameMode, choices: [
          { id: 'waves', label: t('game.frog-bonk.modeWaves', { def: 'Waves' }),
            mech: [t('game.frog-bonk.mechWaves15', { def: '15 waves' }), t('game.frog-bonk.mechShop', { def: 'Upgrade shop' })],
            best: st => loadBest('waves', st.diff), preview: (g, w, h) => pvScene(g, w, h, 6, false) },
          { id: 'endless', label: t('game.frog-bonk.modeEndless', { def: 'Endless' }),
            mech: [t('game.frog-bonk.mechRamps', { def: 'Ramps up' }), t('game.frog-bonk.mechScoreChase', { def: 'Score chase' })],
            best: st => loadBest('endless', st.diff), preview: (g, w, h) => pvScene(g, w, h, 9, true) },
          { id: 'zen', label: t('game.frog-bonk.modeZen', { def: 'Zen' }),
            mech: [t('game.frog-bonk.mechNoLose', { def: 'No losing' }), t('game.frog-bonk.mechChill', { def: 'Chill bonks' })],
            best: () => loadBest('zen'), preview: pvZen },
        ] },
        // Zen ignores difficulty entirely (invulnerable castle, fixed gentle spawn) — gray the
        // selector out there instead of letting the player pick a knob that does nothing.
        { id: 'diff', label: t('game.frog-bonk.diffLabel', { def: 'DIFFICULTY' }), default: diff, disabled: st => st.mode === 'zen', choices: [
          { id: 'easy', label: diffDisplay('easy') },
          { id: 'medium', label: diffDisplay('medium') },
          { id: 'hard', label: diffDisplay('hard') },
        ] },
      ],
      hint: st => ({
        waves: t('game.frog-bonk.hintWaves', { def: 'Bonk every frog before it chomps the castle. Spend flies between waves.' }),
        endless: t('game.frog-bonk.hintEndless', { def: 'They never stop coming — how long can the castle stand?' }),
        zen: t('game.frog-bonk.hintZen', { def: 'No damage, no rush. Just you, a hammer and some silly frogs.' }),
      }[st.mode] || ''),
      actions: [{ id: 'play', label: t('game.frog-bonk.defend', { def: 'DEFEND!' }), primary: true }],
      onChange: st => { gameMode = st.mode; diff = st.diff; KIT.stampUrl(urlParams(st)); },
      onPlay: st => { KIT.stampUrl(urlParams(st)); startMode(st.mode, st.diff); },
    });
    KIT.stampUrl(urlParams({ mode: gameMode, diff }));
  }

  function shareMsg(won) {
    return KIT.shareText({
      verb: won ? t('game.frog-bonk.verbDefended', { def: 'I held the castle with' }) : undefined,
      score, game: t('game.frog-bonk.title', { def: 'Frog Bonk' }), emoji: '🐸',
      mode: modeDisplay() + (gameMode === 'zen' ? '' : ' · ' + diffDisplay()),
      extra: gameMode === 'waves' ? [t('game.frog-bonk.waveN', { wave, def: 'wave ' + wave })] : [t('game.frog-bonk.bonksN', { kills, def: kills + ' bonks' })],
    });
  }
  function showEnd(won, isBest) {
    if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if (!KIT) return;
    const lines = [];
    if (gameMode === 'waves') lines.push(won ? t('game.frog-bonk.endWavesWon', { def: 'All 15 waves held — the meadow is safe!' }) : t('game.frog-bonk.endWavesLost', { wave, def: 'The castle fell on wave {wave}.' }));
    else if (gameMode === 'endless') lines.push(t('game.frog-bonk.endEndless', { time: fmtTime(Math.floor(steps / 60)), kills, def: 'Held out {time} · {kills} frogs bonked.' }));
    else lines.push(t('game.frog-bonk.endZen', { kills, def: '{kills} happy bonks. See you next time.' }));
    KIT.menu.show({ kind: 'end', theme: MENU_THEME, backdrop: menuBackdrop, backdropAnimate: true,
      title: won ? t('game.frog-bonk.victory', { def: 'VICTORY!' }) : (gameMode === 'zen' ? t('game.frog-bonk.zenDone', { def: 'NICE SESSION' }) : t('game.common.gameOver', { def: 'GAME OVER' })),
      record: { slug: SLUG, mode: modeLabel(), modeText: (gameMode === 'zen' ? modeDisplay('zen') : modeDisplay(gameMode) + ' · ' + diffDisplay(diff)), score, stats: { wave, kills } },
      score, best, newBest: isBest, lines,
      share: { slug: SLUG, accent: '#7ed957', icon: '🐸', title: t('game.frog-bonk.title', { def: 'Frog Bonk' }), message: () => shareMsg(won), params: () => urlParams({ mode: gameMode, diff }) },
      actions: [ { id: 'again', label: t('game.common.playAgain', { def: 'PLAY AGAIN' }), primary: true }, { id: 'menu', label: t('game.common.menu', { def: 'MENU' }) } ],
      onAction: id => { if (id === 'again') startMode(gameMode, diff); else if (id === 'menu') toMenu(); } });
  }
  function pauseGame() {
    if (state !== 'playing' || !KIT) return;
    state = 'paused';
    const acts = [{ id: 'resume', label: t('game.common.resume', { def: 'RESUME (ESC)' }), primary: true }];
    if (gameMode === 'zen') acts.push({ id: 'finish', label: t('game.frog-bonk.finishSave', { def: 'FINISH & SAVE' }) });
    acts.push({ id: 'menu', label: t('game.common.quitToMenu', { def: 'QUIT TO MENU' }), danger: true });
    KIT.menu.show({ kind: 'pause', theme: MENU_THEME, title: t('game.common.paused', { def: 'PAUSED' }),
      lines: [t('game.common.scoreLine', { score, def: 'Score {score}' })],
      actions: acts,
      onAction: id => { if (id === 'resume') resumeGame(); else if (id === 'finish') finishZen(); else if (id === 'menu') toMenu(); }, onEsc: resumeGame });
  }
  function resumeGame() { if (state !== 'paused') return; state = 'playing'; if (KIT) KIT.menu.hide(); }
  function toMenu() { if (KIT) KIT.menu.hide(); showStartMenu(); }

      ballista: t('game.frog-bonk.upBallistaDesc', { def: 'Auto-lobs peas that knock frogs back. No damage — bonking is your job.' }) }[id];
  }
  const UP_ICONS = {
    repair: (g, w, h) => { g.strokeStyle = '#ffd166'; g.lineWidth = 3; g.beginPath(); g.moveTo(w * 0.3, h * 0.7); g.lineTo(w * 0.7, h * 0.3); g.stroke(); g.fillStyle = '#c8b078'; g.fillRect(w * 0.6, h * 0.16, w * 0.2, h * 0.26); },
    walls: (g, w, h) => { g.fillStyle = '#a8a4b8'; g.fillRect(w * 0.2, h * 0.4, w * 0.6, h * 0.4); g.fillStyle = '#807c94'; for (let i = 0; i < 3; i++) g.fillRect(w * 0.2 + i * w * 0.22, h * 0.3, w * 0.14, h * 0.12); },
    moat: (g, w, h) => { g.strokeStyle = '#4d8ce0'; g.lineWidth = 5; g.beginPath(); g.arc(w / 2, h / 2, Math.min(w, h) * 0.3, 0, 7); g.stroke(); g.fillStyle = '#7fe07a'; g.beginPath(); g.ellipse(w / 2 + Math.min(w, h) * 0.3, h / 2, 4, 3, 0, 0, 7); g.fill(); },
    ballista: (g, w, h) => { g.strokeStyle = '#c8894a'; g.lineWidth = 3; g.beginPath(); g.moveTo(w * 0.3, h * 0.75); g.lineTo(w * 0.7, h * 0.3); g.stroke(); g.fillStyle = '#7fe07a'; g.beginPath(); g.arc(w * 0.72, h * 0.26, 5, 0, 7); g.fill(); },
  };
  function upgCost(u) { const lv = upg[u.id] || 0; return lv >= u.max ? 0 : u.cost(lv); }
  function openShop() {
    state = 'shop';
    if (!KIT) return;
    KIT.menu.show({ kind: 'pause', theme: MENU_THEME, title: t('game.frog-bonk.shopTitle', { wave, def: 'WAVE {wave} CLEARED!' }),
      banner: () => '🪰 ' + t('game.frog-bonk.fliesBanner', { flies, def: '{flies} flies' }),
      hint: () => t('game.frog-bonk.shopHint', { def: 'Spend flies on the castle, then sound the horn.' }),
      groups: [{ id: 'buy', style: 'shop', cols: 2, choices: UPGRADES.map(u => ({ id: u.id, label: upgName(u.id), desc: upgDesc(u.id), icon: UP_ICONS[u.id] })),
        sub: c => { const u = UPGRADES.find(x => x.id === c.id); const lv = upg[u.id] || 0;
          return lv >= u.max ? t('game.frog-bonk.upMax', { def: 'MAX' }) : ((u.id === 'repair' ? '' : t('game.frog-bonk.upLv', { lv, max: u.max, def: 'LV {lv}/{max}' }) + ' · ') + '🪰 ' + upgCost(u)); },
        pickLabel: c => { const u = UPGRADES.find(x => x.id === c.id); const lv = upg[u.id] || 0;
          return lv >= u.max ? t('game.frog-bonk.upMaxed', { def: 'MAXED' }) : t('game.frog-bonk.buyCost', { cost: upgCost(u), def: 'BUY · 🪰 {cost}' }); },
        disabled: c => { const u = UPGRADES.find(x => x.id === c.id); const lv = upg[u.id] || 0;
          return lv >= u.max || flies < upgCost(u) || (u.id === 'repair' && castleHp >= castleMax); },
        onPick: id => buyUpgrade(id) }],
      actions: [{ id: 'next', label: t('game.frog-bonk.nextWave', { def: 'NEXT WAVE ▶' }), primary: true }],
      onAction: id => { if (id === 'next') closeShop(); } });
  }
  function buyUpgrade(id) {
    if (state !== 'shop') return;
    const u = UPGRADES.find(x => x.id === id);
    if (!u) return;
    const lv = upg[u.id] || 0;
    const cost = upgCost(u);
    if (lv >= u.max || flies < cost) return;
    if (u.id === 'repair' && castleHp >= castleMax) return;
    flies -= cost;
    if (u.id === 'repair') { castleHp = Math.min(castleMax, castleHp + 5); upg.repair++; }
    else if (u.id === 'walls') { upg.walls++; castleMax += 5; castleHp += 5; }
    else if (u.id === 'moat') upg.moat++;
    else if (u.id === 'ballista') { upg.ballista++; ballistaT = 60; }
    SND.play('coin');
    updateHud();
  }
  function closeShop() { if (state !== 'shop') return; state = 'playing'; if (KIT) KIT.menu.hide(); startWave(wave + 1); }

  // ---- Input ----
  function toCanvas(e, r) { return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) }; }
  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    const p = toCanvas(e, r);
    whack(p.x, p.y);
  });
  window.addEventListener('keydown', e => {
    if (state === 'playing' && e.key === 'Escape') { e.preventDefault(); pauseGame(); }
  });

  // ---- Nav / chrome ----
  { const pm = KIT && KIT.param && KIT.param('mode'); if (['waves', 'endless', 'zen'].indexOf(pm) >= 0) gameMode = pm; }
  { const pd = KIT && KIT.param && KIT.param('diff'); if (['easy', 'medium', 'hard'].indexOf(pd) >= 0) diff = pd; }
  KIT.nav({ slug: SLUG, music: true, home: '../../', theme: MENU_THEME, onMenu: () => toMenu(),
    onPause: () => { if (state === 'playing') pauseGame(); else if (state === 'paused') resumeGame(); },
    confirmLeave: () => (state === 'playing' || state === 'paused' || state === 'shop') ? t('confirm.leave', { def: "Leave this run? You'll lose your progress." }) : false,
    controls: { title: t('game.frog-bonk.controlsTitle', { def: 'Frog Bonk — Controls' }),
      mouse: [ [t('game.common.click', { def: 'Click' }), t('game.frog-bonk.ctrlBonk', { def: 'Bonk a frog' })] ],
      keyboard: [ [t('game.common.esc', { def: 'Esc' }), t('game.common.pause', { def: 'Pause' })] ],
      touch: [ [t('game.common.tap', { def: 'Tap' }), t('game.frog-bonk.ctrlBonk', { def: 'Bonk a frog' })] ] } });
  KIT.music.play('castle');

  // ---- __test hook + layout getter ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get best() { return best; },
    get castleHp() { return castleHp; },
    get castleMax() { return castleMax; },
    get wave() { return wave; },
    get flies() { return flies; },
    get combo() { return combo; },
    get kills() { return kills; },
    get mode() { return gameMode; },
    get diff() { return diff; },
    get frogCount() { return frogs.filter(f => f.ph !== 'out').length; },
    get frogs() { return frogs.map(f => ({ type: f.type, hp: f.hp, x: f.x, y: f.y, ph: f.ph })); },
    get hammer() { return { st: hammer.st, t: hammer.t }; },
    get upgrades() { return { repair: upg.repair, walls: upg.walls, moat: upg.moat, ballista: upg.ballista }; },
    get spawnQueueLen() { return spawnQueue.length; },
    get layout() {
      return { W, H, topReserve: topMargin,
        castle: { x: cx, y: cy, r: castR },
        castleTop: cy - castR * 0.5 - castR * 1.1 - 9,   // keep-tower top incl. battlements
        castleBottom: cy + castR * 1.1 + 8 };            // wall band + base ellipse
    },
    start() { startMode(gameMode, diff); },
    startMode,
    spawnAt(type, x, y) { frogs.push(makeFrog(type, x, y)); },
    clearFrogs() { frogs = []; spawnQueue = []; },
    spawnPos,
    firePea(i) { const f = frogs[i]; if (f) peas.push({ x: cx, y: cy, tx: f.x, ty: f.y, t: 2, frog: f }); },
    get fxCount() { return parts.length; },
    setFlies(n) { flies = n; updateHud(); },
    setCastleHp(n) { castleHp = n; updateHud(); },
    whack,
    buyUpgrade,
    closeShop,
    finishZen,
    menu() { return KIT ? KIT.menu.current() : null; },
    best_(m, d) { return loadBest(m, d); },
    step(n) { for (let i = 0; i < (n || 1); i++) update(); },
  };

  resize();
  i18nHudLabels();
  updateHud();
  KIT.loop(update, render);
  showStartMenu();
})();
  window.gamekit.pwa('../../sw.js');
</script>
</body>
</html>
