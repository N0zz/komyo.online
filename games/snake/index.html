<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">

<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#7fffb0">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:#050a0f; color:#b0f0ff;
    font-family: 'Courier New', Courier, monospace; user-select:none; touch-action:none; }
  #game { display:block; width:100vw; height:100vh; }
  #hud { position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:5; display:flex; gap:24px;
    background:rgba(0,10,20,0.75); border:1px solid #0af3; border-radius:8px; padding:6px 18px;
    font-size:14px; letter-spacing:2px; pointer-events:none; }
  #hud .lbl { opacity:0.5; font-size:10px; }
  #hud b { color:#0ff; text-shadow:0 0 10px #0ff; }
  /* Portrait: the centered HUD can collide with the top-left nav, so drop it below the nav row. */
  @media (orientation:portrait) and (max-width:560px) {
    #hud { top:46px; gap:16px; padding:6px 14px; font-size:13px; }
  }
  #overlay { position:fixed; inset:0; z-index:8; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:16px; background:rgba(0,5,12,0.88); padding:24px; }
  #overlay.hidden { display:none; }
  /* on-screen D-pad (touch only): tap to turn instead of swiping */
  #dpad { position:fixed; left:50%; bottom:20px; transform:translateX(-50%); z-index:7; display:none; opacity:1;
    transition:opacity 0.2s ease; grid-template-columns:repeat(3,54px); grid-template-rows:repeat(3,54px); gap:6px; touch-action:none; user-select:none; }
  #dpad button { border-radius:12px; border:1px solid rgba(127,255,176,0.5); background:rgba(10,22,16,0.6);
    color:#7fffb0; font:600 22px/1 system-ui,sans-serif; display:flex; align-items:center; justify-content:center;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation; cursor:pointer; }
  #dpad button:active { background:rgba(127,255,176,0.28); }
  #dpad button.dim { opacity:0.3; }
  #dpad .u{grid-area:1/2} #dpad .l{grid-area:2/1} #dpad .r{grid-area:2/3} #dpad .d{grid-area:3/2}
  /* center cell = drag handle (move the pad anywhere; position is remembered) */
  #dpad .c { grid-area:2/2; display:flex; align-items:center; justify-content:center; cursor:move; touch-action:none; }
  #dpad .c i { width:16px; height:16px; border-radius:50%; background:rgba(127,255,176,0.7); box-shadow:0 0 8px rgba(127,255,176,0.6); border:2px solid rgba(127,255,176,0.4); }
  /* drag the pad onto this ✕ (top-right, shown only while dragging) to hide it; the re-enable button takes its place */
  #dpadHide { position:fixed; right:10px; top:56px; z-index:9; display:none;
    width:56px; height:56px; border-radius:50%; border:2px dashed rgba(255,120,120,0.75); background:rgba(40,10,12,0.65);
    color:#ff9a9a; font:600 24px/52px system-ui,sans-serif; text-align:center; pointer-events:none; user-select:none; }
  #dpadHide.over { background:rgba(255,70,70,0.55); border-style:solid; color:#fff; transform:scale(1.18); }
  #dpadShow { position:fixed; right:10px; top:56px; z-index:7; display:none; opacity:0; transition:opacity 0.2s ease;
    padding:7px 12px; border-radius:12px; border:1px solid rgba(127,255,176,0.5); background:rgba(10,22,16,0.72);
    color:#7fffb0; font:600 18px/1 system-ui,sans-serif; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  /* touch-only handle to slide the arena up/down (remembered) — sits in the board's top-left corner */
  #boardGrip { position:fixed; z-index:8; width:34px; height:34px; border-radius:9px; display:none;
    align-items:center; justify-content:center; opacity:0.5; cursor:ns-resize; touch-action:none; user-select:none;
    background:rgba(10,22,16,0.6); border:1px solid rgba(127,255,176,0.5); color:#7fffb0; font:16px/1 system-ui,sans-serif; }
  #boardGrip:active { opacity:0.9; background:rgba(127,255,176,0.28); }
  #overlay h1 { margin:0; font-size:52px; letter-spacing:6px; color:#0ff; text-shadow:0 0 30px #0ff,0 0 60px #0af; }
  #overlay p { margin:4px; font-size:14px; opacity:0.8; letter-spacing:1px; }
  #overlay .sub { opacity:0.5; font-size:12px; letter-spacing:1px; }
  #overlay button { font-family:inherit; cursor:pointer; font-size:15px; letter-spacing:3px; padding:12px 32px;
    border-radius:8px; color:#0ff; background:transparent; border:1px solid #0ff;
    text-shadow:0 0 10px #0ff; box-shadow:0 0 18px #0af4; transition:box-shadow 0.15s; }
  #overlay button:hover { box-shadow:0 0 32px #0af9; }
  #goScore { font-size:28px; color:#f0f; text-shadow:0 0 20px #f0f; letter-spacing:3px; }
  #goStats { font-size:13px; color:#0af; opacity:0.85; letter-spacing:2px; }
  #goBest { font-size:14px; color:#0af; opacity:0.8; }
  #goBest.newbest { color:#0ff; opacity:1; text-shadow:0 0 14px #0ff; }
  .screen { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; width:100%; }
  .screen.hidden { display:none; }
  #shareRow { --gamekit-accent:#0ff; }
  .opts { display:flex; flex-direction:column; gap:11px; width:100%; max-width:380px; }
  .opt-row { display:grid; grid-template-columns:54px 1fr; align-items:center; gap:12px; }
  .opt-label { font-size:11px; letter-spacing:2px; opacity:0.55; text-align:left; }
  .opt-btns { display:flex; gap:8px; }
  /* scoped under #overlay to outrank the generic "#overlay button" rule above */
  #overlay .opt-btn { flex:1; min-width:0; font-family:inherit; cursor:pointer; font-size:11px; letter-spacing:2px; padding:8px 4px;
    border-radius:6px; color:rgba(150,195,215,0.6); background:transparent; border:1px solid rgba(120,200,255,0.25);
    text-shadow:none; box-shadow:none; transition:all 0.12s; white-space:nowrap; text-align:center; }
  #overlay .opt-btn:hover { border-color:#0af; color:#cfefff; box-shadow:none; }
  #overlay .opt-btn.active { color:#04222b; border-color:#0ff; background:#2ff3ff; text-shadow:none;
    box-shadow:0 0 18px rgba(0,240,255,0.7); font-weight:bold; }
  .topscores { display:flex; flex-direction:column; gap:3px; width:100%; max-width:380px;
    font-size:11px; letter-spacing:1.5px; }
  .topscores .ts-title { font-size:10px; letter-spacing:2px; opacity:0.5; text-align:left; margin-bottom:2px; }
  .topscores .ts-row { display:flex; justify-content:space-between; gap:12px;
    color:rgba(150,195,215,0.75); }
  .topscores .ts-row.cur { color:#0ff; text-shadow:0 0 8px #0ff6; }
  .topscores .ts-row .ts-mode { opacity:0.85; }
  .topscores .ts-row .ts-val { color:#0ff; font-weight:bold; }
  .topscores .ts-empty { opacity:0.4; text-align:left; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div><div class="lbl">SCORE</div><b id="scoreEl">0</b></div>
  <div><div class="lbl">BEST</div><b id="bestEl">0</b></div>
  <div><div class="lbl">LENGTH</div><b id="lenEl">1</b></div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const KIT = window.gamekit;
  const scoreEl = document.getElementById('scoreEl');
  const bestEl = document.getElementById('bestEl');
  const lenEl = document.getElementById('lenEl');

  // ---- Audio (game-kit shared engine + global mute) ----
  const SND = window.gamekit.sound;
  SND.define({
    eat: ({ tone }) => { tone(660, 0.06, 'square', 0.12); tone(880, 0.08, 'sine', 0.07); },
    turn: ({ tone }) => tone(220, 0.03, 'triangle', 0.04),
    crash: ({ tone }) => { [220, 165, 110].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'sawtooth', 0.14), i * 80)); },
  });

  // ---- Grid sizes ----
  const GRID_SIZES = {
    small:  { cols: 18, rows: 14 },
    medium: { cols: 28, rows: 22 },
    large:  { cols: 40, rows: 30 },
  };

  // ---- Speed config ----
  const SPEED_CFG = {
    slow:   { base: 200, ramp: 2, min: 110 },
    normal: { base: 140, ramp: 3, min: 60 },
    fast:   { base: 90,  ramp: 5, min: 40 },
  };

  // ---- Options ----
  const OPT_DEFAULTS = { walls: 'solid', speed: 'normal', size: 'medium' };
  let opts = { ...OPT_DEFAULTS };

  function loadOpts() {
    try {
      const raw = localStorage.getItem('snake_opts');
      if (raw) {
        const saved = JSON.parse(raw);
        if (saved.walls === 'wrap') opts.walls = 'wrap';
        if (SPEED_CFG[saved.speed]) opts.speed = saved.speed;
        if (GRID_SIZES[saved.size]) opts.size = saved.size;
      }
    } catch (_) {}
  }
  function saveOpts() {
    try { localStorage.setItem('snake_opts', JSON.stringify(opts)); } catch (_) {}
  }

  // ---- State ----
  let state = 'ready'; // ready | playing | over
  let snake, dir, nextDir, food, score, best, particles, flashAlpha, pendingFood;
  let COLS, ROWS;
  let W, H, cellW, cellH, offX, offY;
  let dpadReserve = 0; // space kept clear for the on-screen D-pad (touch) so it never overlaps the arena
  let boardShiftY = 0; // touch players can slide the arena up/down (persisted); clamped each layout
  let dpadEl = null, dpadHidden = false, dpadOrient = null; // declared early so resize() can lay it out safely

  // ---- Per-mode best scores ----
  // Bests are keyed by the full mode (walls + speed + size) and stored as a map in localStorage.
  function modeKey(o) { return (o.walls) + ':' + (o.speed) + ':' + (o.size); }
  function loadBests() {
    try { const raw = localStorage.getItem('snake_bests'); const m = raw ? JSON.parse(raw) : null; return (m && typeof m === 'object') ? m : {}; }
    catch (_) { return {}; }
  }
  function loadBest() {
    const m = loadBests();
    let v = m[modeKey(opts)];
    // Migrate the old single global best into the current mode on first run.
    if (!(modeKey(opts) in m)) {
      try { const legacy = parseInt(localStorage.getItem('snake_best') || '0', 10) || 0; if (legacy > 0) v = legacy; } catch (_) {}
    }
    return parseInt(v || 0, 10) || 0;
  }
  function saveBest(v) {
    try {
      const m = loadBests();
      m[modeKey(opts)] = v;
      localStorage.setItem('snake_bests', JSON.stringify(m));
      localStorage.setItem('snake_best', String(v)); // keep legacy key for back-compat
    } catch (_) {}
  }

  function applyGridSize() {
    const g = GRID_SIZES[opts.size] || GRID_SIZES.medium;
    COLS = g.cols;
    ROWS = g.rows;
  }

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    // In portrait the HUD drops below the nav row (see CSS @media), so reserve more headroom.
    let portrait = false;
    try { portrait = !!(window.matchMedia && window.matchMedia('(orientation:portrait)').matches) && W <= 560; } catch (_) {}
    const hud = portrait ? 90 : 48;
    // reserve room for the D-pad: a bottom strip in portrait, a side strip in landscape (so the
    // arena stays large in landscape instead of being squeezed vertically)
    const landscape = W > H;
    const rBottom = (dpadReserve && !landscape) ? dpadReserve : 0;
    const rSide = (dpadReserve && landscape) ? dpadReserve : 0;
    const avW = W - rSide, avH = H - hud - rBottom;
    cellW = Math.floor(avW / COLS);
    cellH = Math.floor(avH / ROWS);
    const cell = Math.min(cellW, cellH);
    cellW = cellH = cell;
    offX = Math.floor((avW - COLS * cell) / 2); // arena hugs the left; D-pad sits in the right strip (landscape)
    // vertical position = centered, plus the player's saved up/down shift, clamped so the arena always
    // clears the HUD on top and the D-pad reserve on the bottom (write the clamp back so it can't run past).
    const baseOffY = hud + Math.floor((avH - ROWS * cell) / 2);
    const minOffY = hud, maxOffY = Math.max(hud, H - rBottom - ROWS * cell);
    offY = Math.max(minOffY, Math.min(maxOffY, baseOffY + boardShiftY));
    boardShiftY = offY - baseOffY;
    layoutDpad();
    placeGrip();
  }
  window.gamekit.layout.on(resize); // resize + orientationchange + visualViewport, debounced

  function cx(c) { return offX + c * cellW; }
  function cy(r) { return offY + r * cellH; }

  function randFood() {
    const occupied = new Set(snake.map(s => s.x + ',' + s.y));
    let x, y;
    do { x = Math.floor(Math.random() * COLS); y = Math.floor(Math.random() * ROWS); } while (occupied.has(x + ',' + y));
    return { x, y };
  }

  function reset() {
    applyGridSize();
    resize();
    const sx = Math.floor(COLS / 2), sy = Math.floor(ROWS / 2);
    snake = [{ x: sx, y: sy }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    best = loadBest();
    particles = [];
    flashAlpha = 0;
    pendingFood = null;
    food = randFood();
    updateHud();
  }

  function updateHud() {
    if (scoreEl) scoreEl.textContent = score;
    if (bestEl) bestEl.textContent = best;
    if (lenEl) lenEl.textContent = snake.length;
  }

  // ---- Particles ----
  function spawnParticles(x, y) {
    const px = cx(x) + cellW / 2, py = cy(y) + cellH / 2;
    for (let i = 0; i < 12; i++) {
      const a = (Math.PI * 2 * i) / 12 + Math.random() * 0.4;
      const spd = 1.5 + Math.random() * 2.5;
      particles.push({ x: px, y: py, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, life: 1, r: 2 + Math.random() * 2 });
    }
  }

  // ---- Core tick ----
  function tick() {
    if (state !== 'playing') return;

    // Apply pending direction (no 180° reversal)
    const nd = nextDir;
    if (!(nd.x === -dir.x && nd.y === -dir.y)) {
      if (nd.x !== dir.x || nd.y !== dir.y) { dir = nd; SND.play('turn'); dimDpad(); }
    }

    const head = snake[0];
    let nx = head.x + dir.x, ny = head.y + dir.y;

    if (opts.walls === 'wrap') {
      // Wrap around edges
      nx = ((nx % COLS) + COLS) % COLS;
      ny = ((ny % ROWS) + ROWS) % ROWS;
    } else {
      // Solid walls — collision kills
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) { gameOver(); return; }
    }

    // Self collision — exclude tail tip (it moves away this same tick when not eating)
    if (snake.slice(0, -1).some(s => s.x === nx && s.y === ny)) { gameOver(); return; }

    const ate = nx === food.x && ny === food.y;
    snake.unshift({ x: nx, y: ny });
    if (!ate) { snake.pop(); }
    else {
      score += 10;
      if (score > best) { best = score; saveBest(best); }
      flashAlpha = 0.12;
      spawnParticles(nx, ny);
      SND.play('eat');
      food = pendingFood !== null ? pendingFood : randFood();
      pendingFood = null;
      updateHud();
    }
  }

  function gameOver() {
    state = 'over';
    SND.play('crash');
    const newBest = score > best;
    if (newBest) { best = score; saveBest(best); }
    updateHud();
    showDpad(false);
    showEnd(newBest);
  }

  function startGame() {
    reset();
    state = 'playing';
    if (KIT) { KIT.menu.hide(); KIT.showMenuButton(true); KIT.showPauseButton(true); }
    showDpad(true);
  }

  // ---- shared menus (gamekit.menu) — neon theme + a live-grid snake backdrop ----
  const MENU_THEME = { accent: '#00ffdc', glow: '0 0 18px rgba(0,255,220,0.5)', bg: 'rgba(6,12,16,0.72)',
    border: 'rgba(0,220,255,0.32)', overlay: 'rgba(4,8,12,0.6)', title: '#7dfff0', 'on-accent': '#03140f', 'accent-soft': 'rgba(0,255,220,0.16)' };
  function roundRectM(g, x, y, w, h, r) { g.beginPath(); g.moveTo(x + r, y); g.arcTo(x + w, y, x + w, y + h, r); g.arcTo(x + w, y + h, x, y + h, r); g.arcTo(x, y + h, x, y, r); g.arcTo(x, y, x + w, y, r); g.closePath(); }
  // a live "demo" snake wandering the menu grid: it moves on a timer and turns at random every ~1–3s
  var mb = null;
  function mbInit(cols, rows) {
    const c = Math.floor(cols / 2), r = Math.floor(rows / 2);
    mb = { cols, rows, dir: [1, 0], cells: [[c - 2, r], [c - 1, r], [c, r]],
      food: [Math.min(cols - 3, c + 4), r], step: 6, since: 0, turnEvery: 8 + Math.floor(Math.random() * 22), lastStep: -999 };
  }
  function mbTurn() { const d = mb.dir, opts = d[0] !== 0 ? [[0, -1], [0, 1]] : [[-1, 0], [1, 0]]; mb.dir = opts[Math.floor(Math.random() * opts.length)]; }
  function mbStep() {
    const head = mb.cells[mb.cells.length - 1];
    const nx = ((head[0] + mb.dir[0]) % mb.cols + mb.cols) % mb.cols;
    const ny = ((head[1] + mb.dir[1]) % mb.rows + mb.rows) % mb.rows;
    mb.cells.push([nx, ny]);
    if (nx === mb.food[0] && ny === mb.food[1]) { mb.food = [1 + Math.floor(Math.random() * (mb.cols - 2)), 1 + Math.floor(Math.random() * (mb.rows - 2))]; if (mb.cells.length > 24) mb.cells.shift(); }
    else mb.cells.shift();
  }
  function menuBackdrop(g, w, h, st, frame) {
    frame = frame || 0;
    g.fillStyle = '#050a0f'; g.fillRect(0, 0, w, h);
    const cs = 27, cols = Math.floor(w / cs), rows = Math.floor(h / cs);
    g.strokeStyle = 'rgba(0,180,255,.07)'; g.lineWidth = 1;
    for (let x = 0; x <= w; x += cs) { g.beginPath(); g.moveTo(x, 0); g.lineTo(x, h); g.stroke(); }
    for (let y = 0; y <= h; y += cs) { g.beginPath(); g.moveTo(0, y); g.lineTo(w, y); g.stroke(); }
    if (!mb || mb.cols !== cols || mb.rows !== rows) mbInit(cols, rows);
    if (frame - mb.lastStep >= mb.step) { // advance the demo snake on its own tick
      mb.lastStep = frame; mb.since++;
      if (mb.since >= mb.turnEvery) { mbTurn(); mb.since = 0; mb.turnEvery = 8 + Math.floor(Math.random() * 22); }
      mbStep();
    }
    g.fillStyle = '#f0f'; g.shadowColor = '#f0f'; g.shadowBlur = 16; g.beginPath(); g.arc(mb.food[0] * cs + cs / 2, mb.food[1] * cs + cs / 2, cs * .28, 0, 7); g.fill(); g.shadowBlur = 0;
    const n = mb.cells.length; g.save();
    for (let k = 0; k < n; k++) { const t = (n - 1 - k) / n; g.fillStyle = 'rgb(0,' + Math.round(255 - 45 * t) + ',' + Math.round(220 - 140 * t) + ')'; g.shadowColor = 'rgba(0,255,220,.6)'; g.shadowBlur = (k === n - 1) ? 18 : 7; const px = mb.cells[k][0] * cs, py = mb.cells[k][1] * cs; roundRectM(g, px + cs * .06, py + cs * .06, cs * .88, cs * .88, cs * .3); g.fill(); }
    g.restore();
  }
  function pvWall(g, w, h, wrap) {
    g.fillStyle = '#050a0f'; g.fillRect(0, 0, w, h); g.strokeStyle = wrap ? '#00ffdc' : '#2a5a55'; if (g.setLineDash) g.setLineDash(wrap ? [4, 4] : []); g.lineWidth = 2; g.strokeRect(4, 4, w - 8, h - 8); if (g.setLineDash) g.setLineDash([]);
    g.fillStyle = '#00ffdc'; g.shadowColor = '#00ffdc'; g.shadowBlur = 8; for (let i = 0; i < 4; i++) g.fillRect(14 + i * 9, h / 2, 7, 7); g.shadowBlur = 0;
    g.fillStyle = '#f0f'; g.beginPath(); g.arc(w - 18, 20, 5, 0, 7); g.fill();
  }
  const SPD_LABEL = { slow: 'Slow', normal: 'Normal', fast: 'Fast' };
  const SZ_LABEL = { small: 'Small', medium: 'Medium', large: 'Large' };
  function comboBest(o) { const m = loadBests(); return parseInt(m[modeKey(o)], 10) || 0; }
  function showStartMenu() {
    state = 'ready'; showDpad(false); if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if (!KIT) return;
    KIT.menu.show({ kind: 'start', theme: MENU_THEME, title: 'NEON SNAKE', backdrop: menuBackdrop, backdropAnimate: true,
      groups: [
        { id: 'walls', label: 'WALLS', style: 'cards', default: opts.walls, choices: [
          { id: 'solid', label: 'Solid walls', mech: ['Classic'], preview: (g, w, h) => pvWall(g, w, h, false) },
          { id: 'wrap', label: 'Wrap-around', mech: ['No edges'], preview: (g, w, h) => pvWall(g, w, h, true) },
        ] },
        { id: 'speed', label: 'SPEED', style: 'slider', default: opts.speed, choices: [ { id: 'slow', label: 'Slow' }, { id: 'normal', label: 'Normal' }, { id: 'fast', label: 'Fast' } ] },
        { id: 'size', label: 'BOARD', default: opts.size, choices: [ { id: 'small', label: 'Small' }, { id: 'medium', label: 'Medium' }, { id: 'large', label: 'Large' } ] },
      ],
      actions: [{ id: 'play', label: 'PLAY', primary: true }],
      hint: st => { const b = comboBest({ walls: st.walls, speed: st.speed, size: st.size }); return (b > 0 ? 'Best ' + b + ' · ' : '') + 'Arrows / WASD · swipe · on-screen D-pad on phones.'; },
      onChange: st => { opts.walls = st.walls; opts.speed = st.speed; opts.size = st.size; saveOpts(); applyGridSize(); best = loadBest(); if (bestEl) bestEl.textContent = best; KIT.stampUrl({ walls: opts.walls, speed: opts.speed, size: opts.size }); },
      onPlay: st => { opts.walls = st.walls; opts.speed = st.speed; opts.size = st.size; saveOpts(); applyGridSize(); KIT.stampUrl({ walls: opts.walls, speed: opts.speed, size: opts.size }); startGame(); },
    });

  }
  function shareMsg() {
    const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

  }
  function showEnd(newBest) {
    if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if (!KIT) return;
    KIT.menu.show({ kind: 'end', theme: MENU_THEME, title: 'GAME OVER', backdrop: menuBackdrop,
      score: score, best: best, newBest: newBest, lines: ['Length ' + (snake ? snake.length : 1) + ' · ' + SPD_LABEL[opts.speed] + ' · ' + SZ_LABEL[opts.size] + ' · ' + (opts.walls === 'wrap' ? 'Wrap' : 'Solid')],
      share: { slug: 'snake', title: 'Neon Snake', message: () => shareMsg(), params: () => ({ walls: opts.walls, speed: opts.speed, size: opts.size }) },
      record: { slug: 'snake', mode: '', score: score, stats: { length: snake ? snake.length : 1 } },
      actions: [ { id: 'again', label: 'PLAY AGAIN', primary: true }, { id: 'menu', label: 'MENU' } ],
      onAction: id => { if (id === 'again') startGame(); else if (id === 'menu') toMenu(); } });
  }
  function pauseGame() { if (state !== 'playing' || !KIT) return; state = 'paused'; showDpad(false);
    KIT.menu.show({ kind: 'pause', theme: MENU_THEME, title: 'PAUSED', lines: ['Score ' + score],
      actions: [ { id: 'resume', label: 'RESUME (ESC)', primary: true }, { id: 'menu', label: 'QUIT TO MENU', danger: true } ],
      onAction: id => { if (id === 'resume') resumeGame(); else if (id === 'menu') toMenu(); }, onEsc: resumeGame }); }
  function resumeGame() { if (state !== 'paused') return; state = 'playing'; if (KIT) KIT.menu.hide(); showDpad(true); }
  function toMenu() { if (KIT) KIT.menu.hide(); showStartMenu(); }

  // ---- Tick timing ----
  let lastTick = 0;
  function getInterval() {
    const cfg = SPEED_CFG[opts.speed] || SPEED_CFG.normal;
    return Math.max(cfg.min, cfg.base - (snake.length - 1) * cfg.ramp);
  }

  // (options + per-combo bests now live in the shared gamekit.menu — see showStartMenu)

  // ---- Render ----
  function render(ts) {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#050a0f';
    ctx.fillRect(0, 0, W, H);

    // Grid lines (dim neon)
    ctx.strokeStyle = 'rgba(0,180,255,0.07)';
    ctx.lineWidth = 0.5;
    for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(cx(c), cy(0)); ctx.lineTo(cx(c), cy(ROWS)); ctx.stroke(); }
    for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(cx(0), cy(r)); ctx.lineTo(cx(COLS), cy(r)); ctx.stroke(); }

    // Board border glow
    ctx.strokeStyle = 'rgba(0,220,255,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx(0) - 1, cy(0) - 1, COLS * cellW + 2, ROWS * cellH + 2);

    // Flash on eat
    if (flashAlpha > 0) {
      ctx.fillStyle = 'rgba(0,255,200,' + flashAlpha.toFixed(2) + ')';
      ctx.fillRect(cx(0), cy(0), COLS * cellW, ROWS * cellH);
      flashAlpha = Math.max(0, flashAlpha - 0.012);
    }

    if (state === 'playing' || state === 'over') {
      // Food — pulsing pip
      const pulse = 0.5 + 0.5 * Math.sin((ts || 0) * 0.004);
      const fx = cx(food.x) + cellW / 2, fy = cy(food.y) + cellH / 2;
      const fr = (cellW * 0.28) + pulse * cellW * 0.08;
      ctx.save();
      ctx.shadowBlur = 18 + pulse * 12;
      ctx.shadowColor = '#f0f';
      ctx.fillStyle = '#f0f';
      ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 6;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(fx - fr * 0.3, fy - fr * 0.3, fr * 0.28, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // Snake
      const len = snake.length;
      for (let i = len - 1; i >= 0; i--) {
        const seg = snake[i];
        const t = 1 - i / len;
        const pad = Math.floor(cellW * 0.1);
        const sx = cx(seg.x) + pad, sy = cy(seg.y) + pad;
        const sw = cellW - pad * 2, sh = cellH - pad * 2;
        const r = Math.floor(sw * 0.3);

        // Color: head = cyan, tail fades to green
        const h1 = [0, 255, 220], h2 = [0, 210, 80];
        const ri = Math.round(h1[0] + (h2[0] - h1[0]) * (1 - t));
        const gi = Math.round(h1[1] + (h2[1] - h1[1]) * (1 - t));
        const bi = Math.round(h1[2] + (h2[2] - h1[2]) * (1 - t));
        const col = 'rgb(' + ri + ',' + gi + ',' + bi + ')';

        ctx.save();
        if (i === 0) { ctx.shadowBlur = 22; ctx.shadowColor = '#0ffb'; }
        else { ctx.shadowBlur = 8 * t; ctx.shadowColor = 'rgba(0,220,120,0.5)'; }
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(sx, sy, sw, sh, r) : ctx.rect(sx, sy, sw, sh);
        ctx.fill();
        ctx.restore();

        // Head eyes
        if (i === 0) {
          ctx.fillStyle = '#fff';
          const ex = cx(seg.x) + cellW / 2, ey = cy(seg.y) + cellH / 2;
          const er = cellW * 0.1;
          const eo = cellW * 0.18;
          // orient eyes by direction
          const ex1 = ex + dir.y * eo - dir.x * eo, ey1 = ey - dir.x * eo - dir.y * eo;
          const ex2 = ex - dir.y * eo - dir.x * eo, ey2 = ey + dir.x * eo - dir.y * eo;
          ctx.beginPath(); ctx.arc(ex1 + dir.x * eo, ey1 + dir.y * eo, er, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2 + dir.x * eo, ey2 + dir.y * eo, er, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#006';
          ctx.beginPath(); ctx.arc(ex1 + dir.x * eo, ey1 + dir.y * eo, er * 0.5, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2 + dir.x * eo, ey2 + dir.y * eo, er * 0.5, 0, Math.PI * 2); ctx.fill();
        }
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= 0.04;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.shadowBlur = 8; ctx.shadowColor = '#f0f';
        ctx.fillStyle = p.life > 0.5 ? '#f0f' : '#0ff';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }
  }

  // ---- rAF loop (render only, decoupled from ticks) ----
  function loop(ts) {
    requestAnimationFrame(loop);
    if (window.gamekit && window.gamekit.isPaused && window.gamekit.isPaused()) { lastTick = ts; return; } // kit pause (keep tick baseline fresh)
    if (state === 'playing' && ts - lastTick >= getInterval()) {
      lastTick = ts;
      tick();
    }
    render(ts);
  }

  // ---- Input ----
  const KEY_MAP = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right', w:'up', s:'down', a:'left', d:'right' };
  const DIR_MAP = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} };

  document.addEventListener('keydown', e => {
    const d = KEY_MAP[e.key];
    if (d) { e.preventDefault(); if (state === 'playing') nextDir = DIR_MAP[d]; }
    if (e.key === 'Escape' && state === 'playing') { e.preventDefault(); pauseGame(); }
  });

  // Touch swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', e => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    if (state !== 'playing') return;
    if (Math.abs(dx) > Math.abs(dy)) nextDir = dx > 0 ? DIR_MAP.right : DIR_MAP.left;
    else nextDir = dy > 0 ? DIR_MAP.down : DIR_MAP.up;
  }, { passive: true });

  // On-screen D-pad (touch only): tap an arrow to turn — no swiping required.
  const isTouch = (typeof matchMedia !== 'undefined' && matchMedia('(pointer:coarse)').matches) || (typeof window !== 'undefined' && 'ontouchstart' in window);
  let dpadBtns = null, hideZoneEl = null, showBtnEl = null, gripEl = null;
  const DPAD_POS_KEY = 'snake_dpad_pos', DPAD_HIDE_KEY = 'snake_dpad_hidden', DPAD_RESERVE = 200;
  const BOARD_SHIFT_KEY = 'snake_board_shift';
  try { dpadHidden = localStorage.getItem(DPAD_HIDE_KEY) === '1'; } catch (_) {}
  try { boardShiftY = parseInt(localStorage.getItem(BOARD_SHIFT_KEY) || '0', 10) || 0; } catch (_) {}

  // ---- Board move handle (touch): slide the arena up/down so it clears the player's thumb ----
  function placeGrip() {
    if (!gripEl) return;
    gripEl.style.left = (offX + 4) + 'px';
    gripEl.style.top = (offY + 4) + 'px';
  }
  function buildGrip() {
    if (gripEl || typeof document === 'undefined' || !document.body || !document.createElement) return;
    gripEl = document.createElement('div'); gripEl.id = 'boardGrip'; gripEl.textContent = '↕';
    gripEl.title = 'Drag to move the board up or down';
    gripEl.setAttribute('aria-label', 'Drag to move the board up or down');
    document.body.appendChild(gripEl);
    let drag = false, startY = 0, startShift = 0;
    gripEl.addEventListener('pointerdown', (e) => {
      drag = true; startY = e.clientY; startShift = boardShiftY;
      try { gripEl.setPointerCapture(e.pointerId); } catch (_) {}
      if (e.preventDefault) e.preventDefault();
    });
    gripEl.addEventListener('pointermove', (e) => {
      if (!drag) return; boardShiftY = startShift + (e.clientY - startY); resize(); // resize clamps + repositions
    });
    const end = () => {
      if (!drag) return; drag = false;
      try { localStorage.setItem(BOARD_SHIFT_KEY, String(Math.round(boardShiftY))); } catch (_) {}
    };
    gripEl.addEventListener('pointerup', end); gripEl.addEventListener('pointercancel', end);
    placeGrip();
  }
  if (isTouch && !dpadHidden) dpadReserve = DPAD_RESERVE; // first layout already leaves room
  function dirClass() { return dir ? (dir.x === 1 ? 'r' : dir.x === -1 ? 'l' : dir.y === 1 ? 'd' : 'u') : null; }
  function dimDpad() { if (!dpadBtns) return; const cur = dirClass(), opp = { r: 'l', l: 'r', u: 'd', d: 'u' }[cur]; ['u', 'l', 'r', 'd'].forEach(c => { if (dpadBtns[c]) dpadBtns[c].classList.toggle('dim', c === cur || c === opp); }); }
  function applyReserve() { const want = (isTouch && !dpadHidden) ? DPAD_RESERVE : 0; if (want !== dpadReserve) { dpadReserve = want; resize(); } }
  // ---- D-pad positioning (kept on-screen; default sits in the reserved strip per orientation) ----
  function placeDpad(x, y) {
    if (!dpadEl) return;
    const w = dpadEl.offsetWidth || 174, h = dpadEl.offsetHeight || 174;
    x = Math.max(4, Math.min((window.innerWidth || 360) - w - 4, x));
    y = Math.max(4, Math.min((window.innerHeight || 640) - h - 4, y));
    dpadEl.style.left = x + 'px'; dpadEl.style.top = y + 'px'; dpadEl.style.bottom = 'auto'; dpadEl.style.transform = 'none';
  }
  function placeDpadDefault(landscape) {
    if (!dpadEl) return;
    const w = dpadEl.offsetWidth || 174, h = dpadEl.offsetHeight || 174;
    if (landscape) placeDpad(W - w - 16, Math.round((H - h) / 2 + 16)); // right strip, vertically centred
    else placeDpad(Math.round((W - w) / 2), H - h - 20);                // bottom strip, centred
  }
  function clampDpad() { if (dpadEl) placeDpad(parseInt(dpadEl.style.left, 10) || 0, parseInt(dpadEl.style.top, 10) || 0); }
  function layoutDpad() {
    if (!dpadEl || dpadHidden) return;
    const landscape = W > H;
    if (dpadOrient !== landscape) { dpadOrient = landscape; placeDpadDefault(landscape); } // orientation flip → snap to default
    else clampDpad();                                                                       // same orientation → just keep on-screen
  }
  function buildDpad() {
    if (dpadEl || typeof document === 'undefined' || !document.body || !document.createElement) return;
    dpadEl = document.createElement('div'); dpadEl.id = 'dpad'; dpadBtns = {};
    [['u', '▲', 'up'], ['l', '◀', 'left'], ['r', '▶', 'right'], ['d', '▼', 'down']].forEach(([cls, glyph, d]) => {
      const b = document.createElement('button'); b.className = cls; b.type = 'button'; b.textContent = glyph; b.setAttribute('aria-label', d);
      const turn = (e) => { if (e && e.preventDefault) e.preventDefault(); if (state === 'playing') nextDir = DIR_MAP[d]; };
      b.addEventListener('touchstart', turn, { passive: false });
      b.addEventListener('click', turn);
      dpadBtns[cls] = b; dpadEl.appendChild(b);
    });
    // center cell: drag handle (move the pad; remembered across sessions)
    const handle = document.createElement('div'); handle.className = 'c'; handle.setAttribute('aria-label', 'Move controls');
    handle.innerHTML = '<i></i>'; dpadEl.appendChild(handle);
    document.body.appendChild(dpadEl);
    // ✕ hide target (only while dragging) + re-enable button (when hidden)
    hideZoneEl = document.createElement('div'); hideZoneEl.id = 'dpadHide'; hideZoneEl.textContent = '✕'; document.body.appendChild(hideZoneEl);
    showBtnEl = document.createElement('button'); showBtnEl.id = 'dpadShow'; showBtnEl.type = 'button'; showBtnEl.textContent = '🎮';
    showBtnEl.title = 'Show on-screen controls'; showBtnEl.setAttribute('aria-label', 'Show on-screen controls');
    showBtnEl.addEventListener('click', () => setHidden(false)); document.body.appendChild(showBtnEl);

    const landscape = W > H; dpadOrient = landscape;
    let saved = null; try { saved = JSON.parse(localStorage.getItem(DPAD_POS_KEY) || 'null'); } catch (_) {}
    if (saved && typeof saved.x === 'number' && typeof saved.y === 'number' && saved.landscape === landscape) placeDpad(saved.x, saved.y);
    else placeDpadDefault(landscape);
    // true when the PAD overlaps the ✕ target (drag the pad onto it, not just the finger)
    const overHide = () => {
      if (!hideZoneEl || !dpadEl) return false;
      const a = dpadEl.getBoundingClientRect(), b = hideZoneEl.getBoundingClientRect();
      return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
    };
    let drag = false, offX = 0, offY = 0;
    handle.addEventListener('pointerdown', (e) => {
      drag = true; const r = dpadEl.getBoundingClientRect(); offX = e.clientX - r.left; offY = e.clientY - r.top;
      dpadEl.classList.add('dragging'); if (hideZoneEl) hideZoneEl.style.display = 'block';
      try { handle.setPointerCapture(e.pointerId); } catch (_) {} if (e.preventDefault) e.preventDefault();
    });
    handle.addEventListener('pointermove', (e) => { if (!drag) return; placeDpad(e.clientX - offX, e.clientY - offY); if (hideZoneEl) hideZoneEl.classList.toggle('over', overHide()); });
    const end = () => {
      if (!drag) return; drag = false; dpadEl.classList.remove('dragging');
      const hit = overHide();
      if (hideZoneEl) { hideZoneEl.style.display = 'none'; hideZoneEl.classList.remove('over'); }
      if (hit) { setHidden(true); return; } // dropped on ✕ → hide
      try { localStorage.setItem(DPAD_POS_KEY, JSON.stringify({ x: parseInt(dpadEl.style.left, 10) || 0, y: parseInt(dpadEl.style.top, 10) || 0, landscape: W > H })); } catch (_) {}
    };
    handle.addEventListener('pointerup', end); handle.addEventListener('pointercancel', end);
  }
  // fade an element in/out (cross-fade the pad and the re-enable button instead of popping)
  function setVis(el, show, disp) {
    if (!el) return;
    if (show) { el.style.display = disp; if (typeof requestAnimationFrame === 'function') requestAnimationFrame(() => { el.style.opacity = '1'; }); else el.style.opacity = '1'; }
    else { el.style.opacity = '0'; setTimeout(() => { if (el.style.opacity === '0') el.style.display = 'none'; }, 220); }
  }
  function setHidden(h) {
    dpadHidden = h; try { localStorage.setItem(DPAD_HIDE_KEY, h ? '1' : '0'); } catch (_) {}
    const playing = state === 'playing';
    setVis(dpadEl, !h && playing, 'grid');
    setVis(showBtnEl, h && playing, 'block');
    applyReserve();
    if (!h) dimDpad();
  }
  function showDpad(v) {
    if (!isTouch) return;
    if (v) { buildDpad(); buildGrip(); }
    setVis(dpadEl, v && !dpadHidden, 'grid');
    setVis(showBtnEl, v && dpadHidden, 'block');
    if (gripEl) { gripEl.style.display = v ? 'flex' : 'none'; if (v) placeGrip(); }  // board-move handle (independent of the D-pad hide state)
    applyReserve();
    if (v && !dpadHidden) dimDpad();
  }


  // ---- Test hook ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get length() { return snake ? snake.length : 0; },
    get head() { return snake ? { ...snake[0] } : null; },
    get best() { return best; },
    get cols() { return COLS; },
    get rows() { return ROWS; },
    // JS-computed layout bounds in canvas/px space (for layout regression tests).
    // Arena box hugs the left (D-pad sits in the right strip in landscape); topReserve is the
    // HUD headroom the arena must clear so the score pill never overlaps the board.
    get layout() {
      const landscape = W > H;
      let portrait = false;
      try { portrait = !!(window.matchMedia && window.matchMedia('(orientation:portrait)').matches) && W <= 560; } catch (_) {}
      const topReserve = portrait ? 90 : 48;
      const rBottom = (dpadReserve && !landscape) ? dpadReserve : 0;
      const rSide = (dpadReserve && landscape) ? dpadReserve : 0;
      return {
        W, H, landscape, topReserve, rBottom, rSide, dpadReserve,
        offX, offY, cell: cellW, cols: COLS, rows: ROWS,
        arenaLeft: offX, arenaTop: offY,
        arenaRight: offX + COLS * cellW, arenaBottom: offY + ROWS * cellH,
      };
    },
    get speed() { return opts.speed; },
    get boardShiftY() { return boardShiftY; },
    nudgeBoard(dy) { boardShiftY += dy; resize(); return boardShiftY; },   // slide the arena up/down (clamped in resize)
    get interval() { return getInterval(); },
    menu() { return KIT ? KIT.menu.current() : null; },
    comboBest(o) { return comboBest(o || opts); },
    start: startGame,
    startMode(o) {
      if (o && o.wrap !== undefined) opts.walls = o.wrap ? 'wrap' : 'solid';
      if (o && o.speed !== undefined && SPEED_CFG[o.speed]) opts.speed = o.speed;
      else if (o && o.fast !== undefined) opts.speed = o.fast ? 'fast' : 'normal';
      if (o && o.size !== undefined && GRID_SIZES[o.size]) opts.size = o.size;
      saveOpts();
      startGame();
    },
    setDir(dx, dy) { nextDir = { x: dx, y: dy }; },
    turn(d) { nextDir = DIR_MAP[d]; },
    step(n) { for (let i = 0; i < (n || 1); i++) tick(); },
    placeFoodAt(x, y) { if (state === 'playing') { pendingFood = { x, y }; food = { x, y }; } },
  };

  // ---- top nav (game-kit) ----
  KIT.nav({ reset: 'snake_', home: '../../', theme: MENU_THEME, challenges: 'snake', onMenu: () => toMenu(),
    onPause: () => { if (state === 'playing') pauseGame(); else if (state === 'paused') resumeGame(); },
    confirmLeave: () => (state === 'playing' || state === 'paused') ? "Leave this run? You'll lose your progress." : false,
    controls: { title: 'Neon Snake — Controls',
      keyboard: [ ['Arrows · WASD', 'Turn'], ['Esc', 'Pause'] ],
      touch: [ ['Swipe', 'Turn'], ['On-screen D-pad', 'Turn'], ['Drag ↕ handle', 'Slide the board'] ] } });

  loadOpts();
  // deep-link ?walls=&speed=&size= → preselect options
  { const P = KIT && KIT.param; if (P) { const w = P('walls'), s = P('speed'), z = P('size'); if (w === 'solid' || w === 'wrap') opts.walls = w; if (SPEED_CFG[s]) opts.speed = s; if (GRID_SIZES[z]) opts.size = z; } }
  applyGridSize();
  resize();
  best = loadBest();
  if (bestEl) bestEl.textContent = best;
  reset();
  requestAnimationFrame(loop);
  showStartMenu(); // open the shared start menu (options preselected from ?walls=/?speed=/?size=)
})();
  window.gamekit.pwa();
</script>
</body>
