<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Neon Snake</title>
<link rel="icon" href="../../favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#7fffb0">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Neon Snake">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="../../analytics.js" defer></script>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:#050a0f; color:#b0f0ff;
    font-family: 'Courier New', Courier, monospace; user-select:none; touch-action:none; }
  #game { display:block; width:100vw; height:100vh; }
  .back { position:fixed; top:8px; left:10px; z-index:9; font-family:inherit; font-size:12px; letter-spacing:1px;
    color:#b0f0ff; text-decoration:none; background:rgba(0,20,30,0.7); border:1px solid #0af; border-radius:7px; padding:6px 10px;
    text-shadow:0 0 8px #0af; cursor:pointer; }
  .nav { position:fixed; top:8px; left:10px; z-index:9; display:flex; gap:8px; }
  .nav .back { position:static; top:auto; left:auto; }
  #hud { position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:5; display:flex; gap:24px;
    background:rgba(0,10,20,0.75); border:1px solid #0af3; border-radius:8px; padding:6px 18px;
    font-size:14px; letter-spacing:2px; pointer-events:none; }
  #hud .lbl { opacity:0.5; font-size:10px; }
  #hud b { color:#0ff; text-shadow:0 0 10px #0ff; }
  /* Portrait: the centered HUD can collide with the top-left nav, so drop it below the nav row. */
  @media (orientation:portrait) and (max-width:560px) {
    #hud { top:46px; gap:16px; padding:6px 14px; font-size:13px; }
  }
  #overlay { position:fixed; inset:0; z-index:8; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:16px; background:rgba(0,5,12,0.88); padding:24px; }
  #overlay.hidden { display:none; }
  #overlay h1 { margin:0; font-size:52px; letter-spacing:6px; color:#0ff; text-shadow:0 0 30px #0ff,0 0 60px #0af; }
  #overlay p { margin:4px; font-size:14px; opacity:0.8; letter-spacing:1px; }
  #overlay .sub { opacity:0.5; font-size:12px; letter-spacing:1px; }
  #overlay button { font-family:inherit; cursor:pointer; font-size:15px; letter-spacing:3px; padding:12px 32px;
    border-radius:8px; color:#0ff; background:transparent; border:1px solid #0ff;
    text-shadow:0 0 10px #0ff; box-shadow:0 0 18px #0af4; transition:box-shadow 0.15s; }
  #overlay button:hover { box-shadow:0 0 32px #0af9; }
  #goScore { font-size:28px; color:#f0f; text-shadow:0 0 20px #f0f; letter-spacing:3px; }
  #goStats { font-size:13px; color:#0af; opacity:0.85; letter-spacing:2px; }
  #goBest { font-size:14px; color:#0af; opacity:0.8; }
  #goBest.newbest { color:#0ff; opacity:1; text-shadow:0 0 14px #0ff; }
  .screen { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; width:100%; }
  .screen.hidden { display:none; }
  /* ---- Share row (END screen) ---- */
  .share { display:flex; gap:9px; justify-content:center; align-items:center; flex-wrap:wrap; margin-top:4px; }
  .share .lbl { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(150,195,215,0.6); margin-right:2px; }
  .share .sbtn { appearance:none; -webkit-appearance:none; font:inherit; margin:0; line-height:0;
    display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; padding:0; cursor:pointer;
    color:#0ff; background:transparent; border:1px solid #0ff5; border-radius:9px; text-shadow:none; box-shadow:none; transition:all 0.12s; }
  .share .sbtn svg { width:18px; height:18px; fill:currentColor; display:block; }
  .share .sbtn:hover { color:#fff; border-color:#0ff; box-shadow:0 0 14px #0af6; }
  .share .sbtn.ok { color:#7fffb0; border-color:#7fffb0; box-shadow:0 0 14px rgba(127,255,176,0.6); }
  .opts { display:flex; flex-direction:column; gap:11px; width:100%; max-width:380px; }
  .opt-row { display:grid; grid-template-columns:54px 1fr; align-items:center; gap:12px; }
  .opt-label { font-size:11px; letter-spacing:2px; opacity:0.55; text-align:left; }
  .opt-btns { display:flex; gap:8px; }
  /* scoped under #overlay to outrank the generic "#overlay button" rule above */
  #overlay .opt-btn { flex:1; min-width:0; font-family:inherit; cursor:pointer; font-size:11px; letter-spacing:2px; padding:8px 4px;
    border-radius:6px; color:rgba(150,195,215,0.6); background:transparent; border:1px solid rgba(120,200,255,0.25);
    text-shadow:none; box-shadow:none; transition:all 0.12s; white-space:nowrap; text-align:center; }
  #overlay .opt-btn:hover { border-color:#0af; color:#cfefff; box-shadow:none; }
  #overlay .opt-btn.active { color:#04222b; border-color:#0ff; background:#2ff3ff; text-shadow:none;
    box-shadow:0 0 18px rgba(0,240,255,0.7); font-weight:bold; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="nav">
  <button class="back" id="menuBtn" type="button">&#x2039; Menu</button>
  <a class="back" href="../../">funyo &#x203A;</a>
</div>
<div id="hud">
  <div><div class="lbl">SCORE</div><b id="scoreEl">0</b></div>
  <div><div class="lbl">BEST</div><b id="bestEl">0</b></div>
  <div><div class="lbl">LENGTH</div><b id="lenEl">1</b></div>
</div>

<div id="overlay">
<div class="screen" id="menuScreen">
  <h1>NEON SNAKE</h1>
  <p>Navigate the grid. Eat the food. Don't crash.</p>
  <div class="opts">
    <div class="opt-row">
      <span class="opt-label">WALLS</span>
      <div class="opt-btns">
        <button class="opt-btn" data-opt="walls" data-val="solid">SOLID</button>
        <button class="opt-btn" data-opt="walls" data-val="wrap">WRAP</button>
      </div>
    </div>
    <div class="opt-row">
      <span class="opt-label">SPEED</span>
      <div class="opt-btns">
        <button class="opt-btn" data-opt="speed" data-val="normal">NORMAL</button>
        <button class="opt-btn" data-opt="speed" data-val="fast">FAST</button>
      </div>
    </div>
    <div class="opt-row">
      <span class="opt-label">SIZE</span>
      <div class="opt-btns">
        <button class="opt-btn" data-opt="size" data-val="small">SMALL</button>
        <button class="opt-btn" data-opt="size" data-val="medium">MEDIUM</button>
        <button class="opt-btn" data-opt="size" data-val="large">LARGE</button>
      </div>
    </div>
  </div>
  <p class="sub">Arrow keys · WASD · Swipe on mobile</p>
  <button id="startBtn">PLAY</button>
</div>

<div class="screen hidden" id="endScreen">
  <h1>GAME OVER</h1>
  <div id="goScore">0</div>
  <div id="goStats">LENGTH 1</div>
  <div id="goBest">BEST: 0</div>
  <button id="restartBtn" style="margin-top:8px;">PLAY AGAIN</button>
  <div class="share">
    <span class="lbl">Share</span>
    <a class="sbtn" id="shareNative" href="#" style="display:none" aria-label="Share…" title="Share…">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg></a>
    <a class="sbtn" id="shareX" target="_blank" rel="noopener" aria-label="Share on X" title="Share on X">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
    <a class="sbtn" id="shareReddit" target="_blank" rel="noopener" aria-label="Share on Reddit" title="Share on Reddit">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12c-.688 0-1.25.561-1.25 1.25 0 .687.562 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg></a>
    <button class="sbtn" id="shareCopy" type="button" aria-label="Copy link" title="Copy link">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg></button>
  </div>
</div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const menuScreen = document.getElementById('menuScreen');
  const endScreen = document.getElementById('endScreen');
  const goScore = document.getElementById('goScore');
  const goStats = document.getElementById('goStats');
  const goBest = document.getElementById('goBest');
  const scoreEl = document.getElementById('scoreEl');
  const bestEl = document.getElementById('bestEl');
  const lenEl = document.getElementById('lenEl');

  // ---- Audio ----
  const SND = (() => {
    let ac;
    function ensure() { if (ac !== undefined) return; const AC = window.AudioContext || window.webkitAudioContext; ac = AC ? new AC() : null; }
    function tone(f, d, type, g) { if (!ac) return; const o = ac.createOscillator(), v = ac.createGain(); o.type = type || 'sine'; o.frequency.value = f; v.gain.value = g || 0.1; v.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + d); o.connect(v); v.connect(ac.destination); o.start(); o.stop(ac.currentTime + d); }
    const S = {
      eat: () => { tone(660, 0.06, 'square', 0.12); tone(880, 0.08, 'sine', 0.07); },
      turn: () => tone(220, 0.03, 'triangle', 0.04),
      crash: () => { [220, 165, 110].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'sawtooth', 0.14), i * 80)); },
    };
    return { play(n) { ensure(); if (ac && ac.state === 'suspended') ac.resume(); (S[n] || (() => {}))(); } };
  })();

  // ---- Grid sizes ----
  const GRID_SIZES = {
    small:  { cols: 18, rows: 14 },
    medium: { cols: 28, rows: 22 },
    large:  { cols: 40, rows: 30 },
  };

  // ---- Speed config ----
  const SPEED_CFG = {
    normal: { base: 140, ramp: 3, min: 60 },
    fast:   { base: 90,  ramp: 5, min: 40 },
  };

  // ---- Options ----
  const OPT_DEFAULTS = { walls: 'solid', speed: 'normal', size: 'medium' };
  let opts = { ...OPT_DEFAULTS };

  function loadOpts() {
    try {
      const raw = localStorage.getItem('snake_opts');
      if (raw) {
        const saved = JSON.parse(raw);
        if (saved.walls === 'wrap') opts.walls = 'wrap';
        if (saved.speed === 'fast') opts.speed = 'fast';
        if (GRID_SIZES[saved.size]) opts.size = saved.size;
      }
    } catch (_) {}
  }
  function saveOpts() {
    try { localStorage.setItem('snake_opts', JSON.stringify(opts)); } catch (_) {}
  }

  // ---- State ----
  let state = 'ready'; // ready | playing | over
  let snake, dir, nextDir, food, score, best, particles, flashAlpha, pendingFood;
  let COLS, ROWS;
  let W, H, cellW, cellH, offX, offY;

  function loadBest() { try { return parseInt(localStorage.getItem('snake_best') || '0', 10) || 0; } catch (_) { return 0; } }
  function saveBest(v) { try { localStorage.setItem('snake_best', String(v)); } catch (_) {} }

  function applyGridSize() {
    const g = GRID_SIZES[opts.size] || GRID_SIZES.medium;
    COLS = g.cols;
    ROWS = g.rows;
  }

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    // In portrait the HUD drops below the nav row (see CSS @media), so reserve more headroom.
    let portrait = false;
    try { portrait = !!(window.matchMedia && window.matchMedia('(orientation:portrait)').matches) && W <= 560; } catch (_) {}
    const hud = portrait ? 90 : 48;
    const avW = W, avH = H - hud;
    cellW = Math.floor(avW / COLS);
    cellH = Math.floor(avH / ROWS);
    const cell = Math.min(cellW, cellH);
    cellW = cellH = cell;
    offX = Math.floor((W - COLS * cell) / 2);
    offY = hud + Math.floor((H - hud - ROWS * cell) / 2);
  }
  window.addEventListener('resize', resize);

  function cx(c) { return offX + c * cellW; }
  function cy(r) { return offY + r * cellH; }

  function randFood() {
    const occupied = new Set(snake.map(s => s.x + ',' + s.y));
    let x, y;
    do { x = Math.floor(Math.random() * COLS); y = Math.floor(Math.random() * ROWS); } while (occupied.has(x + ',' + y));
    return { x, y };
  }

  function reset() {
    applyGridSize();
    resize();
    const sx = Math.floor(COLS / 2), sy = Math.floor(ROWS / 2);
    snake = [{ x: sx, y: sy }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    best = loadBest();
    particles = [];
    flashAlpha = 0;
    pendingFood = null;
    food = randFood();
    updateHud();
  }

  function updateHud() {
    if (scoreEl) scoreEl.textContent = score;
    if (bestEl) bestEl.textContent = best;
    if (lenEl) lenEl.textContent = snake.length;
  }

  // ---- Particles ----
  function spawnParticles(x, y) {
    const px = cx(x) + cellW / 2, py = cy(y) + cellH / 2;
    for (let i = 0; i < 12; i++) {
      const a = (Math.PI * 2 * i) / 12 + Math.random() * 0.4;
      const spd = 1.5 + Math.random() * 2.5;
      particles.push({ x: px, y: py, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, life: 1, r: 2 + Math.random() * 2 });
    }
  }

  // ---- Core tick ----
  function tick() {
    if (state !== 'playing') return;

    // Apply pending direction (no 180° reversal)
    const nd = nextDir;
    if (!(nd.x === -dir.x && nd.y === -dir.y)) {
      if (nd.x !== dir.x || nd.y !== dir.y) { dir = nd; SND.play('turn'); }
    }

    const head = snake[0];
    let nx = head.x + dir.x, ny = head.y + dir.y;

    if (opts.walls === 'wrap') {
      // Wrap around edges
      nx = ((nx % COLS) + COLS) % COLS;
      ny = ((ny % ROWS) + ROWS) % ROWS;
    } else {
      // Solid walls — collision kills
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) { gameOver(); return; }
    }

    // Self collision — exclude tail tip (it moves away this same tick when not eating)
    if (snake.slice(0, -1).some(s => s.x === nx && s.y === ny)) { gameOver(); return; }

    const ate = nx === food.x && ny === food.y;
    snake.unshift({ x: nx, y: ny });
    if (!ate) { snake.pop(); }
    else {
      score += 10;
      if (score > best) { best = score; saveBest(best); }
      flashAlpha = 0.35;
      spawnParticles(nx, ny);
      SND.play('eat');
      food = pendingFood !== null ? pendingFood : randFood();
      pendingFood = null;
      updateHud();
    }
  }

  function gameOver() {
    state = 'over';
    SND.play('crash');
    const newBest = score > best;
    if (newBest) { best = score; saveBest(best); }
    updateHud();
    if (goScore) goScore.textContent = score;
    if (goStats) goStats.textContent = 'LENGTH ' + (snake ? snake.length : 1);
    if (goBest) { goBest.textContent = (newBest ? 'NEW BEST: ' : 'BEST: ') + best; goBest.classList.toggle('newbest', newBest); }
    if (menuScreen) menuScreen.classList.add('hidden');
    if (endScreen) endScreen.classList.remove('hidden');
    overlay.classList.remove('hidden');
  }

  function startGame() {
    reset();
    state = 'playing';
    if (endScreen) endScreen.classList.add('hidden');
    if (menuScreen) menuScreen.classList.remove('hidden');
    overlay.classList.add('hidden');
  }

  // ---- Tick timing ----
  let lastTick = 0;
  function getInterval() {
    const cfg = SPEED_CFG[opts.speed] || SPEED_CFG.normal;
    return Math.max(cfg.min, cfg.base - (snake.length - 1) * cfg.ramp);
  }

  // ---- Option picker UI ----
  function syncOptBtns() {
    if (!overlay) return;
    const btns = overlay.querySelectorAll ? overlay.querySelectorAll('.opt-btn') : [];
    btns.forEach(btn => {
      const active = opts[btn.dataset.opt] === btn.dataset.val;
      btn.classList.toggle('active', active);
    });
  }

  function initOptBtns() {
    if (!overlay) return;
    const btns = overlay.querySelectorAll ? overlay.querySelectorAll('.opt-btn') : [];
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        opts[btn.dataset.opt] = btn.dataset.val;
        saveOpts();
        syncOptBtns();
      });
    });
  }

  // ---- Render ----
  function render(ts) {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#050a0f';
    ctx.fillRect(0, 0, W, H);

    // Grid lines (dim neon)
    ctx.strokeStyle = 'rgba(0,180,255,0.07)';
    ctx.lineWidth = 0.5;
    for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(cx(c), cy(0)); ctx.lineTo(cx(c), cy(ROWS)); ctx.stroke(); }
    for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(cx(0), cy(r)); ctx.lineTo(cx(COLS), cy(r)); ctx.stroke(); }

    // Board border glow
    ctx.strokeStyle = 'rgba(0,220,255,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx(0) - 1, cy(0) - 1, COLS * cellW + 2, ROWS * cellH + 2);

    // Flash on eat
    if (flashAlpha > 0) {
      ctx.fillStyle = 'rgba(0,255,200,' + flashAlpha.toFixed(2) + ')';
      ctx.fillRect(cx(0), cy(0), COLS * cellW, ROWS * cellH);
      flashAlpha = Math.max(0, flashAlpha - 0.025);
    }

    if (state === 'playing' || state === 'over') {
      // Food — pulsing pip
      const pulse = 0.5 + 0.5 * Math.sin((ts || 0) * 0.004);
      const fx = cx(food.x) + cellW / 2, fy = cy(food.y) + cellH / 2;
      const fr = (cellW * 0.28) + pulse * cellW * 0.08;
      ctx.save();
      ctx.shadowBlur = 18 + pulse * 12;
      ctx.shadowColor = '#f0f';
      ctx.fillStyle = '#f0f';
      ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 6;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(fx - fr * 0.3, fy - fr * 0.3, fr * 0.28, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // Snake
      const len = snake.length;
      for (let i = len - 1; i >= 0; i--) {
        const seg = snake[i];
        const t = 1 - i / len;
        const pad = Math.floor(cellW * 0.1);
        const sx = cx(seg.x) + pad, sy = cy(seg.y) + pad;
        const sw = cellW - pad * 2, sh = cellH - pad * 2;
        const r = Math.floor(sw * 0.3);

        // Color: head = cyan, tail fades to green
        const h1 = [0, 255, 220], h2 = [0, 210, 80];
        const ri = Math.round(h1[0] + (h2[0] - h1[0]) * (1 - t));
        const gi = Math.round(h1[1] + (h2[1] - h1[1]) * (1 - t));
        const bi = Math.round(h1[2] + (h2[2] - h1[2]) * (1 - t));
        const col = 'rgb(' + ri + ',' + gi + ',' + bi + ')';

        ctx.save();
        if (i === 0) { ctx.shadowBlur = 22; ctx.shadowColor = '#0ffb'; }
        else { ctx.shadowBlur = 8 * t; ctx.shadowColor = 'rgba(0,220,120,0.5)'; }
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(sx, sy, sw, sh, r) : ctx.rect(sx, sy, sw, sh);
        ctx.fill();
        ctx.restore();

        // Head eyes
        if (i === 0) {
          ctx.fillStyle = '#fff';
          const ex = cx(seg.x) + cellW / 2, ey = cy(seg.y) + cellH / 2;
          const er = cellW * 0.1;
          const eo = cellW * 0.18;
          // orient eyes by direction
          const ex1 = ex + dir.y * eo - dir.x * eo, ey1 = ey - dir.x * eo - dir.y * eo;
          const ex2 = ex - dir.y * eo - dir.x * eo, ey2 = ey + dir.x * eo - dir.y * eo;
          ctx.beginPath(); ctx.arc(ex1 + dir.x * eo, ey1 + dir.y * eo, er, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2 + dir.x * eo, ey2 + dir.y * eo, er, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#006';
          ctx.beginPath(); ctx.arc(ex1 + dir.x * eo, ey1 + dir.y * eo, er * 0.5, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2 + dir.x * eo, ey2 + dir.y * eo, er * 0.5, 0, Math.PI * 2); ctx.fill();
        }
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= 0.04;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.shadowBlur = 8; ctx.shadowColor = '#f0f';
        ctx.fillStyle = p.life > 0.5 ? '#f0f' : '#0ff';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }
  }

  // ---- rAF loop (render only, decoupled from ticks) ----
  function loop(ts) {
    requestAnimationFrame(loop);
    if (state === 'playing' && ts - lastTick >= getInterval()) {
      lastTick = ts;
      tick();
    }
    render(ts);
  }

  // ---- Input ----
  const KEY_MAP = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right', w:'up', s:'down', a:'left', d:'right' };
  const DIR_MAP = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} };

  document.addEventListener('keydown', e => {
    const d = KEY_MAP[e.key];
    if (d) { e.preventDefault(); if (state === 'playing') nextDir = DIR_MAP[d]; }
    if (e.key === 'Enter' && state === 'ready') startGame();
  });

  // Touch swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', e => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    if (state !== 'playing') return;
    if (Math.abs(dx) > Math.abs(dy)) nextDir = dx > 0 ? DIR_MAP.right : DIR_MAP.left;
    else nextDir = dy > 0 ? DIR_MAP.down : DIR_MAP.up;
  }, { passive: true });

  const startBtn = document.getElementById('startBtn');
  if (startBtn) startBtn.addEventListener('click', startGame);

  // ---- Test hook ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get length() { return snake ? snake.length : 0; },
    get head() { return snake ? { ...snake[0] } : null; },
    get best() { return best; },
    get cols() { return COLS; },
    get rows() { return ROWS; },
    start: startGame,
    startMode(o) {
      if (o && o.wrap !== undefined) opts.walls = o.wrap ? 'wrap' : 'solid';
      if (o && o.fast !== undefined) opts.speed = o.fast ? 'fast' : 'normal';
      if (o && o.size !== undefined && GRID_SIZES[o.size]) opts.size = o.size;
      saveOpts();
      startGame();
    },
    setDir(dx, dy) { nextDir = { x: dx, y: dy }; },
    turn(d) { nextDir = DIR_MAP[d]; },
    step(n) { for (let i = 0; i < (n || 1); i++) tick(); },
    placeFoodAt(x, y) { if (state === 'playing') { pendingFood = { x, y }; food = { x, y }; } },
  };

  const restartBtn = document.getElementById('restartBtn');
  if (restartBtn) restartBtn.addEventListener('click', startGame);

  // ---- Share buttons (END screen) — mirrors index.html footer wiring ----
  (function () {
    const url = 'https://funyo.online/games/snake/';
    const enc = (typeof encodeURIComponent === 'function') ? encodeURIComponent : (s => String(s));
    const shareText = () => 'I scored ' + score + ' in Neon Snake 🐍';
    const x = document.getElementById('shareX'), reddit = document.getElementById('shareReddit');
    const setHref = (e, href) => { if (e) e.href = href; };
    const refreshLinks = () => {
      const t = enc(shareText());
      setHref(x, 'https://twitter.com/intent/tweet?text=' + t + '&url=' + enc(url));
      setHref(reddit, 'https://www.reddit.com/submit?url=' + enc(url) + '&title=' + t);
    };
    if (x) x.addEventListener('click', refreshLinks);
    if (reddit) reddit.addEventListener('click', refreshLinks);
    refreshLinks();
    const cp = document.getElementById('shareCopy');
    if (cp) cp.addEventListener('click', () => {
      const done = () => { cp.classList.add('ok'); cp.title = 'Copied!'; setTimeout(() => { cp.classList.remove('ok'); cp.title = 'Copy link'; }, 1500); };
      try { if (navigator.clipboard) navigator.clipboard.writeText(shareText() + '\n' + url).then(done).catch(() => {}); } catch (e) {}
    });
    const ns = document.getElementById('shareNative');
    if (ns && typeof navigator !== 'undefined' && navigator.share) {
      ns.style.display = '';
      ns.addEventListener('click', (e) => { e.preventDefault(); try { navigator.share({ title: 'Neon Snake', text: shareText(), url: url }).catch(() => {}); } catch (_) {} });
    }
  })();

  const menuBtn = document.getElementById('menuBtn');
  if (menuBtn) menuBtn.addEventListener('click', () => { try { location.reload(); } catch (e) {} });

  loadOpts();
  applyGridSize();
  resize();
  initOptBtns();
  syncOptBtns();
  best = loadBest();
  if (bestEl) bestEl.textContent = best;
  reset();
  requestAnimationFrame(loop);
})();
  if ('serviceWorker' in navigator) { try { navigator.serviceWorker.register('sw.js').catch(function () {}); } catch (e) {} }
</script>
</body>
</html>
