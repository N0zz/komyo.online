<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Neon Snake</title>
<link rel="icon" href="../../favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#7fffb0">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Neon Snake">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="../../analytics.js" defer></script>
<link rel="stylesheet" href="../../funyo-kit.css">
<script src="../../funyo-kit.js"></script>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:#050a0f; color:#b0f0ff;
    font-family: 'Courier New', Courier, monospace; user-select:none; touch-action:none; }
  #game { display:block; width:100vw; height:100vh; }
  #hud { position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:5; display:flex; gap:24px;
    background:rgba(0,10,20,0.75); border:1px solid #0af3; border-radius:8px; padding:6px 18px;
    font-size:14px; letter-spacing:2px; pointer-events:none; }
  #hud .lbl { opacity:0.5; font-size:10px; }
  #hud b { color:#0ff; text-shadow:0 0 10px #0ff; }
  /* Portrait: the centered HUD can collide with the top-left nav, so drop it below the nav row. */
  @media (orientation:portrait) and (max-width:560px) {
    #hud { top:46px; gap:16px; padding:6px 14px; font-size:13px; }
  }
  #overlay { position:fixed; inset:0; z-index:8; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:16px; background:rgba(0,5,12,0.88); padding:24px; }
  #overlay.hidden { display:none; }
  #overlay h1 { margin:0; font-size:52px; letter-spacing:6px; color:#0ff; text-shadow:0 0 30px #0ff,0 0 60px #0af; }
  #overlay p { margin:4px; font-size:14px; opacity:0.8; letter-spacing:1px; }
  #overlay .sub { opacity:0.5; font-size:12px; letter-spacing:1px; }
  #overlay button { font-family:inherit; cursor:pointer; font-size:15px; letter-spacing:3px; padding:12px 32px;
    border-radius:8px; color:#0ff; background:transparent; border:1px solid #0ff;
    text-shadow:0 0 10px #0ff; box-shadow:0 0 18px #0af4; transition:box-shadow 0.15s; }
  #overlay button:hover { box-shadow:0 0 32px #0af9; }
  #goScore { font-size:28px; color:#f0f; text-shadow:0 0 20px #f0f; letter-spacing:3px; }
  #goStats { font-size:13px; color:#0af; opacity:0.85; letter-spacing:2px; }
  #goBest { font-size:14px; color:#0af; opacity:0.8; }
  #goBest.newbest { color:#0ff; opacity:1; text-shadow:0 0 14px #0ff; }
  .screen { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; width:100%; }
  .screen.hidden { display:none; }
  #shareRow { --funyo-accent:#0ff; }
  .opts { display:flex; flex-direction:column; gap:11px; width:100%; max-width:380px; }
  .opt-row { display:grid; grid-template-columns:54px 1fr; align-items:center; gap:12px; }
  .opt-label { font-size:11px; letter-spacing:2px; opacity:0.55; text-align:left; }
  .opt-btns { display:flex; gap:8px; }
  /* scoped under #overlay to outrank the generic "#overlay button" rule above */
  #overlay .opt-btn { flex:1; min-width:0; font-family:inherit; cursor:pointer; font-size:11px; letter-spacing:2px; padding:8px 4px;
    border-radius:6px; color:rgba(150,195,215,0.6); background:transparent; border:1px solid rgba(120,200,255,0.25);
    text-shadow:none; box-shadow:none; transition:all 0.12s; white-space:nowrap; text-align:center; }
  #overlay .opt-btn:hover { border-color:#0af; color:#cfefff; box-shadow:none; }
  #overlay .opt-btn.active { color:#04222b; border-color:#0ff; background:#2ff3ff; text-shadow:none;
    box-shadow:0 0 18px rgba(0,240,255,0.7); font-weight:bold; }
  .topscores { display:flex; flex-direction:column; gap:3px; width:100%; max-width:380px;
    font-size:11px; letter-spacing:1.5px; }
  .topscores .ts-title { font-size:10px; letter-spacing:2px; opacity:0.5; text-align:left; margin-bottom:2px; }
  .topscores .ts-row { display:flex; justify-content:space-between; gap:12px;
    color:rgba(150,195,215,0.75); }
  .topscores .ts-row.cur { color:#0ff; text-shadow:0 0 8px #0ff6; }
  .topscores .ts-row .ts-mode { opacity:0.85; }
  .topscores .ts-row .ts-val { color:#0ff; font-weight:bold; }
  .topscores .ts-empty { opacity:0.4; text-align:left; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div><div class="lbl">SCORE</div><b id="scoreEl">0</b></div>
  <div><div class="lbl">BEST</div><b id="bestEl">0</b></div>
  <div><div class="lbl">LENGTH</div><b id="lenEl">1</b></div>
</div>

<div id="overlay">
<div class="screen" id="menuScreen">
  <h1>NEON SNAKE</h1>
  <p>Navigate the grid. Eat the food. Don't crash.</p>
  <div class="opts">
    <div class="opt-row">
      <span class="opt-label">WALLS</span>
      <div class="opt-btns">
        <button class="opt-btn" data-opt="walls" data-val="solid">SOLID</button>
        <button class="opt-btn" data-opt="walls" data-val="wrap">WRAP</button>
      </div>
    </div>
    <div class="opt-row">
      <span class="opt-label">SPEED</span>
      <div class="opt-btns">
        <button class="opt-btn" data-opt="speed" data-val="slow">SLOW</button>
        <button class="opt-btn" data-opt="speed" data-val="normal">NORMAL</button>
        <button class="opt-btn" data-opt="speed" data-val="fast">FAST</button>
      </div>
    </div>
    <div class="opt-row">
      <span class="opt-label">SIZE</span>
      <div class="opt-btns">
        <button class="opt-btn" data-opt="size" data-val="small">SMALL</button>
        <button class="opt-btn" data-opt="size" data-val="medium">MEDIUM</button>
        <button class="opt-btn" data-opt="size" data-val="large">LARGE</button>
      </div>
    </div>
  </div>
  <div id="topScores" class="topscores"></div>
  <p class="sub">Arrow keys · WASD · Swipe on mobile</p>
  <button id="startBtn">PLAY</button>
</div>

<div class="screen hidden" id="endScreen">
  <h1>GAME OVER</h1>
  <div id="goScore">0</div>
  <div id="goStats">LENGTH 1</div>
  <div id="goBest">BEST: 0</div>
  <button id="restartBtn" style="margin-top:8px;">PLAY AGAIN</button>
  <div id="shareRow"></div>
</div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const menuScreen = document.getElementById('menuScreen');
  const endScreen = document.getElementById('endScreen');
  const goScore = document.getElementById('goScore');
  const goStats = document.getElementById('goStats');
  const goBest = document.getElementById('goBest');
  const scoreEl = document.getElementById('scoreEl');
  const bestEl = document.getElementById('bestEl');
  const lenEl = document.getElementById('lenEl');

  // ---- Audio (funyo-kit shared engine + global mute) ----
  const SND = window.funyo.sound;
  SND.define({
    eat: ({ tone }) => { tone(660, 0.06, 'square', 0.12); tone(880, 0.08, 'sine', 0.07); },
    turn: ({ tone }) => tone(220, 0.03, 'triangle', 0.04),
    crash: ({ tone }) => { [220, 165, 110].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'sawtooth', 0.14), i * 80)); },
  });

  // ---- Grid sizes ----
  const GRID_SIZES = {
    small:  { cols: 18, rows: 14 },
    medium: { cols: 28, rows: 22 },
    large:  { cols: 40, rows: 30 },
  };

  // ---- Speed config ----
  const SPEED_CFG = {
    slow:   { base: 200, ramp: 2, min: 110 },
    normal: { base: 140, ramp: 3, min: 60 },
    fast:   { base: 90,  ramp: 5, min: 40 },
  };

  // ---- Options ----
  const OPT_DEFAULTS = { walls: 'solid', speed: 'normal', size: 'medium' };
  let opts = { ...OPT_DEFAULTS };

  function loadOpts() {
    try {
      const raw = localStorage.getItem('snake_opts');
      if (raw) {
        const saved = JSON.parse(raw);
        if (saved.walls === 'wrap') opts.walls = 'wrap';
        if (SPEED_CFG[saved.speed]) opts.speed = saved.speed;
        if (GRID_SIZES[saved.size]) opts.size = saved.size;
      }
    } catch (_) {}
  }
  function saveOpts() {
    try { localStorage.setItem('snake_opts', JSON.stringify(opts)); } catch (_) {}
  }

  // ---- State ----
  let state = 'ready'; // ready | playing | over
  let snake, dir, nextDir, food, score, best, particles, flashAlpha, pendingFood;
  let COLS, ROWS;
  let W, H, cellW, cellH, offX, offY;

  // ---- Per-mode best scores ----
  // Bests are keyed by the full mode (walls + speed + size) and stored as a map in localStorage.
  function modeKey(o) { return (o.walls) + ':' + (o.speed) + ':' + (o.size); }
  function loadBests() {
    try { const raw = localStorage.getItem('snake_bests'); const m = raw ? JSON.parse(raw) : null; return (m && typeof m === 'object') ? m : {}; }
    catch (_) { return {}; }
  }
  function loadBest() {
    const m = loadBests();
    let v = m[modeKey(opts)];
    // Migrate the old single global best into the current mode on first run.
    if (!(modeKey(opts) in m)) {
      try { const legacy = parseInt(localStorage.getItem('snake_best') || '0', 10) || 0; if (legacy > 0) v = legacy; } catch (_) {}
    }
    return parseInt(v || 0, 10) || 0;
  }
  function saveBest(v) {
    try {
      const m = loadBests();
      m[modeKey(opts)] = v;
      localStorage.setItem('snake_bests', JSON.stringify(m));
      localStorage.setItem('snake_best', String(v)); // keep legacy key for back-compat
    } catch (_) {}
  }

  function applyGridSize() {
    const g = GRID_SIZES[opts.size] || GRID_SIZES.medium;
    COLS = g.cols;
    ROWS = g.rows;
  }

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    // In portrait the HUD drops below the nav row (see CSS @media), so reserve more headroom.
    let portrait = false;
    try { portrait = !!(window.matchMedia && window.matchMedia('(orientation:portrait)').matches) && W <= 560; } catch (_) {}
    const hud = portrait ? 90 : 48;
    const avW = W, avH = H - hud;
    cellW = Math.floor(avW / COLS);
    cellH = Math.floor(avH / ROWS);
    const cell = Math.min(cellW, cellH);
    cellW = cellH = cell;
    offX = Math.floor((W - COLS * cell) / 2);
    offY = hud + Math.floor((H - hud - ROWS * cell) / 2);
  }
  window.addEventListener('resize', resize);

  function cx(c) { return offX + c * cellW; }
  function cy(r) { return offY + r * cellH; }

  function randFood() {
    const occupied = new Set(snake.map(s => s.x + ',' + s.y));
    let x, y;
    do { x = Math.floor(Math.random() * COLS); y = Math.floor(Math.random() * ROWS); } while (occupied.has(x + ',' + y));
    return { x, y };
  }

  function reset() {
    applyGridSize();
    resize();
    const sx = Math.floor(COLS / 2), sy = Math.floor(ROWS / 2);
    snake = [{ x: sx, y: sy }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    best = loadBest();
    particles = [];
    flashAlpha = 0;
    pendingFood = null;
    food = randFood();
    updateHud();
  }

  function updateHud() {
    if (scoreEl) scoreEl.textContent = score;
    if (bestEl) bestEl.textContent = best;
    if (lenEl) lenEl.textContent = snake.length;
  }

  // ---- Particles ----
  function spawnParticles(x, y) {
    const px = cx(x) + cellW / 2, py = cy(y) + cellH / 2;
    for (let i = 0; i < 12; i++) {
      const a = (Math.PI * 2 * i) / 12 + Math.random() * 0.4;
      const spd = 1.5 + Math.random() * 2.5;
      particles.push({ x: px, y: py, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, life: 1, r: 2 + Math.random() * 2 });
    }
  }

  // ---- Core tick ----
  function tick() {
    if (state !== 'playing') return;

    // Apply pending direction (no 180° reversal)
    const nd = nextDir;
    if (!(nd.x === -dir.x && nd.y === -dir.y)) {
      if (nd.x !== dir.x || nd.y !== dir.y) { dir = nd; SND.play('turn'); }
    }

    const head = snake[0];
    let nx = head.x + dir.x, ny = head.y + dir.y;

    if (opts.walls === 'wrap') {
      // Wrap around edges
      nx = ((nx % COLS) + COLS) % COLS;
      ny = ((ny % ROWS) + ROWS) % ROWS;
    } else {
      // Solid walls — collision kills
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) { gameOver(); return; }
    }

    // Self collision — exclude tail tip (it moves away this same tick when not eating)
    if (snake.slice(0, -1).some(s => s.x === nx && s.y === ny)) { gameOver(); return; }

    const ate = nx === food.x && ny === food.y;
    snake.unshift({ x: nx, y: ny });
    if (!ate) { snake.pop(); }
    else {
      score += 10;
      if (score > best) { best = score; saveBest(best); }
      flashAlpha = 0.12;
      spawnParticles(nx, ny);
      SND.play('eat');
      food = pendingFood !== null ? pendingFood : randFood();
      pendingFood = null;
      updateHud();
    }
  }

  function gameOver() {
    state = 'over';
    SND.play('crash');
    const newBest = score > best;
    if (newBest) { best = score; saveBest(best); }
    updateHud();
    if (goScore) goScore.textContent = score;
    if (goStats) goStats.textContent = 'LENGTH ' + (snake ? snake.length : 1);
    if (goBest) { goBest.textContent = (newBest ? 'NEW BEST: ' : 'BEST: ') + best; goBest.classList.toggle('newbest', newBest); }
    if (menuScreen) menuScreen.classList.add('hidden');
    if (endScreen) endScreen.classList.remove('hidden');
    overlay.classList.remove('hidden');
  }

  function startGame() {
    reset();
    state = 'playing';
    if (endScreen) endScreen.classList.add('hidden');
    if (menuScreen) menuScreen.classList.remove('hidden');
    overlay.classList.add('hidden');
  }

  // ---- Tick timing ----
  let lastTick = 0;
  function getInterval() {
    const cfg = SPEED_CFG[opts.speed] || SPEED_CFG.normal;
    return Math.max(cfg.min, cfg.base - (snake.length - 1) * cfg.ramp);
  }

  // ---- Top scores (menu) ----
  const topScoresEl = document.getElementById('topScores');
  const SPEED_LABEL = { slow: 'Slow', normal: 'Normal', fast: 'Fast' };
  const SIZE_LABEL = { small: 'Small', medium: 'Medium', large: 'Large' };
  const WALLS_LABEL = { solid: 'Solid', wrap: 'Wrap' };
  function renderTopScores() {
    if (!topScoresEl) return;
    const m = loadBests();
    const cur = modeKey(opts);
    const keys = Object.keys(m).filter(k => (parseInt(m[k], 10) || 0) > 0);
    keys.sort((a, b) => (parseInt(m[b], 10) || 0) - (parseInt(m[a], 10) || 0));
    let html = '<div class="ts-title">TOP SCORES</div>';
    if (keys.length === 0) {
      html += '<div class="ts-empty">No scores yet — play a round!</div>';
    } else {
      html += keys.map(k => {
        const parts = k.split(':');
        const label = (SPEED_LABEL[parts[1]] || parts[1]) + ' · ' + (SIZE_LABEL[parts[2]] || parts[2]) + ' · ' + (WALLS_LABEL[parts[0]] || parts[0]);
        const isCur = k === cur ? ' cur' : '';
        return '<div class="ts-row' + isCur + '"><span class="ts-mode">' + label + '</span><span class="ts-val">' + (parseInt(m[k], 10) || 0) + '</span></div>';
      }).join('');
    }
    topScoresEl.innerHTML = html;
  }

  // ---- Option picker UI ----
  function syncOptBtns() {
    if (!overlay) return;
    const btns = overlay.querySelectorAll ? overlay.querySelectorAll('.opt-btn') : [];
    btns.forEach(btn => {
      const active = opts[btn.dataset.opt] === btn.dataset.val;
      btn.classList.toggle('active', active);
    });
  }

  function initOptBtns() {
    if (!overlay) return;
    const btns = overlay.querySelectorAll ? overlay.querySelectorAll('.opt-btn') : [];
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        opts[btn.dataset.opt] = btn.dataset.val;
        saveOpts();
        syncOptBtns();
        // reflect the selected mode's best in the HUD + highlight its row
        best = loadBest();
        if (bestEl) bestEl.textContent = best;
        renderTopScores();
      });
    });
  }

  // ---- Render ----
  function render(ts) {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#050a0f';
    ctx.fillRect(0, 0, W, H);

    // Grid lines (dim neon)
    ctx.strokeStyle = 'rgba(0,180,255,0.07)';
    ctx.lineWidth = 0.5;
    for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(cx(c), cy(0)); ctx.lineTo(cx(c), cy(ROWS)); ctx.stroke(); }
    for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(cx(0), cy(r)); ctx.lineTo(cx(COLS), cy(r)); ctx.stroke(); }

    // Board border glow
    ctx.strokeStyle = 'rgba(0,220,255,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx(0) - 1, cy(0) - 1, COLS * cellW + 2, ROWS * cellH + 2);

    // Flash on eat
    if (flashAlpha > 0) {
      ctx.fillStyle = 'rgba(0,255,200,' + flashAlpha.toFixed(2) + ')';
      ctx.fillRect(cx(0), cy(0), COLS * cellW, ROWS * cellH);
      flashAlpha = Math.max(0, flashAlpha - 0.012);
    }

    if (state === 'playing' || state === 'over') {
      // Food — pulsing pip
      const pulse = 0.5 + 0.5 * Math.sin((ts || 0) * 0.004);
      const fx = cx(food.x) + cellW / 2, fy = cy(food.y) + cellH / 2;
      const fr = (cellW * 0.28) + pulse * cellW * 0.08;
      ctx.save();
      ctx.shadowBlur = 18 + pulse * 12;
      ctx.shadowColor = '#f0f';
      ctx.fillStyle = '#f0f';
      ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 6;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(fx - fr * 0.3, fy - fr * 0.3, fr * 0.28, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // Snake
      const len = snake.length;
      for (let i = len - 1; i >= 0; i--) {
        const seg = snake[i];
        const t = 1 - i / len;
        const pad = Math.floor(cellW * 0.1);
        const sx = cx(seg.x) + pad, sy = cy(seg.y) + pad;
        const sw = cellW - pad * 2, sh = cellH - pad * 2;
        const r = Math.floor(sw * 0.3);

        // Color: head = cyan, tail fades to green
        const h1 = [0, 255, 220], h2 = [0, 210, 80];
        const ri = Math.round(h1[0] + (h2[0] - h1[0]) * (1 - t));
        const gi = Math.round(h1[1] + (h2[1] - h1[1]) * (1 - t));
        const bi = Math.round(h1[2] + (h2[2] - h1[2]) * (1 - t));
        const col = 'rgb(' + ri + ',' + gi + ',' + bi + ')';

        ctx.save();
        if (i === 0) { ctx.shadowBlur = 22; ctx.shadowColor = '#0ffb'; }
        else { ctx.shadowBlur = 8 * t; ctx.shadowColor = 'rgba(0,220,120,0.5)'; }
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(sx, sy, sw, sh, r) : ctx.rect(sx, sy, sw, sh);
        ctx.fill();
        ctx.restore();

        // Head eyes
        if (i === 0) {
          ctx.fillStyle = '#fff';
          const ex = cx(seg.x) + cellW / 2, ey = cy(seg.y) + cellH / 2;
          const er = cellW * 0.1;
          const eo = cellW * 0.18;
          // orient eyes by direction
          const ex1 = ex + dir.y * eo - dir.x * eo, ey1 = ey - dir.x * eo - dir.y * eo;
          const ex2 = ex - dir.y * eo - dir.x * eo, ey2 = ey + dir.x * eo - dir.y * eo;
          ctx.beginPath(); ctx.arc(ex1 + dir.x * eo, ey1 + dir.y * eo, er, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2 + dir.x * eo, ey2 + dir.y * eo, er, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#006';
          ctx.beginPath(); ctx.arc(ex1 + dir.x * eo, ey1 + dir.y * eo, er * 0.5, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2 + dir.x * eo, ey2 + dir.y * eo, er * 0.5, 0, Math.PI * 2); ctx.fill();
        }
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= 0.04;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.shadowBlur = 8; ctx.shadowColor = '#f0f';
        ctx.fillStyle = p.life > 0.5 ? '#f0f' : '#0ff';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }
  }

  // ---- rAF loop (render only, decoupled from ticks) ----
  function loop(ts) {
    requestAnimationFrame(loop);
    if (state === 'playing' && ts - lastTick >= getInterval()) {
      lastTick = ts;
      tick();
    }
    render(ts);
  }

  // ---- Input ----
  const KEY_MAP = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right', w:'up', s:'down', a:'left', d:'right' };
  const DIR_MAP = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} };

  document.addEventListener('keydown', e => {
    const d = KEY_MAP[e.key];
    if (d) { e.preventDefault(); if (state === 'playing') nextDir = DIR_MAP[d]; }
    if (e.key === 'Enter' && state === 'ready') startGame();
  });

  // Touch swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', e => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    if (state !== 'playing') return;
    if (Math.abs(dx) > Math.abs(dy)) nextDir = dx > 0 ? DIR_MAP.right : DIR_MAP.left;
    else nextDir = dy > 0 ? DIR_MAP.down : DIR_MAP.up;
  }, { passive: true });

  const startBtn = document.getElementById('startBtn');
  if (startBtn) startBtn.addEventListener('click', startGame);

  // ---- Test hook ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get length() { return snake ? snake.length : 0; },
    get head() { return snake ? { ...snake[0] } : null; },
    get best() { return best; },
    get cols() { return COLS; },
    get rows() { return ROWS; },
    get speed() { return opts.speed; },
    get interval() { return getInterval(); },
    get topScoresHtml() { return topScoresEl ? topScoresEl.innerHTML : ''; },
    start: startGame,
    startMode(o) {
      if (o && o.wrap !== undefined) opts.walls = o.wrap ? 'wrap' : 'solid';
      if (o && o.speed !== undefined && SPEED_CFG[o.speed]) opts.speed = o.speed;
      else if (o && o.fast !== undefined) opts.speed = o.fast ? 'fast' : 'normal';
      if (o && o.size !== undefined && GRID_SIZES[o.size]) opts.size = o.size;
      saveOpts();
      startGame();
    },
    refreshMenu() { best = loadBest(); if (bestEl) bestEl.textContent = best; renderTopScores(); },
    setDir(dx, dy) { nextDir = { x: dx, y: dy }; },
    turn(d) { nextDir = DIR_MAP[d]; },
    step(n) { for (let i = 0; i < (n || 1); i++) tick(); },
    placeFoodAt(x, y) { if (state === 'playing') { pendingFood = { x, y }; food = { x, y }; } },
  };

  const restartBtn = document.getElementById('restartBtn');
  if (restartBtn) restartBtn.addEventListener('click', startGame);

  // ---- Share row + top nav (funyo-kit) ----
  window.funyo.shareRow(document.getElementById('shareRow'), {
    slug: 'snake', title: 'Neon Snake',
    message: () => 'I scored ' + score + ' in Neon Snake 🐍',
  });
  window.funyo.nav({ mute: true });

  loadOpts();
  applyGridSize();
  resize();
  initOptBtns();
  syncOptBtns();
  best = loadBest();
  if (bestEl) bestEl.textContent = best;
  renderTopScores();
  reset();
  requestAnimationFrame(loop);
})();
  window.funyo.pwa();
</script>
</body>
</html>
