<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Balloon Pop</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#ff9ec2">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Balloon Pop">
<link rel="apple-touch-icon" href="icon-192.png">
<!-- Atomic <head> unit — DO NOT reorder or add defer to game-kit.js (window.gamekit must
     exist before the inline IIFE runs). The root sw.js SHELL lists these same files. -->
<script src="../../analytics.js" defer></script>
<link rel="stylesheet" href="../../game-kit.css">
<script src="../../version.js"></script>
<script src="../../game-kit.js"></script>
<script src="../../challenges.js"></script>
<script src="../../cosmetics.js"></script>
<script src="../../i18n.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #8fd0f5; color: #fff;
    font-family: system-ui, -apple-system, sans-serif; user-select: none; touch-action: none; }
  #game { display: block; width: 100vw; height: 100vh; }
  #hud .val { color: #ff5c96; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud" class="gamekit-hud">
  <div class="stat"><span class="lbl" id="lblScore">POPS</span><span class="val" id="scoreEl">0</span></div>
  <div class="stat"><span class="lbl" id="lblBest">BEST</span><span class="val" id="bestEl">0</span></div>
  <div class="stat"><span class="lbl" id="lblTime">TIME</span><span class="val" id="timeEl">—</span></div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const KIT = window.gamekit;
  const SLUG = 'balloon-pop';
  const ACCENT = '#ff9ec2';

  const SND = window.gamekit.sound;
  SND.define({
    popHi:  c => { c.voice({ f: 900, slideTo: 1250, dur: 0.06, type: 'triangle', gain: 0.12 }); c.noiseHit({ dur: 0.05, gain: 0.08, filter: 'highpass', cutoff: 1500 }); },
    popMid: c => { c.voice({ f: 620, slideTo: 860, dur: 0.07, type: 'triangle', gain: 0.12 }); c.noiseHit({ dur: 0.06, gain: 0.08, filter: 'highpass', cutoff: 1100 }); },
    popLo:  c => { c.voice({ f: 420, slideTo: 580, dur: 0.09, type: 'triangle', gain: 0.13 }); c.noiseHit({ dur: 0.07, gain: 0.09, filter: 'highpass', cutoff: 800 }); },
    streak: c => c.seq([659, 784, 1047], 55, f => c.voice({ f, dur: 0.16, type: 'triangle', gain: 0.08, reverb: 0.25 })),
    tickT:  c => c.voice({ f: 1100, dur: 0.03, type: 'sine', gain: 0.05 }),
    buzz:   c => c.voice({ f: 180, slideTo: 140, dur: 0.35, type: 'sawtooth', gain: 0.1, filter: 'lowpass', cutoff: 900, vibrato: 22, vibratoDepth: 30 }),
    whoosh: c => c.noiseHit({ dur: 0.5, gain: 0.05, filter: 'lowpass', cutoff: 1400, cutoffTo: 500 }),
    fwk:    c => { c.noiseHit({ dur: 0.3, gain: 0.1, filter: 'highpass', cutoff: 900 }); c.seq([784, 1047, 1319], 60, f => c.voice({ f, dur: 0.22, type: 'triangle', gain: 0.07, reverb: 0.35 })); },
  });

  const PARTY_TIME = 60;                      // seconds
  const COLORS = [
    ['#ff6b8a', '#c23a5a'], ['#ffd166', '#c89a2a'], ['#6bd6a8', '#2f9a6e'],
    ['#7ab8ff', '#3a72c8'], ['#c99aff', '#8a5ad0'], ['#ff9d5c', '#c86a2a'],
  ];

  let W = 0, H = 0, topMargin = 48;
  let state = 'ready';                        // ready | playing | over
  let mode = 'party';                         // party | zen | bees
  let balloons = [];                          // {x,y,r,c,wob,vy,pop:0}
  let bees = [];                              // bees mode: {x,y,vx,wob,hit}
  let bits = [];                              // pop confetti (view-only, capped)
  let fireworks = [];                         // zen milestone bursts (view-only, capped)
  let score = 0, best = 0, combo = 0, comboColor = -1, comboT = 0, bestCombo = 0;
  let popCount = 0, fireworksSeen = 0, beeStings = 0;
  let timeLeft = PARTY_TIME, frame = 0, playFrames = 0, spawnT = 0, beeT = 0;
  let wind = 0, windT = 0, windNext = 900;    // rare gusts: strength (±), active frames, next-gust timer
  let cloudDrift = 0;                         // accumulated so clouds don't snap when a gust ends
  let streaks = [];                           // visible wind streak lines
  let shakeT = 0;

  const modeLabel = m => { m = m || mode; return m === 'party' ? 'Party' : m === 'zen' ? 'Zen' : 'Bees'; };
  const modeDisplay = m => KIT.t('game.balloon-pop.mode' + modeLabel(m), { def: modeLabel(m) });
  function loadBest(m) { return KIT ? KIT.bestScore(SLUG, modeLabel(m)) : 0; }

  const scaleR = () => Math.min(W, H) / 560;   // balloon sizes scale with the viewport

  function spawnBalloon(fx, fy, fr, fc) {
    const s = scaleR();
    const r = fr !== undefined ? fr : (34 + Math.random() * 30) * s;
    balloons.push({
      x: fx !== undefined ? fx : r + Math.random() * Math.max(1, W - r * 2),
      y: fy !== undefined ? fy : H + r * 1.6,
      r, c: fc !== undefined ? fc : Math.floor(Math.random() * COLORS.length),
      wob: Math.random() * Math.PI * 2,
      vy: (0.55 + Math.random() * 0.5) * (H / 700),
      pop: 0,
    });
  }

  function newGame(m) {
    mode = m || mode;
    balloons = []; bits = []; bees = []; fireworks = [];
    score = 0; combo = 0; comboColor = -1; comboT = 0; bestCombo = 0;
    popCount = 0; fireworksSeen = 0; beeStings = 0;
    timeLeft = PARTY_TIME; playFrames = 0; spawnT = 0; beeT = 150;
    wind = 0; windT = 0; windNext = 700 + Math.floor(Math.random() * 500);
    best = loadBest(mode);
    for (let k = 0; k < 4; k++) spawnBalloon(undefined, H * (0.35 + 0.15 * k) + topMargin);
    updateHud();
  }

  function spawnBee(fx, fy, fvx) {
    const fromLeft = fx !== undefined ? fvx > 0 : Math.random() < 0.5;
    const s = scaleR();
    bees.push({
      x: fx !== undefined ? fx : (fromLeft ? -20 : W + 20),
      y: fy !== undefined ? fy : topMargin + 60 + Math.random() * (H - topMargin - 200),
      vx: fvx !== undefined ? fvx : (fromLeft ? 1 : -1) * (1.4 + Math.random() * 0.9) * (W / 700),
      wob: Math.random() * Math.PI * 2, hit: 0, s,
    });
  }

  function popAt(px, py) {
    if (state !== 'playing') return false;
    // bees sit on top — tapping one stings
    for (let k = bees.length - 1; k >= 0; k--) {
      const be = bees[k];
      if (be.hit) continue;
      if (Math.hypot(px - be.x, py - be.y) <= 34 * be.s) { stingBee(k); return true; }
    }
    // topmost balloon under the finger (generous kid-sized hit area)
    for (let k = balloons.length - 1; k >= 0; k--) {
      const b = balloons[k];
      if (b.pop) continue;
      if (Math.hypot(px - b.x, py - b.y) <= b.r * 1.25) { popBalloon(k); return true; }
    }
    return false;
  }

  function stingBee(k) {
    const be = bees[k];
    be.hit = 20;
    score = Math.max(0, score - 5);
    combo = 0; comboColor = -1; comboT = 0;
    beeStings++;
    shakeT = 12;
    SND.play('buzz');
    if (navigator.vibrate) { try { navigator.vibrate([40, 40, 40]); } catch (e) {} }
    updateHud();
  }

  function popBalloon(k) {
    const b = balloons[k];
    b.pop = 1; b.popT = 6;
    // combo: same colour within 2 s
    if (b.c === comboColor && comboT > 0) combo++;
    else { combo = 1; comboColor = b.c; }
    comboT = 120;
    bestCombo = Math.max(bestCombo, combo);
    score += 1 + Math.max(0, combo - 1);       // streak bonus
    popCount++;
    SND.play(b.r > 52 * scaleR() ? 'popLo' : b.r > 42 * scaleR() ? 'popMid' : 'popHi');
    if (combo > 1 && combo % 5 === 0) SND.play('streak');
    if (navigator.vibrate) { try { navigator.vibrate(15); } catch (e) {} }
    for (let i = 0; i < 10 && bits.length < 120; i++) {
      const a = (i / 10) * Math.PI * 2;
      bits.push({ x: b.x, y: b.y, vx: Math.cos(a) * (1.5 + Math.random() * 2), vy: Math.sin(a) * (1.5 + Math.random() * 2) - 1, c: b.c, t: 30 });
    }
    // zen milestone fireworks every 50 pops — celebration instead of a finish line
    if (mode === 'zen' && popCount % 50 === 0) launchFireworks();
    updateHud();
  }

  function launchFireworks() {
    fireworksSeen++;
    SND.play('fwk');
    for (let f = 0; f < 3; f++) {
      const fx = W * (0.2 + Math.random() * 0.6), fy = topMargin + 60 + Math.random() * (H * 0.3);
      const c = Math.floor(Math.random() * COLORS.length);
      for (let i = 0; i < 16 && fireworks.length < 140; i++) {
        const a = (i / 16) * Math.PI * 2, sp = 2 + Math.random() * 2.4;
        fireworks.push({ x: fx, y: fy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, c, t: 44 + f * 6 });
      }
    }
  }

  function endRun() {
    state = 'over';
    const prev = loadBest(mode);
    if (KIT) KIT.saveBest(SLUG, modeLabel(mode), { score, stats: { bestCombo } });
    const isBest = score > prev && score > 0;
    best = loadBest(mode);
    updateHud();
    setTimeout(() => showEnd(isBest), 600);
  }

  // ---- update / render ----
  function update() {
    frame++;
    if (comboT > 0 && --comboT === 0) { combo = 0; comboColor = -1; }
    if (shakeT > 0) shakeT--;
    // rare wind gusts (all modes) — balloons lean, strings swirl
    if (state === 'playing') {
      if (windT > 0) {
        windT--; if (windT === 0) wind = 0;
        cloudDrift += wind * 0.4;
        // spawn the classic wind-streak lines while the gust blows
        if (frame % 6 === 0 && streaks.length < 14) {
          streaks.push({ x: wind > 0 ? -40 : W + 40, y: topMargin + 20 + Math.random() * (H - topMargin - 60),
            v: wind * (3.5 + Math.random() * 2), len: 50 + Math.random() * 70, amp: 4 + Math.random() * 6, ph: Math.random() * 6, t: 0 });
        }
      } else if (--windNext <= 0) {
        wind = (Math.random() < 0.5 ? -1 : 1) * (1 + Math.random() * 1.1) * (W / 700);
        windT = 80 + Math.floor(Math.random() * 50);
        windNext = 700 + Math.floor(Math.random() * 500);
        SND.play('whoosh');
      }
    }
    for (let k = streaks.length - 1; k >= 0; k--) {
      const s = streaks[k];
      s.x += s.v; s.t++;
      if (s.x < -s.len - 60 || s.x > W + s.len + 60) streaks.splice(k, 1);
    }
    for (let k = bits.length - 1; k >= 0; k--) {
      const p = bits[k];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1;
      if (--p.t <= 0) bits.splice(k, 1);
    }
    for (let k = fireworks.length - 1; k >= 0; k--) {
      const p = fireworks[k];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.vx *= 0.985;
      if (--p.t <= 0) fireworks.splice(k, 1);
    }
    for (let k = balloons.length - 1; k >= 0; k--) {
      const b = balloons[k];
      if (b.pop) { if (--b.popT <= 0) balloons.splice(k, 1); continue; }
      b.wob += 0.03;
      b.y -= b.vy;
      b.x += Math.sin(b.wob) * 0.4 + wind * (windT > 0 ? Math.min(1, windT / 25) : 0);
      b.x = Math.max(b.r, Math.min(W - b.r, b.x));
      if (b.y < topMargin - b.r * 2) balloons.splice(k, 1);   // drifted away — no penalty, ever
    }
    for (let k = bees.length - 1; k >= 0; k--) {
      const be = bees[k];
      if (be.hit) { if (--be.hit <= 0) bees.splice(k, 1); continue; }
      be.wob += 0.11;
      be.x += be.vx;
      be.y += Math.sin(be.wob) * 1.4;
      if (be.x < -60 || be.x > W + 60) bees.splice(k, 1);
    }
    if (state === 'playing') {
      playFrames++;
      // spawn cadence: gently ramps in party/bees, steady in zen
      if (--spawnT <= 0) {
        spawnBalloon();
        const ramp = mode !== 'zen' ? Math.max(18, 42 - Math.floor(playFrames / 300)) : 38;
        spawnT = ramp + Math.floor(Math.random() * 12);
      }
      if (mode === 'bees' && --beeT <= 0 && bees.length < 3) {
        spawnBee();
        beeT = 200 + Math.floor(Math.random() * 160);
      }
      if (mode !== 'zen') {
        if (playFrames % 60 === 0) {
          timeLeft--;
          if (timeLeft <= 5 && timeLeft > 0) SND.play('tickT');
          updateHud();
          if (timeLeft <= 0) { endRun(); return; }
        }
      }
      if (KIT && KIT.music) KIT.music.intensity(Math.min(1, 0.35 + 0.04 * combo + (mode !== 'zen' && timeLeft < 15 ? 0.25 : 0)));
    } else if (KIT && KIT.music) KIT.music.intensity(0.3);
  }

  // ---- balloon styles (cosmetics) ----
  function balloonStyle() {
    const id = KIT && KIT.cosmetics ? KIT.cosmetics.selected('balloon-pop.balloons') : null;
    const key = (id || '').split('.').pop();
    return { critters: 'critter', planets: 'planet', stripes: 'stripes', dots: 'dots' }[key] || 'classic';
  }

  function drawBalloon(g, b, style) {
    const [c0, c1] = COLORS[b.c];
    const grd = g.createRadialGradient(b.x - b.r * 0.35, b.y - b.r * 0.4, b.r * 0.15, b.x, b.y, b.r * 1.15);
    grd.addColorStop(0, '#ffffff'); grd.addColorStop(0.25, c0); grd.addColorStop(1, c1);
    // string (leans with the wind)
    const lean = wind * (windT > 0 ? 6 : 0);
    g.strokeStyle = 'rgba(90,70,90,0.5)'; g.lineWidth = Math.max(1, b.r * 0.05);
    g.beginPath(); g.moveTo(b.x, b.y + b.r);
    g.quadraticCurveTo(b.x + Math.sin(b.wob * 2) * 6 - lean, b.y + b.r * 1.6, b.x + Math.sin(b.wob) * 4 - lean * 1.6, b.y + b.r * 2.1);
    g.stroke();
    g.fillStyle = grd;
    g.beginPath(); g.ellipse(b.x, b.y, b.r * 0.92, b.r, 0, 0, Math.PI * 2); g.fill();
    // knot
    g.beginPath(); g.moveTo(b.x, b.y + b.r * 0.96); g.lineTo(b.x - b.r * 0.12, b.y + b.r * 1.14);
    g.lineTo(b.x + b.r * 0.12, b.y + b.r * 1.14); g.closePath(); g.fill();
    if (style === 'critter') drawCritterFace(g, b, c1);
    else if (style === 'planet') drawPlanetFace(g, b, c0, c1);
    else if (style === 'stripes' || style === 'dots') {
      g.save();
      g.beginPath(); g.ellipse(b.x, b.y, b.r * 0.92, b.r, 0, 0, Math.PI * 2); g.clip();
      g.fillStyle = 'rgba(255,255,255,0.45)';
      if (style === 'stripes') {
        g.translate(b.x, b.y); g.rotate(-0.5);
        for (let k = -2; k <= 2; k++) g.fillRect(-b.r * 1.5, k * b.r * 0.42 - b.r * 0.08, b.r * 3, b.r * 0.16);
      } else {
        for (let k = 0; k < 7; k++) {
          g.beginPath();
          g.arc(b.x + Math.cos(k * 0.9 + b.c) * b.r * 0.55, b.y + Math.sin(k * 1.7 + b.c) * b.r * 0.6, b.r * 0.12, 0, 7);
          g.fill();
        }
      }
      g.restore();
    }
    // shine
    g.fillStyle = 'rgba(255,255,255,0.55)';
    g.beginPath(); g.ellipse(b.x - b.r * 0.32, b.y - b.r * 0.42, b.r * 0.2, b.r * 0.12, -0.6, 0, 7); g.fill();
  }

  // a DIFFERENT animal per colour: pig, duck, frog, cat, bunny, bear
  function drawCritterFace(g, b, dark) {
    const r = b.r, x = b.x, y = b.y, kind = b.c % 6;
    const ink = '#2b2030';
    const ear = (ox, oy, rw, rh, rot) => { g.beginPath(); g.ellipse(x + ox, y + oy, rw, rh, rot, 0, 7); g.fill(); };
    g.fillStyle = dark;
    if (kind === 0) { ear(-r * 0.5, -r * 0.82, r * 0.22, r * 0.24, -0.5); ear(r * 0.5, -r * 0.82, r * 0.22, r * 0.24, 0.5); }        // pig — round ears
    else if (kind === 2) { ear(-r * 0.32, -r * 0.9, r * 0.2, r * 0.2, 0); ear(r * 0.32, -r * 0.9, r * 0.2, r * 0.2, 0); }             // frog — eye bumps
    else if (kind === 3) { g.beginPath(); g.moveTo(x - r * 0.7, y - r * 0.5); g.lineTo(x - r * 0.5, y - r * 1.05); g.lineTo(x - r * 0.2, y - r * 0.72); g.closePath(); g.fill();
      g.beginPath(); g.moveTo(x + r * 0.7, y - r * 0.5); g.lineTo(x + r * 0.5, y - r * 1.05); g.lineTo(x + r * 0.2, y - r * 0.72); g.closePath(); g.fill(); } // cat — pointy
    else if (kind === 4) { ear(-r * 0.3, -r * 1.15, r * 0.16, r * 0.5, -0.12); ear(r * 0.3, -r * 1.15, r * 0.16, r * 0.5, 0.12); }    // bunny — long ears
    else if (kind === 5) { ear(-r * 0.55, -r * 0.78, r * 0.24, r * 0.24, 0); ear(r * 0.55, -r * 0.78, r * 0.24, r * 0.24, 0); }       // bear — round side ears
    // eyes (frog eyes sit ON the bumps)
    const ey = kind === 2 ? -r * 0.88 : -r * 0.08, ex = kind === 2 ? r * 0.32 : r * 0.28;
    g.fillStyle = ink;
    g.beginPath(); g.arc(x - ex, y + ey, r * 0.09, 0, 7); g.arc(x + ex, y + ey, r * 0.09, 0, 7); g.fill();
    g.fillStyle = '#fff';
    g.beginPath(); g.arc(x - ex - r * 0.03, y + ey - r * 0.03, r * 0.035, 0, 7); g.arc(x + ex - r * 0.03, y + ey - r * 0.03, r * 0.035, 0, 7); g.fill();
    // muzzle per animal
    if (kind === 0) { // pig snout
      g.fillStyle = dark; g.beginPath(); g.ellipse(x, y + r * 0.18, r * 0.26, r * 0.18, 0, 0, 7); g.fill();
      g.fillStyle = ink; g.beginPath(); g.arc(x - r * 0.09, y + r * 0.18, r * 0.04, 0, 7); g.arc(x + r * 0.09, y + r * 0.18, r * 0.04, 0, 7); g.fill();
    } else if (kind === 1) { // duck beak
      g.fillStyle = '#e88f2a';
      g.beginPath(); g.ellipse(x, y + r * 0.16, r * 0.3, r * 0.14, 0, 0, 7); g.fill();
      g.strokeStyle = '#b96a15'; g.lineWidth = Math.max(1, r * 0.03);
      g.beginPath(); g.moveTo(x - r * 0.3, y + r * 0.16); g.lineTo(x + r * 0.3, y + r * 0.16); g.stroke();
    } else if (kind === 3) { // cat whiskers + nose
      g.fillStyle = '#ff9db0'; g.beginPath(); g.arc(x, y + r * 0.12, r * 0.06, 0, 7); g.fill();
      g.strokeStyle = 'rgba(43,32,48,0.7)'; g.lineWidth = Math.max(1, r * 0.03);
      for (const s of [-1, 1]) for (let k2 = 0; k2 < 2; k2++) {
        g.beginPath(); g.moveTo(x + s * r * 0.12, y + r * (0.1 + k2 * 0.08));
        g.lineTo(x + s * r * 0.5, y + r * (0.04 + k2 * 0.14)); g.stroke();
      }
    } else if (kind === 4) { // bunny teeth
      g.fillStyle = '#fff'; g.fillRect(x - r * 0.08, y + r * 0.14, r * 0.08, r * 0.12); g.fillRect(x + r * 0.005, y + r * 0.14, r * 0.08, r * 0.12);
      g.fillStyle = '#ff9db0'; g.beginPath(); g.arc(x, y + r * 0.08, r * 0.05, 0, 7); g.fill();
    } else if (kind === 5) { // bear muzzle
      g.fillStyle = 'rgba(255,244,225,0.85)'; g.beginPath(); g.ellipse(x, y + r * 0.2, r * 0.24, r * 0.18, 0, 0, 7); g.fill();
      g.fillStyle = ink; g.beginPath(); g.arc(x, y + r * 0.13, r * 0.06, 0, 7); g.fill();
    }
    // smile (everyone but pig/duck/bear who have muzzles)
    if (kind === 2) { g.strokeStyle = ink; g.lineWidth = Math.max(1, r * 0.05);
      g.beginPath(); g.arc(x, y + r * 0.1, r * 0.24, 0.3, Math.PI - 0.3); g.stroke(); }
  }

  // a DIFFERENT world per colour: ringed, cratered moon, earth-like, lava, double-ring, banded
  function drawPlanetFace(g, b, c0, c1) {
    const r = b.r, x = b.x, y = b.y, kind = b.c % 6;
    g.save();
    g.beginPath(); g.ellipse(x, y, b.r * 0.92, b.r, 0, 0, Math.PI * 2); g.clip();
    if (kind === 1) {           // moon craters
      g.fillStyle = 'rgba(0,0,0,0.18)';
      for (const [ox, oy, cr] of [[-0.35, -0.2, 0.16], [0.25, 0.1, 0.22], [-0.1, 0.45, 0.12], [0.4, -0.4, 0.1]])
        { g.beginPath(); g.arc(x + ox * r, y + oy * r, cr * r, 0, 7); g.fill(); }
    } else if (kind === 2) {    // earth-like continents
      g.fillStyle = 'rgba(30,120,60,0.55)';
      g.beginPath(); g.ellipse(x - r * 0.25, y - r * 0.2, r * 0.35, r * 0.22, 0.6, 0, 7); g.fill();
      g.beginPath(); g.ellipse(x + r * 0.3, y + r * 0.3, r * 0.28, r * 0.18, -0.4, 0, 7); g.fill();
      g.fillStyle = 'rgba(255,255,255,0.4)';
      g.beginPath(); g.ellipse(x + r * 0.1, y - r * 0.45, r * 0.4, r * 0.1, 0.2, 0, 7); g.fill();
    } else if (kind === 3) {    // lava cracks
      g.strokeStyle = 'rgba(255,220,80,0.75)'; g.lineWidth = Math.max(1.5, r * 0.06);
      g.beginPath(); g.moveTo(x - r * 0.7, y + r * 0.1); g.quadraticCurveTo(x - r * 0.1, y - r * 0.3, x + r * 0.2, y + r * 0.25);
      g.quadraticCurveTo(x + r * 0.5, y + r * 0.5, x + r * 0.75, y + r * 0.2); g.stroke();
      g.beginPath(); g.moveTo(x - r * 0.4, y + r * 0.55); g.quadraticCurveTo(x, y + r * 0.35, x + r * 0.1, y + r * 0.65); g.stroke();
    } else if (kind === 5) {    // banded gas giant
      g.fillStyle = 'rgba(255,255,255,0.22)';
      for (const [oy, bh] of [[-0.45, 0.14], [-0.05, 0.2], [0.4, 0.12]])
        g.fillRect(x - r, y + oy * r, r * 2, bh * r);
    }
    g.restore();
    if (kind === 0 || kind === 4) {   // rings OUTSIDE the clip
      g.strokeStyle = 'rgba(255,255,255,0.65)'; g.lineWidth = Math.max(2, r * 0.09);
      g.beginPath(); g.ellipse(x, y + r * 0.05, r * 1.3, r * 0.34, -0.28, 0, Math.PI * 2); g.stroke();
      if (kind === 4) { g.strokeStyle = 'rgba(255,255,255,0.35)'; g.lineWidth = Math.max(1, r * 0.05);
        g.beginPath(); g.ellipse(x, y + r * 0.05, r * 1.55, r * 0.42, -0.28, 0, Math.PI * 2); g.stroke(); }
    }
  }

  function render() {
    const style = balloonStyle();
    if (style === 'planet') {
      // dusk sky for the planet set
      const bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, '#1a1440'); bg.addColorStop(0.6, '#31235c'); bg.addColorStop(1, '#4a3268');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
      for (let k = 0; k < 24; k++) {   // twinkling stars
        const sx = (k * 173) % W, sy = topMargin + ((k * 97) % Math.max(1, H - topMargin));
        ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + 0.3 * Math.sin(frame * 0.04 + k * 2.2)) + ')';
        ctx.fillRect(sx, sy, 2, 2);
      }
    } else {
      // sunny sky
      const bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, '#9adcff'); bg.addColorStop(0.7, '#bfe9ff'); bg.addColorStop(1, '#e2f6e8');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
      // sun
      ctx.fillStyle = 'rgba(255,236,150,0.9)';
      ctx.beginPath(); ctx.arc(W - 70, topMargin + 60, 34, 0, 7); ctx.fill();
      ctx.fillStyle = 'rgba(255,236,150,0.25)';
      ctx.beginPath(); ctx.arc(W - 70, topMargin + 60, 54 + Math.sin(frame * 0.03) * 5, 0, 7); ctx.fill();
      // drifting clouds (the gust drift ACCUMULATES so they never snap back when it ends)
      for (let k = 0; k < 4; k++) {
        const cxp = ((k * 260 + frame * (0.2 + k * 0.06) + cloudDrift * (0.8 + k * 0.15)) % (W + 260) + (W + 260)) % (W + 260) - 130;
        const cyp = topMargin + 40 + k * (H - topMargin) * 0.2;
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.beginPath();
        ctx.arc(cxp, cyp, 26, 0, 7); ctx.arc(cxp + 26, cyp + 6, 20, 0, 7); ctx.arc(cxp - 26, cyp + 7, 18, 0, 7);
        ctx.fill();
      }
    }
    // wind streak lines — the visual "whoosh" (wavy speed-lines riding the gust)
    if (streaks.length) {
      ctx.lineWidth = 2; ctx.lineCap = 'round';
      for (const s of streaks) {
        const fade = Math.min(1, s.t / 10) * (windT > 0 ? 1 : 0.5);
        ctx.strokeStyle = 'rgba(255,255,255,' + (0.38 * fade) + ')';
        ctx.beginPath();
        const dir = s.v > 0 ? -1 : 1;
        for (let i = 0; i <= 5; i++) {
          const px = s.x + dir * (s.len * i / 5);
          const py = s.y + Math.sin(s.ph + i * 0.9 + frame * 0.08) * s.amp;
          i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
        }
        ctx.stroke();
      }
    }
    if (shakeT > 0) { ctx.save(); ctx.translate(Math.sin(frame * 1.7) * 3 * (shakeT / 12), 0); }
    for (const b of balloons) {
      if (b.pop) { // pop flash ring
        ctx.strokeStyle = COLORS[b.c][0]; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r * (1.2 + (6 - b.popT) * 0.15), 0, 7); ctx.stroke();
        continue;
      }
      drawBalloon(ctx, b, style);
    }
    // bees (on top of balloons)
    for (const be of bees) {
      const s = 16 * be.s, bx2 = be.x, by2 = be.y;
      ctx.globalAlpha = be.hit ? Math.max(0, be.hit / 20) : 1;
      // wings
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      const wf = Math.sin(frame * 0.9) * 0.5;
      ctx.beginPath(); ctx.ellipse(bx2 - s * 0.2, by2 - s * 0.7, s * 0.45, s * 0.7, -0.5 + wf * 0.3, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(bx2 + s * 0.2, by2 - s * 0.7, s * 0.45, s * 0.7, 0.5 - wf * 0.3, 0, 7); ctx.fill();
      // body + stripes
      ctx.fillStyle = '#ffd166';
      ctx.beginPath(); ctx.ellipse(bx2, by2, s, s * 0.7, 0, 0, 7); ctx.fill();
      ctx.save(); ctx.beginPath(); ctx.ellipse(bx2, by2, s, s * 0.7, 0, 0, 7); ctx.clip();
      ctx.fillStyle = '#2b2030';
      ctx.fillRect(bx2 - s * 0.45, by2 - s, s * 0.3, s * 2); ctx.fillRect(bx2 + s * 0.15, by2 - s, s * 0.3, s * 2);
      ctx.restore();
      // eye + smile (friendly, but don't touch!)
      ctx.fillStyle = '#2b2030';
      ctx.beginPath(); ctx.arc(bx2 + (be.vx > 0 ? s * 0.65 : -s * 0.65), by2 - s * 0.15, s * 0.12, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    }

    for (const p of bits) {
      ctx.fillStyle = COLORS[p.c][0];
      ctx.globalAlpha = Math.max(0, p.t / 30);
      ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
      ctx.globalAlpha = 1;
    }
    for (const p of fireworks) {
      ctx.fillStyle = COLORS[p.c][0];
      ctx.globalAlpha = Math.max(0, p.t / 44);
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.6, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    }
    if (shakeT > 0) ctx.restore();

    // combo banner
    if (combo > 1 && comboT > 0 && state === 'playing') {
      ctx.font = '900 ' + Math.min(40, 22 + combo * 2) + 'px system-ui';
      ctx.textAlign = 'center';
      ctx.fillStyle = COLORS[comboColor][1];
      ctx.fillText('×' + combo, W / 2, topMargin + 46);
    }
  }

  function updateHud() {
    const s = document.getElementById('scoreEl'), b = document.getElementById('bestEl'), t = document.getElementById('timeEl');
    if (s) s.textContent = score;
    if (b) b.textContent = Math.max(best, score);
    if (t) t.textContent = mode === 'zen' ? '∞' : timeLeft;
  }

  // ---- menus ----
  const MENU_THEME = { accent: ACCENT, title: '#ff5c96' };

  function startGame(m) {
    newGame(m);
    state = 'playing';
    if (KIT) { KIT.menu.hide(); KIT.showMenuButton(true); KIT.showPauseButton(true); }
  }

  function menuBackdrop(g, w, h, st, frame) {
    const tt = (frame || 0) / 60;
    const bg = g.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, '#9adcff'); bg.addColorStop(1, '#e2f6e8');
    g.fillStyle = bg; g.fillRect(0, 0, w, h);
    const style = balloonStyle();
    for (let k = 0; k < 9; k++) {
      const r = 30 + (k % 3) * 14;
      const bb = { x: ((k * 149 + 50) % Math.max(1, w - r * 2)) + r + Math.sin(tt * 0.7 + k) * 10,
        y: h + r * 2 - (((k * 223 + tt * 46) % (h + r * 5))), r, c: k % COLORS.length, wob: tt + k, pop: 0 };
      drawBalloon(g, bb, style);
    }
  }

  function pvMode(m) {
    return (g, w, h) => {
      const bg = g.createLinearGradient(0, 0, 0, h);
      bg.addColorStop(0, '#9adcff'); bg.addColorStop(1, '#e2f6e8');
      g.fillStyle = bg; g.fillRect(0, 0, w, h);
      const style = balloonStyle();
      for (let k = 0; k < 3; k++)
        drawBalloon(g, { x: w * (0.25 + k * 0.25), y: h * (0.62 - k * 0.14), r: Math.min(w, h) * 0.16, c: k + (m === 'zen' ? 3 : 0), wob: k, pop: 0 }, style);
      if (m === 'party') {
        g.fillStyle = '#c23a5a'; g.font = '900 ' + Math.round(h * 0.22) + 'px system-ui';
        g.textAlign = 'center'; g.fillText('60s', w / 2, h * 0.28);
      }
      if (m === 'bees') {
        g.font = Math.round(h * 0.3) + 'px system-ui';
        g.textAlign = 'center'; g.fillText('🐝', w * 0.72, h * 0.35);
      }
    };
  }

  function showStartMenu() {
    state = 'ready';
    if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if (!KIT) return;
    KIT.menu.show({ kind: 'start', theme: MENU_THEME, backdrop: menuBackdrop, backdropAnimate: true,
      title: KIT.t('game.balloon-pop.menuTitle', { def: 'BALLOON POP' }),
      groups: [{ id: 'mode', label: KIT.t('game.common.modeLabel', { def: 'MODE' }), style: 'cards', default: mode,
        choices: [
          { id: 'party', label: modeDisplay('party'), mech: ['60s 🎉'], best: () => loadBest('party') || '', preview: (g, w, h) => pvMode('party')(g, w, h) },
          { id: 'zen',   label: modeDisplay('zen'),   mech: [KIT.t('game.balloon-pop.noEnd', { def: 'no timer 💚' })], best: () => loadBest('zen') || '', preview: (g, w, h) => pvMode('zen')(g, w, h) },
          { id: 'bees',  label: modeDisplay('bees'),  mech: ['60s 🐝!'], best: () => loadBest('bees') || '', preview: (g, w, h) => pvMode('bees')(g, w, h) },
        ] }],
      hint: st => (st && st.mode) === 'bees'
        ? KIT.t('game.balloon-pop.beesHint', { def: 'Pop balloons — but do NOT tap the bees! A sting costs 5 pops.' })
        : KIT.t('game.balloon-pop.startHint', { def: 'Tap the balloons to pop them! Same colour in a row = bonus pops. You can never lose.' }),
      actions: [{ id: 'play', label: KIT.t('game.common.play', { def: 'PLAY' }), primary: true }],
      onChange: st => { mode = st.mode; KIT.stampUrl({ mode: st.mode }); },
      onPlay: st => startGame(st.mode),
    });
  }

  function shareMsg() {
    return KIT.t('game.balloon-pop.share', { score,
      def: 'I popped {score} balloons in Balloon Pop 🎈' });
  }

  function showEnd(isBest) {
    if (!KIT) return;
    KIT.showMenuButton(false); KIT.showPauseButton(false);
    KIT.menu.show({ kind: 'end', theme: MENU_THEME, backdrop: menuBackdrop, backdropAnimate: true,
      title: KIT.t('game.balloon-pop.end', { def: 'WHAT A PARTY!' }),
      record: { slug: SLUG, mode: modeLabel(mode), score, stats: { bestCombo, beeStings } },
      score, best, newBest: isBest,
      lines: [ modeDisplay(mode) + ' · ' + KIT.t('game.balloon-pop.comboLine', { combo: bestCombo, def: 'best streak ×{combo}' })
        + (mode === 'bees' ? ' · ' + KIT.t('game.balloon-pop.stingsLine', { count: beeStings, def: '{count} stings 🐝' }) : '') ],
      share: { slug: SLUG, accent: ACCENT, icon: '🎈', title: KIT.t('game.balloon-pop.title', { def: 'Balloon Pop' }),
               message: () => shareMsg(), params: () => ({ mode }) },
      actions: [ { id: 'again', label: KIT.t('game.common.playAgain', { def: 'PLAY AGAIN' }), primary: true },
                 { id: 'menu', label: KIT.t('game.common.menu', { def: 'MENU' }) } ],
      onAction: id => { if (id === 'again') startGame(mode); else if (id === 'menu') toMenu(); } });
  }

  function pauseGame() {
    if (state !== 'playing' || !KIT) return;
    KIT.menu.show({ kind: 'pause', theme: MENU_THEME, title: KIT.t('game.common.paused', { def: 'PAUSED' }),
      lines: [KIT.t('game.common.scoreLine', { score, def: 'Score {score}' })],
      actions: [ { id: 'resume', label: KIT.t('game.common.resume', { def: 'RESUME (ESC)' }), primary: true },
                 { id: 'end', label: KIT.t('game.balloon-pop.finish', { def: 'FINISH & SAVE' }) },
                 { id: 'menu', label: KIT.t('game.common.quitToMenu', { def: 'QUIT TO MENU' }), danger: true } ],
      onAction: id => { if (id === 'resume') KIT.menu.hide(); else if (id === 'end') { KIT.menu.hide(); endRun(); } else if (id === 'menu') toMenu(); },
      onEsc: () => KIT.menu.hide() });
  }
  function toMenu() { if (KIT) KIT.menu.hide(); showStartMenu(); }

  // ---- resize ----
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    KIT.fitCanvas(canvas, W, H);
    topMargin = KIT.layout.hudTop();
    for (const b of balloons) b.x = Math.max(b.r, Math.min(W - b.r, b.x));   // clamp after rotate
  }
  window.gamekit.layout.on(resize);

  // ---- input ----
  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    popAt((e.clientX - r.left) * (W / r.width), (e.clientY - r.top) * (H / r.height));
  });
  window.addEventListener('keydown', e => {
    if (state === 'playing' && e.key === 'Escape') { e.preventDefault(); pauseGame(); }
  });

  // ---- nav + music ----
  KIT.nav({ slug: SLUG, music: true, home: '../../', theme: MENU_THEME, onMenu: () => toMenu(),
    onPause: () => { if (state === 'playing') pauseGame(); },
    confirmLeave: () => state === 'playing' && score > 0 ? KIT.t('confirm.leave', { def: "Leave this run? You'll lose your progress." }) : false,
    controls: { title: KIT.t('game.balloon-pop.controlsTitle', { def: 'Balloon Pop — Controls' }),
      mouse: [ [KIT.t('game.common.click', { def: 'Click' }), KIT.t('game.balloon-pop.ctrlPop', { def: 'Pop a balloon' })] ],
      keyboard: [ ['Esc', KIT.t('game.common.pause', { def: 'Pause' })] ],
      touch: [ [KIT.t('game.common.tap', { def: 'Tap' }), KIT.t('game.balloon-pop.ctrlPop', { def: 'Pop a balloon' })] ] } });
  KIT.music.play('balloonpop');

  // ---- __test ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get mode() { return mode; },
    get combo() { return combo; },
    get timeLeft() { return timeLeft; },
    get balloonCount() { return balloons.filter(b => !b.pop).length; },
    get balloons() { return balloons.filter(b => !b.pop).map(b => ({ x: b.x, y: b.y, r: b.r, c: b.c })); },
    get beeCount() { return bees.filter(b => !b.hit).length; },
    get beeStings() { return beeStings; },
    get popCount() { return popCount; },
    get fireworksSeen() { return fireworksSeen; },
    get wind() { return { strength: wind, active: windT > 0 }; },
    gust(dir, frames) { wind = dir; windT = frames || 60; },
    spawnBeeAt(x, y, vx) { spawnBee(x, y, vx); },
    spawnAt(x, y, r, c) { spawnBalloon(x, y, r, c); },
    popAt(x, y) { return popAt(x, y); },
    endRun() { endRun(); },
    get layout() {
      const bs = balloons.filter(b => !b.pop);
      return { W, H, topReserve: topMargin,
        minX: bs.length ? Math.min(...bs.map(b => b.x - b.r)) : 0,
        maxX: bs.length ? Math.max(...bs.map(b => b.x + b.r)) : W };
    },
    start() { startGame('party'); },
    startMode(m) { startGame(m); },
    menu() { return KIT ? KIT.menu.current() : null; },
    step(n) { for (let i = 0; i < (n || 1); i++) update(); },
  };

  // ---- boot ----
  resize();
  if (KIT) {
    const L = { lblScore: ['game.balloon-pop.hudPops', 'POPS'], lblBest: ['game.common.best', 'BEST'], lblTime: ['game.common.time', 'TIME'] };
    for (const id in L) { const el = document.getElementById(id); if (el) el.textContent = KIT.t(L[id][0], { def: L[id][1] }); }
    const m = KIT.param && KIT.param('mode');
    if (m === 'party' || m === 'zen') mode = m;
  }
  newGame(mode); state = 'ready';
  KIT.loop(update, render);
  showStartMenu();
})();
  window.gamekit.pwa('../../sw.js'); // registers the ONE root-scope SW — AFTER the IIFE closes
</script>
</body>
</html>
