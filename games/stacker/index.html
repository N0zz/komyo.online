<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Stack</title>
<link rel="icon" href="../../favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#ff9aa2">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stack">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="../../analytics.js" defer></script>
<link rel="stylesheet" href="../../game-kit.css">
<script src="../../game-kit.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #b8d4f0; font-family: system-ui, -apple-system, sans-serif; user-select: none; touch-action: none; }
  #game { display: block; width: 100vw; height: 100vh; }
  #hud .stat b { color: #ede4ff; font-size: 18px; }
  #combo { position: fixed; top: 56px; left: 50%; transform: translateX(-50%); z-index: 5;
    font-size: 13px; color: #e06ab0; font-weight: bold; letter-spacing: 2px; opacity: 0; transition: opacity 0.2s; }
  #overlay { position: fixed; inset: 0; z-index: 8; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; gap: 16px; background: rgba(180,210,248,0.88); padding: 24px; }
  #overlay.hidden { display: none; }
  #overlay h1 { margin: 0; font-size: 52px; letter-spacing: 3px; color: #6a3fa8; }
  #overlay .sub { font-size: 16px; color: #5a3a8a; opacity: 0.9; max-width: 360px; line-height: 1.5; }
  #overlay .hint { font-size: 13px; color: #7a5aaa; opacity: 0.7; }
  #overlay button { font-family: inherit; cursor: pointer; font-size: 16px; letter-spacing: 1px;
    padding: 12px 32px; border-radius: 24px; color: #fff;
    background: linear-gradient(135deg, #c084fc, #818cf8); border: none;
    box-shadow: 0 4px 16px rgba(160,100,240,0.35); }
  #overlay .score-display { font-size: 42px; font-weight: bold; color: #8a4fbf; }
  #overlay .best-display { font-size: 15px; color: #7a5aaa; }
  .mode-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .mode-btn { position: relative; font-family: inherit; cursor: pointer; font-size: 14px; letter-spacing: 1px;
    padding: 10px 22px 10px 22px; border-radius: 20px; border: 2px solid rgba(160,100,240,0.4);
    background: rgba(255,255,255,0.55); color: #6a3fa8; font-weight: 600;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.1s; }
  .mode-btn:hover { border-color: rgba(160,100,240,0.7); }
  .mode-btn.active { background: linear-gradient(135deg, #c084fc, #818cf8); border-color: #6a3fa8;
    color: #fff; box-shadow: 0 0 0 3px rgba(160,100,240,0.35), 0 4px 16px rgba(160,100,240,0.45);
    transform: translateY(-1px); padding-left: 32px; }
  .mode-btn.active::before { content: '✓'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 13px; font-weight: 700; }
  .mode-desc { font-size: 12px; color: #7a5aaa; opacity: 0.75; min-height: 18px; }
  .mode-btn .mbest { display: block; font-size: 10px; font-weight: 600; letter-spacing: 1px;
    opacity: 0.7; margin-top: 3px; }
  #shareRow { --gamekit-accent: #a064f0; }

  /* Portrait: kit HUD drops to top:50px — push the combo banner below it */
  @media (max-width: 560px) {
    #combo { top: 100px; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud" class="gamekit-hud">
  <div class="stat"><span class="lbl">SCORE</span> <b id="score">0</b></div>
  <div class="stat"><span class="lbl">BEST</span> <b id="best">0</b></div>
  <div class="stat"><span class="lbl">HEIGHT</span> <b id="height">0</b></div>
  <div class="stat" id="timer-stat" style="display:none"><span class="lbl">TIME</span> <b id="timer">60</b></div>
</div>
<div id="combo"></div>

<div id="overlay">
  <h1>STACK</h1>
  <p class="sub">Tap to drop the block.<br>Stack perfectly for a bonus!</p>
  <div class="mode-btns">
    <button class="mode-btn active" id="btn-classic">Classic<span class="mbest" id="mbest-classic"></span></button>
    <button class="mode-btn" id="btn-time">Time Attack<span class="mbest" id="mbest-time"></span></button>
    <button class="mode-btn" id="btn-zen">Zen<span class="mbest" id="mbest-zen"></span></button>
  </div>
  <p class="mode-desc" id="mode-desc">Endless — stack as high as you can</p>
  <div class="mode-btns" id="theme-btns">
    <button class="mode-btn active" id="btn-theme-light">Light</button>
    <button class="mode-btn" id="btn-theme-dark">Dark</button>
  </div>
  <p class="hint">Tap · Click · Space · Enter</p>
  <button id="startBtn">Play</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const comboEl = document.getElementById('combo');
  const timerStat = document.getElementById('timer-stat');
  const timerEl = document.getElementById('timer');

  // ---- Audio (game-kit shared engine + global mute) ----
  const SND = window.gamekit.sound;
  SND.define({
    place: ({ tone }) => tone(440, 0.08, 'triangle', 0.1),
    perfect: ({ tone }) => [523, 659, 784].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'sine', 0.1), i * 40)),
    drop: ({ tone }) => tone(180, 0.15, 'sawtooth', 0.08),
    over: ({ tone }) => [330, 220, 165].forEach((f, i) => setTimeout(() => tone(f, 0.2, 'sawtooth', 0.1), i * 120)),
    timeup: ({ tone }) => [330, 220, 165, 110].forEach((f, i) => setTimeout(() => tone(f, 0.25, 'sine', 0.09), i * 40)),
  });

  // ---- Constants ----
  const BLOCK_H = 28;
  // Playfield max width — keeps traversal snappy on wide/landscape screens
  const MAX_PLAY_W = 720; // upper cap; actual width is ~27% of viewport (see resize)

  // Per-mode config
  const MODE_CFG = {
    classic: { perfectTol: 6,  regrow: 4,  initSpeed: 4.5, speedRamp: 0.35, speedCap: 10, timeLimit: 0,  storageKey: 'stacker_best_classic', label: 'Classic',     desc: 'Endless — stack as high as you can' },
    time:    { perfectTol: 6,  regrow: 4,  initSpeed: 4.5, speedRamp: 0.35, speedCap: 10, timeLimit: 60, storageKey: 'stacker_best_time',    label: 'Time Attack',  desc: '60 seconds — stack as many as possible' },
    zen:     { perfectTol: 14, regrow: 6,  initSpeed: 2.2, speedRamp: 0.10, speedCap: 5,  timeLimit: 0,  storageKey: 'stacker_best_zen',     label: 'Zen',          desc: 'Relaxed — slow speed, wide perfect zone' },
  };

  const MODE_DESCS = { classic: 'Endless — stack as high as you can', time: '60 seconds — stack as many as possible', zen: 'Relaxed — slow speed, wide perfect zone' };

  // ---- Theme ----
  const HUES = [348, 20, 45, 80, 150, 190, 220, 260, 290, 320];
  // Theme-specific palette knobs: block lightness, stroke lightness, sky stops, flash, shadow.
  const THEMES = {
    light: { blockS: 70, blockL: 72, strokeS: 60, strokeL: 55, skyTop: '#c4ddff', skyBot: '#f0e8ff',
             flash: 'rgba(255,220,255,', shadow: 'rgba(0,0,0,0.06)', column: 'rgba(0,0,0,0.035)', bodyBg: '#b8d4f0' },
    dark:  { blockS: 60, blockL: 58, strokeS: 70, strokeL: 38, skyTop: '#1b2238', skyBot: '#2a2140',
             flash: 'rgba(200,170,255,', shadow: 'rgba(0,0,0,0.30)', column: 'rgba(255,255,255,0.04)', bodyBg: '#141a2e' },
  };
  let theme = (localStorage.getItem('stacker_theme') === 'dark') ? 'dark' : 'light';
  function TH() { return THEMES[theme]; }
  function applyTheme() { document.body.style.background = TH().bodyBg; }

  // ---- Palette: pastel hues cycling per layer ----
  function blockColor(layer) {
    const t = TH();
    return `hsl(${HUES[layer % HUES.length]}, ${t.blockS}%, ${t.blockL}%)`;
  }
  function blockStroke(layer) {
    const t = TH();
    return `hsl(${HUES[layer % HUES.length]}, ${t.strokeS}%, ${t.strokeL}%)`;
  }

  // ---- State ----
  let state = 'ready'; // ready | playing | over
  let mode = 'classic';
  let score = 0;
  let combo = 0;
  let blocks = []; // { x, w, y }  y = world-Y of top of block
  let mover = null; // { x, w, y, dir, speed }
  let cameraY = 0;  // world-Y at top of screen (scrolls up as tower grows)
  let targetCameraY = 0;
  let particles = [];
  let fallPieces = []; // sliced-off pieces falling
  let screenFlash = 0;
  let comboTimer = 0;
  let W = 0, H = 0;
  // playfield offset + width (centered, capped)
  let PF_X = 0, PF_W = 0; // updated in resize()
  let TOP_PAD = 48;       // headroom reserved for the kit center-top HUD (orientation-aware, see resize)

  // Time Attack
  let timeLeft = 0;      // seconds remaining (float)
  let timeTick = 0;      // frames accumulated for countdown

  function getBest(m) { return parseInt(localStorage.getItem(MODE_CFG[m].storageKey) || '0', 10); }
  function saveBest() {
    const key = MODE_CFG[mode].storageKey;
    const cur = parseInt(localStorage.getItem(key) || '0', 10);
    if (score > cur) localStorage.setItem(key, String(score));
  }
  function currentBest() { return getBest(mode); }

  function updateHud() {
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent = currentBest();
    document.getElementById('height').textContent = blocks.length > 1 ? blocks.length - 1 : 0;
    if (mode === 'time') {
      timerStat.style.display = '';
      timerEl.textContent = Math.ceil(timeLeft);
    } else {
      timerStat.style.display = 'none';
    }
  }

  // ---- World coords ----
  function worldToCanvas(wy) { return H - BLOCK_H - (wy - cameraY); }

  // ---- Init / reset ----
  function resetGame() {
    score = 0; combo = 0;
    blocks = [];
    particles = []; fallPieces = [];
    screenFlash = 0;
    comboTimer = 0;

    const cfg = MODE_CFG[mode];
    timeLeft = cfg.timeLimit > 0 ? cfg.timeLimit : 0;
    timeTick = 0;

    // Base block fills play column
    const baseW = Math.min(Math.floor(PF_W * 0.75), 220);
    const baseX = PF_X + (PF_W - baseW) / 2;
    blocks.push({ x: baseX, w: baseW, y: 0 });

    mover = { x: baseX, w: baseW, y: BLOCK_H, dir: 1, speed: cfg.initSpeed };

    cameraY = 0;
    targetCameraY = 0;
    updateHud();
  }

  // ---- Mover speed by height ----
  function moverSpeed(level) {
    const cfg = MODE_CFG[mode];
    return Math.min(cfg.initSpeed + level * cfg.speedRamp, cfg.speedCap);
  }

  // ---- Drop logic ----
  function drop() {
    if (state !== 'playing') return;
    const top = blocks[blocks.length - 1];
    const mx = mover.x, mw = mover.w;
    const tx = top.x, tw = top.w;

    // Overlap
    const overlapLeft = Math.max(mx, tx);
    const overlapRight = Math.min(mx + mw, tx + tw);
    const overlap = overlapRight - overlapLeft;

    if (overlap <= 0) {
      SND.play('drop');
      spawnFallPiece(mx, mw, mover.y);
      gameOver();
      return;
    }

    const cfg = MODE_CFG[mode];
    const perfect = Math.abs((mx + mw / 2) - (tx + tw / 2)) <= cfg.perfectTol;
    let placedW, placedX;

    if (perfect) {
      placedX = tx;
      // Regrow capped to playfield width
      placedW = Math.min(tw + cfg.regrow, Math.min(PF_W * 0.75, 220));
      combo++;
      score += 1 + Math.floor(combo / 3);
      SND.play('perfect');
      spawnParticles(placedX + placedW / 2, worldToCanvas(mover.y + BLOCK_H), 22, blockColor(blocks.length));
      screenFlash = 10;
    } else {
      placedX = overlapLeft;
      placedW = overlap;
      combo = 0;
      score += 1;
      SND.play('place');
      if (mx < tx) spawnFallPiece(mx, tx - mx, mover.y);
      if (mx + mw > tx + tw) spawnFallPiece(tx + tw, (mx + mw) - (tx + tw), mover.y);
    }

    blocks.push({ x: placedX, w: placedW, y: mover.y });
    saveBest();

    // Update camera: keep top of tower visible with some headroom, and never let the
    // tower top rise into the kit's center-top HUD band (reserve at least TOP_PAD up top).
    // worldToCanvas(topWorldY) = H - BLOCK_H - (topWorldY - cameraY) must stay >= TOP_PAD,
    // which requires cameraY >= topWorldY - (H - BLOCK_H - TOP_PAD).
    const topWorldY = mover.y + BLOCK_H;
    const desired = topWorldY - H * 0.35;
    const minCam = topWorldY - (H - BLOCK_H - TOP_PAD);
    targetCameraY = Math.max(0, desired, minCam);

    // Spawn next mover — starts from a random edge of the play column
    const level = blocks.length - 1;
    const spd = moverSpeed(level);
    const startLeft = Math.random() < 0.5;
    const startX = startLeft ? PF_X : PF_X + PF_W - placedW;
    mover = { x: startX, w: placedW, y: mover.y + BLOCK_H, dir: startLeft ? 1 : -1, speed: spd };

    comboTimer = combo >= 2 ? 90 : 0;
    updateHud();
  }

  function gameOver(reason) {
    state = 'over';
    SND.play(reason === 'time' ? 'timeup' : 'over');
    saveBest();
    window.gamekit.recordResult('stacker', { mode: mode, score: score });
    setTimeout(() => showOverlay('over'), 400);
  }

  function showOverlay(type) {
    overlay.classList.remove('hidden');
    if (type === 'over') {
      const best = currentBest();
      const modeName = MODE_CFG[mode].label;
      overlay.innerHTML = `
        <h1>OOPS!</h1>
        <div style="font-size:13px;color:#7a5aaa;opacity:0.7;letter-spacing:1px">${modeName.toUpperCase()}</div>
        <div class="score-display">${score}</div>
        <div class="best-display">Best: ${best}</div>
        <button id="restartBtn">Play Again</button>
        <div id="shareRow"></div>`;
      document.getElementById('restartBtn').addEventListener('click', () => startGameMode(mode));
      const finalScore = score;
      window.gamekit.shareRow(document.getElementById('shareRow'), {
        slug: 'stacker', title: 'Stack',
        message: () => window.gamekit.shareText({ verb: 'I stacked', score: finalScore, unit: 'high', game: 'Stack', emoji: '🧊', mode: MODE_CFG[mode].label }),
        params: () => ({ mode: mode }),
      });
    }
  }

  function startGameMode(m) {
    mode = m || 'classic';
    state = 'playing';
    overlay.classList.add('hidden');
    resetGame();
  }

  // Keep backward compat: start() = classic
  function startGame() { startGameMode('classic'); }

  // ---- Mode picker UI ----
  let selectedMode = 'classic';
  const modeDescEl = document.getElementById('mode-desc');

  function selectMode(m) {
    selectedMode = m;
    ['classic', 'time', 'zen'].forEach(id => {
      const btn = document.getElementById('btn-' + id);
      if (btn) btn.classList.toggle('active', id === m);
    });
    if (modeDescEl) modeDescEl.textContent = MODE_DESCS[m] || '';
  }

  ['classic', 'time', 'zen'].forEach(m => {
    const btn = document.getElementById('btn-' + m);
    if (btn) btn.addEventListener('click', e => { e.stopPropagation(); selectMode(m); });
  });

  // Per-mode best scores under each mode button (refreshed whenever the menu shows)
  function refreshMenuBests() {
    ['classic', 'time', 'zen'].forEach(m => {
      const el = document.getElementById('mbest-' + m);
      if (el) el.textContent = 'best: ' + getBest(m);
    });
  }
  refreshMenuBests();
  selectMode(selectedMode); // make the default-selected mode obvious on load
  { const pm = window.gamekit && window.gamekit.param && window.gamekit.param('mode'); if (MODE_CFG[pm]) selectMode(pm); } // deep-link ?mode=

  // ---- Theme picker UI ----
  function selectTheme(t) {
    theme = (t === 'dark') ? 'dark' : 'light';
    localStorage.setItem('stacker_theme', theme);
    const lb = document.getElementById('btn-theme-light');
    const db = document.getElementById('btn-theme-dark');
    if (lb) lb.classList.toggle('active', theme === 'light');
    if (db) db.classList.toggle('active', theme === 'dark');
    applyTheme();
  }
  document.getElementById('btn-theme-light')?.addEventListener('click', e => { e.stopPropagation(); selectTheme('light'); });
  document.getElementById('btn-theme-dark')?.addEventListener('click', e => { e.stopPropagation(); selectTheme('dark'); });
  selectTheme(theme); // apply saved theme on boot + sync button state

  document.getElementById('startBtn').addEventListener('click', () => startGameMode(selectedMode));

  // ---- Particles ----
  function spawnParticles(cx, cy, n, color) {
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i) / n + Math.random() * 0.3;
      const speed = 1.5 + Math.random() * 3.5;
      particles.push({ x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2.5, life: 1, color });
    }
  }

  function spawnFallPiece(x, w, worldY) {
    fallPieces.push({ x, w, y: worldToCanvas(worldY + BLOCK_H), vy: 0, life: 1, color: blockColor(blocks.length) });
  }

  // ---- Update ----
  function update() {
    if (state !== 'playing') return;

    // Move mover — clamped to play column bounds
    mover.x += mover.dir * mover.speed;
    const rightBound = PF_X + PF_W - mover.w;
    if (mover.x >= rightBound) { mover.x = rightBound; mover.dir = -1; }
    if (mover.x <= PF_X) { mover.x = PF_X; mover.dir = 1; }

    // Time Attack countdown (60fps assumed — good enough)
    if (mode === 'time' && timeLeft > 0) {
      timeTick++;
      if (timeTick >= 60) { timeTick = 0; timeLeft = Math.max(0, timeLeft - 1); }
      updateHud();
      if (timeLeft <= 0) { gameOver('time'); return; }
    }

    // Smooth camera
    cameraY += (targetCameraY - cameraY) * 0.07;

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.03;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Fall pieces
    for (let i = fallPieces.length - 1; i >= 0; i--) {
      const f = fallPieces[i];
      f.vy += 0.5; f.y += f.vy; f.life -= 0.025;
      if (f.life <= 0 || f.y > H + 40) fallPieces.splice(i, 1);
    }

    if (screenFlash > 0) screenFlash--;
    if (comboTimer > 0) comboTimer--;

    // Combo display
    if (combo >= 2 && comboTimer > 0) {
      comboEl.style.opacity = '1';
      comboEl.textContent = combo + 'x COMBO!';
    } else {
      comboEl.style.opacity = '0';
    }
  }

  // ---- Render ----
  function render() {
    const t = TH();
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, t.skyTop);
    grad.addColorStop(1, t.skyBot);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Playfield column subtle bg (only on wide screens)
    if (PF_W < W - 4) {
      ctx.fillStyle = t.column;
      ctx.fillRect(PF_X, 0, PF_W, H);
    }

    // Screen flash (perfect placement)
    if (screenFlash > 0) {
      ctx.fillStyle = `${t.flash}${screenFlash / 10 * 0.3})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Draw placed blocks
    for (let i = 0; i < blocks.length; i++) {
      const b = blocks[i];
      const cy = worldToCanvas(b.y);
      const color = blockColor(i);
      const stroke = blockStroke(i);

      ctx.fillStyle = color;
      roundRect(ctx, b.x, cy, b.w, BLOCK_H, 5);
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      roundRect(ctx, b.x + 2, cy + 2, b.w - 4, 6, 3);
      ctx.fill();
    }

    // Draw falling pieces
    for (const f of fallPieces) {
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.fillStyle = f.color;
      roundRect(ctx, f.x, f.y, f.w, BLOCK_H, 4);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Draw moving block
    if (state === 'playing') {
      const my = worldToCanvas(mover.y);
      const level = blocks.length - 1;
      const color = blockColor(level);
      const stroke = blockStroke(level);

      // Shadow below mover showing where it'll land
      const topBlock = blocks[blocks.length - 1];
      ctx.fillStyle = TH().shadow;
      roundRect(ctx, mover.x, worldToCanvas(topBlock.y), mover.w, BLOCK_H, 5);
      ctx.fill();

      ctx.fillStyle = color;
      roundRect(ctx, mover.x, my, mover.w, BLOCK_H, 5);
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      roundRect(ctx, mover.x + 2, my + 2, mover.w - 4, 6, 3);
      ctx.fill();
    }

    // Draw particles
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function roundRect(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ---- Resize ----
  function resize() {
    const oldPFX = PF_X;
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    // Constrain play column so block traversal feels snappy
    PF_W = Math.max(340, Math.min(Math.round(W * 0.27), MAX_PLAY_W, W));
    PF_X = (W - PF_W) / 2;
    // keep the existing stack centered after a rotate/resize: the column recenters, so shift
    // every placed block (and the moving block) by the same delta instead of leaving them off-side
    const dx = PF_X - oldPFX;
    if (dx && blocks.length) { for (let i = 0; i < blocks.length; i++) blocks[i].x += dx; if (mover) mover.x += dx; }
    // Reserve headroom for the kit center-top HUD: top:8px landscape, top:50px portrait (≤560px)
    TOP_PAD = W <= 560 ? 92 : 48;
  }
  window.gamekit.layout.on(resize); // resize + orientationchange + visualViewport, debounced

  // ---- Input ----
  function handleDrop() { if (state === 'playing') drop(); else if (state === 'ready' || state === 'over') startGameMode(selectedMode); }

  canvas.addEventListener('pointerdown', handleDrop);
  overlay.addEventListener('pointerdown', e => { if (e.target === overlay) handleDrop(); });
  document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); handleDrop(); }
  });

  // ---- Game loop ----
  function loop() {
    requestAnimationFrame(loop);
    try { update(); render(); } catch (e) { if (window.console) console.error(e); }
  }

  // ---- __test hook ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get blocks() { return blocks.length > 0 ? blocks.length - 1 : 0; },
    get combo() { return combo; },
    get moving() { return mover ? { x: mover.x, w: mover.w } : null; },
    get base() { return blocks.length > 0 ? { x: blocks[blocks.length - 1].x, w: blocks[blocks.length - 1].w } : null; },
    get mode() { return mode; },
    get timeLeft() { return timeLeft; },
    start() { startGame(); },
    startMode(m) { startGameMode(m); },
    drop() { drop(); },
    step(n) { for (let i = 0; i < (n || 1); i++) update(); },
    dropPerfect() {
      if (state !== 'playing' || !mover || blocks.length === 0) return;
      const top = blocks[blocks.length - 1];
      mover.x = top.x + (top.w - mover.w) / 2;
      drop();
    },
    // Expose for tests: force timeLeft (Time Attack sim)
    _setTimeLeft(v) { timeLeft = v; },
    _setTimeTick(v) { timeTick = v; },
    // Expose for tests: per-mode best line shown in the menu
    refreshMenuBests() { refreshMenuBests(); },
    menuBest(m) { const el = document.getElementById('mbest-' + m); return el ? el.textContent : null; },
  };

  window.gamekit.nav({ reset: 'stacker_' });

  resize();
  updateHud();
  loop();
})();
  window.gamekit.pwa();
</script>
</body>
