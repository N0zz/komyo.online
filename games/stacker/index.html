<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Stack</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#ff9aa2">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stack">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="../../analytics.js" defer></script>
<link rel="stylesheet" href="../../game-kit.css">
<script src="../../version.js"></script>
<script src="../../game-kit.js"></script>
<script src="../../challenges.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #b8d4f0; font-family: system-ui, -apple-system, sans-serif; user-select: none; touch-action: none; }
  #game { display: block; width: 100vw; height: 100vh; }
  #hud .stat b { color: #ede4ff; font-size: 18px; }
  #combo { position: fixed; top: 56px; left: 50%; transform: translateX(-50%); z-index: 5;
    font-size: 13px; color: #e06ab0; font-weight: bold; letter-spacing: 2px; opacity: 0; transition: opacity 0.2s; }
  /* start / pause / end screens now come from the shared gamekit.menu (see MENU_THEME below) */

  /* Portrait: kit HUD drops to top:50px — push the combo banner below it */
  @media (max-width: 560px) {
    #combo { top: 100px; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud" class="gamekit-hud">
  <div class="stat"><span class="lbl">SCORE</span> <b id="score">0</b></div>
  <div class="stat"><span class="lbl">BEST</span> <b id="best">0</b></div>
  <div class="stat"><span class="lbl">HEIGHT</span> <b id="height">0</b></div>
  <div class="stat" id="timer-stat" style="display:none"><span class="lbl">TIME</span> <b id="timer">60</b></div>
</div>
<div id="combo"></div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const KIT = window.gamekit;
  const comboEl = document.getElementById('combo');
  const timerStat = document.getElementById('timer-stat');
  const timerEl = document.getElementById('timer');

  // ---- Audio (game-kit shared engine + global mute) ----
  const SND = window.gamekit.sound;
  SND.define({
    place: (c) => c.voice({ f: 440, dur: 0.1, type: 'triangle', gain: 0.12, filter: 'lowpass', cutoff: 1600, reverb: 0.12 }),
    perfect: (c) => { [523, 659, 784, 1047].forEach((f, i) => c.voice({ f, dur: 0.2, type: 'sine', gain: 0.09, reverb: 0.32, t: c.now() + i * 0.045 })); },
    drop: (c) => c.voice({ f: 200, slideTo: 110, dur: 0.16, type: 'triangle', gain: 0.1, filter: 'lowpass', cutoff: 900 }),
    over: (c) => c.play('lose'),
    timeup: (c) => c.play('gameover'),
  });

  // ---- Constants ----
  const BLOCK_H = 28;
  // Playfield max width — keeps traversal snappy on wide/landscape screens
  const MAX_PLAY_W = 720; // upper cap; actual width is ~27% of viewport (see resize)

  // Per-mode config
  const MODE_CFG = {
    classic: { perfectTol: 6,  regrow: 4,  initSpeed: 4.5, speedRamp: 0.35, speedCap: 10, timeLimit: 0,  storageKey: 'stacker_best_classic', label: 'Classic',     desc: 'Endless — stack as high as you can' },
    time:    { perfectTol: 6,  regrow: 4,  initSpeed: 4.5, speedRamp: 0.35, speedCap: 10, timeLimit: 60, storageKey: 'stacker_best_time',    label: 'Time Attack',  desc: '60 seconds — stack as many as possible' },
    zen:     { perfectTol: 14, regrow: 6,  initSpeed: 2.2, speedRamp: 0.10, speedCap: 5,  timeLimit: 0,  storageKey: 'stacker_best_zen',     label: 'Zen',          desc: 'Relaxed — slow speed, wide perfect zone' },
  };

  // ---- Theme ----
  const HUES = [348, 20, 45, 80, 150, 190, 220, 260, 290, 320];
  // Theme-specific palette knobs: block lightness, stroke lightness, sky stops, flash, shadow.
  const THEMES = {
    light: { blockS: 70, blockL: 72, strokeS: 60, strokeL: 55, skyTop: '#c4ddff', skyBot: '#f0e8ff',
             flash: 'rgba(255,220,255,', shadow: 'rgba(0,0,0,0.06)', column: 'rgba(0,0,0,0.035)', bodyBg: '#b8d4f0' },
    dark:  { blockS: 60, blockL: 58, strokeS: 70, strokeL: 38, skyTop: '#1b2238', skyBot: '#2a2140',
             flash: 'rgba(200,170,255,', shadow: 'rgba(0,0,0,0.30)', column: 'rgba(255,255,255,0.04)', bodyBg: '#141a2e' },
  };
  let theme = (localStorage.getItem('stacker_theme') === 'dark') ? 'dark' : 'light';
  function TH() { return THEMES[theme]; }
  function applyTheme() { document.body.style.background = TH().bodyBg; }

  // ---- Palette: pastel hues cycling per layer ----
  function blockColor(layer) {
    const t = TH();
    return `hsl(${HUES[layer % HUES.length]}, ${t.blockS}%, ${t.blockL}%)`;
  }
  function blockStroke(layer) {
    const t = TH();
    return `hsl(${HUES[layer % HUES.length]}, ${t.strokeS}%, ${t.strokeL}%)`;
  }

  // ---- State ----
  let state = 'ready'; // ready | playing | over
  let mode = 'classic';
  let score = 0;
  let combo = 0;
  let blocks = []; // { x, w, y }  y = world-Y of top of block
  let mover = null; // { x, w, y, dir, speed }
  let cameraY = 0;  // world-Y at top of screen (scrolls up as tower grows)
  let targetCameraY = 0;
  let particles = [];
  let fallPieces = []; // sliced-off pieces falling
  let screenFlash = 0;
  let comboTimer = 0;
  let W = 0, H = 0;
  // playfield offset + width (centered, capped)
  let PF_X = 0, PF_W = 0; // updated in resize()
  let TOP_PAD = 48;       // headroom reserved for the kit center-top HUD (orientation-aware, see resize)

  // Time Attack
  let timeLeft = 0;      // seconds remaining (float)
  let timeTick = 0;      // frames accumulated for countdown

  function getBest(m) { return KIT ? KIT.bestScore('stacker', MODE_CFG[m].label) : 0; }
  function saveBest() { if (KIT) KIT.saveBest('stacker', MODE_CFG[mode].label, { score: score }); }
  function currentBest() { return getBest(mode); }

  function updateHud() {
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent = currentBest();
    document.getElementById('height').textContent = blocks.length > 1 ? blocks.length - 1 : 0;
    if (mode === 'time') {
      timerStat.style.display = '';
      timerEl.textContent = Math.ceil(timeLeft);
    } else {
      timerStat.style.display = 'none';
    }
  }

  // ---- World coords ----
  function worldToCanvas(wy) { return H - BLOCK_H - (wy - cameraY); }

  // ---- Init / reset ----
  function resetGame() {
    score = 0; combo = 0;
    blocks = [];
    particles = []; fallPieces = [];
    screenFlash = 0;
    comboTimer = 0;

    const cfg = MODE_CFG[mode];
    timeLeft = cfg.timeLimit > 0 ? cfg.timeLimit : 0;
    timeTick = 0;

    // Base block fills play column
    const baseW = Math.min(Math.floor(PF_W * 0.75), 220);
    const baseX = PF_X + (PF_W - baseW) / 2;
    blocks.push({ x: baseX, w: baseW, y: 0 });

    mover = { x: baseX, w: baseW, y: BLOCK_H, dir: 1, speed: cfg.initSpeed };

    cameraY = 0;
    targetCameraY = 0;
    updateHud();
  }

  // ---- Mover speed by height ----
  function moverSpeed(level) {
    const cfg = MODE_CFG[mode];
    return Math.min(cfg.initSpeed + level * cfg.speedRamp, cfg.speedCap);
  }

  // ---- Drop logic ----
  function drop() {
    if (state !== 'playing') return;
    const top = blocks[blocks.length - 1];
    const mx = mover.x, mw = mover.w;
    const tx = top.x, tw = top.w;

    // Overlap
    const overlapLeft = Math.max(mx, tx);
    const overlapRight = Math.min(mx + mw, tx + tw);
    const overlap = overlapRight - overlapLeft;

    if (overlap <= 0) {
      SND.play('drop');
      spawnFallPiece(mx, mw, mover.y);
      gameOver();
      return;
    }

    const cfg = MODE_CFG[mode];
    const perfect = Math.abs((mx + mw / 2) - (tx + tw / 2)) <= cfg.perfectTol;
    let placedW, placedX;

    if (perfect) {
      placedX = tx;
      // Regrow capped to playfield width
      placedW = Math.min(tw + cfg.regrow, Math.min(PF_W * 0.75, 220));
      combo++;
      score += 1 + Math.floor(combo / 3);
      SND.play('perfect');
      spawnParticles(placedX + placedW / 2, worldToCanvas(mover.y + BLOCK_H), 22, blockColor(blocks.length));
      screenFlash = 10;
    } else {
      placedX = overlapLeft;
      placedW = overlap;
      combo = 0;
      score += 1;
      SND.play('place');
      if (mx < tx) spawnFallPiece(mx, tx - mx, mover.y);
      if (mx + mw > tx + tw) spawnFallPiece(tx + tw, (mx + mw) - (tx + tw), mover.y);
    }

    blocks.push({ x: placedX, w: placedW, y: mover.y });

    // Update camera: keep top of tower visible with some headroom, and never let the
    // tower top rise into the kit's center-top HUD band (reserve at least TOP_PAD up top).
    // worldToCanvas(topWorldY) = H - BLOCK_H - (topWorldY - cameraY) must stay >= TOP_PAD,
    // which requires cameraY >= topWorldY - (H - BLOCK_H - TOP_PAD).
    const topWorldY = mover.y + BLOCK_H;
    const desired = topWorldY - H * 0.35;
    const minCam = topWorldY - (H - BLOCK_H - TOP_PAD);
    targetCameraY = Math.max(0, desired, minCam);

    // Spawn next mover — starts from a random edge of the play column
    const level = blocks.length - 1;
    const spd = moverSpeed(level);
    const startLeft = Math.random() < 0.5;
    const startX = startLeft ? PF_X : PF_X + PF_W - placedW;
    mover = { x: startX, w: placedW, y: mover.y + BLOCK_H, dir: startLeft ? 1 : -1, speed: spd };

    comboTimer = combo >= 2 ? 90 : 0;
    updateHud();
  }

  function gameOver(reason) {
    state = 'over';
    SND.play(reason === 'time' ? 'timeup' : 'over');
    const prevBest = currentBest(); saveBest(); const isBest = score > prevBest;
    KIT.recordResult('stacker', { mode: MODE_CFG[mode].label, score: score });
    setTimeout(() => showEnd(reason, isBest), 400);
  }

  function startGameMode(m) {
    mode = m || 'classic'; selectedMode = mode;
    state = 'playing';
    if (KIT) { KIT.menu.hide(); KIT.showMenuButton(true); KIT.showPauseButton(true); }
    resetGame();
  }
  function startGame() { startGameMode('classic'); } // back-compat: start() = classic

  // ---- Theme (light/dark) — driven by the menu's THEME selector (no separate buttons) ----
  let selectedMode = 'classic';
  function selectTheme(t) { theme = (t === 'dark') ? 'dark' : 'light'; localStorage.setItem('stacker_theme', theme); applyTheme(); }
  selectTheme(theme); // apply saved theme on boot
  { const pm = KIT && KIT.param && KIT.param('mode'); if (MODE_CFG[pm]) selectedMode = pm; }          // deep-link ?mode=
  { const pt = KIT && KIT.param && KIT.param('theme'); if (pt === 'dark' || pt === 'light') selectTheme(pt); } // deep-link ?theme=

  // ---- shared menus (gamekit.menu) — pastel theme; a leaning-tower backdrop that follows light/dark ----
  const MENU_THEME = { accent: '#c084fc', glow: '0 0 20px rgba(192,132,252,0.45)', bg: 'rgba(34,26,44,0.72)',
    border: 'rgba(192,132,252,0.32)', overlay: 'rgba(20,16,30,0.5)', title: '#e0b8ff', 'on-accent': '#180f22', 'accent-soft': 'rgba(192,132,252,0.18)' };
  // menu art reads the theme from the menu STATE the kit passes in (so Light/Dark updates instantly),
  // not the global `theme` (which onChange updates only after the kit has already repainted)
  function skyTheme(st) { return THEMES[(st && st.theme) || theme]; }
  function blkC(layer, t) { return `hsl(${HUES[layer % HUES.length]}, ${t.blockS}%, ${t.blockL}%)`; }
  function blkS(layer, t) { return `hsl(${HUES[layer % HUES.length]}, ${t.strokeS}%, ${t.strokeL}%)`; }
  // draw a real Stack tower bottom-up: each block sits within the one below and NARROWS on an
  // imperfect drop (the overhang is sliced off), flush-alternating left/right → a zig-zag taper.
  // `shrinks[i]` = px lost at layer i (0 = a perfect drop that keeps the width).
  function drawTower(g, t, x0, bw0, yBase, n, blockH, gapY, shrinks, down, c0) {
    c0 = c0 || 0; let bw = bw0, bx = x0;
    for (let i = 0; i < n; i++) {
      const y = down ? yBase + i * gapY : yBase - i * gapY;
      g.fillStyle = blkC(c0 + i, t); g.strokeStyle = blkS(c0 + i, t); g.lineWidth = 1.5;
      roundRect(g, bx, y, bw, blockH, 4); g.fill(); g.stroke();
      g.fillStyle = 'rgba(255,255,255,0.32)'; roundRect(g, bx + 3, y + 2, Math.max(2, bw - 6), Math.min(5, blockH - 4), 2); g.fill();
      const s = shrinks[i % shrinks.length], nbw = Math.max(bw0 * 0.28, bw - s);
      bx = (i % 2 === 0) ? bx : bx + (bw - nbw); // flush-alternate so it zig-zags as it tapers
      bw = nbw;
    }
  }
  function menuBackdrop(g, w, h, st) {
    const t = skyTheme(st); const gr = g.createLinearGradient(0, 0, 0, h); gr.addColorStop(0, t.skyTop); gr.addColorStop(1, t.skyBot); g.fillStyle = gr; g.fillRect(0, 0, w, h);
    const bwL = Math.min(120, w * 0.32); // left tower rising from the floor
    drawTower(g, t, w * 0.2 - bwL / 2, bwL, h - 30, 11, 24, 26, [0, 8, 0, 12, 6, 0, 10, 5, 9, 0, 7], false, 0);
    const bwR = Math.min(96, w * 0.26);  // right tower hanging from the ceiling, tapering downward
    drawTower(g, t, w * 0.8 - bwR / 2, bwR, -8, 8, 24, 26, [0, 11, 5, 0, 9, 6, 8, 4], true, 5);
  }
  function pvMode(g, w, h, variant, st) {
    const t = skyTheme(st); const gr = g.createLinearGradient(0, 0, 0, h); gr.addColorStop(0, t.skyTop); gr.addColorStop(1, t.skyBot); g.fillStyle = gr; g.fillRect(0, 0, w, h);
    const bw0 = variant === 'zen' ? w * 0.52 : w * 0.42; // zen keeps blocks wide (forgiving), so it barely tapers
    const shrinks = variant === 'zen' ? [0, 3, 0, 2, 0] : [0, 8, 5, 10, 6];
    drawTower(g, t, w / 2 - bw0 / 2, bw0, h - 12, 5, 10, 11, shrinks);
    if (variant === 'time') { g.strokeStyle = '#e0a020'; g.lineWidth = 2.5; g.beginPath(); g.arc(w - 16, 15, 9, -1.3, 3.3); g.stroke(); g.beginPath(); g.moveTo(w - 16, 15); g.lineTo(w - 16, 9); g.stroke(); }
    if (variant === 'zen') { g.fillStyle = (((st && st.theme) || theme) === 'dark') ? '#a8e878' : '#6a3fa8'; g.font = '700 15px system-ui'; g.fillText('z', w - 20, 20); g.font = '700 11px system-ui'; g.fillText('z', w - 13, 14); }
  }
  const menuParams = st => (st.theme && st.theme !== 'light') ? { mode: st.mode, theme: st.theme } : { mode: st.mode };
  function showStartMenu() {
    state = 'ready'; if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if (!KIT) return;
    KIT.menu.show({ kind: 'start', theme: MENU_THEME, title: 'STACK', backdrop: menuBackdrop,
      groups: [
        { id: 'mode', label: 'MODE', style: 'cards', default: selectedMode, choices: [
          { id: 'classic', label: 'Classic',    mech: ['Endless', 'High score'], best: () => getBest('classic'), preview: (g, w, h, st) => pvMode(g, w, h, 'classic', st) },
          { id: 'time',    label: 'Time Attack', mech: ['60 seconds'],            best: () => getBest('time'),    preview: (g, w, h, st) => pvMode(g, w, h, 'time', st) },
          { id: 'zen',     label: 'Zen',         mech: ['Slow', 'Forgiving'],     best: () => getBest('zen'),     preview: (g, w, h, st) => pvMode(g, w, h, 'zen', st) },
        ] },
        { id: 'theme', label: 'THEME', default: theme, choices: [ { id: 'light', label: 'Light' }, { id: 'dark', label: 'Dark' } ] },
      ],
      actions: [{ id: 'play', label: 'Play', primary: true }],
      hint: () => 'Tap / click / Space to drop the block.',
      onChange: st => { selectedMode = st.mode; if (st.theme !== theme) selectTheme(st.theme); KIT.stampUrl(menuParams(st)); },
      onPlay: st => { selectTheme(st.theme); KIT.stampUrl(menuParams(st)); startGameMode(st.mode); },
    });
    KIT.stampUrl(menuParams({ mode: selectedMode, theme: theme }));
  }
  function shareMsg() { return KIT.shareText({ verb: 'I stacked', score: score, unit: 'high', game: 'Stack', emoji: '🧊', mode: MODE_CFG[mode].label }); }
  function showEnd(reason, isBest) {
    if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if (!KIT) return;
    KIT.menu.show({ kind: 'end', theme: MENU_THEME, title: reason === 'time' ? "TIME'S UP!" : 'OOPS!', backdrop: menuBackdrop,
      score: score, best: currentBest(), newBest: isBest, lines: [MODE_CFG[mode].label],
      share: { slug: 'stacker', accent: '#ff9aa2', icon: '🧊', title: 'Stack', message: () => shareMsg(), params: () => menuParams({ mode: mode, theme: theme }) },
      actions: [ { id: 'again', label: 'Play Again', primary: true }, { id: 'menu', label: 'Menu' } ],
      onAction: id => { if (id === 'again') startGameMode(mode); else if (id === 'menu') toMenu(); } });
  }
  function pauseGame() { if (state !== 'playing' || !KIT) return; state = 'paused';
    KIT.menu.show({ kind: 'pause', theme: MENU_THEME, title: 'PAUSED', lines: ['Score ' + score],
      actions: [ { id: 'resume', label: 'RESUME (ESC)', primary: true }, { id: 'menu', label: 'QUIT TO MENU', danger: true } ],
      onAction: id => { if (id === 'resume') resumeGame(); else if (id === 'menu') toMenu(); }, onEsc: resumeGame });
  }
  function resumeGame() { if (state !== 'paused') return; state = 'playing'; if (KIT) KIT.menu.hide(); }
  function toMenu() { saveBest(); if (KIT) KIT.menu.hide(); showStartMenu(); }

  // ---- Particles ----
  function spawnParticles(cx, cy, n, color) {
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i) / n + Math.random() * 0.3;
      const speed = 1.5 + Math.random() * 3.5;
      particles.push({ x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2.5, life: 1, color });
    }
  }

  function spawnFallPiece(x, w, worldY) {
    fallPieces.push({ x, w, y: worldToCanvas(worldY + BLOCK_H), vy: 0, life: 1, color: blockColor(blocks.length) });
  }

  // ---- Update ----
  function update() {
    if (state !== 'playing') return;

    // Move mover — clamped to play column bounds
    mover.x += mover.dir * mover.speed;
    const rightBound = PF_X + PF_W - mover.w;
    if (mover.x >= rightBound) { mover.x = rightBound; mover.dir = -1; }
    if (mover.x <= PF_X) { mover.x = PF_X; mover.dir = 1; }

    // Time Attack countdown (update() now runs at a fixed 60/s via the kit loop)
    if (mode === 'time' && timeLeft > 0) {
      timeTick++;
      if (timeTick >= 60) { timeTick = 0; timeLeft = Math.max(0, timeLeft - 1); }
      updateHud();
      if (timeLeft <= 0) { gameOver('time'); return; }
    }

    // Smooth camera
    cameraY += (targetCameraY - cameraY) * 0.07;

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.03;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Fall pieces
    for (let i = fallPieces.length - 1; i >= 0; i--) {
      const f = fallPieces[i];
      f.vy += 0.5; f.y += f.vy; f.life -= 0.025;
      if (f.life <= 0 || f.y > H + 40) fallPieces.splice(i, 1);
    }

    if (screenFlash > 0) screenFlash--;
    if (comboTimer > 0) comboTimer--;

    // Combo display
    if (combo >= 2 && comboTimer > 0) {
      comboEl.style.opacity = '1';
      comboEl.textContent = combo + 'x COMBO!';
    } else {
      comboEl.style.opacity = '0';
    }
  }

  // ---- Render ----
  function render() {
    const t = TH();
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, t.skyTop);
    grad.addColorStop(1, t.skyBot);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Playfield column subtle bg (only on wide screens)
    if (PF_W < W - 4) {
      ctx.fillStyle = t.column;
      ctx.fillRect(PF_X, 0, PF_W, H);
    }

    // Screen flash (perfect placement)
    if (screenFlash > 0) {
      ctx.fillStyle = `${t.flash}${screenFlash / 10 * 0.3})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Draw placed blocks
    for (let i = 0; i < blocks.length; i++) {
      const b = blocks[i];
      const cy = worldToCanvas(b.y);
      const color = blockColor(i);
      const stroke = blockStroke(i);

      ctx.fillStyle = color;
      roundRect(ctx, b.x, cy, b.w, BLOCK_H, 5);
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      roundRect(ctx, b.x + 2, cy + 2, b.w - 4, 6, 3);
      ctx.fill();
    }

    // Draw falling pieces
    for (const f of fallPieces) {
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.fillStyle = f.color;
      roundRect(ctx, f.x, f.y, f.w, BLOCK_H, 4);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Draw moving block
    if (state === 'playing') {
      const my = worldToCanvas(mover.y);
      const level = blocks.length - 1;
      const color = blockColor(level);
      const stroke = blockStroke(level);

      // Shadow below mover showing where it'll land
      const topBlock = blocks[blocks.length - 1];
      ctx.fillStyle = TH().shadow;
      roundRect(ctx, mover.x, worldToCanvas(topBlock.y), mover.w, BLOCK_H, 5);
      ctx.fill();

      ctx.fillStyle = color;
      roundRect(ctx, mover.x, my, mover.w, BLOCK_H, 5);
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      roundRect(ctx, mover.x + 2, my + 2, mover.w - 4, 6, 3);
      ctx.fill();
    }

    // Draw particles
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function roundRect(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ---- Resize ----
  function resize() {
    const oldPFX = PF_X;
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    // Constrain play column so block traversal feels snappy
    PF_W = Math.max(340, Math.min(Math.round(W * 0.27), MAX_PLAY_W, W));
    PF_X = (W - PF_W) / 2;
    // keep the existing stack centered after a rotate/resize: the column recenters, so shift
    // every placed block (and the moving block) by the same delta instead of leaving them off-side
    const dx = PF_X - oldPFX;
    if (dx && blocks.length) { for (let i = 0; i < blocks.length; i++) blocks[i].x += dx; if (mover) mover.x += dx; }
    // Reserve headroom for the kit center-top HUD: top:8px landscape, top:50px portrait (≤560px)
    TOP_PAD = W <= 560 ? 92 : 48;
  }
  window.gamekit.layout.on(resize); // resize + orientationchange + visualViewport, debounced

  // ---- Input ---- (start/restart come from the menu's Play; canvas taps only drop while playing)
  function handleDrop() { if (state === 'playing') drop(); }

  canvas.addEventListener('pointerdown', handleDrop);
  document.addEventListener('keydown', e => {
    if (state === 'playing' && e.key === 'Escape') { e.preventDefault(); pauseGame(); return; }
    if (state === 'playing' && (e.key === ' ' || e.key === 'Enter')) { e.preventDefault(); handleDrop(); }
  });

  // ---- __test hook ----
  window.__test = {
    // JS-computed layout snapshot in canvas/px space — drives the headless layout-fit regression test.
    get layout() {
      const top = blocks.length ? blocks[blocks.length - 1] : null;
      const moverTopCanvas = mover ? worldToCanvas(mover.y) : null;
      // Topmost drawn pixel across placed blocks + the moving block (smallest canvas-y).
      let topCanvas = Infinity;
      for (const b of blocks) topCanvas = Math.min(topCanvas, worldToCanvas(b.y));
      if (mover && state === 'playing') topCanvas = Math.min(topCanvas, moverTopCanvas);
      return {
        W, H, topReserve: TOP_PAD, blockH: BLOCK_H,
        pfX: PF_X, pfW: PF_W,
        baseCenterX: top ? top.x + top.w / 2 : null,
        mover: mover ? {
          left: mover.x, right: mover.x + mover.w, w: mover.w,
          top: moverTopCanvas, bottom: moverTopCanvas + BLOCK_H,
        } : null,
        stackLeft: top ? top.x : null,
        stackRight: top ? top.x + top.w : null,
        topCanvas: topCanvas === Infinity ? null : topCanvas,
      };
    },
    get state() { return state; },
    get score() { return score; },
    get blocks() { return blocks.length > 0 ? blocks.length - 1 : 0; },
    get combo() { return combo; },
    get moving() { return mover ? { x: mover.x, w: mover.w } : null; },
    get base() { return blocks.length > 0 ? { x: blocks[blocks.length - 1].x, w: blocks[blocks.length - 1].w } : null; },
    get mode() { return mode; },
    get timeLeft() { return timeLeft; },
    start() { startGame(); },
    startMode(m) { startGameMode(m); },
    drop() { drop(); },
    setMover(x) { if (mover) mover.x = x; },
    step(n) { for (let i = 0; i < (n || 1); i++) update(); },
    dropPerfect() {
      if (state !== 'playing' || !mover || blocks.length === 0) return;
      const top = blocks[blocks.length - 1];
      mover.x = top.x + (top.w - mover.w) / 2;
      drop();
    },
    // Expose for tests: force timeLeft (Time Attack sim)
    _setTimeLeft(v) { timeLeft = v; },
    _setTimeTick(v) { timeTick = v; },
    menu() { return KIT ? KIT.menu.current() : null; },
    best(m) { return getBest(m); },
    pause() { pauseGame(); },
    resume() { resumeGame(); },
    toMenu() { toMenu(); },
  };

  KIT.nav({ music: true, reset: 'stacker_', home: '../../', theme: MENU_THEME, challenges: 'stacker', onMenu: () => toMenu(),
    onPause: () => { if (state === 'playing') pauseGame(); else if (state === 'paused') resumeGame(); },
    confirmLeave: () => (state === 'playing' || state === 'paused') ? "Leave this run? You'll lose your progress." : false,
    controls: { title: 'Stack — Controls',
      mouse: [ ['Click', 'Drop the block'] ],
      keyboard: [ ['Space  ·  Enter', 'Drop the block'], ['Esc', 'Pause'] ],
      touch: [ ['Tap', 'Drop the block'] ] } });
  KIT.music.play('pastel');

  resize();
  updateHud();
  KIT.loop(update, render);
  showStartMenu(); // open the shared start menu (mode/theme preselected from ?mode= / ?theme=)
})();
  window.gamekit.pwa();
</script>
</body>
</html>
