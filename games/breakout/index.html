<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Brick Breaker</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#ff5cc8">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Brick Breaker">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="../../analytics.js" defer></script>
<link rel="stylesheet" href="../../game-kit.css">
<script src="../../version.js"></script>
<script src="../../game-kit.js"></script>
<script src="../../challenges.js"></script>
<script src="../../cosmetics.js"></script>
<script src="../../i18n.js"></script>
<style>
  :root { --mg:#ff00ff; --cy:#00ffff; --bg:#0a0010; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:#fff;
    font-family: 'Courier New', Courier, monospace; user-select:none; touch-action:none; }
  #game { display:block; width:100vw; height:100vh; }
  /* Position/background/font come from the shared .gamekit-hud (center-top pill). Keep only
     the synthwave value colors. */
  #hud .val { color:var(--cy); text-shadow:0 0 8px var(--cy); }
  #hud .hrt { color:var(--mg); text-shadow:0 0 8px var(--mg); }
  /* start / pause / end screens come from the shared gamekit.menu (MENU_THEME below) */
  /* touch-only hint: which screen half moves the paddle (the canvas handles the actual input) */
  /* fixed offset near the paddle so it's clear of the bricks in BOTH orientations (13% floated up over the bricks in portrait) */
  #bkpad { position:fixed; left:0; right:0; bottom:64px; z-index:6; display:none; justify-content:space-between; padding:0 20px; pointer-events:none; user-select:none; }
  #bkpad span { font-size:32px; line-height:1; color:rgba(0,255,255,0.42); text-shadow:0 0 12px rgba(0,255,255,0.5); }
  body.bktouch #bkpad { display:flex; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="bkpad" aria-hidden="true"><span>◀</span><span>▶</span></div>
<div id="hud" class="gamekit-hud">
  <div class="stat"><span class="lbl" id="lblScore">SCORE</span><span class="val" id="scoreEl">0</span></div>
  <div class="stat"><span class="lbl" id="lblBest">BEST</span><span class="val" id="bestEl">0</span></div>
  <div class="stat"><span class="lbl" id="lblLives">LIVES</span><span class="hrt" id="livesEl">♥♥♥</span></div>
  <div class="stat"><span class="lbl" id="lblLevel">LEVEL</span><span class="val" id="levelEl">1</span></div>
  <div class="stat" style="opacity:.75"><span class="lbl" id="lblMode">MODE</span><span class="val" id="modeEl">CLASSIC</span></div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const KIT = window.gamekit;

  // ---- Audio (game-kit shared engine + global mute) ----
  const SND = window.gamekit.sound;
  SND.define({
    bounce: (c) => c.voice({ f: 520, dur: 0.05, type: 'triangle', gain: 0.13, filter: 'bandpass', cutoff: 1400, q: 3 }),
    break: (c) => { c.voice({ f: 740, slideTo: 1180, dur: 0.09, type: 'square', gain: 0.11, filter: 'highpass', cutoff: 500, reverb: 0.14 }); c.noiseHit({ dur: 0.06, gain: 0.07, filter: 'highpass', cutoff: 3000 }); },
    launch: (c) => c.voice({ f: 220, slideTo: 340, dur: 0.12, type: 'triangle', gain: 0.1, filter: 'lowpass', cutoff: 1600 }),
    power: (c) => { [440, 660, 990].forEach((f, i) => c.voice({ f, dur: 0.12, type: 'triangle', gain: 0.1, reverb: 0.2, t: c.now() + i * 0.05 })); },
  });


  // ---- Config ----
  const PADDLE_H = 14, BALL_R = 7;
  const BRICK_ROWS = 10, BRICK_COLS = 18, BRICK_GAP = 3;
  const LIVES_START = 3;
  const MIN_VY = 1.95;
  const ENDLESS_ROW_INTERVAL = 420;
  const SURVIVAL_DESCENT_RATE = 0.04;

  const MODE_DESCS = {
    classic: 'Level progression — clear all bricks',
    endless: 'Endless rows descend — score as long as you survive',
    survival: 'The wall descends — clear it before it reaches your paddle',
  };

  // ---- State ----
  let W, H, paddleW, paddleX, brickW, brickH, brickOffX, brickOffY, topMargin = 44;
  let dpr = 1, bgCache = null, brickSprites = null; // prerendered static layers (see buildStaticLayers)
  let state = 'ready'; // ready | playing | over
  let score = 0, best = 0, lives = LIVES_START, level = 1;
  let balls = [], bricks = [], particles = [], powerups = [], trail = [];
  let ballStuck = true;
  let shakeFrames = 0;
  let paddleTarget = 0;
  let widePaddle = 0, slowBall = 0; // power-up timers (frames remaining)
  let gameMode = 'classic';
  let endlessTimer = 0;
  let survivalOffset = 0;
  let speedMult = 1; // 1 = normal, 2 = "2× speed" (sub-steps update() so collisions stay exact)

  const SPEED_KEY = 'breakout_speed2x';
  function loadSpeedPref() { try { return localStorage.getItem(SPEED_KEY) === '1'; } catch(_){ return false; } }
  function saveSpeedPref(on) { try { localStorage.setItem(SPEED_KEY, on ? '1' : '0'); } catch(_){} }

  const modeLabel = m => { m = m || gameMode; return m.charAt(0).toUpperCase() + m.slice(1); };
  // Display-only: translate a mode label at render time. NEVER feed this to saveBest/bestScore/
  // record.mode — those stay on the English modeLabel (the storage key).
  const modeDisplay = m => KIT ? KIT.t('game.breakout.mode' + modeLabel(m), { def: modeLabel(m) }) : modeLabel(m);
  function loadBest(mode) { return KIT ? KIT.bestScore('breakout', modeLabel(mode)) : 0; }
  function saveBest() { if (KIT) KIT.saveBest('breakout', modeLabel(gameMode), { score: score }); }

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    dpr = KIT.fitCanvas(canvas, W, H).dpr; // retina-sharp backing store; drawing stays in CSS px
    // Reserve headroom so the playfield clears the shared center-top .gamekit-hud pill.
    // Landscape: pill at top:8px → ~48px (kit hudTop). Narrow: the 5-stat pill drops to top:50px
    // and wraps to two rows, so it needs more than the kit's 92 or the top bricks tuck under it.
    topMargin = KIT.layout.narrow ? 128 : KIT.layout.hudTop();
    brickW = Math.floor((W - BRICK_GAP * (BRICK_COLS + 1)) / BRICK_COLS);
    brickOffX = Math.floor((W - (brickW + BRICK_GAP) * BRICK_COLS + BRICK_GAP) / 2);
    brickOffY = topMargin + 12;
    // Cap brick height so the whole row block fills at most ~half the space above the paddle —
    // guarantees a reaction gap below the lowest brick in BOTH orientations (esp. short/landscape).
    const spaceAbovePaddle = (H - 60 - PADDLE_H) - brickOffY;
    const maxBlock = Math.max(60, spaceAbovePaddle * 0.5);
    brickH = Math.max(6, Math.min(Math.floor(brickW * 0.32), Math.floor(maxBlock / BRICK_ROWS) - BRICK_GAP));
    paddleW = Math.floor(W * 0.14);
    if (!paddleX) paddleX = W / 2;
    buildStaticLayers();
  }
  window.gamekit.layout.on(() => { resize(); if (ballStuck && balls.length) snapBallToPaddle(); }); // + orientationchange/visualViewport
  if (typeof window.matchMedia !== 'undefined') { /* guard */ }

  // ---- Brick grid ----
  const BRICK_COLORS = [
    '#ff2d78', '#ff6b35', '#ffd23f', '#00e5ff', '#b14fff', '#39ff14',
  ];
  function buildLevel() {
    bricks = [];
    if (gameMode === 'survival') survivalOffset = 0;
    for (let r = 0; r < BRICK_ROWS; r++) {
      for (let c = 0; c < BRICK_COLS; c++) {
        const hp = (level >= 3 && r < 2) ? 2 : 1;
        bricks.push({ r, c, hp, maxHp: hp });
      }
    }
  }

  function brickRect(b) {
    return {
      x: brickOffX + b.c * (brickW + BRICK_GAP),
      y: brickOffY + b.r * (brickH + BRICK_GAP) + Math.round(survivalOffset),
      w: brickW, h: brickH,
    };
  }

  // ---- Ball helpers ----
  function paddleY() { return H - 60; }
  function snapBallToPaddle() {
    if (balls.length) { balls[0].x = paddleX; balls[0].y = paddleY() - BALL_R - PADDLE_H / 2; }
  }

  function makeBall(x, y, speed) {
    const spd = speed || (5.85 + level * 0.65);
    const ang = -Math.PI / 2 + (Math.random() - 0.5) * 0.4;
    return { x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd };
  }

  // ---- Power-ups ----
  function dropPowerup(bx, by) {
    if (Math.random() > 0.35) return;
    // 'multi' gets rarer the more balls are already in play so it can't snowball
    // (common when solo to reward going multi; ~0 once it's already a swarm).
    const n = balls.length;
    const multiW = n <= 1 ? 2.5 : n <= 3 ? 1.4 : n <= 6 ? 0.6 : n <= 12 ? 0.2 : 0;
    const weights = [['wide', 1], ['slow', 1], ['multi', multiW]];
    const total = weights.reduce((s, w) => s + w[1], 0);
    let r = Math.random() * total, type = 'wide';
    for (const [t, w] of weights) { if ((r -= w) <= 0) { type = t; break; } }
    powerups.push({ x: bx, y: by, type, vy: 2.5 });
  }

  function applyPowerup(p) {
    SND.play('power');
    if (p.type === 'wide') widePaddle = 480;
    else if (p.type === 'slow') slowBall = 360;
    else if (p.type === 'multi') {
      const MAX_BALLS = 20; // safety cap so a late multi can't annihilate the board
      const room = MAX_BALLS - balls.length;
      if (room <= 0) return;
      const extra = [];
      for (const b of balls) {
        if (extra.length >= room) break;
        const ang = Math.atan2(b.vy, b.vx), spd = Math.hypot(b.vx, b.vy);
        extra.push({ ...b, vx: Math.cos(ang + 0.4) * spd, vy: Math.sin(ang + 0.4) * spd });
      }
      balls.push(...extra);
    }
  }

  // ---- Particles ----
  function spawnParticles(x, y, col) {
    for (let i = 0; i < 10; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 1.5 + Math.random() * 3;
      particles.push({ x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, life: 1, col });
    }
  }

  // ---- Init / reset ----
  function reset() {
    score = 0; lives = LIVES_START; level = 1; ballStuck = true;
    widePaddle = 0; slowBall = 0;
    particles = []; powerups = []; trail = [];
    endlessTimer = 0; survivalOffset = 0;
    balls = [{ x: paddleX, y: paddleY() - BALL_R - PADDLE_H / 2, vx: 0, vy: 0 }];
    best = loadBest(gameMode);
    buildLevel();
    updateHud();
  }

  function startGame() {
    reset();
    state = 'playing';
    if (KIT) { KIT.menu.hide(); KIT.showMenuButton(true); KIT.showPauseButton(true); }
    updateHud();
  }

  function startMode(mode) {
    gameMode = mode || 'classic';
    startGame();
  }

  function launch() {
    if (!ballStuck || state !== 'playing') return;
    ballStuck = false;
    const spd = 5.85 + level * 0.65;
    balls[0].vx = (Math.random() - 0.5) * spd * 0.6;
    balls[0].vy = -spd;
    SND.play('launch');
  }

  function nextLevel() {
    level++;
    ballStuck = true;
    widePaddle = 0; slowBall = 0;
    powerups = []; particles = []; trail = [];
    if (gameMode === 'survival') survivalOffset = 0;
    balls = [{ x: paddleX, y: paddleY() - BALL_R - PADDLE_H / 2, vx: 0, vy: 0 }];
    buildLevel();
    SND.play('levelup');
    updateHud();
  }

  function loseLife() {
    SND.play('lose');
    lives--;
    updateHud();
    if (lives <= 0) {
      state = 'over';
      saveBest();
      best = loadBest(gameMode);
      showEnd();
    } else {
      ballStuck = true;
      balls = [{ x: paddleX, y: paddleY() - BALL_R - PADDLE_H / 2, vx: 0, vy: 0 }];
      powerups = []; widePaddle = 0; slowBall = 0;
    }
  }

  // ---- shared menus (gamekit.menu) — synthwave theme + a neon perspective-grid backdrop ----
  const MENU_THEME = { accent: '#ff5cc8', glow: '0 0 20px rgba(255,92,200,0.5)', bg: 'rgba(20,8,30,0.72)',
    border: 'rgba(255,92,200,0.35)', overlay: 'rgba(10,0,16,0.6)', title: '#ff8fd8', new: '#ffd23f', 'on-accent': '#180a1e', 'accent-soft': 'rgba(255,92,200,0.2)' };
  function menuBackdrop(g, w, h) {
    g.fillStyle = '#0a0010'; g.fillRect(0, 0, w, h);
    const lg = g.createLinearGradient(0, 0, 0, h); lg.addColorStop(0, 'rgba(10,0,16,1)'); lg.addColorStop(.6, 'rgba(40,0,40,.5)'); lg.addColorStop(1, 'rgba(80,10,60,.4)'); g.fillStyle = lg; g.fillRect(0, 0, w, h);
    const hz = h * .5, mx = w / 2; g.strokeStyle = 'rgba(255,60,220,.34)'; g.lineWidth = 1;
    for (let i = 1; i <= 18; i++) { const y = hz + (i * i) * ((h - hz) / 300); if (y > h) break; g.beginPath(); g.moveTo(0, y); g.lineTo(w, y); g.stroke(); }
    for (let v = -10; v <= 10; v++) { g.beginPath(); g.moveTo(mx + v * 18, hz); g.lineTo(mx + v * 170, h); g.stroke(); }
    const pal = ['#ff2d78', '#ff6b35', '#ffd23f', '#00e5ff', '#b14fff', '#39ff14'], cols = 12, bw = w / cols;
    g.save(); g.globalAlpha = .5; for (let r = 0; r < 4; r++) for (let c = 0; c < cols; c++) { g.fillStyle = pal[r % 6]; g.shadowColor = pal[r % 6]; g.shadowBlur = 9; g.fillRect(c * bw + 2, 14 + r * 15, bw - 4, 9); } g.restore();
  }
  function pvBrick(g, w, h, rows) { g.fillStyle = '#0a0010'; g.fillRect(0, 0, w, h); const cols = 6, bw = w / cols;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) { g.fillStyle = ['#ff2d78', '#ff6b35', '#ffd23f', '#00e5ff'][r % 4]; g.fillRect(c * bw + 2, 10 + r * 11, bw - 4, 8); }
    g.fillStyle = '#00ffff'; g.fillRect(w / 2 - 14, h - 10, 28, 5); g.beginPath(); g.arc(w / 2, h - 20, 4, 0, 7); g.fill(); }
  function setSpeed(on) { speedMult = on ? 2 : 1; saveSpeedPref(!!on); }
  const modeParams = st => (st.speed2x ? { mode: st.mode, speed2x: '1' } : { mode: st.mode });
  function showStartMenu() {
    state = 'ready'; if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if (!KIT) return;
    KIT.menu.show({ kind: 'start', theme: MENU_THEME, title: KIT.t('game.breakout.menuTitle', { def: 'BRICK BREAKER' }), backdrop: menuBackdrop,
      groups: [{ id: 'mode', label: KIT.t('game.common.modeLabel', { def: 'MODE' }), style: 'cards', default: gameMode, choices: [
        { id: 'classic', label: modeDisplay('classic'), mech: [KIT.t('game.breakout.mechLevels', { def: 'Levels' }), KIT.t('game.breakout.mechClearAdvance', { def: 'Clear to advance' })], best: () => loadBest('classic'), preview: (g, w, h) => pvBrick(g, w, h, 3) },
        { id: 'endless', label: modeDisplay('endless'), mech: [KIT.t('game.breakout.mechRowsDrop', { def: 'Rows drop in' }), KIT.t('game.breakout.mechScoreChase', { def: 'Score chase' })], best: () => loadBest('endless'), preview: (g, w, h) => pvBrick(g, w, h, 4) },
        { id: 'survival', label: modeDisplay('survival'), mech: [KIT.t('game.breakout.mechWallDescends', { def: 'Wall descends' }), KIT.t('game.breakout.mechBeatBack', { def: 'Beat it back' })], best: () => loadBest('survival'), preview: (g, w, h) => pvBrick(g, w, h, 5) },
      ] }],
      toggles: [{ id: 'speed2x', label: KIT.t('game.breakout.speed2x', { def: '2× speed' }), caption: KIT.t('game.breakout.speed2xCaption', { def: 'faster ball & paddle' }), default: loadSpeedPref() }],
      actions: [{ id: 'play', label: KIT.t('game.breakout.insertCoin', { def: 'INSERT COIN' }), primary: true }],
      hint: st => { const d = MODE_DESCS[st.mode]; return d ? KIT.t('game.breakout.desc' + modeLabel(st.mode), { def: d }) : ''; },
      onChange: st => { gameMode = st.mode; setSpeed(st.speed2x); KIT.stampUrl(modeParams(st)); },
      onPlay: st => { gameMode = st.mode; setSpeed(st.speed2x); KIT.stampUrl(modeParams(st)); startMode(st.mode); },
    });
    KIT.stampUrl(modeParams({ mode: gameMode, speed2x: speedMult === 2 }));
  }
  function shareMsg() { return KIT.shareText({ score: score, game: KIT.t('game.breakout.title', { def: 'Brick Breaker' }), emoji: '🧱', mode: gameMode.charAt(0).toUpperCase() + gameMode.slice(1), extra: ['level ' + level] }); }
  function showEnd() {
    if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if (!KIT) return;
    KIT.menu.show({ kind: 'end', theme: MENU_THEME, title: KIT.t('game.breakout.gameOver', { def: 'GAME OVER' }), backdrop: menuBackdrop,
      record: { slug: 'breakout', mode: modeLabel(gameMode), score: score },
      score: score, best: best, newBest: score >= best && score > 0, lines: [KIT.t('game.breakout.endLine', { mode: gameMode.toUpperCase(), level: level, def: gameMode.toUpperCase() + ' · level ' + level })],
      share: { slug: 'breakout', accent: '#ff5cc8', icon: '🧱', title: KIT.t('game.breakout.title', { def: 'Brick Breaker' }), message: () => shareMsg(), params: () => modeParams({ mode: gameMode, speed2x: speedMult === 2 }) },
      actions: [ { id: 'again', label: KIT.t('game.common.playAgain', { def: 'PLAY AGAIN' }), primary: true }, { id: 'menu', label: KIT.t('game.common.menu', { def: 'MENU' }) } ],
      onAction: id => { if (id === 'again') startMode(gameMode); else if (id === 'menu') toMenu(); } });
  }
  function pauseGame() { if (state !== 'playing' || !KIT) return; state = 'paused';
    KIT.menu.show({ kind: 'pause', theme: MENU_THEME, title: KIT.t('game.common.paused', { def: 'PAUSED' }), lines: [KIT.t('game.breakout.pauseLine', { score: score, level: level, def: 'Score ' + score + ' · level ' + level })],
      actions: [ { id: 'resume', label: KIT.t('game.common.resume', { def: 'RESUME (ESC)' }), primary: true }, { id: 'menu', label: KIT.t('game.common.quitToMenu', { def: 'QUIT TO MENU' }), danger: true } ],
      onAction: id => { if (id === 'resume') resumeGame(); else if (id === 'menu') toMenu(); }, onEsc: resumeGame });
  }
  function resumeGame() { if (state !== 'paused') return; state = 'playing'; if (KIT) KIT.menu.hide(); }
  function toMenu() { saveBest(); if (KIT) KIT.menu.hide(); showStartMenu(); }

  function updateHud() {
    document.getElementById('scoreEl').textContent = score;
    document.getElementById('bestEl').textContent = best;
    document.getElementById('livesEl').textContent = '♥'.repeat(Math.max(0, lives));
    document.getElementById('levelEl').textContent = level;
    document.getElementById('modeEl').textContent = modeDisplay(gameMode) + (speedMult === 2 ? ' · 2×' : '');
  }

  // Static HUD labels (set once from i18n; def keeps them byte-identical until translations land).
  function i18nHudLabels() {
    if (!KIT) return;
    const set = (id, key, def) => { const e = document.getElementById(id); if (e) e.textContent = KIT.t(key, { def }); };
    set('lblScore', 'game.breakout.hudScore', 'SCORE');
    set('lblBest', 'game.common.best', 'BEST');
    set('lblLives', 'game.breakout.hudLives', 'LIVES');
    set('lblLevel', 'game.breakout.hudLevel', 'LEVEL');
    set('lblMode', 'game.common.modeLabel', 'MODE');
  }

  // ---- Collision ----
  function ballBrickCollide(b) {
    for (let i = bricks.length - 1; i >= 0; i--) {
      const br = brickRect(bricks[i]);
      const bx = br.x, by = br.y, bw = br.w, bh = br.h;
      // find closest point on brick to ball
      const cx = Math.max(bx, Math.min(b.x, bx + bw));
      const cy = Math.max(by, Math.min(b.y, by + bh));
      const dx = b.x - cx, dy = b.y - cy;
      if (dx * dx + dy * dy < BALL_R * BALL_R) {
        // determine collision axis
        const overlapX = (bw / 2) - Math.abs(b.x - (bx + bw / 2));
        const overlapY = (bh / 2) - Math.abs(b.y - (by + bh / 2));
        if (overlapX < overlapY) b.vx = -b.vx;
        else { b.vy = -b.vy; if (Math.abs(b.vy) < MIN_VY) b.vy = b.vy < 0 ? -MIN_VY : MIN_VY; }

        const bk = bricks[i];
        bk.hp--;
        if (bk.hp <= 0) {
          const col = BRICK_COLORS[bk.r % BRICK_COLORS.length];
          spawnParticles(bx + bw / 2, by + bh / 2, col);
          dropPowerup(bx + bw / 2, by + bh / 2);
          bricks.splice(i, 1);
          score += 10 * level;
          if (score > best) { best = score; saveBest(); }
          shakeFrames = 4;
          SND.play('break');
        } else {
          SND.play('bounce');
        }
        updateHud();
        return;
      }
    }
  }

  // ---- Physics update ----
  function update() {
    if (state !== 'playing') return;

    // Endless: spawn new top row periodically
    if (gameMode === 'endless' && !ballStuck) {
      endlessTimer++;
      if (endlessTimer >= ENDLESS_ROW_INTERVAL) {
        endlessTimer = 0;
        for (const b of bricks) b.r++;
        for (let c = 0; c < BRICK_COLS; c++) {
          bricks.push({ r: 0, c, hp: 1, maxHp: 1 });
        }
      }
      // descending bricks reaching the paddle line end the run (mirrors Survival)
      const py = paddleY();
      for (const b of bricks) {
        const { y, h } = brickRect(b);
        if (y + h >= py) {
          lives = 0;
          loseLife();
          return;
        }
      }
    }

    // Survival: descend wall
    if (gameMode === 'survival' && !ballStuck) {
      survivalOffset += SURVIVAL_DESCENT_RATE * (1 + level * 0.1);
      const py = paddleY();
      for (const b of bricks) {
        const { y, h } = brickRect(b);
        if (y + h >= py) {
          lives = 0;
          loseLife();
          return;
        }
      }
    }

    // paddle — pinned to center until the ball is launched, then follows input
    const pw = widePaddle > 0 ? paddleW * 1.6 : paddleW;
    const halfPW = pw / 2;
    if (ballStuck) paddleX = paddleTarget = W / 2;
    else paddleX += (paddleTarget - paddleX) * 0.25;
    paddleX = Math.max(halfPW, Math.min(W - halfPW, paddleX));

    if (ballStuck) { snapBallToPaddle(); return; }

    if (widePaddle > 0) widePaddle--;
    if (slowBall > 0) slowBall--;

    const slowFactor = slowBall > 0 ? 0.55 : 1;

    // power-ups fall
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.y += p.vy;
      const py = paddleY();
      if (p.y + 8 >= py && p.y - 8 <= py + PADDLE_H && p.x >= paddleX - halfPW && p.x <= paddleX + halfPW) {
        applyPowerup(p); powerups.splice(i, 1);
      } else if (p.y > H) { powerups.splice(i, 1); }
    }

    // balls
    for (let bi = balls.length - 1; bi >= 0; bi--) {
      const b = balls[bi];
      b.x += b.vx * slowFactor;
      b.y += b.vy * slowFactor;

      // trail
      trail.push({ x: b.x, y: b.y, life: 1 });

      // walls
      if (b.x - BALL_R < 0) { b.x = BALL_R; b.vx = Math.abs(b.vx); SND.play('bounce'); }
      if (b.x + BALL_R > W) { b.x = W - BALL_R; b.vx = -Math.abs(b.vx); SND.play('bounce'); }
      if (b.y - BALL_R < topMargin) { b.y = topMargin + BALL_R; b.vy = Math.abs(b.vy); SND.play('bounce'); }

      // paddle collision
      const py = paddleY();
      if (b.vy > 0 && b.y + BALL_R >= py && b.y - BALL_R <= py + PADDLE_H &&
          b.x >= paddleX - halfPW - BALL_R && b.x <= paddleX + halfPW + BALL_R) {
        const rel = (b.x - paddleX) / halfPW; // -1 to 1
        const ang = rel * 1.1; // max ~63 deg
        const spd = Math.hypot(b.vx, b.vy);
        b.vx = Math.sin(ang) * spd;
        b.vy = -Math.max(Math.abs(Math.cos(ang) * spd), MIN_VY);
        b.y = py - BALL_R;
        SND.play('bounce');
      }

      // bricks
      ballBrickCollide(b);

      // lost
      if (b.y - BALL_R > H) {
        balls.splice(bi, 1);
        if (balls.length === 0) { loseLife(); return; }
      }
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.05;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // trail fade (cap length so many balls can't grow an unbounded cloud)
    if (trail.length > 120) trail.splice(0, trail.length - 120);
    for (let i = trail.length - 1; i >= 0; i--) {
      trail[i].life -= 0.08;
      if (trail[i].life <= 0) trail.splice(i, 1);
    }

    if (shakeFrames > 0) shakeFrames--;

    // level clear
    if (bricks.length === 0) nextLevel();
  }

  // ---- Render ----
  // paints the full static backdrop (bg + sunset + neon grid + scanlines + HUD glow strip) into g
  function paintBackdrop(g) {
    g.fillStyle = '#0a0010';
    g.fillRect(0, 0, W, H);
    const sg = g.createLinearGradient(0, 0, 0, H * 0.5);
    sg.addColorStop(0, 'rgba(10,0,16,1)');
    sg.addColorStop(0.6, 'rgba(40,0,40,0.6)');
    sg.addColorStop(1, 'rgba(80,10,60,0.5)');
    g.fillStyle = sg;
    g.fillRect(0, 0, W, H * 0.5);
    const lines = 20;
    g.save();
    // horizon gradient
    const gy = Math.round(H * 0.5);
    const gr = g.createLinearGradient(0, gy, 0, H);
    gr.addColorStop(0, 'rgba(255,0,255,0)');
    gr.addColorStop(0.5, 'rgba(255,0,255,0.08)');
    gr.addColorStop(1, 'rgba(255,0,255,0.22)');
    g.fillStyle = gr;
    g.fillRect(0, gy, W, H - gy);

    // perspective grid lines (horizontal)
    g.strokeStyle = 'rgba(255,0,255,0.25)';
    g.lineWidth = 1;
    for (let i = 0; i <= lines; i++) {
      const t = i / lines;
      const yt = gy + (H - gy) * t;
      g.globalAlpha = t * 0.7;
      g.beginPath(); g.moveTo(0, yt); g.lineTo(W, yt); g.stroke();
    }
    // vertical lines converging to horizon center
    const cx2 = W / 2;
    g.globalAlpha = 0.18;
    for (let i = -10; i <= 10; i++) {
      const bx = cx2 + i * (W / 10);
      g.beginPath(); g.moveTo(cx2, gy); g.lineTo(bx, H); g.stroke();
    }
    g.globalAlpha = 1;
    g.restore();

    // scanlines
    g.save();
    g.globalAlpha = 0.03;
    g.fillStyle = '#000';
    for (let y = 0; y < H; y += 4) { g.fillRect(0, y, W, 2); }
    g.globalAlpha = 1;
    g.restore();
    // subtle glow strip at the playfield top edge, matching the HUD bottom border
    g.save();
    g.globalAlpha = 0.15;
    g.fillStyle = '#ff00ff';
    g.fillRect(0, topMargin - 1, W, 1);
    g.restore();
  }

  // Prerender the backdrop + one glowing brick sprite per color (fresh + damaged) at the canvas
  // dpr — per-frame shadowBlur on ~60 bricks plus ~200 scanline fills ate the whole frame budget
  // on hi-dpi screens. Rebuilt on every resize; falls back to live painting headless (mock ctx).
  const SPR_PAD = 14; // room around a brick for its glow
  function buildStaticLayers() {
    bgCache = null; brickSprites = null;
    try {
      const bg = document.createElement('canvas');
      bg.width = Math.max(1, Math.round(W * dpr)); bg.height = Math.max(1, Math.round(H * dpr));
      const g = bg.getContext('2d');
      g.setTransform(dpr, 0, 0, dpr, 0, 0);
      paintBackdrop(g);
      const spr = { ok: [], dmg: [] };
      for (let i = 0; i < BRICK_COLORS.length; i++) {
        const col = BRICK_COLORS[i];
        for (const dmg of [false, true]) {
          const c = document.createElement('canvas');
          c.width = Math.max(1, Math.round((brickW + SPR_PAD * 2) * dpr));
          c.height = Math.max(1, Math.round((brickH + SPR_PAD * 2) * dpr));
          const s = c.getContext('2d');
          s.setTransform(dpr, 0, 0, dpr, 0, 0);
          s.shadowColor = col;
          s.shadowBlur = 12;
          s.fillStyle = dmg ? '#442222' : col;
          s.fillRect(SPR_PAD + 1, SPR_PAD + 1, brickW - 2, brickH - 2);
          s.strokeStyle = col;
          s.lineWidth = 1.5;
          s.strokeRect(SPR_PAD + 1, SPR_PAD + 1, brickW - 2, brickH - 2);
          (dmg ? spr.dmg : spr.ok)[i] = c;
        }
      }
      bgCache = bg; brickSprites = spr;
    } catch (e) { bgCache = null; brickSprites = null; }
  }

  function drawBricks() {
    for (const b of bricks) {
      const { x, y, w, h } = brickRect(b);
      const ci = b.r % BRICK_COLORS.length;
      const dmg = b.maxHp > 1 && b.hp < b.maxHp;
      const spr = brickSprites && (dmg ? brickSprites.dmg : brickSprites.ok)[ci];
      if (spr) {
        ctx.drawImage(spr, x - SPR_PAD, y - SPR_PAD, w + SPR_PAD * 2, h + SPR_PAD * 2);
      } else {
        const col = BRICK_COLORS[ci];
        ctx.shadowColor = col;
        ctx.shadowBlur = 12;
        ctx.fillStyle = dmg ? '#442222' : col;
        ctx.fillRect(x + 1, y + 1, w - 2, h - 2);
        ctx.strokeStyle = col;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
        ctx.shadowBlur = 0;
      }
      // HP cracks
      if (dmg) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x + w * 0.3, y + 2); ctx.lineTo(x + w * 0.6, y + h - 2);
        ctx.moveTo(x + w * 0.7, y + 2); ctx.lineTo(x + w * 0.45, y + h - 2);
        ctx.stroke();
      }
    }
  }

  // ---- cosmetics: paddle + ball skins (selection/purchases in the shared kit store) ----
  const PADDLE_SKINS = {
    'breakout.paddle.synthwave': { stops: ['#00ffff', '#0088aa'], glow: '#00ffff' },
    'breakout.paddle.wood':      { stops: ['#d09a5c', '#8a5a30'], glow: 'rgba(160,110,60,0.5)' },
    'breakout.paddle.ice':       { stops: ['#e8fbff', '#9fd8f0'], glow: '#bfeaff' },
    'breakout.paddle.lava':      { stops: ['#ffd166', '#ff5a2a'], glow: '#ff7a3c' },
    'breakout.paddle.chrome':    { stops: ['#f4f8ff', '#8a97ad', '#e8eef8'], glow: '#cfd8e8' },
  };
  const BALL_SKINS = {
    'breakout.ball.neon':   { trail: '#ff3df0', halo: '#00e6ff', body: '#00ffff', core: '#eaffff' },
    'breakout.ball.eight':  { trail: 'rgba(200,210,230,0.8)', halo: '#8a97ad', body: '#15161c', core: '#15161c', eight: true },
    'breakout.ball.comet':  { trail: '#ff9a3c', halo: '#ff7a3c', body: '#ffb03a', core: '#fff2d0' },
    'breakout.ball.disco':  { trail: '#ff7ab6', halo: '#b98cff', body: 'disco', core: '#ffffff' },
    'breakout.ball.plasma': { trail: '#b98cff', halo: '#7a4dff', body: '#b98cff', core: '#f0e8ff' },
  };
  function skinOf(map, set, fallback) {
    const id = KIT.cosmetics && KIT.cosmetics.selected(set);
    return map[id] || map[fallback];
  }

  function drawPaddle() {
    const pw = widePaddle > 0 ? paddleW * 1.6 : paddleW;
    const py = paddleY();
    const sk = skinOf(PADDLE_SKINS, 'breakout.paddle', 'breakout.paddle.synthwave');
    ctx.save();
    ctx.shadowColor = sk.glow;
    ctx.shadowBlur = 18;
    const gr = ctx.createLinearGradient(paddleX - pw / 2, py, paddleX + pw / 2, py + PADDLE_H);
    sk.stops.forEach((c, i) => gr.addColorStop(i / (sk.stops.length - 1), c));
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.roundRect(paddleX - pw / 2, py, pw, PADDLE_H, 6); // kit installs the polyfill
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawBalls() {
    const sk = skinOf(BALL_SKINS, 'breakout.ball', 'breakout.ball.neon');
    // 'disco' cycles hue continuously; every other skin is a fixed colour set
    const body = sk.body === 'disco' ? 'hsl(' + (((typeof performance !== 'undefined' && performance.now) ? performance.now() : 0) * 0.12 % 360) + ',100%,62%)' : sk.body;
    // trail — cheap additive glow. NO shadowBlur: with many balls this loop is the
    // main multiball perf cost (each blurred arc is far more expensive than a plain one).
    ctx.fillStyle = sk.body === 'disco' ? body : sk.trail;
    for (const t of trail) {
      ctx.globalAlpha = t.life * 0.30;
      ctx.beginPath(); ctx.arc(t.x, t.y, BALL_R * t.life * 0.8, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // balls — layered halo/body/core instead of a per-frame radial gradient + shadowBlur
    for (const b of balls) {
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = sk.halo;
      ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R * 1.9, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = body;
      ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2); ctx.fill();
      if (sk.eight) { // 8-ball: white badge + the number instead of the shine dot
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R * 0.48, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#15161c'; ctx.font = 'bold ' + Math.round(BALL_R * 0.75) + 'px "Courier New"';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('8', b.x, b.y + 0.5);
      } else {
        ctx.fillStyle = sk.core;
        ctx.beginPath(); ctx.arc(b.x - 1, b.y - 1, BALL_R * 0.5, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.col;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  function drawPowerups() {
    const symbols = { wide: '⟺', slow: '◈', multi: '⊕' };
    const cols = { wide: '#00ffff', slow: '#ffd23f', multi: '#ff00ff' };
    for (const p of powerups) {
      ctx.save();
      ctx.font = 'bold 14px "Courier New"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = cols[p.type] || '#fff';
      ctx.shadowColor = cols[p.type] || '#fff';
      ctx.shadowBlur = 10;
      ctx.fillText(symbols[p.type] || '?', p.x, p.y);
      ctx.restore();
    }
  }

  function render() {
    const shake = shakeFrames > 0 ? (Math.random() * 4 - 2) : 0;
    ctx.save();
    if (shake) ctx.translate(shake, shake * 0.5);

    if (bgCache) ctx.drawImage(bgCache, 0, 0, W, H);
    else paintBackdrop(ctx);

    drawBricks();
    drawPowerups();
    drawParticles();
    drawBalls();
    drawPaddle();
    ctx.restore();
  }

  // ---- Input ----
  // Touch: HOLD a screen half to move — press/hold the LEFT half to slide the paddle left, the
  // RIGHT half to slide right (drag your thumb across the middle to switch). Mouse / pen stay
  // ABSOLUTE (paddle follows the cursor) so desktop aiming is unchanged.
  let holdDir = 0, touchId = null;
  function markTouch() { if (document.body) document.body.classList.add('bktouch'); }
  if ((typeof matchMedia !== 'undefined' && matchMedia('(pointer:coarse)').matches)
    || (typeof window !== 'undefined' && 'ontouchstart' in window)
    || (typeof navigator !== 'undefined' && (navigator.maxTouchPoints || 0) > 0)) markTouch();
  function cx(e, r) { return (e.clientX - r.left) * (W / r.width); }
  function sideDir(e, r) { return cx(e, r) < W / 2 ? -1 : 1; }
  canvas.addEventListener('pointermove', e => {
    const r = canvas.getBoundingClientRect();
    if (e.pointerType === 'touch') { if (touchId === e.pointerId) holdDir = sideDir(e, r); }
    else paddleTarget = cx(e, r);
  });
  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    if (e.pointerType === 'touch') { markTouch(); touchId = e.pointerId; holdDir = sideDir(e, r); }
    else paddleTarget = cx(e, r);
    if (state === 'playing') launch();
  });
  const relTouch = e => { if (e.pointerType === 'touch' && e.pointerId === touchId) { touchId = null; holdDir = 0; } };
  canvas.addEventListener('pointerup', relTouch);
  canvas.addEventListener('pointercancel', relTouch);

  // hold arrow key
  const keys = {};
  window.addEventListener('keydown', e => {
    if (state === 'playing') {
      if (e.key === 'Escape') { e.preventDefault(); pauseGame(); }
      else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); launch(); }
    }
    keys[e.key] = true;
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  // ---- top nav (game-kit) ----
  { const pm = KIT && KIT.param && KIT.param('mode'); if (['classic', 'endless', 'survival'].indexOf(pm) >= 0) gameMode = pm; } // deep-link ?mode=
  { const ps = KIT && KIT.param && KIT.param('speed2x'); if (ps === '1') { speedMult = 2; saveSpeedPref(true); } else speedMult = loadSpeedPref() ? 2 : 1; }
  KIT.nav({ slug: 'breakout', music: true, home: '../../', theme: MENU_THEME, onMenu: () => toMenu(),
    onPause: () => { if (state === 'playing') pauseGame(); else if (state === 'paused') resumeGame(); },
    confirmLeave: () => (state === 'playing' || state === 'paused') ? KIT.t('confirm.leave', { def: "Leave this run? You'll lose your progress." }) : false,
    controls: { title: KIT.t('game.breakout.controlsTitle', { def: 'Brick Breaker — Controls' }),
      mouse: [ [KIT.t('game.breakout.ctrlMove', { def: 'Move' }), KIT.t('game.breakout.ctrlSlidePaddle', { def: 'Slide paddle' })], [KIT.t('game.common.click', { def: 'Click' }), KIT.t('game.breakout.ctrlLaunch', { def: 'Launch' })] ],
      keyboard: [ ['← →', KIT.t('game.breakout.ctrlMovePaddle', { def: 'Move paddle' })], [KIT.t('game.common.spaceEnter', { def: 'Space · Enter' }), KIT.t('game.breakout.ctrlLaunch', { def: 'Launch' })], [KIT.t('game.common.esc', { def: 'Esc' }), KIT.t('game.common.pause', { def: 'Pause' })] ],
      touch: [ [KIT.t('game.breakout.ctrlHoldSide', { def: 'Hold L / R side' }), KIT.t('game.breakout.ctrlSlidePaddle', { def: 'Slide paddle' })], [KIT.t('game.common.tap', { def: 'Tap' }), KIT.t('game.breakout.ctrlLaunch', { def: 'Launch' })] ] } });
  KIT.music.play('synthwave');

  // ---- Key hold polling ----
  function pollKeys() {
    if (ballStuck) return; // paddle is pinned to center until launch
    const pw = widePaddle > 0 ? paddleW * 1.6 : paddleW;
    const speed = 14;
    let d = 0;
    if (keys['ArrowLeft'] || holdDir < 0) d -= 1;
    if (keys['ArrowRight'] || holdDir > 0) d += 1;
    // keys / held side move the paddle DIRECTLY (snappy; stops the instant you release) — sync the
    // target so the mouse-easing step below is a no-op while holding. Mouse still glides smoothly.
    if (d) { paddleX = Math.max(pw / 2, Math.min(W - pw / 2, paddleX + d * speed)); paddleTarget = paddleX; }
  }

  // Fixed-timestep loop — polls held keys each frame, then advances physics.
  // Frame-rate-INDEPENDENT fixed timestep: physics advances at a constant 60 steps/sec of
  // game-time regardless of the display's refresh rate (60/90/120 Hz). We accumulate real
  // elapsed time and drain it in fixed STEP chunks, calling update() once per chunk; render
  // happens once per frame. 2× speed simply scales accumulated time by speedMult, so it is
  // exactly twice real-time on every screen. update()'s per-step physics is unchanged — only
  // how often the loop calls it. (High-refresh mobile previously ran update() per frame, which
  // made the sim run 1.5–2× too fast; 2× compounded it.)
  const STEP = 1000 / 60;        // ms of game-time per physics step
  const MAX_FRAME = 100;         // clamp dt to avoid spiral-of-death after a tab stall
  let lastT = null, acc = 0;
  function loop2(now) {
    requestAnimationFrame(loop2);
    try {
      pollKeys();
      if (now === undefined) now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
      if (lastT === null) lastT = now;
      let dt = now - lastT;
      lastT = now;
      if (window.gamekit && window.gamekit.isPaused && window.gamekit.isPaused()) { render(); return; } // kit pause (lastT kept fresh → no dt jump)
      if (dt > MAX_FRAME) dt = MAX_FRAME;
      if (dt < 0) dt = 0;
      const mult = state === 'playing' ? speedMult : 1;
      acc += dt * mult;
      while (acc >= STEP) { update(); acc -= STEP; }
      render();
    } catch (e) { if (window.console) console.error(e); }
  }

  // ---- Test hook ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get lives() { return lives; },
    get bricks() { return bricks.length; },
    get ballStuck() { return ballStuck; },
    get level() { return level; },
    get mode() { return gameMode; },
    get survivalOffset() { return survivalOffset; },
    get lowestBrickY() {
      if (!bricks.length) return 0;
      let maxY = 0;
      for (const b of bricks) { const { y, h } = brickRect(b); if (y + h > maxY) maxY = y + h; }
      return maxY;
    },
    get endlessTimer() { return endlessTimer; },
    get speedMult() { return speedMult; },
    // layout snapshot for on-screen / no-overlap tests (px in canvas space)
    get layout() {
      const pw = widePaddle > 0 ? paddleW * 1.6 : paddleW;
      let bt = brickOffY, bb = brickOffY, bl = W, br = 0;
      for (const b of bricks) { const r = brickRect(b); bt = Math.min(bt, r.y); bb = Math.max(bb, r.y + r.h); bl = Math.min(bl, r.x); br = Math.max(br, r.x + r.w); }
      return { W, H, topReserve: topMargin, brickOffY, brickTop: bt, brickBottom: bb,
        brickLeft: bricks.length ? bl : W / 2, brickRight: bricks.length ? br : W / 2,
        paddleY: paddleY(), paddleLeft: paddleX - pw / 2, paddleRight: paddleX + pw / 2 };
    },
    start: startGame,
    startMode,
    launch,
    menu() { return KIT ? KIT.menu.current() : null; },
    best(m) { return loadBest(m); },
    setSpeed(on) { setSpeed(on); },
    setPaddle(x) { paddleX = x; paddleTarget = x; },
    setBall(x, y, vx, vy) {
      if (!balls.length) balls.push({ x, y, vx, vy });
      else { balls[0].x = x; balls[0].y = y; balls[0].vx = vx; balls[0].vy = vy; }
      ballStuck = false;
    },
    addBall(x, y, vx, vy) { balls.push({ x, y, vx, vy }); ballStuck = false; },
    get ballCount() { return balls.length; },
    step(n) { for (let i = 0; i < (n || 1); i++) update(); },
  };

  resize();
  i18nHudLabels();
  updateHud();
  loop2();
  showStartMenu(); // open the shared start menu (mode/speed preselected from ?mode= / ?speed2x=)
})();
  window.gamekit.pwa();
</script>
</body>
</html>
