<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Brick Breaker</title>
<link rel="icon" href="../../favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#ff5cc8">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Brick Breaker">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="../../analytics.js" defer></script>
<style>
  :root { --mg:#ff00ff; --cy:#00ffff; --bg:#0a0010; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:#fff;
    font-family: 'Courier New', Courier, monospace; user-select:none; touch-action:none; }
  #game { display:block; width:100vw; height:100vh; }
  .back { font-family:inherit; font-size:12px; letter-spacing:1px;
    color:#fff; text-decoration:none; background:rgba(0,0,0,0.6); border:1px solid var(--mg);
    border-radius:7px; padding:6px 10px; text-shadow:0 0 8px var(--mg); box-shadow:0 0 8px rgba(255,0,255,0.3);
    cursor:pointer; }
  .nav { position:fixed; top:0; left:10px; height:44px; z-index:9; display:flex; align-items:center; gap:8px; }
  .nav .back { position:static; top:auto; left:auto; }
  #hud { position:fixed; top:0; left:0; right:0; height:44px; z-index:5; display:flex; align-items:center;
    gap:22px; padding:0 14px; padding-left:210px; font-size:14px; letter-spacing:2px;
    background:rgba(10,0,16,0.85); border-bottom:1px solid rgba(255,0,255,0.3); }
  #hud .lbl { opacity:0.5; font-size:10px; letter-spacing:2px; display:block; }
  #hud .val { color:var(--cy); text-shadow:0 0 8px var(--cy); }
  #hud .hrt { color:var(--mg); text-shadow:0 0 8px var(--mg); }
  /* Portrait phones: the nav (‹ Menu / funyo ›) sits on its own row, so drop the HUD
     below it and let the stats wrap to a second line instead of colliding. */
  @media (orientation:portrait) and (max-width:560px) {
    #hud { height:auto; min-height:40px; top:44px; padding:6px 10px; gap:12px 18px; flex-wrap:wrap;
      font-size:12px; letter-spacing:1px; }
    #hud .lbl { font-size:9px; }
  }
  #overlay, #endOverlay { position:fixed; inset:0; z-index:8; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:16px; background:rgba(10,0,16,0.88); padding:24px; }
  #overlay.hidden, #endOverlay.hidden { display:none; }
  #overlay h1, #endOverlay h1 { margin:0; font-size:42px; letter-spacing:6px; color:var(--mg);
    text-shadow:0 0 20px var(--mg), 0 0 40px var(--mg); }
  #overlay p, #endOverlay p { margin:2px; font-size:14px; opacity:0.85; max-width:480px; line-height:1.6; letter-spacing:1px; }
  #overlay .hint, #endOverlay .hint { opacity:0.5; font-size:12px; letter-spacing:1px; }
  #againBtn { font-family:inherit; cursor:pointer; font-size:15px; letter-spacing:3px; padding:11px 28px;
    border-radius:4px; color:#fff; background:transparent; border:2px solid var(--mg);
    text-shadow:0 0 8px var(--mg); box-shadow:0 0 16px rgba(255,0,255,0.4), inset 0 0 16px rgba(255,0,255,0.1); }
  .modeBtn { font-family:inherit; cursor:pointer; font-size:13px; letter-spacing:2px; padding:8px 18px;
    border-radius:4px; color:#fff; background:transparent; border:2px solid rgba(255,0,255,0.4);
    text-shadow:0 0 6px rgba(255,0,255,0.5); }
  .modeBtn.active { border-color:var(--cy); text-shadow:0 0 8px var(--cy); box-shadow:0 0 12px rgba(0,255,255,0.3); }
  .modeBtn .mbest { display:block; font-size:9px; letter-spacing:1px; opacity:0.6; margin-top:3px; }
  .opt { display:flex; align-items:center; gap:8px; font-size:12px; letter-spacing:2px; cursor:pointer;
    color:#fff; opacity:0.85; user-select:none; }
  .opt input { appearance:none; -webkit-appearance:none; width:16px; height:16px; margin:0; cursor:pointer;
    border:2px solid rgba(0,255,255,0.5); border-radius:3px; background:transparent; position:relative; }
  .opt input:checked { background:var(--cy); box-shadow:0 0 8px var(--cy); border-color:var(--cy); }
  #startBtn { font-family:inherit; cursor:pointer; font-size:15px; letter-spacing:3px; padding:11px 28px;
    border-radius:4px; color:#fff; background:transparent; border:2px solid var(--mg);
    text-shadow:0 0 8px var(--mg); box-shadow:0 0 16px rgba(255,0,255,0.4), inset 0 0 16px rgba(255,0,255,0.1); }
  .share { display:flex; gap:9px; justify-content:center; flex-wrap:wrap; align-items:center; margin-top:4px; }
  .share .lbl { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; opacity:0.5; margin-right:2px; }
  .share .sbtn { appearance:none; -webkit-appearance:none; font:inherit; margin:0; line-height:0;
    display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; padding:0;
    cursor:pointer; color:#9fe8ff; background:transparent; border:1px solid rgba(0,255,255,0.4); border-radius:9px;
    text-shadow:0 0 8px var(--cy); transition:color .15s, border-color .15s; }
  .share .sbtn svg { width:18px; height:18px; fill:currentColor; display:block; }
  .share .sbtn:hover { color:#fff; border-color:var(--cy); }
  #shareReddit:hover { color:#ff4500; border-color:#ff4500; }
  #shareCopy.ok { color:#7fe0a0; border-color:#7fe0a0; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="nav">
  <button class="back" id="menuBtn" type="button">&#x2039; Menu</button>
  <a class="back" href="../../">funyo &#x203A;</a>
</div>
<div id="hud">
  <div class="stat"><span class="lbl">SCORE</span><span class="val" id="scoreEl">0</span></div>
  <div class="stat"><span class="lbl">BEST</span><span class="val" id="bestEl">0</span></div>
  <div class="stat"><span class="lbl">LIVES</span><span class="hrt" id="livesEl">♥♥♥</span></div>
  <div class="stat"><span class="lbl">LEVEL</span><span class="val" id="levelEl">1</span></div>
  <div class="stat"><span class="lbl">MODE</span><span class="val" id="modeEl">CLASSIC</span></div>
</div>
<div id="overlay">
  <h1>BRICK BREAKER</h1>
  <p>Destroy all bricks. Catch power-ups. Don't let the ball fall.</p>
  <div id="modeRow" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px;">
    <button class="modeBtn" data-mode="classic" id="modeBtnClassic">CLASSIC<span class="mbest" id="bestClassic">best: 0</span></button>
    <button class="modeBtn" data-mode="endless" id="modeBtnEndless">ENDLESS<span class="mbest" id="bestEndless">best: 0</span></button>
    <button class="modeBtn" data-mode="survival" id="modeBtnSurvival">SURVIVAL<span class="mbest" id="bestSurvival">best: 0</span></button>
  </div>
  <p id="modeDesc" class="hint">Level progression — clear all bricks</p>
  <label class="opt"><input type="checkbox" id="speed2x">2× SPEED</label>
  <p class="hint">Mouse / Touch to move · Click / Space to launch</p>
  <button id="startBtn">INSERT COIN</button>
</div>
<div id="endOverlay" class="hidden">
  <h1>GAME OVER</h1>
  <p>Mode <b id="endMode" style="color:var(--mg)">CLASSIC</b></p>
  <p style="font-size:20px;letter-spacing:2px">Score <b id="endScore" style="color:var(--cy)">0</b></p>
  <p class="hint">Best <b id="endBest" style="color:var(--cy)">0</b></p>
  <button id="againBtn">PLAY AGAIN</button>
  <div class="share">
    <span class="lbl">Share</span>
    <a class="sbtn" id="shareNative" href="#" style="display:none" aria-label="Share…" title="Share…">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg></a>
    <a class="sbtn" id="shareX" target="_blank" rel="noopener" aria-label="Share on X" title="Share on X">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
    <a class="sbtn" id="shareReddit" target="_blank" rel="noopener" aria-label="Share on Reddit" title="Share on Reddit">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12c-.688 0-1.25.561-1.25 1.25 0 .687.562 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg></a>
    <button class="sbtn" id="shareCopy" type="button" aria-label="Copy result" title="Copy result">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg></button>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const endOverlay = document.getElementById('endOverlay');

  // ---- Audio ----
  const SND = (() => {
    let ac;
    function ensure() { if (ac !== undefined) return; const AC = window.AudioContext || window.webkitAudioContext; ac = AC ? new AC() : null; }
    function tone(f, d, type, g, bend) {
      if (!ac) return;
      const o = ac.createOscillator(), v = ac.createGain();
      o.type = type || 'sine'; o.frequency.value = f;
      if (bend) o.frequency.linearRampToValueAtTime(bend, ac.currentTime + d);
      v.gain.value = g || 0.1; v.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + d);
      o.connect(v); v.connect(ac.destination); o.start(); o.stop(ac.currentTime + d);
    }
    const S = {
      bounce: () => tone(440, 0.05, 'square', 0.07),
      break: () => { tone(660, 0.08, 'sawtooth', 0.1, 220); tone(880, 0.06, 'square', 0.05); },
      lose: () => [330, 220, 165].forEach((f, i) => setTimeout(() => tone(f, 0.2, 'sawtooth', 0.1), i * 100)),
      launch: () => tone(220, 0.12, 'triangle', 0.08, 440),
      power: () => { tone(440, 0.05, 'triangle', 0.08); setTimeout(() => tone(660, 0.07, 'triangle', 0.1), 60); },
      levelup: () => [330, 440, 550, 660].forEach((f, i) => setTimeout(() => tone(f, 0.15, 'triangle', 0.1), i * 80)),
    };
    return { play(n) { ensure(); if (ac && ac.state === 'suspended') ac.resume(); (S[n] || (() => {}))(); } };
  })();

  // ---- Config ----
  const PADDLE_H = 14, BALL_R = 7;
  const BRICK_ROWS = 10, BRICK_COLS = 18, BRICK_GAP = 3;
  const LIVES_START = 3;
  const MIN_VY = 3.9;
  const ENDLESS_ROW_INTERVAL = 420;
  const SURVIVAL_DESCENT_RATE = 0.04;

  const MODE_DESCS = {
    classic: 'Level progression — clear all bricks',
    endless: 'Endless rows descend — score as long as you survive',
    survival: 'The wall descends — clear it before it reaches your paddle',
  };

  // ---- State ----
  let W, H, paddleW, paddleX, brickW, brickH, brickOffX, brickOffY, topMargin = 44;
  let state = 'ready'; // ready | playing | over
  let score = 0, best = 0, lives = LIVES_START, level = 1;
  let balls = [], bricks = [], particles = [], powerups = [], trail = [];
  let ballStuck = true;
  let shakeFrames = 0;
  let paddleTarget = 0;
  let widePaddle = 0, slowBall = 0; // power-up timers (frames remaining)
  let gameMode = 'classic';
  let endlessTimer = 0;
  let survivalOffset = 0;
  let speedMult = 1; // 1 = normal, 2 = "2× speed" (sub-steps update() so collisions stay exact)

  const SPEED_KEY = 'breakout_speed2x';
  function loadSpeedPref() { try { return localStorage.getItem(SPEED_KEY) === '1'; } catch(_){ return false; } }
  function saveSpeedPref(on) { try { localStorage.setItem(SPEED_KEY, on ? '1' : '0'); } catch(_){} }

  function storageKey(mode) { return 'breakout_best_' + (mode || gameMode); }
  function loadBest(mode) { try { return parseInt(localStorage.getItem(storageKey(mode)) || '0', 10) || 0; } catch(_){ return 0; } }
  function saveBest() { try { const k = storageKey(); const cur = loadBest(); if (score > cur) localStorage.setItem(k, String(score)); } catch(_){} }

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    // Clear the top nav (‹ Menu / funyo ›) + HUD. In landscape the HUD shares the 44px
    // nav bar; in portrait it drops below the nav and may wrap, so measure it live.
    let hudBottom = 44;
    try {
      const hud = document.getElementById('hud');
      const r = hud && hud.getBoundingClientRect && hud.getBoundingClientRect();
      // Only trust a plausible HUD bar (a wrapped portrait HUD is well under 200px). A rect
      // reporting near full-viewport height is a stub/odd layout — fall back to the 44px nav.
      if (r && r.height && r.height < 200) hudBottom = Math.ceil(r.top + r.height);
    } catch (e) {}
    topMargin = Math.max(44, hudBottom);
    brickW = Math.floor((W - BRICK_GAP * (BRICK_COLS + 1)) / BRICK_COLS);
    brickH = Math.max(12, Math.floor(brickW * 0.32));
    brickOffX = Math.floor((W - (brickW + BRICK_GAP) * BRICK_COLS + BRICK_GAP) / 2);
    brickOffY = topMargin + 12;
    paddleW = Math.floor(W * 0.14);
    if (!paddleX) paddleX = W / 2;
  }
  window.addEventListener('resize', () => { resize(); if (ballStuck && balls.length) snapBallToPaddle(); });
  if (typeof window.matchMedia !== 'undefined') { /* guard */ }

  // ---- Brick grid ----
  const BRICK_COLORS = [
    '#ff2d78', '#ff6b35', '#ffd23f', '#00e5ff', '#b14fff', '#39ff14',
  ];
  function buildLevel() {
    bricks = [];
    if (gameMode === 'survival') survivalOffset = 0;
    for (let r = 0; r < BRICK_ROWS; r++) {
      for (let c = 0; c < BRICK_COLS; c++) {
        const hp = (level >= 3 && r < 2) ? 2 : 1;
        bricks.push({ r, c, hp, maxHp: hp });
      }
    }
  }

  function brickRect(b) {
    return {
      x: brickOffX + b.c * (brickW + BRICK_GAP),
      y: brickOffY + b.r * (brickH + BRICK_GAP) + Math.round(survivalOffset),
      w: brickW, h: brickH,
    };
  }

  // ---- Ball helpers ----
  function paddleY() { return H - 60; }
  function snapBallToPaddle() {
    if (balls.length) { balls[0].x = paddleX; balls[0].y = paddleY() - BALL_R - PADDLE_H / 2; }
  }

  function makeBall(x, y, speed) {
    const spd = speed || (11.7 + level * 1.3);
    const ang = -Math.PI / 2 + (Math.random() - 0.5) * 0.4;
    return { x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd };
  }

  // ---- Power-ups ----
  function dropPowerup(bx, by) {
    if (Math.random() > 0.35) return;
    // 'multi' gets rarer the more balls are already in play so it can't snowball
    // (common when solo to reward going multi; ~0 once it's already a swarm).
    const n = balls.length;
    const multiW = n <= 1 ? 2.5 : n <= 3 ? 1.4 : n <= 6 ? 0.6 : n <= 12 ? 0.2 : 0;
    const weights = [['wide', 1], ['slow', 1], ['multi', multiW]];
    const total = weights.reduce((s, w) => s + w[1], 0);
    let r = Math.random() * total, type = 'wide';
    for (const [t, w] of weights) { if ((r -= w) <= 0) { type = t; break; } }
    powerups.push({ x: bx, y: by, type, vy: 2.5 });
  }

  function applyPowerup(p) {
    SND.play('power');
    if (p.type === 'wide') widePaddle = 480;
    else if (p.type === 'slow') slowBall = 360;
    else if (p.type === 'multi') {
      const MAX_BALLS = 20; // safety cap so a late multi can't annihilate the board
      const room = MAX_BALLS - balls.length;
      if (room <= 0) return;
      const extra = [];
      for (const b of balls) {
        if (extra.length >= room) break;
        const ang = Math.atan2(b.vy, b.vx), spd = Math.hypot(b.vx, b.vy);
        extra.push({ ...b, vx: Math.cos(ang + 0.4) * spd, vy: Math.sin(ang + 0.4) * spd });
      }
      balls.push(...extra);
    }
  }

  // ---- Particles ----
  function spawnParticles(x, y, col) {
    for (let i = 0; i < 10; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 1.5 + Math.random() * 3;
      particles.push({ x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, life: 1, col });
    }
  }

  // ---- Init / reset ----
  function reset() {
    score = 0; lives = LIVES_START; level = 1; ballStuck = true;
    widePaddle = 0; slowBall = 0;
    particles = []; powerups = []; trail = [];
    endlessTimer = 0; survivalOffset = 0;
    balls = [{ x: paddleX, y: paddleY() - BALL_R - PADDLE_H / 2, vx: 0, vy: 0 }];
    best = loadBest(gameMode);
    buildLevel();
    updateHud();
  }

  function startGame() {
    reset();
    state = 'playing';
    overlay.classList.add('hidden');
    if (endOverlay) endOverlay.classList.add('hidden');
    updateHud();
  }

  function startMode(mode) {
    gameMode = mode || 'classic';
    startGame();
  }

  function launch() {
    if (!ballStuck || state !== 'playing') return;
    ballStuck = false;
    const spd = 11.7 + level * 1.3;
    balls[0].vx = (Math.random() - 0.5) * spd * 0.6;
    balls[0].vy = -spd;
    SND.play('launch');
  }

  function nextLevel() {
    level++;
    ballStuck = true;
    widePaddle = 0; slowBall = 0;
    powerups = []; particles = []; trail = [];
    if (gameMode === 'survival') survivalOffset = 0;
    balls = [{ x: paddleX, y: paddleY() - BALL_R - PADDLE_H / 2, vx: 0, vy: 0 }];
    buildLevel();
    SND.play('levelup');
    updateHud();
  }

  function loseLife() {
    SND.play('lose');
    lives--;
    updateHud();
    if (lives <= 0) {
      state = 'over';
      saveBest();
      best = loadBest(gameMode);
      showEndScreen();
    } else {
      ballStuck = true;
      balls = [{ x: paddleX, y: paddleY() - BALL_R - PADDLE_H / 2, vx: 0, vy: 0 }];
      powerups = []; widePaddle = 0; slowBall = 0;
    }
  }

  function showEndScreen() {
    const set = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
    set('endMode', gameMode.toUpperCase());
    set('endScore', score);
    set('endBest', best);
    if (endOverlay) endOverlay.classList.remove('hidden');
    updateHud();
  }

  function updateHud() {
    document.getElementById('scoreEl').textContent = score;
    document.getElementById('bestEl').textContent = best;
    document.getElementById('livesEl').textContent = '♥'.repeat(Math.max(0, lives));
    document.getElementById('levelEl').textContent = level;
    document.getElementById('modeEl').textContent = gameMode.toUpperCase();
  }

  // ---- Collision ----
  function ballBrickCollide(b) {
    for (let i = bricks.length - 1; i >= 0; i--) {
      const br = brickRect(bricks[i]);
      const bx = br.x, by = br.y, bw = br.w, bh = br.h;
      // find closest point on brick to ball
      const cx = Math.max(bx, Math.min(b.x, bx + bw));
      const cy = Math.max(by, Math.min(b.y, by + bh));
      const dx = b.x - cx, dy = b.y - cy;
      if (dx * dx + dy * dy < BALL_R * BALL_R) {
        // determine collision axis
        const overlapX = (bw / 2) - Math.abs(b.x - (bx + bw / 2));
        const overlapY = (bh / 2) - Math.abs(b.y - (by + bh / 2));
        if (overlapX < overlapY) b.vx = -b.vx;
        else { b.vy = -b.vy; if (Math.abs(b.vy) < MIN_VY) b.vy = b.vy < 0 ? -MIN_VY : MIN_VY; }

        const bk = bricks[i];
        bk.hp--;
        if (bk.hp <= 0) {
          const col = BRICK_COLORS[bk.r % BRICK_COLORS.length];
          spawnParticles(bx + bw / 2, by + bh / 2, col);
          dropPowerup(bx + bw / 2, by + bh / 2);
          bricks.splice(i, 1);
          score += 10 * level;
          if (score > best) { best = score; saveBest(); }
          shakeFrames = 4;
          SND.play('break');
        } else {
          SND.play('bounce');
        }
        updateHud();
        return;
      }
    }
  }

  // ---- Physics update ----
  function update() {
    if (state !== 'playing') return;

    // Endless: spawn new top row periodically
    if (gameMode === 'endless' && !ballStuck) {
      endlessTimer++;
      if (endlessTimer >= ENDLESS_ROW_INTERVAL) {
        endlessTimer = 0;
        for (const b of bricks) b.r++;
        for (let c = 0; c < BRICK_COLS; c++) {
          bricks.push({ r: 0, c, hp: 1, maxHp: 1 });
        }
      }
    }

    // Survival: descend wall
    if (gameMode === 'survival' && !ballStuck) {
      survivalOffset += SURVIVAL_DESCENT_RATE * (1 + level * 0.1);
      const py = paddleY();
      for (const b of bricks) {
        const { y, h } = brickRect(b);
        if (y + h >= py) {
          lives = 0;
          loseLife();
          return;
        }
      }
    }

    // paddle
    const pw = widePaddle > 0 ? paddleW * 1.6 : paddleW;
    const halfPW = pw / 2;
    paddleX += (paddleTarget - paddleX) * 0.25;
    paddleX = Math.max(halfPW, Math.min(W - halfPW, paddleX));

    if (ballStuck) { snapBallToPaddle(); return; }

    if (widePaddle > 0) widePaddle--;
    if (slowBall > 0) slowBall--;

    const slowFactor = slowBall > 0 ? 0.55 : 1;

    // power-ups fall
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.y += p.vy;
      const py = paddleY();
      if (p.y + 8 >= py && p.y - 8 <= py + PADDLE_H && p.x >= paddleX - halfPW && p.x <= paddleX + halfPW) {
        applyPowerup(p); powerups.splice(i, 1);
      } else if (p.y > H) { powerups.splice(i, 1); }
    }

    // balls
    for (let bi = balls.length - 1; bi >= 0; bi--) {
      const b = balls[bi];
      b.x += b.vx * slowFactor;
      b.y += b.vy * slowFactor;

      // trail
      trail.push({ x: b.x, y: b.y, life: 1 });

      // walls
      if (b.x - BALL_R < 0) { b.x = BALL_R; b.vx = Math.abs(b.vx); SND.play('bounce'); }
      if (b.x + BALL_R > W) { b.x = W - BALL_R; b.vx = -Math.abs(b.vx); SND.play('bounce'); }
      if (b.y - BALL_R < topMargin) { b.y = topMargin + BALL_R; b.vy = Math.abs(b.vy); SND.play('bounce'); }

      // paddle collision
      const py = paddleY();
      if (b.vy > 0 && b.y + BALL_R >= py && b.y - BALL_R <= py + PADDLE_H &&
          b.x >= paddleX - halfPW - BALL_R && b.x <= paddleX + halfPW + BALL_R) {
        const rel = (b.x - paddleX) / halfPW; // -1 to 1
        const ang = rel * 1.1; // max ~63 deg
        const spd = Math.hypot(b.vx, b.vy);
        b.vx = Math.sin(ang) * spd;
        b.vy = -Math.max(Math.abs(Math.cos(ang) * spd), MIN_VY);
        b.y = py - BALL_R;
        SND.play('bounce');
      }

      // bricks
      ballBrickCollide(b);

      // lost
      if (b.y - BALL_R > H) {
        balls.splice(bi, 1);
        if (balls.length === 0) { loseLife(); return; }
      }
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.05;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // trail fade (cap length so many balls can't grow an unbounded cloud)
    if (trail.length > 120) trail.splice(0, trail.length - 120);
    for (let i = trail.length - 1; i >= 0; i--) {
      trail[i].life -= 0.08;
      if (trail[i].life <= 0) trail.splice(i, 1);
    }

    if (shakeFrames > 0) shakeFrames--;

    // level clear
    if (bricks.length === 0) nextLevel();
  }

  // ---- Render ----
  function drawGrid() {
    const vp = H - 50;
    const lines = 20;
    ctx.save();
    // horizon gradient
    const gy = Math.round(H * 0.5);
    const gr = ctx.createLinearGradient(0, gy, 0, H);
    gr.addColorStop(0, 'rgba(255,0,255,0)');
    gr.addColorStop(0.5, 'rgba(255,0,255,0.08)');
    gr.addColorStop(1, 'rgba(255,0,255,0.22)');
    ctx.fillStyle = gr;
    ctx.fillRect(0, gy, W, H - gy);

    // perspective grid lines (horizontal)
    ctx.strokeStyle = 'rgba(255,0,255,0.25)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= lines; i++) {
      const t = i / lines;
      const yt = gy + (H - gy) * t;
      ctx.globalAlpha = t * 0.7;
      ctx.beginPath(); ctx.moveTo(0, yt); ctx.lineTo(W, yt); ctx.stroke();
    }
    // vertical lines converging to horizon center
    const cx2 = W / 2;
    ctx.globalAlpha = 0.18;
    for (let i = -10; i <= 10; i++) {
      const bx = cx2 + i * (W / 10);
      ctx.beginPath(); ctx.moveTo(cx2, gy); ctx.lineTo(bx, H); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // scanlines
    ctx.save();
    ctx.globalAlpha = 0.03;
    ctx.fillStyle = '#000';
    for (let y = 0; y < H; y += 4) { ctx.fillRect(0, y, W, 2); }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawBricks() {
    for (const b of bricks) {
      const { x, y, w, h } = brickRect(b);
      const col = BRICK_COLORS[b.r % BRICK_COLORS.length];
      // glow
      ctx.shadowColor = col;
      ctx.shadowBlur = 12;
      // fill
      if (b.maxHp > 1 && b.hp === b.maxHp) {
        ctx.fillStyle = col;
      } else if (b.maxHp > 1) {
        ctx.fillStyle = '#442222';
      } else {
        ctx.fillStyle = col;
      }
      ctx.fillRect(x + 1, y + 1, w - 2, h - 2);
      // border
      ctx.strokeStyle = col;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
      ctx.shadowBlur = 0;
      // HP cracks
      if (b.maxHp > 1 && b.hp < b.maxHp) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x + w * 0.3, y + 2); ctx.lineTo(x + w * 0.6, y + h - 2);
        ctx.moveTo(x + w * 0.7, y + 2); ctx.lineTo(x + w * 0.45, y + h - 2);
        ctx.stroke();
      }
    }
  }

  function drawPaddle() {
    const pw = widePaddle > 0 ? paddleW * 1.6 : paddleW;
    const py = paddleY();
    ctx.save();
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 18;
    const gr = ctx.createLinearGradient(paddleX - pw / 2, py, paddleX + pw / 2, py + PADDLE_H);
    gr.addColorStop(0, '#00ffff');
    gr.addColorStop(1, '#0088aa');
    ctx.fillStyle = gr;
    ctx.beginPath();
    if (ctx.roundRect) {
      ctx.roundRect(paddleX - pw / 2, py, pw, PADDLE_H, 6);
    } else {
      ctx.rect(paddleX - pw / 2, py, pw, PADDLE_H);
    }
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawBalls() {
    // trail — cheap additive glow. NO shadowBlur: with many balls this loop is the
    // main multiball perf cost (each blurred arc is far more expensive than a plain one).
    ctx.fillStyle = '#ff3df0';
    for (const t of trail) {
      ctx.globalAlpha = t.life * 0.30;
      ctx.beginPath(); ctx.arc(t.x, t.y, BALL_R * t.life * 0.8, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // balls — layered halo/body/core instead of a per-frame radial gradient + shadowBlur
    for (const b of balls) {
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#00e6ff';
      ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R * 1.9, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#00ffff';
      ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#eaffff';
      ctx.beginPath(); ctx.arc(b.x - 1, b.y - 1, BALL_R * 0.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.col;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  function drawPowerups() {
    const symbols = { wide: '⟺', slow: '◈', multi: '⊕' };
    const cols = { wide: '#00ffff', slow: '#ffd23f', multi: '#ff00ff' };
    for (const p of powerups) {
      ctx.save();
      ctx.font = 'bold 14px "Courier New"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = cols[p.type] || '#fff';
      ctx.shadowColor = cols[p.type] || '#fff';
      ctx.shadowBlur = 10;
      ctx.fillText(symbols[p.type] || '?', p.x, p.y);
      ctx.restore();
    }
  }

  function drawHudGlow() {
    // subtle glow strip at the playfield top edge, matching the HUD bottom border
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#ff00ff';
    ctx.fillRect(0, topMargin - 1, W, 1);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function render() {
    const shake = shakeFrames > 0 ? (Math.random() * 4 - 2) : 0;
    ctx.save();
    if (shake) ctx.translate(shake, shake * 0.5);

    // background
    ctx.fillStyle = '#0a0010';
    ctx.fillRect(0, 0, W, H);
    // sunset gradient
    const sg = ctx.createLinearGradient(0, 0, 0, H * 0.5);
    sg.addColorStop(0, 'rgba(10,0,16,1)');
    sg.addColorStop(0.6, 'rgba(40,0,40,0.6)');
    sg.addColorStop(1, 'rgba(80,10,60,0.5)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, W, H * 0.5);

    drawGrid();
    drawBricks();
    drawPowerups();
    drawParticles();
    drawBalls();
    drawPaddle();
    drawHudGlow();
    ctx.restore();
  }

  // ---- Loop ----
  function loop() {
    requestAnimationFrame(loop);
    try { update(); render(); } catch (e) { if (window.console) console.error(e); }
  }

  // ---- Input ----
  // Touch: RELATIVE drag (paddle follows the finger's DELTA, not its absolute x). The paddle
  // is horizontal-only, so an "offset above finger" wouldn't move the thumb off the action
  // line — but relative drag lets the player anchor a thumb anywhere comfortable (a bottom
  // corner, off the bricks/ball) and still reach the full width. A 1.7x gain keeps it snappy
  // without a full-width swipe. Mouse / pen stay ABSOLUTE so desktop aiming is unchanged.
  const DRAG_GAIN = 1.7;
  let dragX = null, dragBase = 0;
  function cx(e, r) { return (e.clientX - r.left) * (W / r.width); }
  canvas.addEventListener('pointermove', e => {
    const r = canvas.getBoundingClientRect();
    if (e.pointerType === 'touch') {
      if (dragX === null) return;
      paddleTarget = dragBase + (cx(e, r) - dragX) * DRAG_GAIN;
    } else {
      paddleTarget = cx(e, r);
    }
  });
  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    if (e.pointerType === 'touch') {
      dragX = cx(e, r); dragBase = paddleX;
    } else {
      paddleTarget = cx(e, r);
    }
    if (state === 'playing') launch();
  });
  canvas.addEventListener('pointerup', () => { dragX = null; });
  canvas.addEventListener('pointercancel', () => { dragX = null; });

  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') paddleTarget = Math.max(0, paddleX - 30);
    if (e.key === 'ArrowRight') paddleTarget = Math.min(W, paddleX + 30);
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); launch(); }
  });
  // hold arrow key
  const keys = {};
  window.addEventListener('keydown', e => { keys[e.key] = true; });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  document.getElementById('startBtn').addEventListener('click', startGame);
  { const ab = document.getElementById('againBtn'); if (ab) ab.addEventListener('click', startGame); }
  document.getElementById('menuBtn').addEventListener('click', () => { try { location.reload(); } catch (e) {} });

  // ---- Share buttons (END screen) ----
  (function () {
    const url = 'https://funyo.online/games/breakout/';
    const shareText = () => 'I scored ' + score + ' in Brick Breaker 🧱';
    const enc = (typeof encodeURIComponent === 'function') ? encodeURIComponent : (s => String(s));
    const u = enc(url);
    const setX = () => { const e = document.getElementById('shareX'); if (e) e.href = 'https://twitter.com/intent/tweet?text=' + enc(shareText()) + '&url=' + u; };
    const setReddit = () => { const e = document.getElementById('shareReddit'); if (e) e.href = 'https://www.reddit.com/submit?url=' + u + '&title=' + enc(shareText()); };
    // recompute hrefs at click time so the live score is embedded
    ['shareX', 'shareReddit'].forEach(id => { const e = document.getElementById(id); if (e) e.addEventListener('click', () => { setX(); setReddit(); }); });
    setX(); setReddit();
    const cp = document.getElementById('shareCopy');
    if (cp) cp.addEventListener('click', () => {
      const done = () => { cp.classList.add('ok'); cp.title = 'Copied!'; try { setTimeout(() => { cp.classList.remove('ok'); cp.title = 'Copy result'; }, 1500); } catch (e) {} };
      try { if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(shareText() + '\n' + url).then(done).catch(() => {}); } catch (e) {}
    });
    const ns = document.getElementById('shareNative');
    if (ns && typeof navigator !== 'undefined' && navigator.share) {
      ns.style.display = '';
      ns.addEventListener('click', (e) => { e.preventDefault(); try { navigator.share({ title: 'Brick Breaker', text: shareText(), url: url }).catch(() => {}); } catch (err) {} });
    }
  })();

  // Menu: per-mode best scores (refreshed when the menu is shown)
  function refreshMenuBests() {
    const ids = { classic: 'bestClassic', endless: 'bestEndless', survival: 'bestSurvival' };
    for (const m in ids) { const e = document.getElementById(ids[m]); if (e) e.textContent = 'best: ' + loadBest(m); }
  }

  // Mode picker
  const modeBtns = document.querySelectorAll('.modeBtn');
  const modeDescEl = document.getElementById('modeDesc');
  function setActiveMode(mode) {
    gameMode = mode;
    modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    if (modeDescEl) modeDescEl.textContent = MODE_DESCS[mode] || '';
  }
  modeBtns.forEach(b => b.addEventListener('click', e => { e.stopPropagation(); setActiveMode(b.dataset.mode); }));
  setActiveMode('classic'); // default highlight
  refreshMenuBests();

  // 2× speed toggle (persisted)
  const speedBox = document.getElementById('speed2x');
  function applySpeedFromPref() { const on = loadSpeedPref(); speedMult = on ? 2 : 1; if (speedBox) speedBox.checked = on; }
  if (speedBox) speedBox.addEventListener('change', () => { const on = !!speedBox.checked; speedMult = on ? 2 : 1; saveSpeedPref(on); });
  applySpeedFromPref();

  // ---- Key hold polling ----
  function pollKeys() {
    const pw = widePaddle > 0 ? paddleW * 1.6 : paddleW;
    const speed = 12;
    if (keys['ArrowLeft']) paddleTarget = Math.max(pw / 2, paddleTarget - speed);
    if (keys['ArrowRight']) paddleTarget = Math.min(W - pw / 2, paddleTarget + speed);
  }
  // integrate into update
  const _update = update;
  // (pollKeys called inline in loop)

  // Override loop to include key polling
  function loop2() {
    requestAnimationFrame(loop2);
    try {
      pollKeys();
      // 2× speed = run the fixed-step update twice per frame (sub-stepping). This keeps every
      // collision check at the normal per-step resolution (no tunnelling) and reuses the same
      // hot loops, so it doesn't regress the multiball perf work.
      const steps = state === 'playing' ? speedMult : 1;
      for (let i = 0; i < steps; i++) update();
      render();
    } catch (e) { if (window.console) console.error(e); }
  }

  // ---- Test hook ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get lives() { return lives; },
    get bricks() { return bricks.length; },
    get ballStuck() { return ballStuck; },
    get level() { return level; },
    get mode() { return gameMode; },
    get survivalOffset() { return survivalOffset; },
    get lowestBrickY() {
      if (!bricks.length) return 0;
      let maxY = 0;
      for (const b of bricks) { const { y, h } = brickRect(b); if (y + h > maxY) maxY = y + h; }
      return maxY;
    },
    get endlessTimer() { return endlessTimer; },
    get speedMult() { return speedMult; },
    start: startGame,
    startMode,
    launch,
    setPaddle(x) { paddleX = x; paddleTarget = x; },
    setBall(x, y, vx, vy) {
      if (!balls.length) balls.push({ x, y, vx, vy });
      else { balls[0].x = x; balls[0].y = y; balls[0].vx = vx; balls[0].vy = vy; }
      ballStuck = false;
    },
    step(n) { for (let i = 0; i < (n || 1); i++) update(); },
  };

  resize();
  updateHud();
  loop2();
})();
  if ('serviceWorker' in navigator) {
    var swReloaded = false, hadController = !!navigator.serviceWorker.controller;
    navigator.serviceWorker.addEventListener('controllerchange', function () { if (swReloaded || !hadController) return; swReloaded = true; location.reload(); });
    window.addEventListener('load', function () { try { navigator.serviceWorker.register('sw.js').then(function (reg) { reg.update(); setInterval(function () { reg.update(); }, 3600000); }).catch(function () {}); } catch (e) {} });
  }
</script>
</body>
