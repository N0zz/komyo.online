<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Range</title>
<link rel="icon" href="../../favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#ff7a3c">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Range">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="../../analytics.js" defer></script>
<link rel="stylesheet" href="../../game-kit.css">
<script src="../../game-kit.js"></script>
<style>
  :root { --bg:#0d1117; --grid:#1a2030; --accent:#ff7a3c; --fg:#e0e8f0; --dim:#6a7a8a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--fg);
    font-family:'Courier New',Courier,monospace; user-select:none; touch-action:none; }
  #game { display:block; width:100vw; height:100vh; cursor:none; }
  /* .gamekit-hud (shared kit) provides center-top placement, pill, wrap + font; keep only item colors. */
  #hud .stat b { color:var(--accent); }
  #hud #hTime.warn { color:#ff3c3c; }
  #overlay { position:fixed; inset:0; z-index:8; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; background:rgba(13,17,23,0.88); padding:24px; }
  #overlay.hidden { display:none; }
  #overlay h1 { margin:0; font-size:42px; letter-spacing:5px; color:var(--accent); text-shadow:0 0 30px rgba(255,122,60,0.4); }
  #overlay p { margin:2px; font-size:14px; opacity:0.85; max-width:480px; line-height:1.6; letter-spacing:0.5px; }
  #overlay .hint { opacity:0.5; font-size:12px; letter-spacing:1px; }
  .mode-label { font-size:11px; letter-spacing:2px; opacity:0.6; margin-bottom:2px; }
  .mode-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .mode-btn { font-family:inherit; cursor:pointer; font-size:13px; letter-spacing:2px; padding:9px 18px;
    border-radius:6px; color:var(--fg); background:transparent; border:1px solid #3a4a5a; transition:background 0.15s,border-color 0.15s; }
  .mode-btn:hover { border-color:var(--accent); }
  .mode-btn.selected { background:var(--accent); border-color:var(--accent); color:#0d1117; font-weight:bold;
    box-shadow:0 0 14px rgba(255,122,60,0.5); }
  .mode-btn.selected::before { content:'\2713 '; }
  .start-btn { font-family:inherit; cursor:pointer; font-size:14px; letter-spacing:2px; padding:10px 32px;
    border-radius:6px; color:var(--fg); background:var(--accent); border:none; margin-top:4px; }
  .opt-row { display:flex; gap:10px; justify-content:center; align-items:center; margin-top:6px; }
  .opt-toggle { font-family:inherit; cursor:pointer; font-size:12px; letter-spacing:2px; padding:8px 16px;
    border-radius:6px; color:var(--fg); background:transparent; border:1px solid #3a4a5a; transition:background 0.15s,border-color 0.15s; }
  .opt-toggle:hover { border-color:var(--accent); }
  .opt-toggle[aria-pressed="true"] { background:var(--accent); border-color:var(--accent); color:#0d1117; font-weight:bold;
    box-shadow:0 0 14px rgba(255,122,60,0.5); }
  .opt-toggle[aria-pressed="true"]::before { content:'\2713 '; }
  #bestPanel { display:flex; gap:8px 16px; flex-wrap:wrap; justify-content:center; margin-top:8px;
    font-size:11px; letter-spacing:1.5px; opacity:0.75; }
  #bestPanel .bcell { white-space:nowrap; }
  #bestPanel .bcell b { color:var(--accent); }
  #endScreen { position:fixed; inset:0; z-index:8; display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; background:rgba(13,17,23,0.92); padding:24px; }
  #endScreen h1 { margin:0; font-size:36px; letter-spacing:4px; color:var(--accent); }
  #endScreen .summary { display:grid; grid-template-columns:1fr 1fr; gap:10px 28px; margin:10px 0; max-width:340px; }
  #endScreen .srow { text-align:left; }
  #endScreen .srow .lbl { opacity:0.5; font-size:11px; letter-spacing:2px; }
  #endScreen .srow b { color:var(--accent); font-size:16px; display:block; }
  #endScreen button#restartBtn { font-family:inherit; cursor:pointer; font-size:13px; letter-spacing:2px; padding:9px 24px;
    border-radius:6px; color:var(--fg); background:var(--accent); border:none; }
  #shareRow { --gamekit-accent:#ff7a3c; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud" class="gamekit-hud">
  <div class="stat"><span class="lbl" id="hScoreLbl">SCORE</span><b id="hScore">0</b></div>
  <div class="stat"><span class="lbl">ACC</span><b id="hAcc">--%</b></div>
  <div class="stat"><span id="hTimeLbl" class="lbl">TIME</span><b id="hTime">30</b></div>
  <div class="stat"><span id="hBestLbl" class="lbl">BEST</span><b id="hBest">0</b></div>
</div>

<div id="overlay">
  <h1>RANGE</h1>
  <p>Click targets as fast as possible. Missing costs your combo.</p>
  <div class="mode-label">TIMED MODE — score in the window</div>
  <div class="mode-row" id="timedBtns">
    <button class="mode-btn" data-mode="10">10s</button>
    <button class="mode-btn" data-mode="20">20s</button>
    <button class="mode-btn selected" data-mode="30">30s</button>
    <button class="mode-btn" data-mode="60">60s</button>
  </div>
  <div class="mode-label" style="margin-top:6px">SPRINT MODE — hit 100 targets fastest</div>
  <div class="mode-row">
    <button class="mode-btn" data-mode="sprint">SPRINT TO 100</button>
  </div>
  <div class="opt-row">
    <button class="opt-toggle" id="movingToggle" type="button" aria-pressed="false">MOVING TARGETS</button>
  </div>
  <div id="bestPanel"></div>
  <p class="hint">CLICK / TAP TO SHOOT</p>
  <button class="start-btn" id="startBtn">READY UP</button>
</div>

<div id="endScreen">
  <h1>RANGE CLEAR</h1>
  <div class="summary">
    <div class="srow"><span class="lbl">SCORE</span><b id="eScore">0</b></div>
    <div class="srow"><span class="lbl">ACCURACY</span><b id="eAcc">--%</b></div>
    <div class="srow"><span class="lbl">HITS</span><b id="eHits">0</b></div>
    <div class="srow"><span class="lbl">MISSES</span><b id="eMisses">0</b></div>
    <div class="srow"><span class="lbl">BEST REACTION</span><b id="eBestReact">--ms</b></div>
    <div class="srow"><span class="lbl" id="eBestLbl">BEST SCORE</span><b id="eBest">0</b></div>
  </div>
  <button id="restartBtn">FIRE AGAIN</button>
  <div id="shareRow"></div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const canvas = $('game'), ctx = canvas.getContext('2d');
  const overlay = $('overlay'), endScreen = $('endScreen');
  // Top headroom the playfield must reserve for the kit's center-top .gamekit-hud pill.
  // Landscape: pill at top:8px → clears ~48px. Portrait (≤560px): pill drops to top:50px
  // below the nav → clears ~92px.
  const HUD_LANDSCAPE = 48, HUD_PORTRAIT = 92;
  function isPortrait() {
    try { return window.innerHeight >= window.innerWidth; } catch (e) { return false; }
  }
  function hudBottom() { return isPortrait() ? HUD_PORTRAIT : HUD_LANDSCAPE; }
  let HUD_H = hudBottom();

  // ---- Audio (game-kit shared engine + global mute) ----
  const SND = window.gamekit.sound;
  SND.define({
    hit: ({ tone }) => { tone(880, 0.06, 'square', 0.08); tone(1200, 0.04, 'sine', 0.05); },
    miss: ({ noise }) => noise(0.08, 0.06),
    spawn: ({ tone }) => tone(440, 0.04, 'sine', 0.04),
    end: ({ tone }) => { [660, 550, 440].forEach((f, i) => setTimeout(() => tone(f, 0.2, 'triangle', 0.1), i * 100)); },
  });

  // ---- Constants ----
  const DEFAULT_SESSION = 30;
  const SPRINT_TARGET = 100;
  const TARGET_BASE_R = 34;
  const SPAWN_INTERVAL_INIT = 90;
  const SPAWN_INTERVAL_MIN = 40;
  // Moving-targets ramp: fraction of targets that move + their speed both grow with score.
  const MOVE_START_SCORE = 50;   // points before any target starts drifting
  const MOVE_FULL_SCORE = 400;   // score at which the ramp is maxed out
  const MOVE_MAX_FRACTION = 0.85; // at most this share of targets move
  const MOVE_SPEED_MIN = 0.4;    // px/frame at the moment movement begins
  const MOVE_SPEED_MAX = 2.6;    // px/frame at full ramp

  // ---- Mode state ----
  // mode: 'timed' | 'sprint'
  // sessionSeconds: number (only for timed)
  let mode = 'timed';
  let sessionSeconds = DEFAULT_SESSION;

  // ---- Moving targets (opt-in, persisted) ----
  const MOVING_KEY = 'aim-trainer_moving';
  function loadMoving() {
    try { return localStorage.getItem(MOVING_KEY) === '1'; } catch (e) { return false; }
  }
  function saveMoving(on) {
    try { localStorage.setItem(MOVING_KEY, on ? '1' : '0'); } catch (e) {}
  }
  let movingTargets = loadMoving();

  // ---- State ----
  let state = 'ready'; // ready | playing | over
  let score = 0, hits = 0, misses = 0, timeLeft = sessionSeconds;
  let elapsedFrames = 0; // for sprint: count-up timer
  let targets = [], particles = [];
  let frame = 0, spawnTimer = 0, spawnInterval = SPAWN_INTERVAL_INIT;
  let reticle = { x: -100, y: -100 };
  let hitMarkers = [];
  let bestReact = Infinity, lastSpawnFrame = 0;
  let combo = 0;
  let W = 0, H = 0;

  // per-mode bests: timed stores best score, sprint stores best time (frames)
  const bestKey = (m, s) => m === 'sprint' ? 'aim-trainer_sprint' : 'aim-trainer_best_' + s;

  function loadBest(m, s) {
    try { return parseInt(localStorage.getItem(bestKey(m, s)) || '0', 10) || 0; } catch (e) { return 0; }
  }
  function saveBest(m, s, val) {
    try { localStorage.setItem(bestKey(m, s), String(val)); } catch (e) {}
  }

  // bestScore used by HUD and __test — means: best score for timed, 0 for sprint (sprint uses bestTime)
  // We compute it dynamically from localStorage
  function getBestForCurrentMode() {
    if (mode === 'sprint') {
      const t = loadBest('sprint', 0);
      return t; // stored as frames; 0 = no best yet
    }
    return loadBest('timed', sessionSeconds);
  }

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    HUD_H = hudBottom();
  }
  window.gamekit.layout.on(resize); // resize + orientationchange + visualViewport, debounced

  function updateHud() {
    const acc = hits + misses > 0 ? Math.round(hits / (hits + misses) * 100) : null;
    $('hScore').textContent = score;
    $('hAcc').textContent = acc !== null ? acc + '%' : '--%';

    if (mode === 'sprint') {
      $('hScoreLbl').textContent = 'TARGETS';
      $('hScore').textContent = hits + ' / ' + SPRINT_TARGET;
      $('hTimeLbl').textContent = 'ELAPSED';
      const secs = (elapsedFrames / 60).toFixed(1);
      $('hTime').textContent = secs + 's';
      $('hTime').className = '';
      $('hBestLbl').textContent = 'BEST TIME';
      const bt = loadBest('sprint', 0);
      $('hBest').textContent = bt > 0 ? (bt / 60).toFixed(1) + 's' : '--';
    } else {
      $('hScoreLbl').textContent = 'SCORE';
      $('hTimeLbl').textContent = 'TIME';
      const tl = Math.ceil(timeLeft);
      $('hTime').textContent = tl;
      $('hTime').className = (state === 'playing' && timeLeft <= 5) ? 'warn' : '';
      $('hBestLbl').textContent = 'BEST';
      $('hBest').textContent = loadBest('timed', sessionSeconds);
    }
  }

  function rng(min, max) { return min + Math.random() * (max - min); }
  function seededRng(seed) {
    let s = seed | 0;
    return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0x100000000; };
  }

  let _rng = Math.random;
  function spawnTarget() {
    const pad = 80;
    const x = pad + _rng() * (W - pad * 2);
    const y = HUD_H + pad + _rng() * (H - HUD_H - pad * 2);
    const r = TARGET_BASE_R * (0.75 + _rng() * 0.6);
    targets.push({ x, y, r, born: frame, life: 1, vx: 0, vy: 0, moving: false });
    lastSpawnFrame = frame;
    SND.play('spawn');
  }

  function startParticles(x, y, hit) {
    const count = hit ? 14 : 6;
    const col = hit ? '#ff7a3c' : '#4a5a6a';
    for (let i = 0; i < count; i++) {
      const a = (i / count) * Math.PI * 2 + rng(-0.3, 0.3);
      const spd = hit ? rng(2, 7) : rng(1, 3);
      particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, r: rng(2, hit ? 5 : 3), life: 1, col });
    }
  }

  function shoot(px, py) {
    if (state !== 'playing') return;
    let hit = false;
    for (let i = targets.length - 1; i >= 0; i--) {
      const t = targets[i];
      const d = Math.hypot(px - t.x, py - t.y);
      if (d <= t.r) {
        const reactMs = Math.round((frame - t.born) * (1000 / 60));
        if (reactMs < bestReact) bestReact = reactMs;
        const mult = 1 + Math.floor(combo / 3);
        score += 10 * mult;
        hits++;
        combo++;
        targets.splice(i, 1);
        startParticles(px, py, true);
        hitMarkers.push({ x: px, y: py, life: 1 });
        SND.play('hit');
        hit = true;
        // sprint win check
        if (mode === 'sprint' && hits >= SPRINT_TARGET) { spawnTarget(); endGame(); return; }
        spawnTarget();
        break;
      }
    }
    if (!hit) {
      misses++;
      combo = 0;
      startParticles(px, py, false);
      SND.play('miss');
    }
    updateHud();
  }

  function reset() {
    score = 0; hits = 0; misses = 0;
    timeLeft = mode === 'timed' ? sessionSeconds : 0;
    elapsedFrames = 0;
    targets = []; particles = []; hitMarkers = [];
    frame = 0; spawnTimer = 0; spawnInterval = SPAWN_INTERVAL_INIT;
    combo = 0; bestReact = Infinity;
  }

  function startGame() {
    reset();
    _rng = Math.random;
    state = 'playing';
    overlay.classList.add('hidden');
    endScreen.style.display = 'none';
    spawnTarget();
    updateHud();
  }

  function endGame() {
    state = 'over';
    SND.play('end');
    const acc = hits + misses > 0 ? Math.round(hits / (hits + misses) * 100) : 0;

    $('eScore').textContent = score;
    $('eAcc').textContent = acc + '%';
    $('eHits').textContent = hits;
    $('eMisses').textContent = misses;
    $('eBestReact').textContent = bestReact < Infinity ? bestReact + 'ms' : '--ms';

    if (mode === 'sprint') {
      const prevBest = loadBest('sprint', 0);
      const isNew = prevBest === 0 || elapsedFrames < prevBest;
      if (isNew) saveBest('sprint', 0, elapsedFrames);
      const displayBest = isNew ? elapsedFrames : prevBest;
      $('eBestLbl').textContent = 'BEST TIME';
      $('eBest').textContent = (displayBest / 60).toFixed(2) + 's';
    } else {
      const prevBest = loadBest('timed', sessionSeconds);
      const newBest = Math.max(score, prevBest);
      if (score > prevBest) saveBest('timed', sessionSeconds, score);
      $('eBestLbl').textContent = 'BEST SCORE';
      $('eBest').textContent = newBest;
    }

    window.gamekit.recordResult('aim-trainer', { mode: mode, score: score, time: elapsedFrames, stats: { accuracy: acc } });
    endScreen.style.display = 'flex';
    updateHud();
  }

  function update() {
    if (state !== 'playing') return;
    frame++;
    elapsedFrames++;

    if (mode === 'timed') {
      timeLeft -= 1 / 60;
      if (timeLeft <= 0) { timeLeft = 0; endGame(); return; }
      const elapsed = sessionSeconds - timeLeft;
      spawnInterval = Math.max(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL_INIT - Math.floor(elapsed * 0.8));
    } else {
      // sprint: escalate based on score
      spawnInterval = Math.max(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL_INIT - Math.floor(score * 0.5));
    }

    // no target safety-spawn
    if (targets.length === 0) { spawnTarget(); spawnTimer = 0; }

    // update target life (for pop-in animation)
    for (const t of targets) t.life = Math.min(1, (frame - t.born) / 6);

    // moving targets: more targets drift + faster, the higher the score
    if (movingTargets) updateMovement();

    // update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.88; p.vy *= 0.88;
      p.life -= 0.045;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // update hit markers
    for (let i = hitMarkers.length - 1; i >= 0; i--) {
      hitMarkers[i].life -= 0.06;
      if (hitMarkers[i].life <= 0) hitMarkers.splice(i, 1);
    }
  }

  function moveRamp() {
    if (score <= MOVE_START_SCORE) return 0;
    const p = (score - MOVE_START_SCORE) / (MOVE_FULL_SCORE - MOVE_START_SCORE);
    return Math.max(0, Math.min(1, p));
  }

  function updateMovement() {
    const p = moveRamp();
    // how many of the on-screen targets should be moving right now
    const wantMoving = p > 0 ? Math.ceil(MOVE_MAX_FRACTION * p * targets.length) : 0;
    const speed = MOVE_SPEED_MIN + (MOVE_SPEED_MAX - MOVE_SPEED_MIN) * p;

    let movingCount = 0;
    for (const t of targets) if (t.moving) movingCount++;

    // promote stationary targets until we hit the desired count
    if (movingCount < wantMoving) {
      for (const t of targets) {
        if (movingCount >= wantMoving) break;
        if (!t.moving) {
          const a = _rng() * Math.PI * 2;
          t.vx = Math.cos(a) * speed;
          t.vy = Math.sin(a) * speed;
          t.moving = true;
          movingCount++;
        }
      }
    }

    const minX = t => t.r, maxX = t => W - t.r;
    const top = t => HUD_H + t.r, bot = t => H - 8 - t.r;
    for (const t of targets) {
      if (!t.moving) continue;
      // rescale velocity toward the current ramp speed so existing targets speed up with score
      const cur = Math.hypot(t.vx, t.vy);
      if (cur > 0.0001) { const k = speed / cur; t.vx *= k; t.vy *= k; }
      t.x += t.vx; t.y += t.vy;
      if (t.x < minX(t)) { t.x = minX(t); t.vx = Math.abs(t.vx); }
      else if (t.x > maxX(t)) { t.x = maxX(t); t.vx = -Math.abs(t.vx); }
      if (t.y < top(t)) { t.y = top(t); t.vy = Math.abs(t.vy); }
      else if (t.y > bot(t)) { t.y = bot(t); t.vy = -Math.abs(t.vy); }
    }
  }

  // ---- Render ----
  function drawGrid() {
    const step = 48;
    ctx.strokeStyle = '#161e2a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x < W; x += step) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (let y = HUD_H; y < H; y += step) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();

    // range lane lines
    ctx.strokeStyle = '#1a2535';
    ctx.lineWidth = 2;
    const laneW = W / 3;
    for (let i = 1; i < 3; i++) {
      ctx.beginPath(); ctx.moveTo(laneW * i, HUD_H); ctx.lineTo(laneW * i, H); ctx.stroke();
    }
    // floor line
    ctx.strokeStyle = '#2a3545';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H - 8); ctx.lineTo(W, H - 8); ctx.stroke();
    ctx.strokeStyle = '#ff7a3c22';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, H - 6); ctx.lineTo(W, H - 6); ctx.stroke();
  }

  function drawTarget(t) {
    const { x, y, r, life } = t;
    const s = life;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);

    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#1a2030';
    ctx.fill();
    ctx.strokeStyle = '#ff7a3c';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    ctx.beginPath(); ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2);
    ctx.strokeStyle = '#ff7a3c99';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.beginPath(); ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2);
    ctx.strokeStyle = '#ff7a3c';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.beginPath(); ctx.arc(0, 0, r * 0.12, 0, Math.PI * 2);
    ctx.fillStyle = '#ff7a3c';
    ctx.fill();

    ctx.strokeStyle = '#ff7a3c88';
    ctx.lineWidth = 1;
    const tk = r * 0.15;
    [[r + tk, 0], [-(r + tk), 0], [0, r + tk], [0, -(r + tk)]].forEach(([ex, ey]) => {
      ctx.beginPath(); ctx.moveTo(ex * 0.7, ey * 0.7); ctx.lineTo(ex, ey); ctx.stroke();
    });

    ctx.restore();
  }

  function drawCrosshair(x, y) {
    const cr = 12, gap = 5, tickLen = 8;
    ctx.strokeStyle = '#ff7a3c';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y, cr, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#ff7a3c';
    ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI * 2); ctx.fill();
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    ctx.strokeStyle = '#ff7a3c';
    ctx.lineWidth = 1.5;
    dirs.forEach(([dx, dy]) => {
      ctx.beginPath();
      ctx.moveTo(x + dx * (cr + gap), y + dy * (cr + gap));
      ctx.lineTo(x + dx * (cr + gap + tickLen), y + dy * (cr + gap + tickLen));
      ctx.stroke();
    });
  }

  function render() {
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);
    drawGrid();

    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (const m of hitMarkers) {
      ctx.globalAlpha = Math.max(0, m.life);
      ctx.strokeStyle = '#ff7a3c';
      ctx.lineWidth = 2;
      const s = 8;
      ctx.beginPath(); ctx.moveTo(m.x - s, m.y - s); ctx.lineTo(m.x + s, m.y + s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(m.x + s, m.y - s); ctx.lineTo(m.x - s, m.y + s); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    for (const t of targets) drawTarget(t);

    // combo
    if (state === 'playing' && combo >= 3) {
      ctx.fillStyle = '#ff7a3c';
      ctx.font = 'bold 14px "Courier New",monospace';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText('x' + (1 + Math.floor(combo / 3)) + ' COMBO', W - 16, HUD_H + 8);
    }

    // sprint progress bar — race is to SPRINT_TARGET targets HIT, not points. Lifted off the very
    // bottom edge + thicker + with an inline count so it's actually visible on mobile.
    if (state === 'playing' && mode === 'sprint') {
      const pct = Math.min(hits / SPRINT_TARGET, 1);
      const barH = 14, bx = 20, bw = W - 40, by = H - barH - 12;
      ctx.fillStyle = '#1a2535'; ctx.fillRect(bx, by, bw, barH);
      ctx.fillStyle = '#ff7a3c'; ctx.fillRect(bx, by, bw * pct, barH);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 11px system-ui, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(hits + ' / ' + SPRINT_TARGET, W / 2, by + barH / 2);
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    }

    // timed time warning flash
    if (state === 'playing' && mode === 'timed' && timeLeft <= 5) {
      ctx.globalAlpha = 0.15 + 0.12 * Math.sin(frame * 0.3);
      ctx.strokeStyle = '#ff7a3c';
      ctx.lineWidth = 4;
      ctx.strokeRect(2, 2, W - 4, H - 4);
      ctx.globalAlpha = 1;
    }

    if (state === 'playing') drawCrosshair(reticle.x, reticle.y);
  }

  function loop() {
    requestAnimationFrame(loop);
    try { update(); render(); } catch (e) { if (window.console) console.error(e); }
  }

  // ---- Input ----
  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (W / rect.width),
      y: (e.clientY - rect.top) * (H / rect.height),
    };
  }

  canvas.addEventListener('pointerdown', e => {
    const { x, y } = getCanvasPos(e);
    shoot(x, y);
  });
  canvas.addEventListener('pointermove', e => {
    const { x, y } = getCanvasPos(e);
    reticle.x = x; reticle.y = y;
  });

  // ---- Mode picker ----
  let selectedMode = 'timed';
  let selectedSeconds = DEFAULT_SESSION;

  function selectMode(m, s) {
    selectedMode = m;
    selectedSeconds = s;
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.classList.toggle('selected', btn.dataset.mode === (m === 'sprint' ? 'sprint' : String(s)));
    });
  }

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.mode;
      if (v === 'sprint') selectMode('sprint', 0);
      else selectMode('timed', parseInt(v, 10));
    });
  });

  // deep-link: ?mode=sprint  or  ?mode=timed&secs=30 → preselect that mode in the menu
  (function () {
    const P = window.gamekit && window.gamekit.param; if (!P) return;
    const pm = P('mode');
    if (pm === 'sprint') selectMode('sprint', 0);
    else if (pm === 'timed') { const s = parseInt(P('secs'), 10); if ([10, 20, 30, 60].indexOf(s) >= 0) selectMode('timed', s); }
    const mv = P('moving'); if (mv === '0' || mv === '1') { movingTargets = mv === '1'; syncMovingToggle(); }
  })();

  // ---- Moving-targets toggle ----
  function syncMovingToggle() {
    const btn = $('movingToggle');
    if (!btn) return;
    btn.setAttribute('aria-pressed', movingTargets ? 'true' : 'false');
  }
  {
    const mt = $('movingToggle');
    if (mt) mt.addEventListener('click', () => {
      movingTargets = !movingTargets;
      saveMoving(movingTargets);
      syncMovingToggle();
    });
    syncMovingToggle();
  }

  // ---- Top scores panel (per mode) ----
  function renderBestPanel() {
    const panel = $('bestPanel');
    if (!panel) return;
    const cells = [10, 20, 30, 60].map(s => {
      const b = loadBest('timed', s);
      return '<span class="bcell">' + s + 's <b>' + b + '</b></span>';
    });
    const st = loadBest('sprint', 0);
    cells.push('<span class="bcell">SPRINT <b>' + (st > 0 ? (st / 60).toFixed(1) + 's' : '--') + '</b></span>');
    panel.innerHTML = cells.join('');
  }
  renderBestPanel();

  $('startBtn').addEventListener('click', () => {
    mode = selectedMode;
    sessionSeconds = selectedSeconds || DEFAULT_SESSION;
    startGame();
  });

  $('restartBtn').addEventListener('click', () => {
    endScreen.style.display = 'none';
    overlay.classList.remove('hidden');
    renderBestPanel();
  });

  // ---- Share row + top nav (game-kit) ----
  window.gamekit.shareRow(document.getElementById('shareRow'), {
    slug: 'aim-trainer', title: 'Range',
    message: () => {
      const acc = hits + misses > 0 ? Math.round(hits / (hits + misses) * 100) : 0;
      const mv = movingTargets ? 'moving targets' : null;
      return mode === 'sprint'
        ? window.gamekit.shareText({ verb: 'I sped through', score: '100 targets', game: 'Range', emoji: '🎯', mode: 'Sprint', extra: [(elapsedFrames / 60).toFixed(1) + 's', acc + '% accuracy', mv] })
        : window.gamekit.shareText({ score: score, game: 'Range', emoji: '🎯', mode: sessionSeconds + 's Timed', extra: [acc + '% accuracy', mv] });
    },
    params: () => { const p = mode === 'sprint' ? { mode: 'sprint' } : { mode: 'timed', secs: sessionSeconds }; p.moving = movingTargets ? 1 : 0; return p; },
  });
  window.gamekit.nav({ reset: 'aim-trainer_' });

  // ---- Test hook ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get hits() { return hits; },
    get misses() { return misses; },
    get accuracy() { return hits + misses > 0 ? hits / (hits + misses) : 0; },
    get timeLeft() { return timeLeft; },
    get elapsed() { return elapsedFrames / 60; }, // seconds elapsed (useful for sprint)
    get elapsedFrames() { return elapsedFrames; },
    get targets() { return targets.map(t => ({ x: t.x, y: t.y, r: t.r, vx: t.vx, vy: t.vy, moving: t.moving })); },
    get movingTargets() { return movingTargets; },
    setMoving(on) { movingTargets = !!on; saveMoving(movingTargets); syncMovingToggle(); },
    get bestScore() {
      if (mode === 'timed') return loadBest('timed', sessionSeconds);
      return 0;
    },
    get bestTime() { return loadBest('sprint', 0); }, // frames; 0 = no best
    get mode() { return mode; },
    start() {
      mode = 'timed';
      sessionSeconds = DEFAULT_SESSION;
      startGame();
    },
    startMode(arg) {
      if (arg === 'sprint') {
        mode = 'sprint';
        sessionSeconds = 0;
      } else {
        mode = 'timed';
        sessionSeconds = Number(arg) || DEFAULT_SESSION;
      }
      startGame();
    },
    shootAt(x, y) { shoot(x, y); },
    step(n) { for (let i = 0; i < (n || 1); i++) update(); },
    setSeed(s) { _rng = seededRng(s); },
  };

  resize();
  updateHud();
  loop();
})();
  window.gamekit.pwa();
</script>
</body>
</html>
