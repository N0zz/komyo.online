<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Range</title>
<link rel="icon" href="../../favicon.svg" type="image/svg+xml">
<style>
  :root { --bg:#0d1117; --grid:#1a2030; --accent:#ff7a3c; --fg:#e0e8f0; --dim:#6a7a8a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--fg);
    font-family:'Courier New',Courier,monospace; user-select:none; touch-action:none; }
  #game { display:block; width:100vw; height:100vh; cursor:none; }
  .back { position:fixed; top:8px; left:10px; z-index:9; font-family:inherit; font-size:12px; letter-spacing:1px;
    color:var(--fg); text-decoration:none; background:rgba(13,17,23,0.75); border:1px solid #2a3540; border-radius:7px; padding:6px 10px; cursor:auto; }
  #hud { position:fixed; top:0; left:0; right:0; height:48px; z-index:5; display:flex; align-items:center;
    gap:22px; padding:0 16px; padding-left:100px; background:rgba(13,17,23,0.82); border-bottom:1px solid #1e2d3a; }
  #hud .stat .lbl { opacity:0.5; font-size:10px; letter-spacing:2px; }
  #hud .stat b { color:var(--accent); font-size:15px; }
  #overlay { position:fixed; inset:0; z-index:8; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:16px; background:rgba(13,17,23,0.88); padding:24px; }
  #overlay.hidden { display:none; }
  #overlay h1 { margin:0; font-size:42px; letter-spacing:5px; color:var(--accent); text-shadow:0 0 30px rgba(255,122,60,0.4); }
  #overlay p { margin:2px; font-size:14px; opacity:0.85; max-width:480px; line-height:1.6; letter-spacing:0.5px; }
  #overlay .hint { opacity:0.5; font-size:12px; letter-spacing:1px; }
  #overlay button { font-family:inherit; cursor:pointer; font-size:14px; letter-spacing:2px; padding:10px 28px;
    border-radius:6px; color:var(--fg); background:var(--accent); border:none; margin-top:4px; }
  #endScreen { position:fixed; inset:0; z-index:8; display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; background:rgba(13,17,23,0.92); padding:24px; }
  #endScreen h1 { margin:0; font-size:36px; letter-spacing:4px; color:var(--accent); }
  #endScreen .summary { display:grid; grid-template-columns:1fr 1fr; gap:10px 28px; margin:10px 0; max-width:320px; }
  #endScreen .srow { text-align:left; }
  #endScreen .srow .lbl { opacity:0.5; font-size:11px; letter-spacing:2px; }
  #endScreen .srow b { color:var(--accent); font-size:16px; display:block; }
  #endScreen button { font-family:inherit; cursor:pointer; font-size:13px; letter-spacing:2px; padding:9px 24px;
    border-radius:6px; color:var(--fg); background:var(--accent); border:none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<a class="back" href="../../">‹ Arcade</a>
<div id="hud">
  <div class="stat"><div class="lbl">SCORE</div><b id="hScore">0</b></div>
  <div class="stat"><div class="lbl">ACC</div><b id="hAcc">--%</b></div>
  <div class="stat"><div class="lbl">TIME</div><b id="hTime">30</b></div>
  <div class="stat"><div class="lbl">BEST</div><b id="hBest">0</b></div>
</div>

<div id="overlay">
  <h1>RANGE</h1>
  <p>Click targets as fast as possible. Missing costs you. 30 seconds on the clock.</p>
  <p class="hint">CLICK / TAP TO SHOOT</p>
  <button id="startBtn">READY UP</button>
</div>

<div id="endScreen">
  <h1>RANGE CLEAR</h1>
  <div class="summary">
    <div class="srow"><span class="lbl">SCORE</span><b id="eScore">0</b></div>
    <div class="srow"><span class="lbl">ACCURACY</span><b id="eAcc">--%</b></div>
    <div class="srow"><span class="lbl">HITS</span><b id="eHits">0</b></div>
    <div class="srow"><span class="lbl">MISSES</span><b id="eMisses">0</b></div>
    <div class="srow"><span class="lbl">BEST REACTION</span><b id="eBestReact">--ms</b></div>
    <div class="srow"><span class="lbl">BEST SCORE</span><b id="eBest">0</b></div>
  </div>
  <button id="restartBtn">FIRE AGAIN</button>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const canvas = $('game'), ctx = canvas.getContext('2d');
  const overlay = $('overlay'), endScreen = $('endScreen');
  const HUD_H = 48;

  // ---- Audio ----
  const SND = (() => {
    let ac;
    function ensure() { if (ac !== undefined) return; const AC = window.AudioContext || window.webkitAudioContext; ac = AC ? new AC() : null; }
    function tone(f, d, type, g) { if (!ac) return; const o = ac.createOscillator(), v = ac.createGain(); o.type = type || 'sine'; o.frequency.value = f; v.gain.value = g || 0.1; v.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + d); o.connect(v); v.connect(ac.destination); o.start(); o.stop(ac.currentTime + d); }
    function noise(d, g) { if (!ac) return; const n = ac.createBufferSource(), b = ac.createBuffer(1, Math.max(1, ac.sampleRate * d), ac.sampleRate), dt = b.getChannelData(0); for (let i = 0; i < dt.length; i++) dt[i] = (Math.random() * 2 - 1) * (1 - i / dt.length); n.buffer = b; const v = ac.createGain(); v.gain.value = g || 0.15; const f = ac.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1200; n.connect(f); f.connect(v); v.connect(ac.destination); n.start(); }
    const S = {
      hit: () => { tone(880, 0.06, 'square', 0.08); tone(1200, 0.04, 'sine', 0.05); },
      miss: () => noise(0.08, 0.06),
      spawn: () => tone(440, 0.04, 'sine', 0.04),
      end: () => { [660, 550, 440].forEach((f, i) => setTimeout(() => tone(f, 0.2, 'triangle', 0.1), i * 100)); },
    };
    return { play(n) { ensure(); if (ac && ac.state === 'suspended') ac.resume(); if (ac) (S[n] || (() => {}))(); } };
  })();

  // ---- Constants ----
  const SESSION = 30;
  const TARGET_BASE_R = 34;
  const SPAWN_INTERVAL_INIT = 90;
  const SPAWN_INTERVAL_MIN = 40;

  // ---- State ----
  let state = 'ready'; // ready | playing | over
  let score = 0, hits = 0, misses = 0, timeLeft = SESSION;
  let targets = [], particles = [];
  let frame = 0, spawnTimer = 0, spawnInterval = SPAWN_INTERVAL_INIT;
  let reticle = { x: -100, y: -100 };
  let hitMarkers = [];
  let bestReact = Infinity, lastSpawnFrame = 0;
  let combo = 0;
  let bestScore = 0, bestAccuracy = 0;
  let W = 0, H = 0;

  function loadBest() {
    try { bestScore = parseInt(localStorage.getItem('aim-trainer_best') || '0', 10) || 0; } catch (e) { bestScore = 0; }
  }
  function saveBest() {
    try { localStorage.setItem('aim-trainer_best', String(bestScore)); } catch (e) {}
  }
  loadBest();

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);

  function updateHud() {
    const acc = hits + misses > 0 ? Math.round(hits / (hits + misses) * 100) : null;
    $('hScore').textContent = score;
    $('hAcc').textContent = acc !== null ? acc + '%' : '--%';
    $('hTime').textContent = Math.ceil(timeLeft);
    $('hBest').textContent = bestScore;
  }

  function rng(min, max) { return min + Math.random() * (max - min); }
  function seededRng(seed) {
    let s = seed | 0;
    return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
  }

  let _rng = Math.random;
  function spawnTarget() {
    const pad = 80;
    const x = pad + _rng() * (W - pad * 2);
    const y = HUD_H + pad + _rng() * (H - HUD_H - pad * 2);
    const r = TARGET_BASE_R * (0.75 + _rng() * 0.6);
    targets.push({ x, y, r, born: frame, life: 1 });
    lastSpawnFrame = frame;
    SND.play('spawn');
  }

  function startParticles(x, y, hit) {
    const count = hit ? 14 : 6;
    const col = hit ? '#ff7a3c' : '#4a5a6a';
    for (let i = 0; i < count; i++) {
      const a = (i / count) * Math.PI * 2 + rng(-0.3, 0.3);
      const spd = hit ? rng(2, 7) : rng(1, 3);
      particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, r: rng(2, hit ? 5 : 3), life: 1, col });
    }
  }

  function shoot(px, py) {
    if (state !== 'playing') return;
    let hit = false;
    for (let i = targets.length - 1; i >= 0; i--) {
      const t = targets[i];
      const d = Math.hypot(px - t.x, py - t.y);
      if (d <= t.r) {
        const reactMs = Math.round((frame - t.born) * (1000 / 60));
        if (reactMs < bestReact) bestReact = reactMs;
        const mult = 1 + Math.floor(combo / 3);
        score += 10 * mult;
        hits++;
        combo++;
        targets.splice(i, 1);
        startParticles(px, py, true);
        hitMarkers.push({ x: px, y: py, life: 1 });
        SND.play('hit');
        hit = true;
        spawnTarget();
        break;
      }
    }
    if (!hit) {
      misses++;
      combo = 0;
      startParticles(px, py, false);
      SND.play('miss');
    }
    updateHud();
  }

  function reset() {
    score = 0; hits = 0; misses = 0; timeLeft = SESSION;
    targets = []; particles = []; hitMarkers = [];
    frame = 0; spawnTimer = 0; spawnInterval = SPAWN_INTERVAL_INIT;
    combo = 0; bestReact = Infinity;
  }

  function startGame() {
    reset();
    _rng = Math.random;
    state = 'playing';
    overlay.classList.add('hidden');
    endScreen.style.display = 'none';
    spawnTarget();
    updateHud();
  }

  function endGame() {
    state = 'over';
    SND.play('end');
    const acc = hits + misses > 0 ? Math.round(hits / (hits + misses) * 100) : 0;
    bestAccuracy = acc;
    if (score > bestScore) { bestScore = score; saveBest(); }
    $('eScore').textContent = score;
    $('eAcc').textContent = acc + '%';
    $('eHits').textContent = hits;
    $('eMisses').textContent = misses;
    $('eBestReact').textContent = bestReact < Infinity ? bestReact + 'ms' : '--ms';
    $('eBest').textContent = bestScore;
    endScreen.style.display = 'flex';
    updateHud();
  }

  function update() {
    if (state !== 'playing') return;
    frame++;
    timeLeft -= 1 / 60;
    if (timeLeft <= 0) { timeLeft = 0; endGame(); return; }

    // escalate spawn pace
    const elapsed = SESSION - timeLeft;
    spawnInterval = Math.max(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL_INIT - Math.floor(elapsed * 0.8));

    // no target safety-spawn
    if (targets.length === 0) { spawnTarget(); spawnTimer = 0; }

    // update target life (for pop-in animation)
    for (const t of targets) t.life = Math.min(1, (frame - t.born) / 6);

    // update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.88; p.vy *= 0.88;
      p.life -= 0.045;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // update hit markers
    for (let i = hitMarkers.length - 1; i >= 0; i--) {
      hitMarkers[i].life -= 0.06;
      if (hitMarkers[i].life <= 0) hitMarkers.splice(i, 1);
    }
  }

  // ---- Render ----
  function drawGrid() {
    const step = 48;
    ctx.strokeStyle = '#161e2a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x < W; x += step) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (let y = HUD_H; y < H; y += step) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();

    // range lane lines
    ctx.strokeStyle = '#1a2535';
    ctx.lineWidth = 2;
    const laneW = W / 3;
    for (let i = 1; i < 3; i++) {
      ctx.beginPath(); ctx.moveTo(laneW * i, HUD_H); ctx.lineTo(laneW * i, H); ctx.stroke();
    }
    // floor line
    ctx.strokeStyle = '#2a3545';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H - 8); ctx.lineTo(W, H - 8); ctx.stroke();
    ctx.strokeStyle = '#ff7a3c22';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, H - 6); ctx.lineTo(W, H - 6); ctx.stroke();
  }

  function drawTarget(t) {
    const { x, y, r, life } = t;
    const s = life; // pop-in scale
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);

    // outer ring
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#1a2030';
    ctx.fill();
    ctx.strokeStyle = '#ff7a3c';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // middle ring
    ctx.beginPath(); ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2);
    ctx.strokeStyle = '#ff7a3c99';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // inner ring
    ctx.beginPath(); ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2);
    ctx.strokeStyle = '#ff7a3c';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // bullseye
    ctx.beginPath(); ctx.arc(0, 0, r * 0.12, 0, Math.PI * 2);
    ctx.fillStyle = '#ff7a3c';
    ctx.fill();

    // crosshair ticks
    ctx.strokeStyle = '#ff7a3c88';
    ctx.lineWidth = 1;
    const tk = r * 0.15;
    [[r + tk, 0], [-(r + tk), 0], [0, r + tk], [0, -(r + tk)]].forEach(([ex, ey]) => {
      ctx.beginPath(); ctx.moveTo(ex * 0.7, ey * 0.7); ctx.lineTo(ex, ey); ctx.stroke();
    });

    ctx.restore();
  }

  function drawCrosshair(x, y) {
    const cr = 12, gap = 5, tickLen = 8;
    ctx.strokeStyle = '#ff7a3c';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y, cr, 0, Math.PI * 2);
    ctx.stroke();
    // center dot
    ctx.fillStyle = '#ff7a3c';
    ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI * 2); ctx.fill();
    // ticks
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    ctx.strokeStyle = '#ff7a3c';
    ctx.lineWidth = 1.5;
    dirs.forEach(([dx, dy]) => {
      ctx.beginPath();
      ctx.moveTo(x + dx * (cr + gap), y + dy * (cr + gap));
      ctx.lineTo(x + dx * (cr + gap + tickLen), y + dy * (cr + gap + tickLen));
      ctx.stroke();
    });
  }

  function render() {
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);
    drawGrid();

    // particles
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // hit markers (X mark)
    for (const m of hitMarkers) {
      ctx.globalAlpha = Math.max(0, m.life);
      ctx.strokeStyle = '#ff7a3c';
      ctx.lineWidth = 2;
      const s = 8;
      ctx.beginPath(); ctx.moveTo(m.x - s, m.y - s); ctx.lineTo(m.x + s, m.y + s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(m.x + s, m.y - s); ctx.lineTo(m.x - s, m.y + s); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // targets
    for (const t of targets) drawTarget(t);

    // combo
    if (state === 'playing' && combo >= 3) {
      ctx.fillStyle = '#ff7a3c';
      ctx.font = 'bold 14px "Courier New",monospace';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText('x' + (1 + Math.floor(combo / 3)) + ' COMBO', W - 16, HUD_H + 8);
    }

    // time warning
    if (state === 'playing' && timeLeft <= 5) {
      ctx.globalAlpha = 0.15 + 0.12 * Math.sin(frame * 0.3);
      ctx.strokeStyle = '#ff7a3c';
      ctx.lineWidth = 4;
      ctx.strokeRect(2, 2, W - 4, H - 4);
      ctx.globalAlpha = 1;
    }

    // crosshair
    if (state === 'playing') drawCrosshair(reticle.x, reticle.y);
  }

  function loop() {
    requestAnimationFrame(loop);
    try { update(); render(); } catch (e) { if (window.console) console.error(e); }
  }

  // ---- Input ----
  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (W / rect.width),
      y: (e.clientY - rect.top) * (H / rect.height),
    };
  }

  canvas.addEventListener('pointerdown', e => {
    const { x, y } = getCanvasPos(e);
    shoot(x, y);
  });
  canvas.addEventListener('pointermove', e => {
    const { x, y } = getCanvasPos(e);
    reticle.x = x; reticle.y = y;
  });

  $('startBtn').addEventListener('click', startGame);
  $('restartBtn').addEventListener('click', startGame);

  // ---- Test hook ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get hits() { return hits; },
    get misses() { return misses; },
    get accuracy() { return hits + misses > 0 ? hits / (hits + misses) : 0; },
    get timeLeft() { return timeLeft; },
    get targets() { return targets.map(t => ({ x: t.x, y: t.y, r: t.r })); },
    get bestScore() { return bestScore; },
    start: startGame,
    shootAt(x, y) { shoot(x, y); },
    step(n) { for (let i = 0; i < (n || 1); i++) update(); },
    // expose for determinism in tests
    setSeed(s) { _rng = seededRng(s); },
  };

  resize();
  updateHud();
  loop();
})();
</script>
</body>
</html>
