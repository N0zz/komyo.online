<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Range</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#ff7a3c">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Range">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="../../analytics.js" defer></script>
<link rel="stylesheet" href="../../game-kit.css">
<script src="../../version.js"></script>
<script src="../../game-kit.js"></script>
<script src="../../challenges.js"></script>
<script src="../../cosmetics.js"></script>
<script src="../../i18n.js"></script>
<style>
  :root { --bg:#0d1117; --grid:#1a2030; --accent:#ff7a3c; --fg:#e0e8f0; --dim:#6a7a8a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--fg);
    font-family:'Courier New',Courier,monospace; user-select:none; touch-action:none; }
  #game { display:block; width:100vw; height:100vh; cursor:none; }
  /* .gamekit-hud (shared kit) provides center-top placement, pill, wrap + font; keep only item colors. */
  #hud .stat b { color:var(--accent); }
  #hud #hTime.warn { color:#ff3c3c; }
  #hud #hMode { color:var(--dim); font-weight:400; }
  /* start / pause / end screens come from the shared gamekit.menu (MENU_THEME below) */
</style>
</head>
<body>
<canvas id="game" data-gk-hide-cursor></canvas>
<div id="hud" class="gamekit-hud">
  <div class="stat"><span class="lbl" id="hScoreLbl">SCORE</span><b id="hScore">0</b></div>
  <div class="stat"><span class="lbl">ACC</span><b id="hAcc">--%</b></div>
  <div class="stat"><span id="hTimeLbl" class="lbl">TIME</span><b id="hTime">30</b></div>
  <div class="stat"><span id="hBestLbl" class="lbl">BEST</span><b id="hBest">0</b></div>
  <div class="stat"><b id="hMode">Timed 30s</b></div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const canvas = $('game'), ctx = canvas.getContext('2d');
  const KIT = window.gamekit;
  // Top headroom the playfield must reserve for the kit's center-top .gamekit-hud pill.
  function hudBottom() { return KIT.layout.hudTop(); }
  let HUD_H = hudBottom();

  // ---- Audio (game-kit shared engine + global mute) ----
  const SND = window.gamekit.sound;
  SND.define({
    hit: (c) => { c.voice({ f: 1100, dur: 0.05, type: 'square', gain: 0.1, filter: 'bandpass', cutoff: 1800, q: 2 }); c.voice({ f: 1760, dur: 0.04, type: 'sine', gain: 0.05, t: c.now() + 0.015, reverb: 0.1 }); },
    miss: (c) => c.noiseHit({ dur: 0.1, gain: 0.08, filter: 'lowpass', cutoff: 700, cutoffTo: 300 }),
    spawn: (c) => c.voice({ f: 660, dur: 0.05, type: 'sine', gain: 0.05, filter: 'highpass', cutoff: 400 }),
    end: (c) => c.play('gameover'),
  });

  // ---- Constants ----
  const DEFAULT_SESSION = 30;
  let SPRINT_TARGET = 100; // selectable in the menu: 10 / 50 / 100
  const TARGET_BASE_R = 34;
  const SPAWN_INTERVAL_INIT = 90;
  const SPAWN_INTERVAL_MIN = 40;
  // Moving-targets ramp: fraction of targets that move + their speed both grow with score.
  const MOVE_START_SCORE = 50;   // points before any target starts drifting
  const MOVE_FULL_SCORE = 400;   // score at which the ramp is maxed out
  const MOVE_MAX_FRACTION = 0.85; // at most this share of targets move
  const MOVE_SPEED_MIN = 0.4;    // px/frame at the moment movement begins
  const MOVE_SPEED_MAX = 2.6;    // px/frame at full ramp

  // ---- Mode state ----
  // mode: 'timed' | 'sprint'
  // sessionSeconds: number (only for timed)
  let mode = 'timed';
  let sessionSeconds = DEFAULT_SESSION;

  // ---- Moving targets (opt-in, persisted) ----
  const MOVING_KEY = 'aim-trainer_moving';
  function loadMoving() {
    try { return localStorage.getItem(MOVING_KEY) === '1'; } catch (e) { return false; }
  }
  function saveMoving(on) {
    try { localStorage.setItem(MOVING_KEY, on ? '1' : '0'); } catch (e) {}
  }
  let movingTargets = loadMoving();

  // ---- State ----
  let state = 'ready'; // ready | playing | winning | over
  const SPRINT_WIN_HOLD = 18; // frames (~300ms @60fps) — see the sprint win check in shoot()
  let winHoldFrames = 0;
  let score = 0, hits = 0, misses = 0, timeLeft = sessionSeconds;
  let elapsedFrames = 0; // for sprint: count-up timer
  let targets = [], particles = [];
  let frame = 0, spawnTimer = 0, spawnInterval = SPAWN_INTERVAL_INIT;
  let reticle = { x: -100, y: -100 };
  let hitMarkers = [];
  let bestReact = Infinity, lastSpawnFrame = 0;
  let combo = 0;
  let W = 0, H = 0;

  // per-mode bests: timed stores best score, sprint stores best time (frames)
  // one label per mode+amount — the single key for bests (menu + profile) AND the record.
  // Timed keeps the best SCORE (max); Sprint keeps the best TIME (min). Moving is a toggle, not its own board.
  const modeLabel = (m, amt) => m === 'sprint' ? ('Sprint · ' + amt + ' targets') : ('Timed · ' + amt + 's');
  const hudModeLabel = () => (mode === 'sprint' ? KIT.t('game.aim-trainer.hudModeSprint', { n: SPRINT_TARGET, def: 'Sprint ' + SPRINT_TARGET }) : KIT.t('game.aim-trainer.hudModeTimed', { n: sessionSeconds, def: 'Timed ' + sessionSeconds + 's' })) + (movingTargets ? KIT.t('game.aim-trainer.hudMoving', { def: ' · moving' }) : '');
  function loadBest(m, s) {
    if (!KIT) return 0;
    return m === 'sprint' ? KIT.best('aim-trainer', modeLabel('sprint', SPRINT_TARGET)).time
                          : KIT.best('aim-trainer', modeLabel('timed', s || sessionSeconds)).score;
  }
  function saveBest(m, s, val) {
    if (!KIT) return;
    if (m === 'sprint') KIT.saveBest('aim-trainer', modeLabel('sprint', SPRINT_TARGET), { time: val });
    else KIT.saveBest('aim-trainer', modeLabel('timed', s || sessionSeconds), { score: val });
  }

  // bestScore used by HUD and __test — means: best score for timed, 0 for sprint (sprint uses bestTime)
  // We compute it dynamically from localStorage
  function getBestForCurrentMode() {
    if (mode === 'sprint') {
      const t = loadBest('sprint', 0);
      return t; // stored as frames; 0 = no best yet
    }
    return loadBest('timed', sessionSeconds);
  }

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    KIT.fitCanvas(canvas, W, H);
    HUD_H = hudBottom();
    // pull live targets back on-screen — a rotation can otherwise strand the current target
    for (const t of targets) {
      t.x = Math.min(Math.max(t.x, t.r + 4), W - t.r - 4);
      t.y = Math.min(Math.max(t.y, HUD_H + t.r + 4), H - t.r - 4);
    }
  }
  window.gamekit.layout.on(resize); // resize + orientationchange + visualViewport, debounced

  function updateHud() {
    const acc = hits + misses > 0 ? Math.round(hits / (hits + misses) * 100) : null;
    $('hScore').textContent = score;
    $('hAcc').textContent = acc !== null ? acc + '%' : '--%';
    $('hMode').textContent = hudModeLabel();

    if (mode === 'sprint') {
      $('hScoreLbl').textContent = KIT.t('game.aim-trainer.hudTargets', { def: 'TARGETS' });
      $('hScore').textContent = hits + ' / ' + SPRINT_TARGET;
      $('hTimeLbl').textContent = KIT.t('game.aim-trainer.hudElapsed', { def: 'ELAPSED' });
      const secs = (elapsedFrames / 60).toFixed(1);
      $('hTime').textContent = secs + 's';
      $('hTime').className = '';
      $('hBestLbl').textContent = KIT.t('game.aim-trainer.hudBestTime', { def: 'BEST TIME' });
      const bt = loadBest('sprint', 0);
      $('hBest').textContent = bt > 0 ? (bt / 1000).toFixed(1) + 's' : '--';
    } else {
      $('hScoreLbl').textContent = KIT.t('game.aim-trainer.hudScore', { def: 'SCORE' });
      $('hTimeLbl').textContent = KIT.t('game.aim-trainer.hudTime', { def: 'TIME' });
      const tl = Math.ceil(timeLeft);
      $('hTime').textContent = tl;
      $('hTime').className = (state === 'playing' && timeLeft <= 5) ? 'warn' : '';
      $('hBestLbl').textContent = KIT.t('game.common.best', { def: 'BEST' });
      $('hBest').textContent = loadBest('timed', sessionSeconds);
    }
  }

  function rng(min, max) { return min + Math.random() * (max - min); }
  function seededRng(seed) {
    let s = seed | 0;
    return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0x100000000; };
  }

  let _rng = Math.random;
  function spawnTarget() {
    const pad = 80;
    const x = pad + _rng() * (W - pad * 2);
    const y = HUD_H + pad + _rng() * (H - HUD_H - pad * 2);
    const r = TARGET_BASE_R * (0.75 + _rng() * 0.6);
    targets.push({ x, y, r, born: frame, life: 1, vx: 0, vy: 0, moving: false });
    lastSpawnFrame = frame;
    SND.play('spawn');
  }

  function startParticles(x, y, hit) {
    const count = hit ? 14 : 6;
    const col = hit ? '#ff7a3c' : '#4a5a6a';
    for (let i = 0; i < count; i++) {
      const a = (i / count) * Math.PI * 2 + rng(-0.3, 0.3);
      const spd = hit ? rng(2, 7) : rng(1, 3);
      particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, r: rng(2, hit ? 5 : 3), life: 1, col });
    }
  }

  function shoot(px, py) {
    if (state !== 'playing') return;
    reticle.x = px; reticle.y = py; // the crosshair marks the LAST shot (so touch gets a static mark, not a dragging cursor)
    let hit = false;
    for (let i = targets.length - 1; i >= 0; i--) {
      const t = targets[i];
      const d = Math.hypot(px - t.x, py - t.y);
      if (d <= t.r) {
        const reactMs = Math.round((frame - t.born) * (1000 / 60));
        if (reactMs < bestReact) bestReact = reactMs;
        const mult = 1 + Math.floor(combo / 3);
        score += 10 * mult;
        hits++;
        combo++;
        targets.splice(i, 1);
        startParticles(px, py, true);
        hitMarkers.push({ x: px, y: py, life: 1 });
        SND.play('hit');
        hit = true;
        // sprint win check — hold on a "winning" state for a beat so the progress bar is actually
        // seen filling to 100% (with a flash) before the end screen appears, instead of cutting to
        // it on the same frame as the winning hit (read as "did that even count?").
        if (mode === 'sprint' && hits >= SPRINT_TARGET) { state = 'winning'; winHoldFrames = 0; updateHud(); return; }
        spawnTarget();
        break;
      }
    }
    if (!hit) {
      misses++;
      combo = 0;
      startParticles(px, py, false);
      SND.play('miss');
    }
    updateHud();
  }

  function reset() {
    score = 0; hits = 0; misses = 0;
    timeLeft = mode === 'timed' ? sessionSeconds : 0;
    elapsedFrames = 0;
    targets = []; particles = []; hitMarkers = [];
    frame = 0; spawnTimer = 0; spawnInterval = SPAWN_INTERVAL_INIT;
    combo = 0; bestReact = Infinity; winHoldFrames = 0;
  }

  function startGame() {
    reset();
    _rng = Math.random;
    state = 'playing';
    if (KIT) { KIT.menu.hide(); KIT.showMenuButton(true); KIT.showPauseButton(true); }
    spawnTarget();
    updateHud();
  }

  function endGame() {
    state = 'over';
    SND.play('end');
    const acc = hits + misses > 0 ? Math.round(hits / (hits + misses) * 100) : 0;
    let isBest = false;
    if (mode === 'sprint') { const prev = loadBest('sprint', 0), ms = Math.round(elapsedFrames / 60 * 1000); isBest = prev === 0 || ms < prev; if (isBest) saveBest('sprint', 0, ms); }
    else { const prev = loadBest('timed', sessionSeconds); isBest = score > prev; if (isBest) saveBest('timed', sessionSeconds, score); }
    showEnd(acc, isBest);
    updateHud();
  }

  // ---- shared menus (gamekit.menu) — tactical theme + target-range backdrop ----
  const MENU_THEME = { accent: '#ff7a3c', glow: '0 0 18px rgba(255,122,60,0.45)', bg: 'rgba(13,17,23,0.72)',
    border: 'rgba(255,122,60,0.3)', overlay: 'rgba(8,11,16,0.6)', title: '#ff9a5c', 'on-accent': '#160a04', 'accent-soft': 'rgba(255,122,60,0.18)' };
  function menuTarget(g, x, y, R) {
    g.fillStyle = '#1a2030'; g.beginPath(); g.arc(x, y, R, 0, 7); g.fill();
    g.strokeStyle = '#ff7a3c'; g.lineWidth = 2.5; g.beginPath(); g.arc(x, y, R, 0, 7); g.stroke();
    g.strokeStyle = 'rgba(255,122,60,.6)'; g.lineWidth = 1.5; g.beginPath(); g.arc(x, y, R * .65, 0, 7); g.stroke();
    g.strokeStyle = '#ff7a3c'; g.beginPath(); g.arc(x, y, R * .35, 0, 7); g.stroke();
    g.fillStyle = '#ff7a3c'; g.beginPath(); g.arc(x, y, R * .12, 0, 7); g.fill();
    g.strokeStyle = 'rgba(255,122,60,.5)'; [[0, -1], [0, 1], [-1, 0], [1, 0]].forEach(d => { g.beginPath(); g.moveTo(x + d[0] * (R + 3), y + d[1] * (R + 3)); g.lineTo(x + d[0] * (R + 9), y + d[1] * (R + 9)); g.stroke(); });
  }
  function menuBackdrop(g, w, h, st, frame) {
    frame = frame || 0;
    g.fillStyle = '#0d1117'; g.fillRect(0, 0, w, h);
    g.strokeStyle = '#161e2a'; g.lineWidth = 1; for (let x = 0; x < w; x += 48) { g.beginPath(); g.moveTo(x, 0); g.lineTo(x, h); g.stroke(); } for (let y = 0; y < h; y += 48) { g.beginPath(); g.moveTo(0, y); g.lineTo(w, y); g.stroke(); }
    g.strokeStyle = '#1a2535'; g.lineWidth = 2; [.25, .5, .75].forEach(f => { g.beginPath(); g.moveTo(w * f, 0); g.lineTo(w * f, h); g.stroke(); });
    g.strokeStyle = '#2a3545'; g.beginPath(); g.moveTo(0, h * .82); g.lineTo(w, h * .82); g.stroke();
    // the targets themselves drift slowly, like the in-game "moving targets" mode
    [[.2, .32, 26, 0], [.7, .26, 22, 1.6], [.5, .6, 30, 3.1], [.84, .66, 20, 4.5]].forEach(t => {
      const x = w * (t[0] + 0.045 * Math.sin(frame * 0.010 + t[3]));
      const y = h * (t[1] + 0.03 * Math.sin(frame * 0.013 + t[3] * 1.4));
      menuTarget(g, x, y, t[2]);
    });
  }
  function pvRange(g, w, h, variant) {
    g.fillStyle = '#0d1117'; g.fillRect(0, 0, w, h); g.strokeStyle = '#161e2a'; for (let x = 0; x < w; x += 16) { g.beginPath(); g.moveTo(x, 0); g.lineTo(x, h); g.stroke(); }
    [[w * .28, h * .36], [w * .7, h * .32], [w * .5, h * .72]].forEach(p => menuTarget(g, p[0], p[1], 11));
    if (variant === 'timed') { g.strokeStyle = '#ffd23f'; g.lineWidth = 2.5; g.beginPath(); g.arc(15, h - 15, 8, -1.3, 3.6); g.stroke(); }
    else if (variant === 'reaction') { g.fillStyle = '#ff9a5c'; g.font = '700 12px system-ui'; g.fillText('~230ms', 6, h - 8); }
    else { g.fillStyle = '#ff9a5c'; g.font = '700 13px system-ui'; g.fillText('→' + SPRINT_TARGET, 6, h - 8); }
  }
  const rangeParams = () => { const m = rangeLastMode || 'timed'; const p = m === 'sprint' ? { mode: 'sprint', target: SPRINT_TARGET } : { mode: 'timed', secs: sessionSeconds }; p.moving = movingTargets ? 1 : 0; return p; };
  function shareMsg() {
    const acc = hits + misses > 0 ? Math.round(hits / (hits + misses) * 100) : 0; const mv = movingTargets ? KIT.t('game.aim-trainer.shareMoving', { def: 'moving targets' }) : null;
    return mode === 'sprint'
      ? KIT.shareText({ verb: KIT.t('game.aim-trainer.shareVerb', { def: 'I cleared' }), score: KIT.t('game.aim-trainer.shareTargets', { n: SPRINT_TARGET, def: SPRINT_TARGET + ' targets' }), game: KIT.t('game.aim-trainer.gameName', { def: 'Range' }), emoji: '🎯', mode: KIT.t('game.aim-trainer.modeSprint', { def: 'Sprint' }), extra: [KIT.t('game.aim-trainer.shareTime', { s: (elapsedFrames / 60).toFixed(1), def: (elapsedFrames / 60).toFixed(1) + 's' }), KIT.t('game.aim-trainer.shareAccuracy', { pct: acc, def: acc + '% accuracy' }), mv] })
      : KIT.shareText({ score: score, game: KIT.t('game.aim-trainer.gameName', { def: 'Range' }), emoji: '🎯', mode: KIT.t('game.aim-trainer.shareModeTimed', { n: sessionSeconds, def: sessionSeconds + 's Timed' }), extra: [KIT.t('game.aim-trainer.shareAccuracy', { pct: acc, def: acc + '% accuracy' }), mv] });
  }
  let rangeLastMode = null;
  function showStartMenu(m) {
    m = m || selectedMode || 'timed'; selectedMode = m; rangeLastMode = m;
    state = 'ready'; if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if (!KIT) return;
    const amounts = m === 'sprint'
      ? [{ id: '10', label: '10' }, { id: '50', label: '50' }, { id: '100', label: '100' }]
      : [{ id: '10', label: '10s' }, { id: '30', label: '30s' }, { id: '60', label: '60s' }];
    KIT.menu.show({ kind: 'start', theme: MENU_THEME, title: KIT.t('game.aim-trainer.title', { def: 'RANGE' }), backdrop: menuBackdrop, backdropAnimate: true,
      groups: [
        { id: 'mode', label: KIT.t('game.common.modeLabel', { def: 'MODE' }), style: 'cards', default: m, choices: [
          { id: 'timed', label: KIT.t('game.aim-trainer.modeTimed', { def: 'Timed' }), mech: [KIT.t('game.aim-trainer.mechBeatClock', { def: 'Beat the clock' })], best: st => loadBest('timed', Number(st.amount) || DEFAULT_SESSION), preview: (g, w, h) => pvRange(g, w, h, 'timed') },
          { id: 'sprint', label: KIT.t('game.aim-trainer.modeSprint', { def: 'Sprint' }), mech: [KIT.t('game.aim-trainer.mechRace', { def: 'Race to a count' })], best: () => { const t = loadBest('sprint', 0); return t > 0 ? (t / 1000).toFixed(1) + 's' : '--'; }, preview: (g, w, h) => pvRange(g, w, h, 'sprint') },
          { id: 'reaction', label: KIT.t('game.aim-trainer.modeReaction', { def: 'Reaction' }), tag: KIT.t('game.aim-trainer.soon', { def: 'SOON' }), locked: true, mech: [KIT.t('game.aim-trainer.mechPopups', { def: 'Random pop-ups' }), KIT.t('game.aim-trainer.mechAvgReaction', { def: 'Avg reaction ms' })],
            desc: KIT.t('game.aim-trainer.reactionDesc', { def: 'Targets pop up at random moments — your average reaction time is the score.' }),
            preview: (g, w, h) => pvRange(g, w, h, 'reaction') },
        ] },
        { id: 'amount', label: m === 'sprint' ? KIT.t('game.aim-trainer.hudTargets', { def: 'TARGETS' }) : KIT.t('game.aim-trainer.duration', { def: 'DURATION' }), default: m === 'sprint' ? String(SPRINT_TARGET) : String(sessionSeconds), choices: amounts },
      ],
      toggles: [{ id: 'moving', label: KIT.t('game.aim-trainer.movingToggle', { def: 'Moving targets' }), caption: KIT.t('game.aim-trainer.movingCaption', { def: 'they drift once you warm up' }), default: movingTargets }],
      actions: [{ id: 'play', label: KIT.t('game.aim-trainer.readyUp', { def: 'READY UP' }), primary: true }],
      hint: st => st.mode === 'sprint' ? KIT.t('game.aim-trainer.hintSprint', { def: 'Hit the target count as fast as you can.' }) : KIT.t('game.aim-trainer.hintTimed', { def: 'Score as many hits as you can before time runs out.' }),
      onChange: st => {
        movingTargets = !!st.moving; saveMoving(movingTargets);
        if (st.mode !== rangeLastMode) { rangeLastMode = st.mode; if (st.mode === 'sprint') SPRINT_TARGET = 100; else sessionSeconds = DEFAULT_SESSION; showStartMenu(st.mode); return; }
        if (st.mode === 'sprint') SPRINT_TARGET = Number(st.amount) || 100; else sessionSeconds = Number(st.amount) || DEFAULT_SESSION;
        KIT.stampUrl(rangeParams());
      },
      onPlay: st => {
        mode = st.mode; movingTargets = !!st.moving; saveMoving(movingTargets);
        if (st.mode === 'sprint') SPRINT_TARGET = Number(st.amount) || 100; else sessionSeconds = Number(st.amount) || DEFAULT_SESSION;
        KIT.stampUrl(rangeParams()); startGame();
      },
    });
    KIT.stampUrl(rangeParams());
  }
  function showEnd(acc, isBest) {
    if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if (!KIT) return;
    const isSprint = mode === 'sprint';
    const detail = KIT.t('game.aim-trainer.endStats', { acc: acc, hits: hits, misses: misses, def: acc + '% accuracy · ' + hits + ' hits · ' + misses + ' misses' }) + (bestReact < Infinity ? KIT.t('game.aim-trainer.endReact', { ms: bestReact, def: ' · ' + bestReact + 'ms' }) : '');
    const cfg = { kind: 'end', theme: MENU_THEME, backdrop: menuBackdrop, backdropAnimate: true, title: isSprint ? KIT.t('game.aim-trainer.sprintClear', { def: 'SPRINT CLEAR' }) : KIT.t('game.aim-trainer.timesUp', { def: "TIME'S UP" }), lines: [detail],
      share: { slug: 'aim-trainer', accent: '#ff7a3c', icon: '🎯', title: KIT.t('game.aim-trainer.gameName', { def: 'Range' }), message: () => shareMsg(), params: () => rangeParams() },
      record: { slug: 'aim-trainer', mode: modeLabel(mode, mode === 'sprint' ? SPRINT_TARGET : sessionSeconds), score: score, time: Math.round(elapsedFrames / 60 * 1000), stats: { accuracy: acc } },
      actions: [ { id: 'again', label: KIT.t('game.aim-trainer.fireAgain', { def: 'FIRE AGAIN' }), primary: true }, { id: 'menu', label: KIT.t('game.common.menu', { def: 'MENU' }) } ],
      onAction: id => { if (id === 'again') startGame(); else if (id === 'menu') toMenu(); } };
    if (isSprint) {
      // sprint's "best" is a TIME, not a score, so it can't use the generic cfg.best/newBest
      // paragraph (that renders via fmtScore and only appears at all when cfg.best is a score) —
      // it already has its own custom bestTimeLine; fold the same ★ New best! badge into THAT
      // line instead (regression: isBest was computed but never surfaced anywhere for sprint).
      const bt = loadBest('sprint', 0);
      cfg.score = elapsedFrames; cfg.scoreText = (elapsedFrames / 60).toFixed(2) + 's';
      const bestLine = KIT.t('game.aim-trainer.bestTimeLine', { time: (bt > 0 ? (bt / 1000).toFixed(2) + 's' : '--'), def: 'Best ' + (bt > 0 ? (bt / 1000).toFixed(2) + 's' : '--') });
      cfg.lines.unshift(isBest ? bestLine + ' <span class="gkm-new">' + KIT.t('menu.newBest', { def: '★ New best!' }) + '</span>' : bestLine);
    }
    else { cfg.score = score; cfg.best = loadBest('timed', sessionSeconds); cfg.newBest = isBest; }
    KIT.menu.show(cfg);
  }
  function pauseGame() { if (state !== 'playing' || !KIT) return; state = 'paused';
    KIT.menu.show({ kind: 'pause', theme: MENU_THEME, title: KIT.t('game.common.paused', { def: 'PAUSED' }),
      actions: [ { id: 'resume', label: KIT.t('game.common.resume', { def: 'RESUME (ESC)' }), primary: true }, { id: 'menu', label: KIT.t('game.common.quitToMenu', { def: 'QUIT TO MENU' }), danger: true } ],
      onAction: id => { if (id === 'resume') resumeGame(); else if (id === 'menu') toMenu(); }, onEsc: resumeGame }); }
  function resumeGame() { if (state !== 'paused') return; state = 'playing'; if (KIT) KIT.menu.hide(); }
  function toMenu() { if (KIT) KIT.menu.hide(); showStartMenu(selectedMode); }

  function update() {
    if (state === 'winning') {
      // frozen gameplay (no more spawns/hits), just holding the final frame on-screen; freezing
      // elapsedFrames here also means the recorded clear time is the real win moment, not padded
      winHoldFrames++;
      if (winHoldFrames >= SPRINT_WIN_HOLD) endGame();
      return;
    }
    if (state !== 'playing') return;
    frame++;
    elapsedFrames++;

    if (mode === 'timed') {
      timeLeft -= 1 / 60;
      if (timeLeft <= 0) { timeLeft = 0; endGame(); return; }
      const elapsed = sessionSeconds - timeLeft;
      spawnInterval = Math.max(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL_INIT - Math.floor(elapsed * 0.8));
    } else {
      // sprint: escalate based on score
      spawnInterval = Math.max(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL_INIT - Math.floor(score * 0.5));
    }

    // no target safety-spawn
    if (targets.length === 0) { spawnTarget(); spawnTimer = 0; }

    // update target life (for pop-in animation)
    for (const t of targets) t.life = Math.min(1, (frame - t.born) / 6);

    // moving targets: more targets drift + faster, the higher the score
    if (movingTargets) updateMovement();

    // update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.88; p.vy *= 0.88;
      p.life -= 0.045;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // update hit markers
    for (let i = hitMarkers.length - 1; i >= 0; i--) {
      hitMarkers[i].life -= 0.06;
      if (hitMarkers[i].life <= 0) hitMarkers.splice(i, 1);
    }

    updateHud(); // was only refreshed on shoot() — the on-screen clock/elapsed HUD now ticks live
  }

  function moveRamp() {
    if (score <= MOVE_START_SCORE) return 0;
    const p = (score - MOVE_START_SCORE) / (MOVE_FULL_SCORE - MOVE_START_SCORE);
    return Math.max(0, Math.min(1, p));
  }

  function updateMovement() {
    const p = moveRamp();
    // how many of the on-screen targets should be moving right now
    const wantMoving = p > 0 ? Math.ceil(MOVE_MAX_FRACTION * p * targets.length) : 0;
    const speed = MOVE_SPEED_MIN + (MOVE_SPEED_MAX - MOVE_SPEED_MIN) * p;

    let movingCount = 0;
    for (const t of targets) if (t.moving) movingCount++;

    // promote stationary targets until we hit the desired count
    if (movingCount < wantMoving) {
      for (const t of targets) {
        if (movingCount >= wantMoving) break;
        if (!t.moving) {
          const a = _rng() * Math.PI * 2;
          t.vx = Math.cos(a) * speed;
          t.vy = Math.sin(a) * speed;
          t.moving = true;
          movingCount++;
        }
      }
    }

    const minX = t => t.r, maxX = t => W - t.r;
    const top = t => HUD_H + t.r, bot = t => H - 8 - t.r;
    for (const t of targets) {
      if (!t.moving) continue;
      // rescale velocity toward the current ramp speed so existing targets speed up with score
      const cur = Math.hypot(t.vx, t.vy);
      if (cur > 0.0001) { const k = speed / cur; t.vx *= k; t.vy *= k; }
      t.x += t.vx; t.y += t.vy;
      if (t.x < minX(t)) { t.x = minX(t); t.vx = Math.abs(t.vx); }
      else if (t.x > maxX(t)) { t.x = maxX(t); t.vx = -Math.abs(t.vx); }
      if (t.y < top(t)) { t.y = top(t); t.vy = Math.abs(t.vy); }
      else if (t.y > bot(t)) { t.y = bot(t); t.vy = -Math.abs(t.vy); }
    }
  }

  // ---- Render ----
  function drawGrid() {
    const step = 48;
    ctx.strokeStyle = '#161e2a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x < W; x += step) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (let y = HUD_H; y < H; y += step) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();

    // range lane lines
    ctx.strokeStyle = '#1a2535';
    ctx.lineWidth = 2;
    const laneW = W / 3;
    for (let i = 1; i < 3; i++) {
      ctx.beginPath(); ctx.moveTo(laneW * i, HUD_H); ctx.lineTo(laneW * i, H); ctx.stroke();
    }
    // floor line
    ctx.strokeStyle = '#2a3545';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H - 8); ctx.lineTo(W, H - 8); ctx.stroke();
    ctx.strokeStyle = '#ff7a3c22';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, H - 6); ctx.lineTo(W, H - 6); ctx.stroke();
  }

  // ---- cosmetics: target + hit-marker skins (challenge-trophy sets). Purely visual — the hitbox is
  //      always the circle of radius t.r, so hit detection is identical for every skin. ----
  function targetStyle() { return (KIT && KIT.cosmetics) ? KIT.cosmetics.selected('aim-trainer.target') : 'aim-trainer.target.rings'; }
  function markerStyle() { return (KIT && KIT.cosmetics) ? KIT.cosmetics.selected('aim-trainer.marker') : 'aim-trainer.marker.classic'; }
  function drawTarget(t) {
    const { x, y, r, life } = t;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(life, life);
    const style = targetStyle();
    if (style === 'aim-trainer.target.donut') {
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fillStyle = '#ff7ab6'; ctx.fill();
      ctx.beginPath(); ctx.arc(0, 0, r * 0.4, 0, Math.PI * 2); ctx.fillStyle = '#2a1420'; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(-r * 0.25, -r * 0.35, r * 0.4, 2.2, 4.0); ctx.stroke();
    } else if (style === 'aim-trainer.target.fruit') {
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fillStyle = '#3aa858'; ctx.fill();          // rind
      ctx.beginPath(); ctx.arc(0, 0, r * 0.82, 0, Math.PI * 2); ctx.fillStyle = '#eafbe6'; ctx.fill();    // pith
      ctx.beginPath(); ctx.arc(0, 0, r * 0.68, 0, Math.PI * 2); ctx.fillStyle = '#ff5b6b'; ctx.fill();    // flesh
      ctx.fillStyle = '#2a1420'; for (let i = 0; i < 6; i++) { const a = i / 6 * Math.PI * 2; ctx.beginPath(); ctx.ellipse(Math.cos(a) * r * 0.4, Math.sin(a) * r * 0.4, r * 0.06, r * 0.1, a, 0, Math.PI * 2); ctx.fill(); }
    } else if (style === 'aim-trainer.target.alien') {
      ctx.fillStyle = '#7fe07a'; ctx.strokeStyle = '#3aa858'; ctx.lineWidth = 2;
      ctx.beginPath(); for (let i = 0; i < 12; i++) { const a = i / 12 * Math.PI * 2, rr = r * (0.86 + 0.14 * Math.sin(i * 2.3 + (frame || 0) * 0.05)); ctx[i ? 'lineTo' : 'moveTo'](Math.cos(a) * rr, Math.sin(a) * rr); } ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#0e2a14'; ctx.beginPath(); ctx.arc(-r * 0.28, -r * 0.1, r * 0.16, 0, Math.PI * 2); ctx.arc(r * 0.28, -r * 0.1, r * 0.16, 0, Math.PI * 2); ctx.fill();
    } else if (style === 'aim-trainer.target.goldstar') {
      ctx.shadowColor = '#ffd166'; ctx.shadowBlur = r * 0.4; ctx.fillStyle = '#ffd166';
      ctx.beginPath(); for (let i = 0; i < 10; i++) { const rr = i % 2 ? r * 0.45 : r, a = -1.57 + i * 0.6283; ctx[i ? 'lineTo' : 'moveTo'](Math.cos(a) * rr, Math.sin(a) * rr); } ctx.closePath(); ctx.fill();
      ctx.shadowBlur = 0; ctx.fillStyle = '#fff6cc'; ctx.beginPath(); ctx.arc(0, 0, r * 0.16, 0, Math.PI * 2); ctx.fill();
    } else { // rings — the regulation target, exactly as before
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fillStyle = '#1a2030'; ctx.fill();
      ctx.strokeStyle = '#ff7a3c'; ctx.lineWidth = 2.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2); ctx.strokeStyle = '#ff7a3c99'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2); ctx.strokeStyle = '#ff7a3c'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, r * 0.12, 0, Math.PI * 2); ctx.fillStyle = '#ff7a3c'; ctx.fill();
      ctx.strokeStyle = '#ff7a3c88'; ctx.lineWidth = 1;
      const tk = r * 0.15;
      [[r + tk, 0], [-(r + tk), 0], [0, r + tk], [0, -(r + tk)]].forEach(([ex, ey]) => { ctx.beginPath(); ctx.moveTo(ex * 0.7, ey * 0.7); ctx.lineTo(ex, ey); ctx.stroke(); });
    }
    ctx.restore();
  }
  // one hit marker at (m.x,m.y), fading with m.life — shape from the selected marker cosmetic
  function drawHitMarker(m) {
    const style = markerStyle();
    if (style === 'aim-trainer.marker.spark') {
      ctx.strokeStyle = '#ffe066'; ctx.lineWidth = 2; const g = 4, len = 11;
      for (let i = 0; i < 8; i++) { const a = i / 8 * Math.PI * 2; ctx.beginPath(); ctx.moveTo(m.x + Math.cos(a) * g, m.y + Math.sin(a) * g); ctx.lineTo(m.x + Math.cos(a) * (g + len), m.y + Math.sin(a) * (g + len)); ctx.stroke(); }
    } else if (style === 'aim-trainer.marker.boom') {
      ctx.fillStyle = '#ffd166'; ctx.strokeStyle = '#ff4b2a'; ctx.lineWidth = 2;
      ctx.beginPath(); for (let i = 0; i < 12; i++) { const rr = i % 2 ? 5 : 13, a = i / 12 * Math.PI * 2; ctx[i ? 'lineTo' : 'moveTo'](m.x + Math.cos(a) * rr, m.y + Math.sin(a) * rr); } ctx.closePath(); ctx.fill(); ctx.stroke();
    } else { // classic — the crisp X
      ctx.strokeStyle = '#ff7a3c'; ctx.lineWidth = 2; const s = 8;
      ctx.beginPath(); ctx.moveTo(m.x - s, m.y - s); ctx.lineTo(m.x + s, m.y + s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(m.x + s, m.y - s); ctx.lineTo(m.x - s, m.y + s); ctx.stroke();
    }
  }

  function drawCrosshair(x, y) {
    const cr = 12, gap = 5, tickLen = 8;
    ctx.strokeStyle = '#ff7a3c';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y, cr, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#ff7a3c';
    ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI * 2); ctx.fill();
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    ctx.strokeStyle = '#ff7a3c';
    ctx.lineWidth = 1.5;
    dirs.forEach(([dx, dy]) => {
      ctx.beginPath();
      ctx.moveTo(x + dx * (cr + gap), y + dy * (cr + gap));
      ctx.lineTo(x + dx * (cr + gap + tickLen), y + dy * (cr + gap + tickLen));
      ctx.stroke();
    });
  }

  function render() {
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);
    drawGrid();

    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (const m of hitMarkers) {
      ctx.globalAlpha = Math.max(0, m.life);
      drawHitMarker(m);
    }
    ctx.globalAlpha = 1;

    for (const t of targets) drawTarget(t);

    // combo
    if (state === 'playing' && combo >= 3) {
      ctx.fillStyle = '#ff7a3c';
      ctx.font = 'bold 14px "Courier New",monospace';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText('x' + (1 + Math.floor(combo / 3)) + ' COMBO', W - 16, HUD_H + 8);
    }

    // sprint progress bar — race is to SPRINT_TARGET targets HIT, not points. Lifted off the very
    // bottom edge + thicker + with an inline count so it's actually visible on mobile. Stays drawn
    // through the brief 'winning' hold (see shoot()) so the bar is actually SEEN hitting 100%,
    // with a glow flash, instead of cutting straight to the end screen on the winning hit's frame.
    if ((state === 'playing' || state === 'winning') && mode === 'sprint') {
      const pct = Math.min(hits / SPRINT_TARGET, 1);
      const won = state === 'winning';
      const barH = 14, bx = 20, bw = W - 40, by = H - barH - 12;
      ctx.fillStyle = '#1a2535'; ctx.fillRect(bx, by, bw, barH);
      if (won) {
        const glow = 0.55 + 0.45 * Math.sin(winHoldFrames * 0.5);
        ctx.shadowColor = '#ffd166'; ctx.shadowBlur = 16 * glow;
        ctx.fillStyle = '#ffd166';
      } else {
        ctx.fillStyle = '#ff7a3c';
      }
      ctx.fillRect(bx, by, bw * pct, barH);
      ctx.shadowBlur = 0;
      ctx.fillStyle = won ? '#2a1a00' : '#fff'; ctx.font = 'bold 11px system-ui, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(hits + ' / ' + SPRINT_TARGET, W / 2, by + barH / 2);
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    }

    // timed time warning flash
    if (state === 'playing' && mode === 'timed' && timeLeft <= 5) {
      ctx.globalAlpha = 0.15 + 0.12 * Math.sin(frame * 0.3);
      ctx.strokeStyle = '#ff7a3c';
      ctx.lineWidth = 4;
      ctx.strokeRect(2, 2, W - 4, H - 4);
      ctx.globalAlpha = 1;
    }

    if (state === 'playing') drawCrosshair(reticle.x, reticle.y);
  }

  // ---- Input ----
  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (W / rect.width),
      y: (e.clientY - rect.top) * (H / rect.height),
    };
  }

  canvas.addEventListener('pointerdown', e => { const { x, y } = getCanvasPos(e); shoot(x, y); });
  canvas.addEventListener('pointermove', e => {
    if (e.pointerType === 'touch') return; // touch: the crosshair is the last-shot mark only — don't drag it behind the finger
    const { x, y } = getCanvasPos(e); reticle.x = x; reticle.y = y;
  });
  window.addEventListener('keydown', e => { if (e.key === 'Escape' && state === 'playing') { e.preventDefault(); pauseGame(); } });

  // ---- mode state (deep-linkable) + top nav (game-kit) ----
  let selectedMode = 'timed';
  { const P = KIT && KIT.param; if (P) {
      const pm = P('mode');
      if (pm === 'sprint') { selectedMode = 'sprint'; const t = parseInt(P('target'), 10); if ([10, 50, 100].indexOf(t) >= 0) SPRINT_TARGET = t; }
      else if (pm === 'timed') { selectedMode = 'timed'; const s = parseInt(P('secs'), 10); if ([10, 30, 60].indexOf(s) >= 0) sessionSeconds = s; }
      const mv = P('moving'); if (mv === '0' || mv === '1') movingTargets = mv === '1';
  } }
  KIT.nav({ slug: 'aim-trainer', music: true, home: '../../', theme: MENU_THEME, onMenu: () => toMenu(),
    onPause: () => { if (state === 'playing') pauseGame(); else if (state === 'paused') resumeGame(); },
    confirmLeave: () => (state === 'playing' || state === 'paused') ? KIT.t('confirm.leave', { def: "Leave this run? You'll lose your progress." }) : false,
    controls: { title: KIT.t('game.aim-trainer.controlsTitle', { def: 'Range — Controls' }),
      mouse: [ [KIT.t('game.aim-trainer.ctrlMove', { def: 'Move' }), KIT.t('game.aim-trainer.ctrlAim', { def: 'Aim' })], [KIT.t('game.common.click', { def: 'Click' }), KIT.t('game.aim-trainer.ctrlShoot', { def: 'Shoot' })] ],
      keyboard: [ [KIT.t('game.common.esc', { def: 'Esc' }), KIT.t('game.common.pause', { def: 'Pause' })] ],
      touch: [ [KIT.t('game.common.tap', { def: 'Tap' }), KIT.t('game.aim-trainer.ctrlTapShoot', { def: 'Shoot where you tap' })] ] } });
  KIT.music.play('tactical');

  // ---- Test hook ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get hits() { return hits; },
    get misses() { return misses; },
    get accuracy() { return hits + misses > 0 ? hits / (hits + misses) : 0; },
    get timeLeft() { return timeLeft; },
    get elapsed() { return elapsedFrames / 60; }, // seconds elapsed (useful for sprint)
    get elapsedFrames() { return elapsedFrames; },
    get targets() { return targets.map(t => ({ x: t.x, y: t.y, r: t.r, vx: t.vx, vy: t.vy, moving: t.moving })); },
    // layout snapshot for on-screen / HUD-overlap tests (px in canvas space)
    get layout() {
      const pad = 80, maxR = TARGET_BASE_R * 1.35; // r = TARGET_BASE_R * (0.75 + rng*0.6)
      // Spawn region: target CENTERS land in [pad, W-pad] x [HUD_H+pad, H-pad]; the rect below
      // accounts for the largest possible radius so the full disc stays on-screen / below the HUD.
      const spawn = {
        left: pad - maxR, right: W - pad + maxR,
        top: HUD_H + pad - maxR, bottom: H - pad + maxR,
      };
      let bbox = null;
      if (targets.length) {
        let l = Infinity, r = -Infinity, t = Infinity, b = -Infinity;
        for (const tg of targets) { l = Math.min(l, tg.x - tg.r); r = Math.max(r, tg.x + tg.r); t = Math.min(t, tg.y - tg.r); b = Math.max(b, tg.y + tg.r); }
        bbox = { left: l, right: r, top: t, bottom: b };
      }
      return { W, H, topReserve: HUD_H, spawn, targetsBox: bbox };
    },
    get movingTargets() { return movingTargets; },
    setMoving(on) { movingTargets = !!on; saveMoving(movingTargets); },
    menu() { return KIT ? KIT.menu.current() : null; },
    get bestScore() {
      if (mode === 'timed') return loadBest('timed', sessionSeconds);
      return 0;
    },
    get bestTime() { return loadBest('sprint', 0); }, // ms; 0 = no best
    get mode() { return mode; },
    start() {
      mode = 'timed';
      sessionSeconds = DEFAULT_SESSION;
      startGame();
    },
    startMode(arg) {
      if (arg === 'sprint') {
        mode = 'sprint';
        sessionSeconds = 0;
      } else {
        mode = 'timed';
        sessionSeconds = Number(arg) || DEFAULT_SESSION;
      }
      startGame();
    },
    shootAt(x, y) { shoot(x, y); },
    step(n) { for (let i = 0; i < (n || 1); i++) update(); },
    render() { render(); }, // headless: exercise the draw path (target + hit-marker skins)
    setSeed(s) { _rng = seededRng(s); },
  };

  resize();
  updateHud();
  KIT.loop(update, render);
  showStartMenu(selectedMode); // open the shared start menu (mode/amount/moving preselected from the URL)
})();
  window.gamekit.pwa('../../sw.js');
</script>
</body>
</html>
