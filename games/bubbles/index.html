<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Bubble Pop</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#2ee8c8">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bubble Pop">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="../../analytics.js" defer></script>
<link rel="stylesheet" href="../../game-kit.css">
<script src="../../version.js"></script>
<script src="../../game-kit.js"></script>
<script src="../../challenges.js"></script>
<style>
  :root {
    --aqua:#2ee8c8; --aqua2:#1bc4a8; --bg1:#0d1f2d; --bg2:#162840;
    --text:#e8f8ff; --dim:rgba(232,248,255,0.55); --panel:rgba(13,31,45,0.88);
    --border:rgba(46,232,200,0.3); --gold:#ffe066;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg1);
    color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; user-select:none; touch-action:none; }
  #game { display:block; width:100vw; height:100vh; }

  /* Position/background/font come from the shared .gamekit-hud (center-top pill).
     Keep only the aqua value color. */
  #hud .val { color:var(--aqua); }
  #chargeMeter { position:fixed; right:10px; top:56px; bottom:auto; height:120px; z-index:5;
    width:12px; border-radius:6px; border:1px solid var(--border);
    background:rgba(13,31,45,0.7); overflow:hidden; }
  #chargeFill { width:100%; background:linear-gradient(180deg,#ffe066,#ff9c2e);
    border-radius:6px; transition:height 0.15s; }
  #chargeLabel { position:fixed; right:26px; top:56px; z-index:5; font-size:9px;
    letter-spacing:1px; color:var(--gold); writing-mode:vertical-lr; transform:rotate(180deg); }

  /* Sits just under the HUD, centered over the playfield, so it tracks the HUD
     across viewport sizes instead of floating near the shooter. */
  #specialIndicator { position:fixed; top:56px; left:50%; transform:translateX(-50%);
    z-index:6; font-size:13px; letter-spacing:1px; padding:5px 14px;
    background:rgba(255,224,102,0.18); border:1px solid #ffe066; border-radius:8px;
    color:#ffe066; display:none; white-space:nowrap; pointer-events:none; }
  @media (max-width:560px), (orientation:portrait) {
    #specialIndicator { top:96px; font-size:12px; padding:4px 11px; }
    /* Portrait HUD pill drops to top:50px and is taller — push these below it. */
    #chargeMeter, #chargeLabel { top:96px; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud" class="gamekit-hud">
  <div class="stat"><span class="lbl">Score</span><span class="val" id="scoreEl">0</span></div>
  <div class="stat"><span class="lbl">Best</span><span class="val" id="bestEl">0</span></div>
  <div class="stat"><span class="lbl">Level</span><span class="val" id="levelEl">1</span></div>
  <div class="stat" style="opacity:.75"><span class="lbl">Mode</span><span class="val" id="modeEl">Arcade</span></div>
</div>
<div id="chargeMeter">
  <div id="chargeFill" style="height:0%;margin-top:auto;"></div>
</div>
<div id="chargeLabel">CHARGE</div>
<div id="specialIndicator">⚡ SPECIAL READY</div>

<script>
(() => {
  // ---- Helpers ----
  const $ = id => document.getElementById(id);
  const canvas = $('game');
  const ctx = canvas.getContext('2d');

  // ---- Audio (game-kit shared engine + global mute) ----
  const SND = window.gamekit.sound;
  const KIT = window.gamekit;
  SND.define({
    shoot: (c) => c.voice({ f: 420, slideTo: 640, dur: 0.07, type: 'triangle', gain: 0.1, filter: 'lowpass', cutoff: 1800 }),
    pop:   (c) => { c.voice({ f: 900, slideTo: 1500, dur: 0.06, type: 'sine', gain: 0.12, reverb: 0.16 }); c.noiseHit({ dur: 0.03, gain: 0.04, filter: 'bandpass', cutoff: 2400, q: 6 }); },
    drop:  (c) => { [660, 440, 330].forEach((f, i) => c.voice({ f, dur: 0.08, type: 'triangle', gain: 0.06, t: c.now() + i * 0.04 })); },
    special: (c) => { [523, 659, 880, 1175].forEach((f, i) => c.voice({ f, dur: 0.14, type: 'sine', gain: 0.1, reverb: 0.3, t: c.now() + i * 0.06 })); },
    won:   (c) => c.play('victory'),
  });


  // ---- Constants ----
  const COLORS = ['#ff4d6d','#ff9f1c','#ffe14d','#4ddb8c','#4dbfff','#a56bff','#ff6bbf'];
  const COLOR_NAMES = ['red','orange','yellow','green','cyan','purple','pink'];
  const COLOR_SYMBOLS = ['●','▲','◆','★','■','✦','♥'];
  let R = 18; // bubble radius (recomputed in resize so the grid fits any width)
  const COLS_COUNT = 12;
  let ROW_H = R * 1.73;
  const SHOOTER_Y_OFFSET = 90;

  // ---- State ----
  let W, H;
  // Headroom so the playfield/bubbles clear the shared center-top .gamekit-hud pill.
  // Landscape: pill at top:8px → ~48px. Portrait (≤560px): pill drops to top:50px → ~92px.
  let topMargin = 48;
  let WALL = 8; // thickness of the play-column walls (set in resize); side walls bounce, ceiling attaches
  let state = 'ready'; // 'ready'|'playing'|'over'|'won'
  let mode = 'arcade'; // 'arcade'|'endless'|'zen'
  let timeDescent = false; // descent driven by a timer (vs by shots); toggle on the menu; ignored in zen
  let score = 0, bestScore = 0, level = 1;
  let grid = []; // array of rows; each row is array of {color, colorIdx} or null
  let gridOffsetY = 0; // pixels the whole grid has descended
  let gridParity = 0;  // 0/1 — flips when a row is unshifted on top, so existing rows keep their hex offset (no reshape)
  let shotBubble = null; // { x, y, vx, vy, colorIdx, isSpecial, specialType }
  let shotColor = 0;
  let nextColor = 0;
  let aimAngle = -Math.PI / 2;
  let isShooting = false;
  let chargeLevel = 0; // 0..1
  let specialReady = false;
  let specialType = null; // 'bomb' | 'rainbow'
  let floats = []; // { x, y, txt, col, life, vy }
  let particles = []; // pop particles
  let fallingBubbles = []; // { x, y, vy, colorIdx }
  let descentTimer = 0;
  let shotsThisLevel = 0;
  let shotsSinceDescent = 0; // arcade (default): grid descends every N shots, not on a timer
  let endlessRowTimer = 0;

  // Arcade descent cadence: drop a row every this-many shots (fewer as levels climb)
  const ARCADE_SHOTS_PER_DESCENT = 6;
  // How many rows in initial grid per level
  const GRID_ROWS_START = 8;
  const CHARGE_PER_POP = 0.07;
  const DESCENT_INTERVAL_BASE = 180; // frames between descent steps in arcade
  const ENDLESS_ROW_INTERVAL = 300;

  // ---- Resize ----
  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    KIT.fitCanvas(canvas, W, H); // retina-sharp backing store; drawing stays in CSS px
    // Shrink bubbles so the fixed 12-column grid (incl. the half-step offset rows)
    // always fits the viewport width — otherwise narrow / zoomed screens clip columns.
    R = Math.max(9, Math.min(18, Math.floor((W - 24) / (2 * (COLS_COUNT + 1)))));
    ROW_H = R * 1.73;
    WALL = Math.max(6, Math.round(R * 0.55));
    topMargin = KIT.layout.hudTop();
    // Vertical fit: on short (landscape phone) screens the default row spacing makes the
    // starting grid spill past the lose line / shooter. Compress ROW_H so the initial grid
    // (GRID_ROWS_START rows, top at topMargin+R) clears the lose line (H-SHOOTER_Y_OFFSET-3R)
    // with a one-row breather. Never expand beyond the default spacing.
    const playBand = (H - SHOOTER_Y_OFFSET - R * 3) - (topMargin + WALL + R);
    const fitRowH = playBand / (GRID_ROWS_START + 1);
    if (fitRowH > 0 && fitRowH < ROW_H) ROW_H = fitRowH;
  }
  window.gamekit.layout.on(resize); // resize + orientationchange + visualViewport, debounced

  // ---- Grid geometry ----
  // The play column is a centered band wide enough to hold the 12 cols + the half-step offset rows.
  // left/right are its inner wall faces; shots bounce there. ceilTop is the playable top (below the ceiling).
  function fieldBounds() {
    const totalW = COLS_COUNT * R * 2;
    const startX = Math.floor((W - (totalW + R)) / 2) + R;
    return { left: startX - R, right: startX + totalW, startX, totalW };
  }
  function ceilTop() { return topMargin + WALL; }
  function gridX(col, row) {
    const offset = ((row + gridParity) % 2 === 1) ? R : 0;
    return fieldBounds().startX + col * R * 2 + offset;
  }
  function gridY(row) {
    return ceilTop() + gridOffsetY + row * ROW_H + R + 2;
  }

  // ---- Color helpers ----
  function randColorIdx(numColors) {
    return Math.floor(Math.random() * (numColors || COLORS.length));
  }
  function getActiveColors() {
    const set = new Set();
    for (const row of grid) for (const b of row) if (b) set.add(b.colorIdx);
    return [...set];
  }
  function pickShotColor() {
    const active = getActiveColors();
    if (active.length === 0) return randColorIdx();
    return active[Math.floor(Math.random() * active.length)];
  }
  // a pop can wipe a color off the board — if the loaded / on-deck shot is now a dead color,
  // swap it for one that's actually still there.
  function ensureLiveColors() {
    const active = getActiveColors();
    if (!active.length) return;
    if (active.indexOf(shotColor) < 0) shotColor = active[Math.floor(Math.random() * active.length)];
    if (active.indexOf(nextColor) < 0) nextColor = active[Math.floor(Math.random() * active.length)];
    updateHud();
  }

  // ---- Grid initialization ----
  function makeGrid(rows, numColors) {
    const nc = numColors || Math.min(COLORS.length, 4 + level);
    const g = [];
    for (let r = 0; r < rows; r++) {
      const row = [];
      for (let c = 0; c < COLS_COUNT; c++) {
        if (r < 2 || Math.random() < 0.85) {
          row.push({ colorIdx: randColorIdx(nc) });
        } else {
          row.push(null);
        }
      }
      g.push(row);
    }
    return g;
  }

  function countBubbles() {
    let n = 0;
    for (const row of grid) for (const b of row) if (b) n++;
    return n;
  }

  // ---- localStorage ----
  const modeLabel = m => { m = m || mode; return m.charAt(0).toUpperCase() + m.slice(1); };
  function loadBest() { bestScore = KIT ? KIT.bestScore('bubbles', modeLabel(mode)) : 0; }
  function saveBest() { if (score > bestScore) { bestScore = score; if (KIT) KIT.saveBest('bubbles', modeLabel(mode), { score: score }); } }
  function bestFor(m) { return KIT ? KIT.bestScore('bubbles', modeLabel(m)) : 0; }

  // ---- Start / modes ----
  function startMode(m, timed) {
    mode = m || 'arcade';
    timeDescent = (mode === 'zen') ? false : !!timed; // zen never descends
    level = 1;
    score = 0;
    gridOffsetY = 0;
    gridParity = 0;
    descentTimer = 0;
    endlessRowTimer = 0;
    shotsThisLevel = 0;
    shotsSinceDescent = 0;
    chargeLevel = 0;
    specialReady = false;
    specialType = null;
    isShooting = false;
    shotBubble = null;
    floats = []; particles = []; fallingBubbles = [];
    grid = makeGrid(GRID_ROWS_START, Math.min(COLORS.length, 4 + level));
    shotColor = pickShotColor();
    nextColor = pickShotColor();
    aimAngle = -Math.PI / 2;
    loadBest();
    state = 'playing';
    if (KIT) { KIT.menu.hide(); KIT.showMenuButton(true); KIT.showPauseButton(true); }
    updateHud();
  }
  function startGame() { startMode(mode); }

  // ---- shared menus (gamekit.menu) — candy/aqua theme; structure/behaviour from the kit ----
  const MENU_THEME = { accent:'#2ee8c8', glow:'0 0 18px rgba(46,232,200,0.42)',
    bg:'radial-gradient(circle at 50% 26%, rgba(22,40,64,0.97), rgba(13,31,45,0.98))', border:'rgba(46,232,200,0.32)',
    overlay:'rgba(9,20,30,0.74)', title:'#7ee8ff', new:'#ffe066', 'on-accent':'#06121a' };
  // mini mechanic previews drawn into each mode card's canvas
  const PV_COLS = ['#ff7eb6','#2ee8c8','#ffe066','#7ee8ff','#b78cff'];
  function pvBubbles(g,w,h){ for(let r=0;r<2;r++) for(let c=0;c<5;c++){ g.fillStyle=PV_COLS[(r*5+c)%PV_COLS.length]; g.beginPath(); g.arc(16+c*((w-32)/4), 22+r*20, 8, 0, 7); g.fill(); }
    g.fillStyle='#7ee8ff'; g.beginPath(); g.arc(w/2,h-18,9,0,7); g.fill(); g.strokeStyle='rgba(126,232,255,.5)'; g.lineWidth=2; g.beginPath(); g.moveTo(w/2,h-18); g.lineTo(w/2,h-42); g.stroke(); }
  // big centered mode motif, drawn as a ~40%-opacity watermark over the bubble cluster
  // motif = the hero (bold, full colour, with a glow for clean figure/ground); bubbles = quiet texture behind
  function pvCard(g,w,h,draw,col){ try{
    g.save(); g.globalAlpha=0.28; pvBubbles(g,w,h); g.restore();
    g.save(); g.strokeStyle=col; g.fillStyle=col; g.lineWidth=Math.max(3, Math.min(w,h)*0.06); g.lineJoin='round'; g.lineCap='round';
    g.shadowColor='rgba(6,16,24,0.9)'; g.shadowBlur=Math.min(w,h)*0.14; draw(g, w/2, h/2, Math.min(w,h)*0.56); g.restore();
  }catch(e){} }
  function icChevron(g,cx,cy,s){ const a=s*0.5; [-s*0.2, s*0.12].forEach(dy=>{ g.beginPath(); g.moveTo(cx-a,cy-a*0.45+dy); g.lineTo(cx,cy+a*0.45+dy); g.lineTo(cx+a,cy-a*0.45+dy); g.stroke(); }); }
  function icZzz(g,cx,cy,s){ g.textAlign='center'; g.textBaseline='middle';
    const z=(sz,dx,dy)=>{ g.font='800 '+Math.round(s*sz)+'px system-ui,sans-serif'; g.fillText('z', cx+dx*s, cy+dy*s); };
    z(0.34,-0.32,0.26); z(0.48,-0.02,0.04); z(0.66,0.30,-0.22); } // sleepy zzz: grows as it drifts up-right
  function icInfinity(g,cx,cy,s){ const r=s*0.23, off=r*0.96; g.beginPath(); g.arc(cx-off,cy,r,0,7); g.stroke(); g.beginPath(); g.arc(cx+off,cy,r,0,7); g.stroke(); }
  function pvArcade(g,w,h){ pvCard(g,w,h,icChevron,'#2ee8c8'); } // grid descends as you shoot
  function pvEndless(g,w,h){ pvCard(g,w,h,icInfinity,'#b78cff'); } // rows push in forever
  function pvZen(g,w,h){ pvCard(g,w,h,icZzz,'#7ee8ff'); }
  const MODE_HINT = { arcade:'Pop groups of 3+; clear the board to advance.', endless:'Rows push in forever — survive and score.', zen:'Relax and pop. No fail, no descent.' };
  const modeParams = st => (st.timed && st.mode !== 'zen') ? { mode: st.mode, timed: '1' } : { mode: st.mode };
  function shareMsg(){ return KIT.shareText({ score: score, game:'Bubble Pop', emoji:'🫧', mode: mode.charAt(0).toUpperCase()+mode.slice(1)+(timeDescent&&mode!=='zen'?' (timed)':''), extra:['level '+level] }); }
  function showStartMenu(){
    state = 'ready'; if(KIT){ KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if(!KIT) return;
    KIT.menu.show({ kind:'start', theme:MENU_THEME, title:'BUBBLE POP',
      groups:[{ id:'mode', label:'MODE', style:'cards', default: mode, choices:[
        { id:'arcade',  label:'ARCADE',  preview:pvArcade,  mech:['Clear to advance','Grid descends'], best:()=>bestFor('arcade') },
        { id:'endless', label:'ENDLESS', preview:pvEndless, mech:['Endless','Rows push in'],           best:()=>bestFor('endless') },
        { id:'zen',     label:'ZEN',     preview:pvZen,     mech:['No fail','No descent'],              best:()=>bestFor('zen') },
      ]}],
      toggles:[{ id:'timed', label:'Time-based descent', caption:'— drops on a clock, not per shot', default: timeDescent, disabled: st => st.mode === 'zen' }],
      hint: st => (MODE_HINT[st.mode] || '') + (st.timed && st.mode !== 'zen' ? ' · timed' : ''),
      actions:[{ id:'play', label:'PLAY ▶', primary:true }],
      onChange: st => KIT.stampUrl(modeParams(st)),
      onPlay: st => { KIT.stampUrl(modeParams(st)); startMode(st.mode, st.timed); },
    });
    KIT.stampUrl(modeParams({ mode: mode, timed: timeDescent }));
  }
  function showEnd(won){
    state = won ? 'won' : 'over';
    const prevBest = bestScore; saveBest(); const isBest = score > prevBest;
    if(KIT){ KIT.showMenuButton(false); KIT.showPauseButton(false); }
    SND.play(won ? 'won' : 'lose');
    if(!KIT) return;
    KIT.menu.show({ kind:'end', theme:MENU_THEME, title: won ? 'CLEARED! ✨' : 'GAME OVER',
      score: score, best: bestScore, newBest: isBest, lines: [ won ? ('Level ' + level + ' · all levels cleared') : ('Reached level ' + level) ],
      share: { slug:'bubbles', accent: '#2ee8c8', icon: '🫧', title:'Bubble Pop', message: ()=>shareMsg(), params: ()=> modeParams({ mode: mode, timed: timeDescent }) },
      record: { slug:'bubbles', mode: modeLabel(mode), score: score },
      actions:[ {id:'again',label:'PLAY AGAIN',primary:true}, {id:'menu',label:'MENU'} ],
      onAction:(id)=>{ if(id==='again') startMode(mode); else if(id==='menu') toMenu(); } });
  }
  function pauseGame(){ if(state!=='playing' || !KIT) return; state='paused';
    KIT.menu.show({ kind:'pause', theme:MENU_THEME, title:'PAUSED', lines:['Score '+score+' · Level '+level],
      actions:[ {id:'resume',label:'RESUME (ESC)',primary:true}, {id:'menu',label:'QUIT TO MENU',danger:true} ],
      onAction:(id)=>{ if(id==='resume') resumeGame(); else if(id==='menu') toMenu(); }, onEsc: resumeGame });
  }
  function resumeGame(){ if(state!=='paused') return; state='playing'; if(KIT) KIT.menu.hide(); }
  function toMenu(){ saveBest(); if(KIT) KIT.menu.hide(); showStartMenu(); }

  // ---- HUD ----
  function updateHud() {
    $('scoreEl').textContent = score;
    $('bestEl').textContent = bestScore;
    $('levelEl').textContent = level;
    $('modeEl').textContent = modeLabel(mode) + (timeDescent && mode !== 'zen' ? ' · timed' : '');
    const pct = Math.round(chargeLevel * 100);
    const fill = $('chargeFill');
    if (fill) {
      fill.style.height = pct + '%';
      fill.style.marginTop = (100 - pct) + '%';
    }
    const sp = $('specialIndicator');
    if (sp) sp.style.display = specialReady ? 'block' : 'none';
  }

  // ---- Nearest grid cell from pixel coords ----
  // ---- BFS flood fill ----
  function bfsColor(startR, startC, targetColorIdx) {
    const visited = new Set();
    const queue = [[startR, startC]];
    const result = [];
    while (queue.length) {
      const [r, c] = queue.shift();
      const key = r + ',' + c;
      if (visited.has(key)) continue;
      visited.add(key);
      if (r < 0 || r >= grid.length || c < 0 || c >= COLS_COUNT) continue;
      const b = grid[r][c];
      if (!b || b.colorIdx !== targetColorIdx) continue;
      result.push([r, c]);
      for (const [nr, nc] of neighbors(r, c)) queue.push([nr, nc]);
    }
    return result;
  }

  function neighbors(r, c) {
    const odd = (r + gridParity) % 2 === 1;
    return [
      [r - 1, c + (odd ? 0 : -1)],
      [r - 1, c + (odd ? 1 : 0)],
      [r + 1, c + (odd ? 0 : -1)],
      [r + 1, c + (odd ? 1 : 0)],
      [r, c - 1],
      [r, c + 1],
    ];
  }

  // ---- Find bubbles disconnected from ceiling ----
  function findOrphans() {
    const visited = new Set();
    const queue = [];
    for (let c = 0; c < COLS_COUNT; c++) {
      if (grid[0] && grid[0][c]) {
        queue.push([0, c]);
        visited.add('0,' + c);
      }
    }
    while (queue.length) {
      const [r, c] = queue.shift();
      for (const [nr, nc] of neighbors(r, c)) {
        const key = nr + ',' + nc;
        if (visited.has(key)) continue;
        if (nr < 0 || nr >= grid.length || nc < 0 || nc >= COLS_COUNT) continue;
        if (!grid[nr][nc]) continue;
        visited.add(key);
        queue.push([nr, nc]);
      }
    }
    const orphans = [];
    for (let r = 0; r < grid.length; r++) {
      for (let c = 0; c < COLS_COUNT; c++) {
        if (grid[r][c] && !visited.has(r + ',' + c)) orphans.push([r, c]);
      }
    }
    return orphans;
  }

  // ---- Pop group ----
  function popGroup(row, col, colorIdx) {
    let group = bfsColor(row, col, colorIdx);
    if (group.length < 3) return false;

    const pts = group.length * 10 * level;
    score += pts;
    float(gridX(col, row), gridY(row), '+' + pts, '#ffe14d');
    SND.play('pop');

    for (const [r, c] of group) {
      spawnParticles(gridX(c, r), gridY(r), grid[r][c].colorIdx);
      grid[r][c] = null;
    }

    chargeLevel = Math.min(1, chargeLevel + group.length * CHARGE_PER_POP);
    if (chargeLevel >= 1 && !specialReady) {
      specialReady = true;
      specialType = Math.random() < 0.5 ? 'bomb' : 'rainbow';
      SND.play('special');
    }

    const orphans = findOrphans();
    if (orphans.length > 0) {
      const bonusPts = orphans.length * 15 * level;
      score += bonusPts;
      float(gridX(col, row), gridY(row) - 30, '+' + bonusPts + ' DROP!', '#4dbfff');
      SND.play('drop');
      for (const [r, c] of orphans) {
        const ci = grid[r][c].colorIdx;
        fallingBubbles.push({ x: gridX(c, r), y: gridY(r), vy: 2 + Math.random() * 3, colorIdx: ci });
        grid[r][c] = null;
      }
    }

    trimEmptyRows();
    updateHud();
    return true;
  }

  // ---- Special shots ----
  function popBomb(row, col) {
    const toKill = [];
    for (let r = 0; r < grid.length; r++) {
      for (let c = 0; c < COLS_COUNT; c++) {
        if (!grid[r][c]) continue;
        const dx = gridX(c, r) - gridX(col, row);
        const dy = gridY(r) - gridY(row);
        if (Math.sqrt(dx * dx + dy * dy) <= R * 3.5) toKill.push([r, c]);
      }
    }
    if (toKill.length === 0) return;
    const pts = toKill.length * 15 * level;
    score += pts;
    float(gridX(col, row), gridY(row), 'BOOM +' + pts, '#ff9f1c');
    SND.play('pop');
    for (const [r, c] of toKill) {
      spawnParticles(gridX(c, r), gridY(r), grid[r][c].colorIdx);
      grid[r][c] = null;
    }
    const orphans = findOrphans();
    for (const [r, c] of orphans) {
      const ci = grid[r][c].colorIdx;
      fallingBubbles.push({ x: gridX(c, r), y: gridY(r), vy: 2 + Math.random() * 3, colorIdx: ci });
      grid[r][c] = null;
    }
    trimEmptyRows();
    updateHud();
  }

  function popRainbow(row, col) {
    const cands = [];
    for (let r = 0; r < grid.length; r++) for (let c = 0; c < COLS_COUNT; c++) if (grid[r][c]) cands.push([r, c]);
    if (cands.length === 0) return;
    // find the largest color group nearby
    const closeColors = {};
    for (const [nr, nc] of neighbors(row, col)) {
      if (nr >= 0 && nr < grid.length && nc >= 0 && nc < COLS_COUNT && grid[nr][nc]) {
        const ci = grid[nr][nc].colorIdx;
        closeColors[ci] = (closeColors[ci] || 0) + 1;
      }
    }
    let targetCI = -1;
    let maxCount = -1;
    for (const [ci, cnt] of Object.entries(closeColors)) {
      const group = bfsColor(row, col, parseInt(ci));
      if (group.length > maxCount) { maxCount = group.length; targetCI = parseInt(ci); }
    }
    if (targetCI === -1) {
      // fallback: pop the largest connected group on the board
      let bestLen = 0;
      for (let r = 0; r < grid.length; r++) {
        for (let c = 0; c < COLS_COUNT; c++) {
          if (!grid[r][c]) continue;
          const g = bfsColor(r, c, grid[r][c].colorIdx);
          if (g.length > bestLen) { bestLen = g.length; targetCI = grid[r][c].colorIdx; }
        }
      }
    }
    if (targetCI === -1) return;
    const group = [];
    for (let r = 0; r < grid.length; r++) for (let c = 0; c < COLS_COUNT; c++) {
      if (grid[r][c] && grid[r][c].colorIdx === targetCI) group.push([r, c]);
    }
    const pts = group.length * 20 * level;
    score += pts;
    float(gridX(col, row), gridY(row), '🌈 +' + pts, '#a56bff');
    SND.play('pop');
    for (const [r, c] of group) {
      spawnParticles(gridX(c, r), gridY(r), grid[r][c].colorIdx);
      grid[r][c] = null;
    }
    const orphans = findOrphans();
    for (const [r, c] of orphans) {
      const ci = grid[r][c].colorIdx;
      fallingBubbles.push({ x: gridX(c, r), y: gridY(r), vy: 2 + Math.random() * 3, colorIdx: ci });
      grid[r][c] = null;
    }
    trimEmptyRows();
    updateHud();
  }

  // ---- Trim trailing empty rows ----
  function trimEmptyRows() {
    while (grid.length > 0) {
      const last = grid[grid.length - 1];
      if (last.every(b => !b)) grid.pop(); else break;
    }
  }

  // ---- Snap bubble to grid ----
  // Snap a landed shot to the EMPTY grid cell whose center is closest to the contact point —
  // so the bubble always sticks right where it touched, never tunnels to a far/back cell.
  function snapToGrid(px, py) {
    // ensure rows exist down to (and just past) the contact point, so a cell below it is available
    let guard = 0;
    while ((grid.length === 0 || gridY(grid.length - 1) < py + ROW_H) && guard++ < 80) {
      grid.push(Array.from({ length: COLS_COUNT }, () => null));
    }
    let bestD = Infinity, bestR = 0, bestC = 0, found = false;
    for (let r = 0; r < grid.length; r++) {
      for (let c = 0; c < COLS_COUNT; c++) {
        if (grid[r][c]) continue; // only empty cells are landing candidates
        const dx = px - gridX(c, r), dy = py - gridY(r);
        const d = dx * dx + dy * dy;
        if (d < bestD) { bestD = d; bestR = r; bestC = c; found = true; }
      }
    }
    if (!found) { // every existing cell is full → drop into a fresh row at the nearest column
      grid.push(Array.from({ length: COLS_COUNT }, () => null));
      bestR = grid.length - 1;
      bestC = Math.max(0, Math.min(COLS_COUNT - 1, Math.round((px - gridX(0, bestR)) / (R * 2))));
    }
    while (grid.length <= bestR) grid.push(Array.from({ length: COLS_COUNT }, () => null));
    return { row: bestR, col: bestC };
  }

  // ---- Particles ----
  function spawnParticles(x, y, colorIdx) {
    const col = COLORS[colorIdx] || '#fff';
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 4;
      particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        col, life: 1, size: 2 + Math.random() * 3 });
    }
  }

  // ---- Float text ----
  function float(x, y, txt, col) {
    floats.push({ x, y, txt, col: col || '#fff', life: 1, vy: 1.5 });
  }

  // ---- Aim guide (trajectory with wall bounce) ----
  function aimGuidePoints(sx, sy, angle, steps) {
    const points = [[sx, sy]];
    let x = sx, y = sy;
    let vx = Math.cos(angle) * 8, vy = Math.sin(angle) * 8;
    const fb = fieldBounds();
    const left = fb.left + R;
    const right = fb.right - R;
    for (let i = 0; i < steps; i++) {
      x += vx; y += vy;
      if (x <= left) { x = left; vx = Math.abs(vx); }
      if (x >= right) { x = right; vx = -Math.abs(vx); }
      points.push([x, y]);
      if (y < gridY(0)) break;
    }
    return points;
  }

  // ---- Shooter position ----
  function shooterX() { return W / 2; }
  function shooterY() { return H - SHOOTER_Y_OFFSET; }

  // ---- Shoot ----
  function shoot() {
    if (isShooting || state !== 'playing') return;
    if (aimAngle > -0.15 || aimAngle < -Math.PI + 0.15) return; // don't shoot sideways or down
    const speed = 12;
    const isSpecial = specialReady;
    const sType = specialType;
    if (isSpecial) { specialReady = false; specialType = null; chargeLevel = 0; }
    shotBubble = {
      x: shooterX(), y: shooterY(),
      vx: Math.cos(aimAngle) * speed,
      vy: Math.sin(aimAngle) * speed,
      colorIdx: shotColor,
      isSpecial, specialType: sType
    };
    isShooting = true;
    SND.play('shoot');
    shotsThisLevel++;
    // Shot-driven pressure (unless "time-based descent" is on): Arcade descends the grid every N shots,
    // Endless pushes a fresh row in every N shots. When timeDescent is on, update() drives it instead.
    if (!timeDescent && mode === 'arcade') {
      shotsSinceDescent++;
      const per = Math.max(3, ARCADE_SHOTS_PER_DESCENT - (level - 1));
      if (shotsSinceDescent >= per) { shotsSinceDescent = 0; descentStep(); }
    } else if (!timeDescent && mode === 'endless') {
      shotsSinceDescent++;
      const per = Math.max(3, 7 - Math.floor(score / 3000));
      if (shotsSinceDescent >= per) { shotsSinceDescent = 0; addEndlessRow(); level = Math.max(level, 1 + Math.floor(score / 2000)); }
    }
    shotColor = nextColor;
    nextColor = pickShotColor();
    updateHud();
  }

  // ---- Land bubble ----
  function landBubble(px, py) {
    const snap = snapToGrid(px, py);
    const r = snap.row, c = snap.col;
    const ci = shotBubble.colorIdx;
    const isSpecial = shotBubble.isSpecial;
    const sType = shotBubble.specialType;

    if (isSpecial && sType === 'bomb') {
      popBomb(r, c);
    } else if (isSpecial && sType === 'rainbow') {
      popRainbow(r, c);
    } else {
      while (grid.length <= r) grid.push(Array.from({ length: COLS_COUNT }, () => null));
      grid[r][c] = { colorIdx: ci };
      popGroup(r, c, ci);
    }

    isShooting = false;
    shotBubble = null;
    ensureLiveColors(); // a pop may have removed the loaded/next color from the board

    checkLose();
    if (state === 'playing') {
      checkWin();
    }
  }

  // ---- Lose condition ----
  function checkLose() {
    if (state !== 'playing') return;
    const loseY = H - SHOOTER_Y_OFFSET - R * 3;
    for (let r = 0; r < grid.length; r++) {
      if (gridY(r) + R > loseY) {
        for (let c = 0; c < COLS_COUNT; c++) {
          if (grid[r][c]) { triggerLose(); return; }
        }
      }
    }
  }

  function triggerLose() { showEnd(false); }

  // ---- Win condition (arcade: clear the board to advance through levels) ----
  function checkWin() {
    if (mode === 'zen') {
      // no fail, no end — a cleared board celebrates and refills so there's always something to pop
      if (countBubbles() === 0) {
        level++;
        gridOffsetY = 0;
        gridParity = 0;
        descentTimer = 0;
        shotsThisLevel = 0;
        shotsSinceDescent = 0;
        grid = makeGrid(GRID_ROWS_START + Math.min(level, 5), Math.min(COLORS.length, 4 + level));
        shotColor = pickShotColor();
        nextColor = pickShotColor();
        SND.play('won');
        float(W / 2, H / 2, 'BOARD CLEARED!', '#ffe14d');
        updateHud();
      }
      return;
    }
    if (mode !== 'arcade') return;
    if (countBubbles() === 0) {
      if (level >= 5) {
        showEnd(true);
      } else {
        level++;
        gridOffsetY = 0;
        gridParity = 0;
        descentTimer = 0;
        shotsThisLevel = 0;
        shotsSinceDescent = 0;
        grid = makeGrid(GRID_ROWS_START + level, Math.min(COLORS.length, 4 + level));
        shotColor = pickShotColor();
        nextColor = pickShotColor();
        SND.play('won');
        float(W / 2, H / 2, 'LEVEL ' + level + '!', '#ffe14d');
        updateHud();
      }
    }
  }

  // ---- Descent (arcade/endless) ----
  function descentStep() {
    gridOffsetY += ROW_H;
    checkLose();
  }

  function addEndlessRow() {
    const nc = Math.min(COLORS.length, 4 + level);
    const newRow = [];
    for (let c = 0; c < COLS_COUNT; c++) {
      newRow.push(Math.random() < 0.8 ? { colorIdx: randColorIdx(nc) } : null);
    }
    grid.unshift(newRow);
    gridParity ^= 1; // inserting a row at the top would flip every row's hex offset — counter it so the existing shape only moves DOWN, not sideways
    gridOffsetY = Math.max(0, gridOffsetY - ROW_H);
    checkLose();
  }

  // ---- Core update ----
  function update() {
    if (state !== 'playing') return;

    // Time-based descent — when the toggle is on (Arcade drops the grid, Endless pushes a row); off = shots.
    if (timeDescent && (mode === 'arcade' || mode === 'endless')) {
      descentTimer++;
      const interval = Math.max(60, DESCENT_INTERVAL_BASE - (level - 1) * 20 - Math.floor(shotsThisLevel / 10) * 5);
      if (descentTimer >= interval) {
        descentTimer = 0;
        if (mode === 'arcade') descentStep();
        else { addEndlessRow(); level = Math.max(level, 1 + Math.floor(score / 2000)); }
      }
    }

    // Move shot bubble
    if (isShooting && shotBubble) {
      shotBubble.x += shotBubble.vx;
      shotBubble.y += shotBubble.vy;

      // Side-wall bounces (off the play column's edges, not the screen edges)
      const fb = fieldBounds();
      if (shotBubble.x <= fb.left + R) { shotBubble.x = fb.left + R; shotBubble.vx = Math.abs(shotBubble.vx); }
      if (shotBubble.x >= fb.right - R) { shotBubble.x = fb.right - R; shotBubble.vx = -Math.abs(shotBubble.vx); }

      // Hit the top of the grid → glue to the top row. The glue line is the top ROW
      // (gridY(0)), which sits gridOffsetY below the fixed ceiling once the board has
      // descended — attaching there stops the bubble right at the top row instead of
      // teleporting it down from the visual ceiling (and never floats it in the gap above).
      const topY = gridY(0);
      if (shotBubble.y <= topY) {
        landBubble(shotBubble.x, topY);
        return;
      }

      // Hit existing bubble
      let hit = false;
      outer: for (let r = 0; r < grid.length; r++) {
        for (let c = 0; c < COLS_COUNT; c++) {
          if (!grid[r][c]) continue;
          const bx = gridX(c, r), by = gridY(r);
          const dx = shotBubble.x - bx, dy = shotBubble.y - by;
          if (dx * dx + dy * dy <= (R * 2) * (R * 2)) { // land as soon as it touches a bubble (less penetration → cleaner snap)
            hit = true; break outer;
          }
        }
      }
      if (hit) {
        landBubble(shotBubble.x, shotBubble.y);
        return;
      }

      // Fell below screen (shouldn't happen in normal play)
      if (shotBubble.y > H + R) {
        isShooting = false; shotBubble = null;
        shotColor = nextColor; nextColor = pickShotColor();
      }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.15;
      p.life -= 0.04;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Floats
    for (let i = floats.length - 1; i >= 0; i--) {
      const f = floats[i];
      f.y -= f.vy; f.life -= 0.025;
      if (f.life <= 0) floats.splice(i, 1);
    }

    // Falling bubbles
    for (let i = fallingBubbles.length - 1; i >= 0; i--) {
      const fb = fallingBubbles[i];
      fb.y += fb.vy; fb.vy += 0.4;
      if (fb.y > H + R * 2) fallingBubbles.splice(i, 1);
    }
  }

  // ---- Draw bubble ----
  function drawBubble(x, y, colorIdx, alpha, scale, isSpecial, specialType) {
    alpha = alpha === undefined ? 1 : alpha;
    scale = scale === undefined ? 1 : scale;
    const r = R * scale;
    const col = COLORS[colorIdx] || '#888';

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);

    // Shadow / glow
    ctx.shadowColor = col;
    ctx.shadowBlur = isSpecial ? 14 : 4;

    // Main fill - glossy gradient
    const grad = safeGrad(ctx.createRadialGradient(-r * 0.3, -r * 0.35, r * 0.05, 0, 0, r));
    grad.addColorStop(0, lighten(col, 0.55));
    grad.addColorStop(0.45, col);
    grad.addColorStop(1, darken(col, 0.35));
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Highlight (top-left gloss)
    ctx.shadowBlur = 0;
    const hgrad = safeGrad(ctx.createRadialGradient(-r * 0.35, -r * 0.38, 0, -r * 0.2, -r * 0.25, r * 0.55));
    hgrad.addColorStop(0, 'rgba(255,255,255,0.75)');
    hgrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = hgrad;
    ctx.fill();

    // Symbol for accessibility
    if (r >= 10) {
      const sym = isSpecial ? (specialType === 'bomb' ? '💥' : '🌈') : COLOR_SYMBOLS[colorIdx % COLOR_SYMBOLS.length];
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = `${Math.round(r * 0.7)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(sym, 0, 1);
    }

    ctx.restore();
  }

  function lighten(hex, amount) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    const nr = Math.min(255, Math.round(r + (255 - r) * amount));
    const ng = Math.min(255, Math.round(g + (255 - g) * amount));
    const nb = Math.min(255, Math.round(b + (255 - b) * amount));
    return '#' + nr.toString(16).padStart(2, '0') + ng.toString(16).padStart(2, '0') + nb.toString(16).padStart(2, '0');
  }
  function darken(hex, amount) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    const nr = Math.max(0, Math.round(r * (1 - amount)));
    const ng = Math.max(0, Math.round(g * (1 - amount)));
    const nb = Math.max(0, Math.round(b * (1 - amount)));
    return '#' + nr.toString(16).padStart(2, '0') + ng.toString(16).padStart(2, '0') + nb.toString(16).padStart(2, '0');
  }

  // ---- Render ----
  function safeGrad(g) { return g && typeof g.addColorStop === 'function' ? g : { addColorStop: () => {} }; }
  function render() {
    ctx.clearRect(0, 0, W, H);

    // Background gradient
    const bg = safeGrad(ctx.createLinearGradient(0, 0, 0, H));
    bg.addColorStop(0, '#0d1f2d');
    bg.addColorStop(1, '#162840');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Subtle grid bg hint
    ctx.strokeStyle = 'rgba(46,232,200,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }

    if (state !== 'playing' && state !== 'over' && state !== 'won') return;

    // Walls: ceiling + left + right of the play column. Side walls bounce shots; the ceiling is the
    // top boundary shots attach to. In landscape the column is centered, so the walls frame the middle.
    const wb = fieldBounds();
    ctx.fillStyle = '#1c374f';
    ctx.fillRect(wb.left - WALL, topMargin, WALL, H - topMargin);                    // left
    ctx.fillRect(wb.right, topMargin, WALL, H - topMargin);                          // right
    ctx.fillRect(wb.left - WALL, topMargin, (wb.right + WALL) - (wb.left - WALL), WALL); // ceiling
    ctx.strokeStyle = 'rgba(46,232,200,0.45)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(wb.left, topMargin + WALL); ctx.lineTo(wb.right, topMargin + WALL);   // ceiling face
    ctx.moveTo(wb.left, topMargin + WALL); ctx.lineTo(wb.left, H);                   // left face
    ctx.moveTo(wb.right, topMargin + WALL); ctx.lineTo(wb.right, H);                 // right face
    ctx.stroke();

    // Lose line (spans the play column)
    const loseY = H - SHOOTER_Y_OFFSET - R * 3;
    ctx.strokeStyle = 'rgba(255,77,109,0.3)';
    ctx.setLineDash([6, 6]);
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(wb.left, loseY); ctx.lineTo(wb.right, loseY); ctx.stroke();
    ctx.setLineDash([]);

    // Grid bubbles
    for (let r = 0; r < grid.length; r++) {
      for (let c = 0; c < COLS_COUNT; c++) {
        const b = grid[r][c];
        if (!b) continue;
        const bx = gridX(c, r), by = gridY(r);
        if (by > H + R) continue;
        drawBubble(bx, by, b.colorIdx, 1, 1, false, null);
      }
    }

    // Falling bubbles
    for (const fb of fallingBubbles) {
      drawBubble(fb.x, fb.y, fb.colorIdx, 0.7, 0.9, false, null);
    }

    // Shooter area
    const sx = shooterX(), sy = shooterY();

    // Aim guide
    if (!isShooting && state === 'playing') {
      const pts = aimGuidePoints(sx, sy, aimAngle, 80);
      ctx.strokeStyle = 'rgba(46,232,200,0.4)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5, 8]);
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Shooter base
    ctx.save();
    ctx.translate(sx, sy);
    const baseGrad = safeGrad(ctx.createRadialGradient(0, -4, 4, 0, 0, 28));
    baseGrad.addColorStop(0, 'rgba(46,232,200,0.5)');
    baseGrad.addColorStop(1, 'rgba(46,232,200,0.05)');
    ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2);
    ctx.fillStyle = baseGrad; ctx.fill();
    // barrel
    ctx.strokeStyle = 'rgba(46,232,200,0.8)';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(aimAngle) * 30, Math.sin(aimAngle) * 30);
    ctx.stroke();
    ctx.restore();

    // Current shot preview (in shooter)
    if (!isShooting) {
      drawBubble(sx, sy, shotColor, 1, 0.85, specialReady, specialType);
    }

    // Next preview
    const nx = sx - 50, ny = sy + 5;
    drawBubble(nx, ny, nextColor, 0.6, 0.6, false, null);
    ctx.fillStyle = 'rgba(232,248,255,0.35)';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('NEXT', nx, ny + R + 10);

    // Moving shot
    if (isShooting && shotBubble) {
      drawBubble(shotBubble.x, shotBubble.y, shotBubble.colorIdx, 1, 1,
        shotBubble.isSpecial, shotBubble.specialType);
    }

    // Particles
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    // Floats
    for (const f of floats) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.fillStyle = f.col;
      ctx.font = 'bold 15px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(f.txt, f.x, f.y);
      ctx.restore();
    }

    // Charge meter fill (canvas side is in HUD via DOM; extra drawn as arc)
    if (chargeLevel > 0) {
      ctx.save();
      ctx.strokeStyle = chargeLevel >= 1 ? '#ffe066' : 'rgba(255,224,102,0.5)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(sx, sy, 32, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * chargeLevel);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ---- Game loop ----
  // Bubble Pop needs vertical room (bubbles descend). On a phone held LANDSCAPE the short height
  // both cramps it and, after a rotate, can insta-lose from the reflow — so lock to portrait there.
  // Desktop landscape windows are left alone (no rotation, enough height).
  function portraitLockActive() {
    try {
      if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return true;
      return Math.min(window.innerWidth, window.innerHeight) < 600;
    } catch (e) { return false; }
  }
  function stepUpdate() {
    // when locked + held the wrong way: kit shows the "↻ rotate" overlay and we FREEZE (skip update)
    if (portraitLockActive() && KIT && KIT.layout && KIT.layout.requireOrientation && !KIT.layout.requireOrientation('portrait')) return;
    update();
  }

  // ---- Input ----
  function getCanvasXY(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width, scaleY = H / rect.height;
    // touchend has no e.touches — the lifted finger's position lives in e.changedTouches, so a pure
    // TAP (no drag) still reports where it landed; otherwise a tap would shoot the previous aim.
    const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]);
    if (t) return { x: (t.clientX - rect.left) * scaleX, y: (t.clientY - rect.top) * scaleY };
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  }

  function handleAim(e) {
    if (state !== 'playing') return;
    const { x, y } = getCanvasXY(e);
    const sx = shooterX(), sy = shooterY();
    const dx = x - sx, dy = y - sy;
    if (dy >= -5) return; // don't aim downward
    aimAngle = Math.atan2(dy, dx);
  }

  function handleShoot(e) {
    if (state !== 'playing') return;
    const { x, y } = getCanvasXY(e);
    const sx = shooterX(), sy = shooterY();
    const dy = y - sy;
    if (dy < -5) {
      const dx = x - sx;
      aimAngle = Math.atan2(dy, dx);
    }
    shoot();
  }

  canvas.addEventListener('mousemove', handleAim);
  canvas.addEventListener('touchmove', e => { e.preventDefault(); handleAim(e); }, { passive: false });
  canvas.addEventListener('click', handleShoot);
  canvas.addEventListener('touchend', e => { e.preventDefault(); handleShoot(e); }, { passive: false });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { if (state === 'playing') pauseGame(); else if (state === 'paused') resumeGame(); return; }
    if (state !== 'playing') return;
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
      aimAngle = Math.max(-Math.PI + 0.2, aimAngle - 0.1);
    } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
      aimAngle = Math.min(-0.2, aimAngle + 0.1);
    } else if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault(); shoot();
    }
  });

  // deep-link ?mode= seeds the start menu's preselected mode
  { const pm = KIT && KIT.param && KIT.param('mode'); if (['arcade', 'endless', 'zen'].indexOf(pm) >= 0) mode = pm; if (KIT && KIT.param && KIT.param('timed') === '1') timeDescent = true; }

  // ---- top nav (game-kit): ‹ Menu + komyo › guard a live run; ⏸ + Esc drive the menu pause ----
  KIT.nav({ slug: 'bubbles', music: true, home: '../../', theme: MENU_THEME, onMenu: () => toMenu(),
    onPause: () => { if (state === 'playing') pauseGame(); else if (state === 'paused') resumeGame(); },
    confirmLeave: () => (state === 'playing' || state === 'paused') ? "Leave this run? You'll lose your progress." : false,
    controls: { title: 'Bubble Pop — Controls',
      mouse: [ ['Move','Aim'], ['Click','Shoot'] ],
      keyboard: [ ['← →  ·  A D','Aim'], ['Space  ·  Enter','Shoot'], ['Esc','Pause'] ],
      touch: [ ['Move / drag','Aim'], ['Tap','Shoot'] ] } });
  KIT.music.play('candy');
  showStartMenu(); // open the unified start menu (mode preselected from ?mode=)

  // ---- __test API ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get bubbleCount() { return countBubbles(); },
    get shotColor() { return shotColor; },
    get nextShotColor() { return nextColor; },
    get level() { return level; },
    get mode() { return mode; },
    get timed() { return timeDescent; },
    bestFor(m) { return bestFor(m); },
    menu() { return KIT ? KIT.menu.current() : null; },
    get chargeLevel() { return chargeLevel; },
    get specialReady() { return specialReady; },
    get specialType() { return specialType; },
    get grid() { return grid.map(row => row.map(b => b ? b.colorIdx : null)); },
    get isShooting() { return isShooting; },
    get gridParity() { return gridParity; },
    cellX(r, c) { return gridX(c, r); },
    cellY(r) { return gridY(r); },
    pushTopRow() { addEndlessRow(); },        // simulate an endless descent (row inserted on top)
    snap(px, py) { return snapToGrid(px, py); },

    start() { startMode('arcade'); },
    startMode(m, timed) { startMode(m, timed); },

    step(n) { for (let i = 0; i < (n || 1); i++) update(); },

    setShotColor(ci) { shotColor = ci; },
    setNextColor(ci) { nextColor = ci; },
    aimAngle(rad) { aimAngle = rad; },
    aimAt(x, y) {
      const sx = shooterX(), sy = shooterY();
      const dx = x - sx, dy = y - sy;
      if (dy < 0) aimAngle = Math.atan2(dy, dx);
    },
    shoot() { shoot(); },

    // inject a bubble directly into grid (for test setup)
    setGridCell(row, col, colorIdx) {
      while (grid.length <= row) grid.push(Array.from({ length: COLS_COUNT }, () => null));
      if (col >= 0 && col < COLS_COUNT) {
        grid[row][col] = colorIdx === null ? null : { colorIdx };
      }
    },
    clearGrid() {
      grid = [];
      gridParity = 0; gridOffsetY = 0;
      for (let r = 0; r < 2; r++) grid.push(Array.from({ length: COLS_COUNT }, () => null));
    },
    forceDescend() { descentStep(); },
    setScore(n) { score = n; updateHud(); },
    addCharge(n) {
      chargeLevel = Math.min(1, chargeLevel + n);
      if (chargeLevel >= 1 && !specialReady) { specialReady = true; specialType = 'bomb'; }
      updateHud();
    },

    get W() { return W; },
    get H() { return H; },
    get shot() { return shotBubble ? { x: shotBubble.x, y: shotBubble.y, vx: shotBubble.vx } : null; },
    gridX,
    gridY,
    get loseY() { return H - SHOOTER_Y_OFFSET - R * 3; },
    get shooterX() { return shooterX(); },
    get shooterY() { return shooterY(); },
    get COLS_COUNT() { return COLS_COUNT; },

    // JS-computed layout snapshot (canvas/px space) for regression tests.
    // Grid bounding box spans all occupied cells across both even/odd (half-step) rows;
    // empty grid → null box. topReserve is the HUD headroom the grid must clear.
    get layout() {
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, count = 0;
      for (let r = 0; r < grid.length; r++) {
        for (let c = 0; c < COLS_COUNT; c++) {
          if (!grid[r][c]) continue;
          const bx = gridX(c, r), by = gridY(r);
          if (bx - R < minX) minX = bx - R;
          if (bx + R > maxX) maxX = bx + R;
          if (by - R < minY) minY = by - R;
          if (by + R > maxY) maxY = by + R;
          count++;
        }
      }
      const grid_ = count ? { left: minX, right: maxX, top: minY, bottom: maxY } : null;
      const fb = fieldBounds();
      return {
        W, H, topReserve: topMargin, R,
        grid: grid_,
        walls: { left: fb.left, right: fb.right, ceiling: ceilTop(), thickness: WALL },
        shooterX: shooterX(), shooterY: shooterY(),
      };
    },
  };

  resize(); KIT.loop(stepUpdate, render);
})();
  window.gamekit.pwa();
</script>
</body>
</html>
