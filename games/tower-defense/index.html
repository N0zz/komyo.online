<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Keep Defender</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#e0b25a">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Keep Defender">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="../../analytics.js" defer></script>
<link rel="stylesheet" href="../../game-kit.css">
<script src="../../version.js"></script>
<script src="../../challenges.js"></script>
<script src="../../game-kit.js"></script>
<style>
  :root { --wood:#4a3220; --wood2:#5e4026; --parch:#e7d6ad; --ink:#3a2a17; --gold:#e0b25a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:#241a10; color:var(--parch);
    font-family: Georgia, "Times New Roman", serif; user-select:none; touch-action:none; }
  #game { display:block; width:100vw; height:100vh; }

  .panel { background:linear-gradient(180deg,var(--wood2),var(--wood)); border:2px solid #2c1d10;
    box-shadow: inset 0 1px 0 rgba(255,220,150,0.15), 0 3px 8px rgba(0,0,0,0.4); }
  /* HUD: center-top via the shared .gamekit-hud (kit centers it + wraps when busy). Keep only the
     parchment value colors + THREAT logic; the kit owns position/background/font. */
  #top .stat b { color:var(--gold); }

  #bottom { position:fixed; left:0; right:0; bottom:0; z-index:5; display:flex; gap:8px; align-items:stretch;
    padding:8px; justify-content:center; flex-wrap:wrap; }
  /* LANDSCAPE: dock the build toolbar as a vertical strip on the left edge so the map keeps its
     full height; in PORTRAIT it stays a horizontal bar along the bottom (the @media below). */
  @media (orientation: landscape) {
    #bottom { right:auto; bottom:0; top:0; width:124px; flex-direction:column; justify-content:center;
      align-items:stretch; flex-wrap:nowrap; gap:6px; padding:8px 8px; overflow-y:auto; }
    #bottom .tbtn { min-width:0; }
  }
  .tbtn { font-family:inherit; cursor:pointer; min-width:84px; padding:7px 10px; border-radius:9px; color:var(--parch);
    background:linear-gradient(180deg,#6a4a2c,#4a3220); border:2px solid #2c1d10; text-align:center; line-height:1.25; }
  .tbtn.sel { border-color:var(--gold); box-shadow:0 0 12px rgba(224,178,90,0.6); }
  .tbtn.dim { opacity:0.45; }
  .tbtn .n { font-size:13px; } .tbtn .c { font-size:12px; color:var(--gold); }
  .tbtn .d { font-size:10px; opacity:0.7; }
  .tbtn .ic { font-size:20px; line-height:1; margin-bottom:1px; }
  .tbtn[data-t] { position:relative; }

  /* Tooltip / info panel: a parchment card with tower stats. Headless-safe (plain DOM). */
  #tip { position:fixed; z-index:10; display:none; max-width:240px; padding:9px 11px; border-radius:9px;
    font-size:12px; line-height:1.45; pointer-events:none; }
  #tip.show { display:block; }
  #tip h4 { margin:0 0 4px; font-size:13px; color:var(--gold); letter-spacing:0.5px; }
  #tip .row { display:flex; justify-content:space-between; gap:14px; }
  #tip .row span:last-child { color:var(--gold); }
  #tip .sp { margin-top:4px; font-size:11px; opacity:0.85; color:#9ee0ff; font-style:italic; }
  #tip .mod { margin-top:3px; font-size:11px; }
  #panelTower .ptstats { font-size:11px; opacity:0.85; margin:2px 0 6px; line-height:1.4; }
  #startBtn { background:linear-gradient(180deg,#3f7a3a,#2c5a28); border-color:#1e3d1b; color:#eaffea; font-size:14px; min-width:120px; }
  #startBtn.busy { background:linear-gradient(180deg,#7a5a2c,#5a4220); }
  #speedBtn { background:linear-gradient(180deg,#3a5a7a,#2a4060); border-color:#1a2c40; color:#eaf4ff; font-size:13px; min-width:72px; }
  #speedBtn.fast { background:linear-gradient(180deg,#5a3a7a,#402060); border-color:#2c1a40; }
  #autoBtn { font-size:13px; min-width:80px; }
  #autoBtn.on { background:linear-gradient(180deg,#3f7a3a,#2c5a28); border-color:#1e3d1b; color:#eaffea; }

  #panelTower { position:fixed; z-index:6; left:50%; bottom:104px; transform:translateX(-50%); display:none;
    padding:10px 12px; border-radius:10px; text-align:center; min-width:200px; }
  #panelTower h3 { margin:0 0 6px; font-size:15px; color:var(--gold); }
  #panelTower .pr { display:flex; gap:8px; justify-content:center; }
  #panelTower button { font-family:inherit; cursor:pointer; padding:6px 10px; border-radius:8px; color:var(--parch);
    background:linear-gradient(180deg,#6a4a2c,#4a3220); border:2px solid #2c1d10; font-size:12px; }
  #panelTower button:disabled { opacity:0.4; cursor:default; }

  #overlay { position:fixed; inset:0; z-index:8; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; background:rgba(20,12,6,0.82); padding:24px; overflow-y:auto; }
  #overlay.hidden { display:none; }
  #overlay h1 { margin:0; font-size:46px; letter-spacing:4px; color:var(--gold); text-shadow:0 2px 0 #2c1d10; }
  #overlay p { margin:2px; font-size:15px; opacity:0.9; max-width:520px; line-height:1.5; }
  #overlay .hint { opacity:0.6; font-size:13px; }
  #overlay button { font-family:inherit; cursor:pointer; font-size:16px; letter-spacing:1px; padding:11px 26px; border-radius:10px;
    color:#eaffea; background:linear-gradient(180deg,#3f7a3a,#2c5a28); border:2px solid #1e3d1b; }
  .map-picker { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-top:4px;
    width:100%; max-width:720px; }
  .map-btn { font-family:inherit; cursor:pointer; text-align:left; padding:14px 16px; border-radius:10px;
    color:var(--parch); background:linear-gradient(180deg,#6a4a2c,#4a3220); border:2px solid #2c1d10;
    display:flex; flex-direction:column; gap:6px; height:100%; box-sizing:border-box; }
  .map-btn.active { border-color:var(--gold); box-shadow:0 0 8px rgba(224,178,90,0.5); }
  .map-btn .tick { color:var(--gold); margin-left:auto; opacity:0; font-size:14px; }
  .map-btn.active .tick { opacity:1; }
  .map-btn .nm { display:flex; align-items:center; gap:6px; font-size:15px; font-weight:bold; }
  .map-btn .desc { font-size:11px; line-height:1.4; opacity:0.85; flex:1; }
  .map-btn .bw { font-size:11px; opacity:0.8; letter-spacing:0.5px; margin-top:auto;
    border-top:1px solid rgba(255,255,255,0.12); padding-top:5px; }
  .map-btn .bw b { color:var(--gold); }
  .map-btn .sw { display:inline-block; width:13px; height:13px; border-radius:50%; flex:none;
    border:1px solid rgba(0,0,0,0.4); }
  .diff-picker { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; width:100%; max-width:540px; }
  .diff-btn { font-family:inherit; cursor:pointer; text-align:left; padding:10px 14px; border-radius:10px;
    color:var(--parch); background:linear-gradient(180deg,#6a4a2c,#4a3220); border:2px solid #2c1d10;
    display:flex; flex-direction:column; gap:4px; }
  .diff-btn.active { border-color:var(--gold); box-shadow:0 0 0 2px var(--gold), 0 0 18px rgba(224,178,90,0.7); }
  .diff-btn .nm { display:flex; align-items:center; gap:6px; font-size:15px; font-weight:bold; }
  .diff-btn.active .nm { color:var(--gold); }
  .diff-btn .tick { color:var(--gold); margin-left:auto; opacity:0; font-size:14px; }
  .diff-btn.active .tick { opacity:1; }
  .diff-btn .desc { font-size:11px; line-height:1.35; opacity:0.85; }
  @media (max-width: 480px) {
    .map-picker { grid-template-columns:repeat(2, 1fr); gap:8px; }
    /* top padding clears the kit's top nav (which sits above the menu overlay) so the title isn't hidden */
    #overlay { gap:9px; padding:58px 12px 16px; justify-content:flex-start; }
    #overlay h1 { font-size:32px; }
    #overlay p { font-size:13px; }
    .map-btn { padding:10px 12px; }
  }
  /* short screens (landscape phones): keep the whole menu on-screen + scrollable, smaller header */
  @media (max-height: 560px) {
    #overlay { gap:8px; padding:56px 12px 12px; justify-content:flex-start; }
    #overlay h1 { font-size:26px; letter-spacing:2px; }
    #overlay p { font-size:12px; margin:1px; }
    .map-picker { grid-template-columns:repeat(4, 1fr); gap:8px; max-width:none; }
    .map-btn { padding:8px 10px; }
    .map-btn .desc { font-size:10px; line-height:1.3; } /* keep the blurb, just smaller in landscape */
  }

  #shareRow { --gamekit-accent:#e0b25a; }
  #waveAnnounce { position:fixed; top:62px; left:50%; transform:translateX(-50%); z-index:7; pointer-events:none;
    font-size:22px; font-weight:bold; color:var(--gold); text-shadow:0 2px 4px rgba(0,0,0,0.7);
    letter-spacing:2px; opacity:0; transition:opacity 0.3s; }
  #waveAnnounce.show { opacity:1; }

  /* Portrait: the kit drops .gamekit-hud to its own row (top:50px) under the nav; nudge the wave
     announce below the (possibly 2-row) HUD so it never overlaps. */
  @media (orientation: portrait) {
    #waveAnnounce { top:108px; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="top" class="gamekit-hud">
  <div class="stat"><span class="lbl">GOLD</span> <b id="gold">0</b></div>
  <div class="stat"><span class="lbl">KEEP</span> <b id="hp">0</b></div>
  <div class="stat"><span class="lbl">WAVE</span> <b id="wave">0</b></div>
  <div class="stat"><span class="lbl">SCORE</span> <b id="score">0</b></div>
  <div class="stat"><span class="lbl">REMAIN</span> <b id="remain">0</b></div>
  <div class="stat"><span class="lbl">BEST</span> <b id="best">0</b></div>
  <div class="stat"><span class="lbl">THREAT</span> <b id="threat">1.0×</b></div>
</div>
<div id="waveAnnounce"></div>

<div id="tip" class="panel"></div>
<div id="panelTower" class="panel"><h3 id="ptName">Tower</h3><div class="ptstats" id="ptStats"></div><div class="pr">
  <button id="upBtn">Upgrade</button><button id="sellBtn">Sell</button>
</div><div class="pr" style="margin-top:6px;"><button id="targetBtn">Target: First ▸</button></div><div id="ptKills" style="font-size:11px;opacity:0.7;margin-top:4px;"></div></div>

<div id="bottom">
  <div class="tbtn" data-t="archer"><div class="ic">🏹</div><div class="n">Archer</div><div class="c" data-cost>18g</div><div class="d">fast · single</div></div>
  <div class="tbtn" data-t="cannon"><div class="ic">💣</div><div class="n">Cannon</div><div class="c" data-cost>38g</div><div class="d">slow · splash</div></div>
  <div class="tbtn" data-t="frost"><div class="ic">❄️</div><div class="n">Frost</div><div class="c" data-cost>30g</div><div class="d">slows nearby</div></div>
  <div class="tbtn" data-t="mage"><div class="ic">🔮</div><div class="n">Mage</div><div class="c" data-cost>45g</div><div class="d">arc · magic</div></div>
  <div class="tbtn" data-t="bard"><div class="ic">🎵</div><div class="n">Bard</div><div class="c" data-cost>40g</div><div class="d">buffs nearby</div></div>
  <button id="startBtn" class="tbtn">Start Wave</button>
  <button id="autoBtn" class="tbtn">Auto: Off</button>
  <button id="speedBtn" class="tbtn">&#x26A1;1x</button>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const canvas = $('game'), ctx = canvas.getContext('2d');
  const KIT = window.gamekit;

  // ---- Audio (game-kit shared engine + global mute) ----
  const SND = window.gamekit.sound;
  SND.define({
    place: (c) => { c.voice({ f: 150, dur: 0.13, type: 'triangle', gain: 0.14, filter: 'lowpass', cutoff: 800 }); c.noiseHit({ dur: 0.05, gain: 0.05, filter: 'lowpass', cutoff: 500 }); },
    shoot: (c) => c.voice({ f: 640, slideTo: 480, dur: 0.06, type: 'triangle', gain: 0.08, filter: 'bandpass', cutoff: 1500, q: 2 }),
    boom: (c) => { c.noiseHit({ dur: 0.32, gain: 0.26, filter: 'lowpass', cutoff: 1200, cutoffTo: 90, reverb: 0.24 }); c.voice({ f: 90, slideTo: 40, dur: 0.3, type: 'sine', gain: 0.18 }); },
    hit: (c) => c.voice({ f: 300, dur: 0.04, type: 'square', gain: 0.05, filter: 'lowpass', cutoff: 1200 }),
    leak: (c) => c.voice({ f: 110, slideTo: 70, dur: 0.35, type: 'sawtooth', gain: 0.16, filter: 'lowpass', cutoff: 600, reverb: 0.15 }),
    wave: (c) => { [294, 392, 494].forEach((f, i) => c.voice({ f, dur: 0.26, type: 'square', gain: 0.1, filter: 'lowpass', cutoff: 1800, reverb: 0.26, t: c.now() + i * 0.12 })); },
    over: (c) => c.play('gameover'),
    win: (c) => c.play('victory'),
    sell: (c) => c.voice({ f: 660, slideTo: 520, dur: 0.08, type: 'sine', gain: 0.1, reverb: 0.1 }),
  });

  // ---- Difficulty levels (FIRST-PASS playtesting knobs — easy to find & dial) ----
  // hpBase/hpGrow drive GEOMETRIC per-enemy HP scaling (waveHpK); the economy fields starve
  // income (lower start gold, lower interest + cap, smaller bounties via rewardMul).
  const DIFFICULTY = {
    easy:   { label:'Easy',   hpBase:2.0, hpGrow:1.17, startGold:90, interestRate:0.015, interestCap:12, rewardMul:0.75 },
    medium: { label:'Medium', hpBase:2.3, hpGrow:1.22, startGold:80, interestRate:0.010, interestCap:8,  rewardMul:0.65 },
    hard:   { label:'Hard',   hpBase:2.6, hpGrow:1.26, startGold:70, interestRate:0.008, interestCap:6,  rewardMul:0.55 },
  };
  const DIFF_KEY = 'tower-defense_diff';
  let diffLevel = 'medium';
  function DIFF() { return DIFFICULTY[diffLevel] || DIFFICULTY.medium; }
  function loadDiff() {
    try { const v = localStorage.getItem(DIFF_KEY); if (v && DIFFICULTY[v]) diffLevel = v; } catch (e) {}
  }
  function setDiff(key) {
    if (!DIFFICULTY[key]) return;
    diffLevel = key;
    try { localStorage.setItem(DIFF_KEY, key); } catch (e) {}
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.dataset.diff === key));
  }
  // Geometric per-enemy HP multiplier for the current wave (excludes map-diff + adaptive threat).
  function waveHpK() { return DIFF().hpBase * Math.pow(DIFF().hpGrow, wave - 1); }

  // ---- Maps (distinct layout + theme each) ----
  // theme: g1/g2 = terrain checker, road = path fill, edge = road border,
  // bg = backdrop, decor = decoration tint, decoType = grass/snow/rock/sand/moss
  // Per-map flavor (TASK 5):
  //  surface  — global multiplier on enemy movement speed (Ice slides fast, Marsh = mud)
  //  surfaceLabel — readable note shown on the menu + in-game legend
  //  towerMod — { towerType: multiplier } on that tower's damage on this map
  //  event    — map-specific collectible/event kind (see EVENTS)
  const MAPS = [
    { name: 'Grassland', diff: 1.0, wp: [[-1,4],[3,4],[3,7],[7,7],[7,2],[11,2],[11,5],[15,5]],
      surface: 1.0, surfaceLabel: 'Open fields — Archers thrive (+25%).',
      desc: 'Open fields. Archers thrive (+25%).',
      towerMod: { archer: 1.25 }, event: 'rally',
      theme: { bg:'#4a6030', g1:'#749044', g2:'#6c8744', road:'#c8a060', edge:'#8a6638', decor:'#3f6b2c', decoType:'grass' } },
    { name: 'Ice', diff: 1.15, wp: [[-1,2],[4,2],[4,6],[8,6],[8,2],[12,2],[12,7],[15,7]],
      surface: 1.25, surfaceLabel: 'Slippery ice — enemies slide 25% faster. Frost is potent here (+25%).',
      desc: 'Enemies slide 25% faster. Frost is potent (+25%).',
      towerMod: { frost: 1.25 }, event: 'freeze',
      theme: { bg:'#3a5060', g1:'#bcd8ea', g2:'#a8cce2', road:'#7fb0d8', edge:'#5a86b0', decor:'#dff0fb', decoType:'snow' } },
    { name: 'Lava', diff: 1.3, wp: [[-1,1],[6,1],[6,4],[2,4],[2,7],[10,7],[10,3],[15,3]],
      surface: 1.0, surfaceLabel: 'Scorched rock — Frost fizzles (-40%), Cannon excels (+25%).',
      desc: 'Scorched rock. Frost fizzles (-40%), Cannon excels (+25%).',
      towerMod: { frost: 0.6, cannon: 1.25 }, event: 'meteor',
      theme: { bg:'#241410', g1:'#3a2a26', g2:'#322320', road:'#7a2e16', edge:'#ff7a28', decor:'#ff5a1e', decoType:'rock', lava:true } },
    { name: 'Desert', diff: 1.1, wp: [[-1,5],[5,5],[5,1],[9,1],[9,6],[13,6],[13,2],[15,2]],
      surface: 0.9, surfaceLabel: 'Deep sand slows enemies (-10%). Cannons hit hard (+30%).',
      desc: 'Deep sand slows enemies (-10%). Cannons hit hard (+30%).',
      towerMod: { cannon: 1.3 }, event: 'oasis',
      theme: { bg:'#7a5e34', g1:'#dcc079', g2:'#d2b56c', road:'#b5946a', edge:'#9a7848', decor:'#c9a85e', decoType:'sand' } },
    { name: 'Dungeon', diff: 1.25, wp: [[-1,3],[2,3],[2,7],[6,7],[6,2],[10,2],[10,6],[13,6],[13,3],[15,3]],
      surface: 1.0, surfaceLabel: 'Dark halls — Mages channel arcane power (+25%).',
      desc: 'Dark halls. Mages channel arcane power (+25%).',
      towerMod: { mage: 1.25 }, event: 'relic',
      theme: { bg:'#1c1c22', g1:'#4a4a56', g2:'#42424e', road:'#6a6a78', edge:'#2c2c36', decor:'#5a5a68', decoType:'moss' } },
    { name: 'Marsh', diff: 1.2, wp: [[-1,7],[3,7],[3,2],[7,2],[7,6],[11,6],[11,1],[15,1]],
      surface: 0.8, surfaceLabel: 'Thick mud slows enemies (-20%) but bog-beasts crawl out.',
      desc: 'Thick mud slows enemies (-20%) but bog-beasts crawl out.',
      towerMod: { archer: 0.85 }, event: 'bog',
      theme: { bg:'#2a3a2a', g1:'#4e6a4a', g2:'#466042', road:'#6a6a3a', edge:'#3a4a2a', decor:'#5e7a4e', decoType:'moss' } },
  ];
  function mapDef() { return MAPS[mapIndex]; }
  function surfaceMul() { return mapDef().surface || 1; }
  function towerMapMod(type) { const m = mapDef().towerMod; return (m && m[type]) || 1; }
  let mapIndex = 0;
  function theme() { return MAPS[mapIndex].theme; }

  // ---- Grid + path ----
  const COLS = 15, ROWS = 9;
  let WP = MAPS[0].wp.slice();
  let ts = 48, ox = 0, oy = 0, road = [];

  function computeRoad() {
    road = Array.from({ length: COLS }, () => Array(ROWS).fill(false));
    for (let i = 0; i < WP.length - 1; i++) {
      let [c0, r0] = WP[i], [c1, r1] = WP[i + 1];
      const sc = Math.sign(c1 - c0), sr = Math.sign(r1 - r0);
      let c = c0, r = r0;
      for (;;) {
        if (c >= 0 && c < COLS && r >= 0 && r < ROWS) road[c][r] = true;
        if (c === c1 && r === r1) break;
        c += sc; r += sr;
      }
    }
  }
  computeRoad();

  function applyMap(i) {
    mapIndex = i;
    WP = MAPS[i].wp.slice();
    computeRoad();
    document.querySelectorAll('.map-btn').forEach(b => b.classList.toggle('active', Number(b.dataset.map) === i));
  }

  function buildMapPicker() {
    const host = $('mapPicker'); if (!host) return;
    host.innerHTML = MAPS.map((m, i) => {
      const b = getMapBest(i);
      const best = b.wave > 0 ? ('Best wave <b>' + b.wave + '</b>') : 'Best wave <b>—</b>';
      return '<button class="map-btn' + (i === mapIndex ? ' active' : '') + '" data-map="' + i + '">' +
        '<span class="nm"><span class="sw" style="background:' + m.theme.road + '"></span>' +
        m.name + '<span class="tick">✓</span></span>' +
        '<span class="desc">' + (m.desc || m.surfaceLabel) + '</span>' +
        '<span class="bw">' + best + '</span></button>';
    }).join('');
    document.querySelectorAll('.map-btn').forEach(b => b.addEventListener('click', () => applyMap(Number(b.dataset.map))));
  }

  function cx(c) { return ox + c * ts + ts / 2; }
  function cy(r) { return oy + r * ts + ts / 2; }

  let W, H;
  // pixel <-> grid-cell conversion using the CURRENT geometry; entities keep their
  // position in fractional cell space so a resize/rotation re-derives correct pixels.
  function pxToGX(px) { return (px - ox) / ts - 0.5; }
  function pxToGY(py) { return (py - oy) / ts - 0.5; }
  function gxToPx(gx) { return ox + (gx + 0.5) * ts; }
  function gyToPy(gy) { return oy + (gy + 0.5) * ts; }

  function reflowEntities() {
    // re-derive every entity's pixel position from its stored grid-cell coords.
    for (const t of towers) { t.x = cx(t.c); t.y = cy(t.r); }
    if (towers.length) recomputeBuffs(); // aura radius is in pixels → re-derive on resize
    for (const e of enemies) {
      if (e.gx !== undefined) { e.x = gxToPx(e.gx); e.y = gyToPy(e.gy); }
    }
    for (const s of shots) {
      if (s.gx !== undefined) { s.x = gxToPx(s.gx); s.y = gyToPy(s.gy); }
      // refresh cached target/aim pixels from the live target (or its last grid coords)
      if (s.tgt) { s.tx = s.tgt.x; s.ty = s.tgt.y; }
    }
    for (const d of drops) { d.x = cx(d.c); d.y = cy(d.r); }
  }

  const SIDEBAR = 132; // landscape: width reserved on the LEFT for the vertical toolbar strip
  let topReserve = 78; // top headroom reserved for the .gamekit-hud (recomputed each resize)
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    const portrait = H > W;

  // Pixel position at a fraction (0..1) along the full waypoint path — used for checkpoints.
  function pathPointAt(frac) {
    let total = 0; const segs = [];
    for (let i = 0; i < WP.length - 1; i++) {
      const ax = cx(WP[i][0]), ay = cy(WP[i][1]), bx = cx(WP[i + 1][0]), by = cy(WP[i + 1][1]);
      const len = Math.hypot(bx - ax, by - ay); segs.push({ ax, ay, bx, by, len }); total += len;
    }
    let want = frac * total;
    for (const s of segs) { if (want <= s.len || s === segs[segs.length - 1]) { const t = s.len ? want / s.len : 0; return { x: s.ax + (s.bx - s.ax) * t, y: s.ay + (s.by - s.ay) * t }; } want -= s.len; }
    return { x: cx(WP[0][0]), y: cy(WP[0][1]) };
  }

  // Fraction (0..1) along the full waypoint path that an enemy has reached.
  function pathFracOf(e) {
    let total = 0; const lens = [];
    for (let i = 0; i < WP.length - 1; i++) {
      const len = Math.hypot(cx(WP[i + 1][0]) - cx(WP[i][0]), cy(WP[i + 1][1]) - cy(WP[i][1]));
      lens.push(len); total += len;
    }
    if (total <= 0) return 0;
    let done = 0;
    for (let i = 0; i < e.seg && i < lens.length; i++) done += lens[i];
    const nx = WP[e.seg + 1];
    if (nx) {
      const segLen = lens[e.seg] || 0;
      const tx = cx(nx[0]), ty = cy(nx[1]);
      const ax = cx(WP[e.seg][0]), ay = cy(WP[e.seg][1]);
      const along = segLen - Math.hypot(tx - e.x, ty - e.y);
      done += Math.max(0, Math.min(segLen, along));
    }
    return Math.max(0, Math.min(1, done / total));
  }

  function menuKeep(g, x, y, s) {
    const hw = s * .34, hh = s * .32; g.fillStyle = '#78788a'; g.fillRect(x - hw, y - hh, hw * 2, hh * 2);
    g.fillStyle = 'rgba(0,0,0,.15)'; g.fillRect(x + hw * .3, y - hh, hw * .7, hh * 2);
    g.fillStyle = '#8a8a9c'; const bw = s * .13, bh = s * .15, gap = s * .15; for (let i = -1; i <= 1; i++) g.fillRect(x + i * gap - bw / 2, y - hh - bh, bw, bh);

  function menuMapRender(g, W2, H2, m) {
    const th = m.theme, ts2 = Math.max(W2 / COLS, H2 / ROWS), ox2 = (W2 - COLS * ts2) / 2, oy2 = (H2 - ROWS * ts2) / 2;
    const cxx = c => ox2 + c * ts2 + ts2 / 2, cyy = r => oy2 + r * ts2 + ts2 / 2;
    g.fillStyle = th.bg; g.fillRect(0, 0, W2, H2);
    const rd = Array.from({ length: COLS }, () => Array(ROWS).fill(false));
    for (let i = 0; i < m.wp.length - 1; i++) { let [c0, r0] = m.wp[i], [c1, r1] = m.wp[i + 1]; const sc = Math.sign(c1 - c0), sr = Math.sign(r1 - r0); let c = c0, r = r0; for (; ;) { if (c >= 0 && c < COLS && r >= 0 && r < ROWS) rd[c][r] = true; if (c === c1 && r === r1) break; c += sc; r += sr; } }
    const rgb1 = hexToRgb(th.g1), rgb2 = hexToRgb(th.g2);

  // ---- Wave building ----
  function buildWave(n) {
    const q = [];
    let t = 0;
    const interval = Math.max(11, 34 - n);

    const grunts = 5 + Math.floor(n * 1.9);
    const runners = n >= 2 ? Math.floor(n * 1.4) : 0;
    const brutes = n >= 3 ? Math.floor((n - 1) / 2) : 0;
    const armoredCount = n >= 4 ? Math.floor(n / 3) : 0;
    const swarmGroups = n >= 3 ? Math.floor(n / 2) : 0;

    for (let i = 0; i < grunts; i++) { q.push({ type: 'grunt', at: t }); t += interval; }
    for (let i = 0; i < runners; i++) { q.push({ type: 'runner', at: t }); t += interval; }
    for (let i = 0; i < brutes; i++) { q.push({ type: 'brute', at: t + 60 }); t += 70; }
    for (let i = 0; i < armoredCount; i++) { q.push({ type: 'armored', at: t + 30 }); t += interval + 5; }
    for (let g = 0; g < swarmGroups; g++) {
      for (let i = 0; i < 4; i++) { q.push({ type: 'swarm', at: t + i * 5 }); }
      t += interval + 20;
    }
    if (n % 5 === 0) { q.push({ type: 'boss', at: t + 80 }); }
    return q.sort((a, b) => a.at - b.at);
  }

  function startWave() {

  // Between-rounds threat rubber-band: called once at wave end (TASK 4).
  function adjustThreat() {
    const before = difficulty;
    if (!waveLeaked && waveMaxFrac < DIFF_EARLY) {
      difficulty = Math.min(DIFF_MAX, difficulty + DIFF_UP);   // dominated → rise
    } else if (waveLeaked || waveMaxFrac >= DIFF_LATE) {
      difficulty = Math.max(DIFF_MIN, difficulty - DIFF_DOWN); // struggled → fall (faster)
    }
    if (Math.abs(difficulty - before) > 1e-6) {
      const up = difficulty > before;
      float(W / 2, 90, (up ? '⚔ Threat rising — ' : '🛡 Threat easing — ') + difficulty.toFixed(1) + '×', up ? '#ff8a3a' : '#7fd0a0');
    }
    updateHud();
  }

  function spawnEnemy(type) {
    const b = ENEMY_DEFS[type];
    if (!b) return;
    // HP scales with wave, map difficulty AND the adaptive threat multiplier.
    // Baseline roughly doubled (1.7 base + 0.5/wave) to offset the new buffs/drops, then
    // the live `difficulty` multiplier ramps it further when the path stays clear (TASK 4).
    const dm = MAPS[mapIndex].diff || 1;
    const k = waveHpK() * dm * difficulty;
    const hpv = Math.max(1, Math.round(b.hp * k));
    // surface affects movement; difficulty also nudges speed up (capped so it stays playable)
    const spd = b.speed * surfaceMul() * (1 + (difficulty - 1) * 0.25);
    const e = {
      type, maxHp: hpv, hp: hpv,
      speed: spd, reward: Math.max(1, Math.round(b.reward * DIFF().rewardMul)), color: b.color, rr: b.rr, leak: b.leak,
      armored: b.armored || false,
      seg: 0, slow: 0,
      x: cx(WP[0][0]), y: cy(WP[0][1]),
      gx: WP[0][0], gy: WP[0][1],
    };
    enemies.push(e);
  }

  // ---- Building ----
  function cellAt(px, py) {
    const c = Math.floor((px - ox) / ts), r = Math.floor((py - oy) / ts);

    return { c, r };

  function placeTower(type, c, r) {

    if (gold < cfg.cost) return false;

      aura: cfg.aura ? { ...cfg.aura } : null,

    $('ptName').textContent = (TOWERS[t.type].icon || '') + ' ' + TOWERS[t.type].name + '  ·  Lv ' + t.lvl;
    const ps = $('ptStats'); if (ps) ps.innerHTML = placedTowerStatsHtml(t);
    $('upBtn').textContent = t.lvl >= 3 ? 'Maxed' : ('Upgrade ' + upgradeCost(t) + 'g');
    $('sellBtn').textContent = 'Sell +' + Math.round(t.spent * 0.7) + 'g';
    const pk = $('ptKills'); if (pk) pk.textContent = 'Kills: ' + t.kills;
    const tb = $('targetBtn');
    if (tb) { tb.style.display = t.kind === 'buff' ? 'none' : ''; tb.textContent = 'Target: ' + TARGET_LABEL[t.targetMode || 'first'] + ' ▸'; }
    refreshUpBtn();
  }
  function cycleTarget(t) {
    if (!t || t.kind === 'buff') return;
    const i = TARGET_MODES.indexOf(t.targetMode || 'first');
    t.targetMode = TARGET_MODES[(i + 1) % TARGET_MODES.length];
    const tb = $('targetBtn'); if (tb) tb.textContent = 'Target: ' + TARGET_LABEL[t.targetMode] + ' ▸';
  }
  // Grey out (disable) the upgrade button when it's maxed or unaffordable; it "pops in" once you
  // can afford it (refreshToolbar runs on every gold change, e.g. each kill).
  function refreshUpBtn() {
    const b = $('upBtn'); if (!b || !selTower) return;
    const canUpgrade = selTower.lvl < 3 && gold >= upgradeCost(selTower);
    b.disabled = !canUpgrade;
  }

  // ---- Tower info / tooltips (TASK 2) ----
  // Frames/tick → "per second": the loop runs update() ~60×/s (×gameSpeed), so a cooldown
  // of `cd` frames ≈ 60/cd shots per second. We report at 1× for a stable readout.
  function ratePerSec(fcd) { return (60 / Math.max(1, fcd)).toFixed(1); }
  function buildTipHtml(type) {
    const c = TOWERS[type];
    const mod = towerMapMod(type);
    const dmg = Math.max(c.dmg ? 1 : 0, Math.round(c.dmg * mod));
    const rows = [];
    if (c.kind !== 'buff') {
      rows.push(['Damage', dmg + (mod !== 1 ? ' (' + (mod > 1 ? '+' : '') + Math.round((mod - 1) * 100) + '% map)' : '')]);
      rows.push(['Rate', ratePerSec(c.cd) + '/s']);
    }
    rows.push(['Range', c.range.toFixed(1)]);
    rows.push(['Cost', c.cost + 'g']);
    rows.push(['Upgrade', Math.round(c.cost * 2.2) + 'g+']);
    return '<h4>' + c.icon + ' ' + c.name + '</h4>' +
      rows.map(r => '<div class="row"><span>' + r[0] + '</span><span>' + r[1] + '</span></div>').join('') +
      '<div class="sp">' + c.special + '</div>';
  }
  function placedTowerStatsHtml(t) {
    const dmg = t.eDmg ?? t.dmg, rng = (t.eRange ?? t.range), fcd = t.eFireCd ?? t.fireCd;
    const parts = [];
    if (t.kind !== 'buff') { parts.push('Dmg ' + dmg); parts.push('Rate ' + ratePerSec(fcd) + '/s'); }
    parts.push('Range ' + rng.toFixed(1));
    if (t.buffed) parts.push('🎵 buffed');
    if (t.mapMod && t.mapMod !== 1) parts.push((t.mapMod > 1 ? '↑' : '↓') + ' map');
    if (t.splash) parts.push('splash');
    if (t.aura) parts.push('aura buff');
    return parts.join(' · ');
  }
  const tipEl = () => $('tip');
  function showTipFor(type, x, y) {
    const el = tipEl(); if (!el) return;
    el.innerHTML = buildTipHtml(type);
    el.classList.add('show');
    // position above the anchor, clamped to viewport (guard innerWidth in headless)
    const vw = (typeof window !== 'undefined' && window.innerWidth) || 1280;
    let lx = Math.min(Math.max(8, x - 120), vw - 248);
    el.style.left = lx + 'px';
    el.style.bottom = ((typeof window !== 'undefined' && window.innerHeight ? window.innerHeight : 800) - y + 10) + 'px';
  }
  function hideTip() { const el = tipEl(); if (el) el.classList.remove('show'); }

  // ---- Buff aura (Bard) ----
  // Recompute each tower's effective stats from its base + the strongest overlapping aura.
  // Auras stack additively but cap so two bards don't trivialise placement.
  function recomputeBuffs() {
    const bards = towers.filter(t => t.aura);
    for (const t of towers) {
      let dmgB = 0, rangeB = 0, rateB = 0;
      if (!t.aura) {
        for (const b of bards) {
          const R = (b.range + (b.lvl - 1) * 0.3) * ts;
          if (b === t) continue;
          if (dist(b.x, b.y, t.x, t.y) <= R) {
            const lvlBoost = 1 + (b.lvl - 1) * 0.4;
            dmgB += b.aura.dmg * lvlBoost;
            rangeB += b.aura.range * lvlBoost;
            rateB += b.aura.rate * lvlBoost;
          }
        }
      }
      dmgB = Math.min(dmgB, 1.2); rangeB = Math.min(rangeB, 0.8); rateB = Math.min(rateB, 0.55);
      t.buffed = dmgB > 0 || rangeB > 0 || rateB > 0;
      const mapMod = towerMapMod(t.type);
      t.mapMod = mapMod;
      t.eDmg = Math.max(1, Math.round(t.dmg * (1 + dmgB) * mapMod));
      t.eRange = t.range * (1 + rangeB);
      t.eFireCd = Math.max(4, Math.round(t.fireCd * (1 - rateB)));
    }
  }
  function auraRadius(t) { return (t.range + (t.lvl - 1) * 0.3) * ts; }

  // ---- Combat helpers ----
  function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }

  // Armored foes shrug off physical (archer/frost); only cannon splash + mage magic
  // hit them in full. Makes the tower MIX matter, not raw tower count.
  function effectiveDmg(dmg, enemy, kind) {
    if (!enemy.armored) return dmg;
    if (kind === 'mage' || kind === 'ball') return dmg;
    return Math.max(1, Math.round(dmg * 0.25));
  }

  // ---- Targeting priority ----
  // Pick the single primary/aim target in range for a tower per its targetMode.
  // first = furthest along path (default), last = least along, strongest/weakest = hp,
  // closest = min distance to the tower. (AoE towers still hit everything; this is only the aim point.)
  const TARGET_MODES = ['first', 'last', 'strongest', 'weakest', 'closest'];
  const TARGET_LABEL = { first: 'First', last: 'Last', strongest: 'Strongest', weakest: 'Weakest', closest: 'Closest' };
  function acquireTarget(t, R) {
    const mode = t.targetMode || 'first';
    let tgt = null, best = null;
    for (const e of enemies) {
      const d = dist(t.x, t.y, e.x, e.y);
      if (d > R) continue;
      let key;
      if (mode === 'last') key = -e.seg;
      else if (mode === 'strongest') key = e.hp;
      else if (mode === 'weakest') key = -e.hp;
      else if (mode === 'closest') key = -d;
      else key = e.seg; // first
      if (best === null || key > best) { best = key; tgt = e; }
    }
    return tgt;
  }

  function spawnParticles(x, y, col) {
    const count = 5 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      particles.push({ x, y, vx: (Math.random() - 0.5) * 3.5, vy: (Math.random() - 0.5) * 3.5, life: 1, col: col || '#e0b25a' });
    }
  }

  // Richer AoE burst: an expanding shockwave ring + flung sparks. Headless-safe (pure data).
  function spawnSplash(x, y, col, pxRadius, sparkCol) {
    particles.push({ x, y, ring: true, r: pxRadius * 0.25, maxR: pxRadius, life: 1, decay: 0.06, col });
    const n = 9 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + Math.random() * 0.4;
      const sp = 2.5 + Math.random() * 3.5;
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, decay: 0.045, col: sparkCol || col });
    }
  }

  // Screen-spanning meteor shockwave: stacked expanding rings + a wide spray of embers (TASK 3).
  function spawnMeteorBlast(x, y, R) {
    particles.push({ x, y, ring: true, r: R * 0.12, maxR: R, life: 1, decay: 0.022, col: '#fff0c0', lw: 8 });
    particles.push({ x, y, ring: true, r: R * 0.05, maxR: R * 0.92, life: 1, decay: 0.03, col: '#ff7a3a', lw: 5 });
    particles.push({ x, y, ring: true, r: R * 0.02, maxR: R * 0.6, life: 1, decay: 0.045, col: '#ffd070', lw: 3 });
    const n = 40;
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + Math.random() * 0.3;
      const sp = 4 + Math.random() * 7;
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, decay: 0.02 + Math.random() * 0.02, col: i % 2 ? '#ff7a3a' : '#ffd070' });
    }
    if (typeof window !== 'undefined' && window.navigator && navigator.vibrate) { try { navigator.vibrate([30, 40, 60]); } catch (e) {} }
  }

  // ---- Map-specific events (TASK 5c) ----
  // Each map has one signature collectible/event. All are clickable drops with a payoff;
  // some also have a side effect (bog spawns an extra mud-beast, freeze chills the field).
  const EVENTS = {
    rally:  { icon: '🚩', col: '#7fb85f', label: 'Rally banner — gold + brief haste' },
    freeze: { icon: '🧊', col: '#9ee0ff', label: 'Freeze — chills every enemy on screen' },
    meteor: { icon: '☄️', col: '#ff7a3a', label: 'Meteor — clear it for big gold (scorches enemies)' },
    oasis:  { icon: '🌴', col: '#4fc0a0', label: 'Oasis — large gold cache' },
    relic:  { icon: '💎', col: '#c080ff', label: 'Relic — gold + haste' },
    bog:    { icon: '🐸', col: '#8fbf6f', label: 'Bog bloom — gold, but rouses a mud-beast' },
  };
  function spawnBogBeast() {
    const b = ENEMY_DEFS.brute;
    const dm = MAPS[mapIndex].diff || 1;
    const k = waveHpK() * dm * difficulty * 0.8;
    const hpv = Math.max(1, Math.round(b.hp * k));
    enemies.push({ type: 'brute', maxHp: hpv, hp: hpv, speed: b.speed * surfaceMul(), reward: Math.max(1, Math.round((b.reward + 4) * DIFF().rewardMul)),
      color: '#6f9a4f', rr: b.rr, leak: b.leak, armored: false, seg: 0, slow: 0,
      x: cx(WP[0][0]), y: cy(WP[0][1]), gx: WP[0][0], gy: WP[0][1] });
  }

  // ---- Map drops (clickable bonuses) ----
  function spawnDrop(kind) {
    // place on a random grass cell so it doesn't hide under the road
    let cell = null;
    for (let tries = 0; tries < 30 && !cell; tries++) {
      const c = Math.floor(Math.random() * COLS), r = Math.floor(Math.random() * ROWS);
      if (!road[c][r] && !towerAt(c, r)) cell = { c, r };
    }
    // map jammed with towers → no free grass; scatter to a random cell instead of the (0,0) corner
    if (!cell) cell = { c: Math.floor(Math.random() * COLS), r: Math.floor(Math.random() * ROWS) };
    const k = kind || (Math.random() < 0.6 ? 'gold' : 'haste');
    const isEvent = !!EVENTS[k];
    const baseGold = 15 + Math.floor(Math.random() * 20) + wave * 2;
    const amount = isEvent ? (k === 'meteor' || k === 'oasis' ? baseGold * 2 : baseGold) : (k === 'gold' ? baseGold : 0);
    const d = { kind: k, event: isEvent ? k : null, c: cell.c, r: cell.r, x: cx(cell.c), y: cy(cell.r), gx: cell.c, gy: cell.r, life: 480, amount, pulse: 0 };
    drops.push(d);
    return d;
  }
  // Spawn this map's signature event (TASK 5c).
  function spawnMapEvent() { return spawnDrop(mapDef().event); }
  function collectDrop(idx) {
    const d = (idx === undefined) ? drops[0] : drops[idx];
    if (!d) return false;
    if (d.event) {
      const ev = EVENTS[d.event];
      if (d.amount > 0) { gold += d.amount; score += Math.round(d.amount / 2); float(d.x, d.y, '+' + d.amount + 'g', '#ffe066'); }
      if (d.event === 'rally' || d.event === 'relic') hasteTicks = Math.max(hasteTicks, 360);
      if (d.event === 'freeze') { for (const e of enemies) e.slow = Math.max(e.slow, 150); float(d.x, d.y - 14, '❄ FROZEN!', '#9ee0ff'); }
      if (d.event === 'meteor') {
        // Rare, devastating: blast spans the whole board (well over 2/3). It KILLS ordinary enemies,
        // but a BOSS only takes a big chunk (half its max HP) — it can't trivialise the boss fight.
        const R = Math.hypot(COLS * ts, ROWS * ts);
        for (const e of [...enemies]) {
          if (dist(d.x, d.y, e.x, e.y) > R) continue;
          if (e.type === 'boss') { e.hp -= e.maxHp * 0.5; if (e.hp <= 0) killEnemy(e); }
          else killEnemy(e);
        }
        spawnMeteorBlast(d.x, d.y, R);
        float(d.x, d.y - 22, '☄️ METEOR STRIKE!', '#ff7a3a');
      }
      if (d.event === 'bog') { spawnBogBeast(); float(d.x, d.y - 14, '🐸 mud-beast!', '#8fbf6f'); }
      spawnParticles(d.x, d.y, ev.col);
    } else if (d.kind === 'gold') { gold += d.amount; score += Math.round(d.amount / 2); float(d.x, d.y, '+' + d.amount + 'g', '#ffe066'); spawnParticles(d.x, d.y, '#ffe066'); }
    else { hasteTicks = Math.max(hasteTicks, 480); float(d.x, d.y, '⚡ HASTE!', '#ffe066'); spawnParticles(d.x, d.y, '#ffe066'); }
    drops.splice(drops.indexOf(d), 1);
    updateHud(); refreshToolbar();
    SND.play('sell');
    return true;
  }

  // ---- Update ----
  function update() {
    // auto-start: launch the next wave after a short build pause
    if (state === 'build' && autoWave) { if (autoDelay > 0) autoDelay--; else startWave(); }
    if (state === 'wave') {
      spawnT++;
      while (spawnQ.length && spawnQ[0].at <= spawnT) { spawnEnemy(spawnQ.shift().type); }

      if (!bossWarnShown && spawnQ.length > 0) {
        const nb = spawnQ.find(e => e.type === 'boss');
        if (nb && (nb.at - spawnT) <= 80 && (nb.at - spawnT) > 0) {
          bossWarnShown = true;
          float(W / 2, H / 2 - 60, '⚠ BOSS INCOMING ⚠', '#ff4444');
        }
      }

      // Threat signal: track how far down the path enemies get this wave (used at wave end).
      for (const e of enemies) { const f = pathFracOf(e); if (f > waveMaxFrac) waveMaxFrac = f; }
    }

    // wave announce timer
    if (waveAnnTimer > 0) {
      waveAnnTimer--;
      if (waveAnnTimer === 0) { const el = $('waveAnnounce'); if (el) el.classList.remove('show'); }
    }

    // enemies move
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const sp = e.speed * ts * 0.03 * (e.slow > 0 ? 0.45 : 1);
      if (e.slow > 0) e.slow--;
      const tw = WP[e.seg + 1];
      if (!tw) { enemies.splice(i, 1); continue; }
      const tx = cx(tw[0]), ty = cy(tw[1]);
      const d = dist(e.x, e.y, tx, ty);
      if (d <= sp) {
        e.x = tx; e.y = ty; e.seg++;
        if (e.seg >= WP.length - 1) {
          hp -= e.leak;
          waveLeaked = true; waveMaxFrac = 1; // a leak pushes threat DOWN at wave end
          enemies.splice(i, 1);
          SND.play('leak');
          float(e.x, e.y, '-' + e.leak, '#ff8a8a');
          updateHud();
          if (hp <= 0) { gameOver(); break; } // keep fell — enemies[] is now cleared, stop iterating
        }
      } else {
        e.x += (tx - e.x) / d * sp;
        e.y += (ty - e.y) / d * sp;
      }
      e.gx = pxToGX(e.x); e.gy = pxToGY(e.y);
    }

    // towers fire (effective stats include any Bard aura)
    for (const t of towers) {
      if (t.kind === 'buff') continue; // bards don't shoot
      if (t.cd > 0) { t.cd--; continue; }
      const R = (t.eRange ?? t.range) * ts;
      const dmg0 = t.eDmg ?? t.dmg;
      let fcd = t.eFireCd ?? t.fireCd;
      if (hasteTicks > 0) fcd = Math.max(3, Math.round(fcd * 0.6));

      if (t.kind === 'frost') {
        let any = false;
        for (const e of enemies) {
          if (dist(t.x, t.y, e.x, e.y) <= R) {
            e.slow = 30;
            const d = effectiveDmg(dmg0, e, 'frost');
            e.hp -= d;
            any = true;
            if (e.hp <= 0) { t.kills++; killEnemy(e); }
          }
        }
        if (any) t.cd = fcd;
        continue;
      }

      if (t.kind === 'mage') {
        let any = false;
        for (const e of enemies) {
          if (dist(t.x, t.y, e.x, e.y) <= R) {
            shots.push({ x: t.x, y: t.y, gx: t.c, gy: t.r, tx: e.x, ty: e.y, tgt: e, dmg: dmg0, kind: 'mage', splash: t.splash, slow: t.slow || 0.3, col: TOWERS.mage.color, t: 0, src: t });
            any = true;
          }
        }
        if (any) { t.cd = fcd; SND.play('shoot'); }
        continue;
      }

      const tgt = acquireTarget(t, R);
      if (tgt) {
        shots.push({ x: t.x, y: t.y, gx: t.c, gy: t.r, tx: tgt.x, ty: tgt.y, tgt, dmg: dmg0, kind: t.kind, splash: t.splash, col: TOWERS[t.type].color, t: 0, src: t });
        t.cd = fcd;
        SND.play('shoot');
      }
    }

    // shots move + impact
    for (let i = shots.length - 1; i >= 0; i--) {
      const s = shots[i]; s.t++;
      const aimx = s.tgt && s.tgt.hp > 0 ? s.tgt.x : s.tx;
      const aimy = s.tgt && s.tgt.hp > 0 ? s.tgt.y : s.ty;
      const d = dist(s.x, s.y, aimx, aimy), sp = 8 + ts * 0.12;
      if (d <= sp || s.t > 120) {
        if (s.kind === 'ball') {
          const SR = s.splash * ts;
          for (const e of enemies) {
            if (dist(aimx, aimy, e.x, e.y) <= SR) {
              const dmg = effectiveDmg(s.dmg, e, 'ball');
              e.hp -= dmg;
              if (e.hp <= 0) { if (s.src) s.src.kills++; killEnemy(e); }
            }
          }
          spawnSplash(aimx, aimy, '#ff8a3a', SR, '#ffd070');
          SND.play('boom');
        } else if (s.kind === 'mage') {
          const SR = (s.splash || 1) * ts * 0.8;
          for (const e of enemies) {
            if (dist(aimx, aimy, e.x, e.y) <= SR) {
              e.slow = Math.round((s.slow || 0.3) * 60);
              const dmg = effectiveDmg(s.dmg, e, 'mage');
              e.hp -= dmg;
              if (e.hp <= 0) { if (s.src) s.src.kills++; killEnemy(e); }
            }
          }
          spawnSplash(aimx, aimy, '#c080ff', SR, '#e6c0ff');
          SND.play('hit');
        } else {
          if (s.tgt && s.tgt.hp > 0) {
            const dmg = effectiveDmg(s.dmg, s.tgt, s.kind);
            s.tgt.hp -= dmg;
            if (s.tgt.hp <= 0) { if (s.src) s.src.kills++; killEnemy(s.tgt); }
          }
          SND.play('hit');
        }
        shots.splice(i, 1);
      } else {
        s.x += (aimx - s.x) / d * sp;
        s.y += (aimy - s.y) / d * sp;
        s.gx = pxToGX(s.x); s.gy = pxToGY(s.y);
      }
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      if (p.ring) { p.r += (p.maxR - p.r) * 0.28; }
      else { p.x += p.vx; p.y += p.vy * 0.8 + 0.3; p.vx *= 0.92; p.vy *= 0.92; }
      p.life -= (p.decay || 0.05);
      if (p.life <= 0) particles.splice(i, 1);
    }

    // floats
    for (let i = floats.length - 1; i >= 0; i--) {
      const f = floats[i]; f.y -= 0.5; f.life -= 0.02;
      if (f.life <= 0) floats.splice(i, 1);
    }

    // map drops: spawn occasionally during waves, expire if not clicked
    if (hasteTicks > 0) hasteTicks--;
    if (state === 'wave') {
      if (dropCooldown > 0) dropCooldown--;
      else if (drops.length < 2 && Math.random() < 0.012) {
        // ~40% chance the drop is this map's signature event, else a generic gold/haste drop.
        // The Lava meteor is a RARE, devastating event — gated far lower than ordinary drops.
        const ev = mapDef().event;
        if (ev === 'meteor') { if (Math.random() < 0.05) spawnMapEvent(); else spawnDrop(); }
        else if (Math.random() < 0.4) spawnMapEvent(); else spawnDrop();
        dropCooldown = 420 + Math.floor(Math.random() * 300);
      }
    }
    for (let i = drops.length - 1; i >= 0; i--) {
      const d = drops[i]; d.life--; d.pulse += 0.15;
      if (d.life <= 0) drops.splice(i, 1);
    }

    // wave end
    if (state === 'wave' && spawnQ.length === 0 && enemies.length === 0) {
      state = 'build';
      autoDelay = 150; // brief breather before auto-start launches the next wave
      adjustThreat(); // between-rounds rubber-band (TASK 4)
      const base = 6 + Math.round(wave * 1.5);
      const interest = Math.min(DIFF().interestCap, Math.max(1, Math.round(gold * DIFF().interestRate)));
      let bonus = 0;
      if (victory) bonus = Math.round(base * 0.5);
      gold += base + bonus + interest;
      score += wave * 10;
      float(W / 2, H / 2 - 40, 'Wave ' + wave + ' cleared! +' + (base + bonus) + 'g', '#e0b25a');
      float(W / 2, H / 2 - 20, 'Interest +' + interest + 'g', '#f0d080');
      if (wave >= 10 && !victory) {
        victory = true;
        gold += 200;
        SND.play('win');
        float(W / 2, H / 2, 'VICTORY! Endless mode...', '#ffe066');
        float(W / 2, H / 2 + 20, '+200g bonus!', '#e0b25a');
      }
      updateHud();
      refreshToolbar();
    }
    updateHud();
  }

  function killEnemy(e) {
    const i = enemies.indexOf(e); if (i < 0) return;
    enemies.splice(i, 1);
    gold += e.reward;
    score += e.reward;
    spawnParticles(e.x, e.y, e.color);
    float(e.x, e.y, '+' + e.reward, '#e0b25a');
    updateHud();
    refreshToolbar();
  }

  function gameOver() {
    state = 'over';
    saveBest();
    KIT.recordResult('tower-defense', { mode: MAPS[mapIndex].name + ' · ' + DIFF().label, score: score, stats: { wave: wave, difficulty: diffLevel } });
    SND.play('over');
    enemies = []; shots = []; spawnQ = [];
    showEnd();
  }

  // ---- Render helpers ----

  function hexToRgb(h) { const n = parseInt(h.slice(1), 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }

  // Terrain cell, themed per map, with subtle variation + light decor
  function drawGrassCell(c, r) {
    const th = theme();
    const x = ox + c * ts, y = oy + r * ts;
    const [R0, G0, B0] = hexToRgb(((c + r) % 2) ? th.g1 : th.g2);
    const vary = ((c * 7 + r * 13) % 5) - 2;
    ctx.fillStyle = 'rgb(' + (R0 + vary) + ',' + (G0 + vary) + ',' + (B0 + vary) + ')';
    ctx.fillRect(x, y, ts, ts);
    // sparse themed decoration (deterministic, cheap)
    const seed = (c * 23 + r * 41) % 11;
    if (seed === 0 || seed === 5) {
      ctx.fillStyle = th.decor;
      const dx = x + ts * (0.3 + (seed % 3) * 0.15), dy = y + ts * 0.55;
      if (th.decoType === 'grass') { ctx.fillRect(dx, dy, 2, ts * 0.18); ctx.fillRect(dx + 4, dy + 3, 2, ts * 0.14); }
      else if (th.decoType === 'snow') { ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.arc(dx, dy, ts * 0.06, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; }
      else if (th.decoType === 'rock') { ctx.beginPath(); ctx.arc(dx, dy, ts * 0.09, 0, Math.PI * 2); ctx.fill(); }
      else if (th.decoType === 'sand') { ctx.globalAlpha = 0.4; ctx.fillRect(dx, dy, ts * 0.3, 1.5); ctx.globalAlpha = 1; }
      else { ctx.globalAlpha = 0.5; ctx.beginPath(); ctx.arc(dx, dy, ts * 0.1, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; }
    }
    // Lava map: glowing pools on some non-road cells
    if (th.lava && ((c * 13 + r * 7) % 17) === 3) {
      ctx.fillStyle = 'rgba(255,90,30,0.5)';
      ctx.beginPath(); ctx.ellipse(x + ts / 2, y + ts / 2, ts * 0.3, ts * 0.22, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,200,80,0.5)';
      ctx.beginPath(); ctx.ellipse(x + ts / 2, y + ts / 2, ts * 0.14, ts * 0.1, 0, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Themed road
  function drawRoadTexture() {
    const th = theme();
    ctx.strokeStyle = th.road; ctx.lineWidth = ts * 0.76; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < WP.length; i++) {
      const x = cx(WP[i][0]), y = cy(WP[i][1]);
      i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    }
    ctx.stroke();
    // edge/underlay
    ctx.strokeStyle = th.edge; ctx.lineWidth = ts * 0.62; ctx.stroke();
    ctx.strokeStyle = th.road; ctx.lineWidth = ts * 0.5; ctx.stroke();

    // patch overlay using road cells
    for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) {
      if (!road[c][r]) continue;
      const x = ox + c * ts, y = oy + r * ts;
      const seed = (c * 17 + r * 31) % 8;
      if (seed < 3) {
        ctx.fillStyle = 'rgba(255,255,255,0.10)';
        ctx.fillRect(x + ts * 0.1, y + ts * 0.1, ts * 0.8, ts * 0.8);
      } else if (seed >= 6) {
        ctx.fillStyle = 'rgba(0,0,0,0.12)';
        ctx.fillRect(x + ts * 0.2, y + ts * 0.2, ts * 0.6, ts * 0.6);
      }
    }
  }

  // Castle / keep at end
  function drawKeep(x, y, s) {
    const hw = s * 0.38, hh = s * 0.36;
    // main body
    ctx.fillStyle = '#78788a';
    ctx.fillRect(x - hw, y - hh, hw * 2, hh * 2);
    // wall shading
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(x + hw * 0.3, y - hh, hw * 0.7, hh * 2);
    // battlements
    ctx.fillStyle = '#8a8a9c';
    const bw = s * 0.14, bh = s * 0.16, gap = s * 0.16;
    for (let i = -1; i <= 1; i++) {
      ctx.fillRect(x + i * gap - bw / 2, y - hh - bh, bw, bh);
    }
    // gate arch
    ctx.fillStyle = '#3a2a17';
    ctx.beginPath();
    ctx.arc(x, y + hh * 0.15, s * 0.12, Math.PI, 0, false);
    ctx.rect(x - s * 0.12, y + hh * 0.15, s * 0.24, s * 0.25);
    ctx.fill();
    // flag
    ctx.fillStyle = '#cc3333';
    ctx.beginPath();
    ctx.moveTo(x, y - hh - bh - s * 0.28);
    ctx.lineTo(x + s * 0.18, y - hh - bh - s * 0.18);
    ctx.lineTo(x, y - hh - bh - s * 0.08);
    ctx.fill();
    ctx.strokeStyle = '#4a3220'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x, y - hh - bh); ctx.lineTo(x, y - hh - bh - s * 0.3); ctx.stroke();
  }

  // Tower shapes per type
  function drawTowerShape(t) {
    const x = t.x, y = t.y, s = ts * 0.5;
    const tierColors = ['#cd7f32', '#c0c0c0', '#e0b25a']; // bronze, silver, gold
    const tc = tierColors[t.lvl - 1];

    // subtle base pad: tinted disc in the tower's colour + a tier-coloured rim (readability)
    ctx.fillStyle = '#3a2a17';
    ctx.beginPath(); ctx.arc(x, y, s * 0.78, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = TOWERS[t.type].color + '55';
    ctx.beginPath(); ctx.arc(x, y, s * 0.66, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = tc; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, s * 0.66, 0, Math.PI * 2); ctx.stroke();

    // the tower's emoji ICON IS the body, centred and filling most of the cell (TASK 1)
    const ic = TOWER_ICON[t.type];
    if (ic) {
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = Math.round(ts * 0.62) + 'px Georgia,serif';
      ctx.fillText(ic, x, y + ts * 0.02);
    }

    // tier pips
    for (let i = 0; i < t.lvl - 1; i++) {
      ctx.fillStyle = '#e0b25a';
      ctx.beginPath(); ctx.arc(x - 5 + i * 6, y + s * 0.78 + 3, 3, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Enemies: a creature emoji centred on the mob, scaled to its radius (TASK 2).
  function drawEnemy(e) {
    const rr = e.rr * ts;
    ctx.save();

    // soft body disc behind the glyph (tinted by type colour) so it reads on any terrain
    ctx.fillStyle = e.color + '66';
    ctx.beginPath(); ctx.arc(e.x, e.y, rr, 0, Math.PI * 2); ctx.fill();

    // chilled/frozen tint: cool halo when slowed (status readability)
    if (e.slow > 0) {
      ctx.fillStyle = 'rgba(150,230,255,0.30)';
      ctx.beginPath(); ctx.arc(e.x, e.y, rr + 2, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(150,230,255,0.85)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(e.x, e.y, rr + 3, 0, Math.PI * 2); ctx.stroke();
    }

    const ic = ENEMY_ICON[e.type] || '🐀';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = Math.round(rr * 2.0) + 'px Georgia,serif';
    if (e.slow > 0) ctx.globalAlpha = 0.85; // frosted look
    ctx.fillText(ic, e.x, e.y + rr * 0.05);
    ctx.globalAlpha = 1;

    ctx.restore();

    // health bar — green → yellow → red
    const w = rr * 2.2, hpf = Math.max(0, e.hp / e.maxHp);
    const hbx = e.x - w / 2, hby = e.y - rr - 8;
    ctx.fillStyle = '#2a1010'; ctx.fillRect(hbx, hby, w, 4);
    const barColor = hpf > 0.6 ? '#5fd35f' : hpf > 0.3 ? '#e0c040' : '#e04040';
    ctx.fillStyle = barColor; ctx.fillRect(hbx, hby, w * hpf, 4);
  }

  // Projectile visuals
  function drawShot(s) {
    ctx.save();
    if (s.kind === 'ball') {
      ctx.fillStyle = '#e07030';
      ctx.beginPath(); ctx.arc(s.x, s.y, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffb060';
      ctx.beginPath(); ctx.arc(s.x - 1, s.y - 1, 2, 0, Math.PI * 2); ctx.fill();
    } else if (s.kind === 'mage') {
      ctx.fillStyle = '#c080ff';
      ctx.beginPath(); ctx.arc(s.x, s.y, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(200,150,255,0.4)';
      ctx.beginPath(); ctx.arc(s.x, s.y, 7, 0, Math.PI * 2); ctx.fill();
    } else if (s.kind === 'frost') {
      ctx.fillStyle = '#80d8ff';
      ctx.beginPath(); ctx.arc(s.x, s.y, 3, 0, Math.PI * 2); ctx.fill();
    } else {
      // arrow: line segment
      ctx.strokeStyle = '#b0a060'; ctx.lineWidth = 2;
      const dx = s.tx - s.x, dy = s.ty - s.y, len = Math.hypot(dx, dy) || 1;
      ctx.beginPath();
      ctx.moveTo(s.x - dx / len * 6, s.y - dy / len * 6);
      ctx.lineTo(s.x + dx / len * 6, s.y + dy / len * 6);
      ctx.stroke();
    }
    ctx.restore();
  }

  let hoverCell = null;

  function render() {
    // background (themed)
    ctx.fillStyle = theme().bg;
    ctx.fillRect(0, 0, W, H);

    // grass cells
    for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) {
      if (!road[c][r]) drawGrassCell(c, r);
    }

    // road
    drawRoadTexture();

    // keep
    drawKeep(cx(WP[WP.length - 1][0]), cy(WP[WP.length - 1][1]), ts);

    // build preview range ring
    if (selBuild && hoverCell && !road[hoverCell.c]?.[hoverCell.r] && !towerAt(hoverCell.c, hoverCell.r)) {
      const cfg = TOWERS[selBuild];
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      ctx.fillRect(ox + hoverCell.c * ts, oy + hoverCell.r * ts, ts, ts);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.arc(cx(hoverCell.c), cy(hoverCell.r), cfg.range * ts, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
    }

    // selected tower range ring — draw the EFFECTIVE (Bard-buffed) range so the ring
    // always matches what the tower actually targets (TASK 3). Targeting uses
    // `t.eRange ?? t.range` in update(); this mirrors that exact value.
    if (selTower) {
      const er = (selTower.eRange ?? selTower.range) * ts;
      ctx.strokeStyle = 'rgba(224,178,90,0.55)'; ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.arc(selTower.x, selTower.y, er, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
      // base range (faint) when buffed, so the +range bonus reads clearly
      if (selTower.buffed && selTower.eRange > selTower.range + 0.001) {
        ctx.strokeStyle = 'rgba(224,178,90,0.22)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(selTower.x, selTower.y, selTower.range * ts, 0, Math.PI * 2); ctx.stroke();
      }
    }

    // bard aura rings (always visible so placement reads at a glance)
    for (const t of towers) {
      if (!t.aura) continue;
      ctx.strokeStyle = 'rgba(217,164,65,0.30)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(t.x, t.y, auraRadius(t), 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = 'rgba(217,164,65,0.06)';
      ctx.beginPath(); ctx.arc(t.x, t.y, auraRadius(t), 0, Math.PI * 2); ctx.fill();
    }

    // towers — emoji icon centred ON the cell as the body (TASK 1)
    for (const t of towers) drawTowerShape(t);
    // buffed glow on towers within an aura
    for (const t of towers) {
      if (!t.buffed) continue;
      ctx.strokeStyle = 'rgba(255,220,120,0.7)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(t.x, t.y, ts * 0.4, 0, Math.PI * 2); ctx.stroke();
    }

    // enemies
    for (const e of enemies) drawEnemy(e);

    // shots
    for (const s of shots) drawShot(s);

    // drops (clickable bonuses) — pulse + fade in the last second
    for (const d of drops) {
      const pr = ts * 0.3 * (1 + 0.12 * Math.sin(d.pulse));
      ctx.globalAlpha = d.life < 60 ? Math.max(0.2, d.life / 60) : 1;
      if (d.event) {
        const ev = EVENTS[d.event];
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.beginPath(); ctx.arc(d.x, d.y, pr * 1.8, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = ev.col; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(d.x, d.y, pr * 1.5, 0, Math.PI * 2); ctx.stroke();
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = Math.round(pr * 2) + 'px Georgia,serif';
        ctx.fillText(ev.icon, d.x, d.y + 1);
        ctx.globalAlpha = 1;
        continue;
      }
      // glow halo
      ctx.fillStyle = 'rgba(255,224,102,0.25)';
      ctx.beginPath(); ctx.arc(d.x, d.y, pr * 1.7, 0, Math.PI * 2); ctx.fill();
      if (d.kind === 'gold') {
        ctx.fillStyle = '#e0b25a'; ctx.beginPath(); ctx.arc(d.x, d.y, pr, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#fff0c0'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#7a5a20'; ctx.font = 'bold ' + Math.round(pr * 1.1) + 'px Georgia,serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('$', d.x, d.y + 1);
      } else {
        ctx.fillStyle = '#9b6fe0'; ctx.beginPath(); ctx.arc(d.x, d.y, pr, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#e6c0ff'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#fff0c0';
        ctx.beginPath();
        ctx.moveTo(d.x - pr * 0.2, d.y - pr * 0.5); ctx.lineTo(d.x + pr * 0.25, d.y - pr * 0.05);
        ctx.lineTo(d.x, d.y - pr * 0.05); ctx.lineTo(d.x + pr * 0.2, d.y + pr * 0.5);
        ctx.lineTo(d.x - pr * 0.25, d.y + pr * 0.05); ctx.lineTo(d.x, d.y + pr * 0.05);
        ctx.closePath(); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // map legend (surface + signature event) — drawn just ABOVE the play grid so it never hides
    // behind the build toolbar (bottom in portrait, left strip in landscape).
    {
      const m = mapDef();
      ctx.fillStyle = 'rgba(231,214,173,0.7)'; ctx.font = '12px Georgia,serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
      const sm = surfaceMul();
      const surf = sm > 1.05 ? 'fast surface' : sm < 0.95 ? 'slow surface' : 'normal surface';
      ctx.fillText(m.name + ' · ' + surf + ' · ' + EVENTS[m.event].icon, ox, oy - 4);
    }

    // haste indicator — top-right of the play area, beside the legend
    if (hasteTicks > 0) {
      ctx.fillStyle = 'rgba(255,224,102,0.85)'; ctx.font = 'bold 14px Georgia,serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
      ctx.fillText('⚡ Haste ' + Math.ceil(hasteTicks / 60) + 's', ox + COLS * ts, oy - 4);
    }

    // particles
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      if (p.ring) {
        ctx.strokeStyle = p.col; ctx.lineWidth = p.lw || 3;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.stroke();
      } else {
        ctx.fillStyle = p.col;
        ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;

    // floats
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (const f of floats) {
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.fillStyle = f.col;
      ctx.font = 'bold 15px Georgia,serif';
      ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;
  }

  function loop() {
    requestAnimationFrame(loop);
    if (window.gamekit && window.gamekit.isPaused && window.gamekit.isPaused()) return; // kit pause
    try {
      if (state === 'wave' || state === 'build') {
        update();
        if (gameSpeed === 2) update();
      }
      render();
    } catch(e) { if (typeof console !== 'undefined') console.error(e); }
  }

  // ---- Input ----
  function tap(px, py) {
    if (state !== 'build' && state !== 'wave') return;
    // clickable drops take priority over building
    for (let i = 0; i < drops.length; i++) {
      if (dist(px, py, drops[i].x, drops[i].y) <= ts * 0.55) { collectDrop(i); return; }
    }
    const cell = cellAt(px, py); if (!cell) return;
    const t = towerAt(cell.c, cell.r);
    if (t) { selectPanel(t); selBuild = null; refreshToolbar(); return; }
    if (road[cell.c][cell.r]) { selTower = null; const pt = $('panelTower'); if (pt) pt.style.display = 'none'; return; }
    if (selBuild) { placeTower(selBuild, cell.c, cell.r); }
    else { selTower = null; const pt = $('panelTower'); if (pt) pt.style.display = 'none'; }
  }

  canvas.addEventListener('pointerdown', e => {
    hideTip(); // a build/select interaction starts → drop the hover tooltip
    const r = canvas.getBoundingClientRect();
    tap((e.clientX - r.left) * (W / r.width), (e.clientY - r.top) * (H / r.height));
  });
  canvas.addEventListener('pointermove', e => {
    const r = canvas.getBoundingClientRect();
    const px = (e.clientX - r.left) * (W / r.width), py = (e.clientY - r.top) * (H / r.height);
    hoverCell = cellAt(px, py);
    // hover a placed tower → show its live stats tooltip. Otherwise the hover
    // tooltip must always hide so it never lingers as the pointer moves around.
    const cell = hoverCell, ht = cell ? towerAt(cell.c, cell.r) : null;
    if (ht && e.pointerType !== 'touch') {
      const el = tipEl();
      if (el) {
        const c = TOWERS[ht.type];
        el.innerHTML = '<h4>' + c.icon + ' ' + c.name + ' · Lv ' + ht.lvl + '</h4>' +
          '<div class="mod">' + placedTowerStatsHtml(ht) + '</div>' +
          '<div class="sp">' + c.special + '</div>';
        el.classList.add('show');
        const cy0 = r.top + ht.y * (r.height / H);
        showTipPos(r.left + ht.x * (r.width / W), cy0);
      }
    } else { hideTip(); }
  });
  // hide the hover tooltip whenever the pointer leaves the canvas entirely
  canvas.addEventListener('mouseleave', hideTip);
  canvas.addEventListener('mouseout', hideTip);
  canvas.addEventListener('pointerleave', hideTip);
  function showTipPos(x, y) {
    const el = tipEl(); if (!el) return;
    const vw = (typeof window !== 'undefined' && window.innerWidth) || 1280;
    el.style.left = Math.min(Math.max(8, x - 120), vw - 248) + 'px';
    el.style.bottom = (((typeof window !== 'undefined' && window.innerHeight) ? window.innerHeight : 800) - y + 14) + 'px';
  }

  document.querySelectorAll('.tbtn[data-t]').forEach(b => {
    const t = b.dataset.t;
    b.addEventListener('click', () => {
      selBuild = selBuild === t ? null : t;
      selTower = null;
      const pt = $('panelTower'); if (pt) pt.style.display = 'none';
      refreshToolbar();
    });
    // desktop hover tooltip with the tower's stats (TASK 2). Headless-safe: handlers
    // simply never fire in the mocked DOM; getBoundingClientRect is guarded.
    // Skip on touch / no-hover devices: there the synthetic mouseenter would pop this
    // opaque card over the map and leave it there (no mouseleave on touch), covering the
    // tiles you're trying to build on. Cost is shown on the button itself, so no loss.
    b.addEventListener('mouseenter', () => {
      try { if (window.matchMedia && window.matchMedia('(hover: none)').matches) return; } catch (e) {}
      let r = { left: 0, top: 0, width: 84 };
      try { r = b.getBoundingClientRect(); } catch (e) {}
      showTipFor(t, r.left + r.width / 2, r.top);
    });
    b.addEventListener('mouseleave', hideTip);
  });
  $('startBtn').addEventListener('click', startWave);
  $('upBtn').addEventListener('click', () => { if (selTower) upgradeTower(selTower); });
  $('sellBtn').addEventListener('click', () => { if (selTower) sellTower(selTower); });
  { const tb = $('targetBtn'); if (tb) tb.addEventListener('click', () => { if (selTower) cycleTarget(selTower); }); }
  const spdBtn = $('speedBtn');
  if (spdBtn) spdBtn.addEventListener('click', () => { gameSpeed = gameSpeed === 1 ? 2 : 1; refreshToolbar(); });
  KIT.nav({ music: true, reset: 'tower-defense_', home: '../../', theme: MENU_THEME, challenges: 'tower-defense', onMenu: () => toMenu(),
    confirmLeave: () => (state === 'build' || state === 'wave') ? "Leave this run? You'll lose your progress." : false,
    controls: { title: 'Keep Defender — Controls',
      mouse: [ ['Pick a tower', 'Select to build'], ['Click grass', 'Place tower'], ['Click a tower', 'Upgrade / sell / targeting'] ],
      touch: [ ['Tap a tower type', 'Select'], ['Tap grass', 'Place'], ['Tap a placed tower', 'Upgrade / sell / targeting'], ['Tap a drop', 'Collect'] ] } });
  KIT.showMenuButton(false); // initial = menu screen → hide the ‹ Menu button
  const autoBtn = $('autoBtn');
  if (autoBtn) autoBtn.addEventListener('click', () => {
    autoWave = !autoWave;
    if (autoWave && autoDelay <= 0) autoDelay = 150; // give a beat before the first auto-launch
    autoBtn.textContent = 'Auto: ' + (autoWave ? 'On' : 'Off');
    autoBtn.classList.toggle('on', autoWave);
  });

  // ---- Test hook ----
  window.__test = {
    get state() { return state; },
    menu() { return KIT ? KIT.menu.current() : null; },
    get gold() { return gold; },
    get hp() { return hp; },
    get wave() { return wave; },
    get score() { return score; },
    get enemies() { return enemies.length; },
    get towers() { return towers.length; },
    start: startGame,
    startWave,
    place: placeTower,
    selectBuild(t) { selBuild = t; },
    addGold(n) { gold += n; updateHud(); refreshToolbar(); },
    killAll() { [...enemies].forEach(killEnemy); },
    upgradeAt(c, r) { const t = towerAt(c, r); if (t) { selectPanel(t); upgradeTower(t); } },
    selectTowerAt(c, r) { const t = towerAt(c, r); if (t) selectPanel(t); },
    upBtnDisabled() { return !!$('upBtn').disabled; },
    sellAt(c, r) { const t = towerAt(c, r); if (t) sellTower(t); },
    step(n) { for (let i = 0; i < (n || 1); i++) update(); },
    roadAt(c, r) { return !!road[c][r]; },
    cols: COLS,
    rows: ROWS,
    selectMap(i) { applyMap(i); loadBest(); buildMapPicker(); },
    get mapIdx() { return mapIndex; },
    resizeTo(w, h) { window.innerWidth = w; window.innerHeight = h; resize(); },
    // geometry + entity probes (used by the resize/orientation reflow test)
    cellPx(c, r) { return { x: cx(c), y: cy(r) }; },
    // map drops (clickable bonuses)
    get drops() { return drops.length; },
    get haste() { return hasteTicks; },
    spawnDrop(kind) { return spawnDrop(kind); },
    collectDrop(i) { return collectDrop(i); },
    tapAt(px, py) { tap(px, py); },
    towerPx(i) { const t = towers[i]; return t ? { x: t.x, y: t.y, c: t.c, r: t.r } : null; },
    towerDmg(i) { const t = towers[i]; return t ? (t.eDmg ?? t.dmg) : null; },
    towerRange(i) { const t = towers[i]; return t ? (t.eRange ?? t.range) : null; }, // EFFECTIVE range = drawn ring (TASK 3)
    enemyPx(i) { const e = enemies[i]; return e ? { x: e.x, y: e.y } : null; },
    get geom() { return { ts, ox, oy, W, H }; },
    // JS-computed layout snapshot in canvas/px space (used by the on-screen regression test).
    // topReserve = top headroom reserved for the .gamekit-hud; everything board-side must clear it.
    get layout() {
      // path bounding box over every waypoint (in pixels, includes the off-grid entry/exit cells)
      let pminx = Infinity, pminy = Infinity, pmaxx = -Infinity, pmaxy = -Infinity;
      for (const [c, r] of WP) {
        const px = cx(c), py = cy(r);
        if (px < pminx) pminx = px; if (px > pmaxx) pmaxx = px;
        if (py < pminy) pminy = py; if (py > pmaxy) pmaxy = py;
      }
      // keep rect at the path end. drawKeep uses hw=s*0.38, body top at y-hh (hh=s*0.36),
      // and a flag spire reaching up to y - hh - bh - s*0.3 (bh=s*0.16). Bound the full sprite.
      const kx = cx(WP[WP.length - 1][0]), ky = cy(WP[WP.length - 1][1]), s = ts;
      const keep = {
        x: kx, y: ky,
        left: kx - s * 0.38, right: kx + s * 0.38,
        top: ky - s * 0.36 - s * 0.16 - s * 0.3, // body top minus battlement minus flag spire
        bottom: ky + s * 0.36 + s * 0.25,         // body bottom plus gate
      };
      return {
        W, H, topReserve,
        path: { left: pminx, right: pmaxx, top: pminy, bottom: pmaxy },
        keep,
        grid: { left: ox, top: oy, right: ox + COLS * ts, bottom: oy + ROWS * ts },
      };
    },
    // selectable difficulty level (easy/medium/hard)
    get diffLevel() { return diffLevel; },
    setDifficultyLevel(key) { setDiff(key); },
    get diffConfig() { return DIFF(); },
    waveHpK() { return waveHpK(); },
    // per-tower targeting priority
    setTargetMode(i, mode) { const t = towers[i]; if (t && TARGET_MODES.includes(mode)) { t.targetMode = mode; return true; } return false; },
    cycleTargetAt(c, r) { const t = towerAt(c, r); if (t) { selectPanel(t); cycleTarget(t); return t.targetMode; } return null; },
    targetMode(i) { const t = towers[i]; return t ? (t.targetMode || 'first') : null; },
    // dynamic difficulty (TASK 4)
    get difficulty() { return difficulty; },
    setDifficulty(d) { difficulty = d; updateHud(); },
    get checkpoints() { return DIFF_CP.map(f => pathPointAt(f)); },
    // per-wave threat signals + the wave-end adjustment (between-rounds rubber-band)
    get waveLeaked() { return waveLeaked; },
    get waveMaxFrac() { return waveMaxFrac; },
    pathFrac(i) { const e = enemies[i]; return e ? pathFracOf(e) : null; },
    adjustThreat() { return adjustThreat(); },
    // map mechanics (TASK 5)
    get surface() { return surfaceMul(); },
    towerMapMod(type) { return towerMapMod(type); },
    get mapEvent() { return mapDef().event; },
    spawnMapEvent() { return spawnMapEvent(); },
    // tooltip/info (TASK 2)
    tipHtml(type) { return buildTipHtml(type); },
    towerInfo(i) { const t = towers[i]; return t ? placedTowerStatsHtml(t) : null; },
  };

  resize(); loadBest(); applyMap(mapIndex); loadDiff(); setDiff(diffLevel); updateHud(); loop();
  // deep-link ?map= / ?diff= → preselect before opening the menu
  { const P = KIT && KIT.param; const m = P && parseInt(P('map'), 10); if (m >= 0 && m < MAPS.length) { applyMap(m); loadBest(); }
    const d = P && P('diff'); if (d && DIFFICULTY[d]) setDiff(d); }
  showStartMenu(); // open the shared start menu (map/difficulty preselected from the URL)
})();
  window.gamekit.pwa();
</script>
</body>
</html>
