name: Deploy to GitHub Pages

# Builds the version stamp (short commit SHA → version.js) and deploys the site via the
# GitHub Actions Pages pipeline. Requires the repo's Pages source to be set to "GitHub Actions"
# (Settings → Pages → Build and deployment → Source). version.js is generated here, never committed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stamp the commit SHA into version.js + the service worker
        run: |
          SHA_SHORT="${GITHUB_SHA:0:7}"
          BUILT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > version.js <<EOF
          // Generated at deploy by .github/workflows/pages.yml from \$GITHUB_SHA — do not edit by hand.
          window.KOMYO_VERSION = { sha: '${SHA_SHORT}', url: 'https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}', built: '${BUILT}' };
          EOF
          # Bump the ONE root SW's cache version so each deploy = a fresh cache + a new worker.
          sed -i "s/self.VERSION = 'dev'/self.VERSION = '${SHA_SHORT}'/" sw.js
          echo "Stamped version.js + $(grep -c "self.VERSION = '${SHA_SHORT}'" sw.js) SW → ${SHA_SHORT}"

      # Whole-site offline bundle behind Settings → "Play offline" (built AFTER the stamp so the
      # zip carries this build's version.js). Lands at komyo.zip in the site root.
      - name: Build offline bundle (komyo.zip)
        run: node scripts/package-site.mjs

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

      # IndexNow (Bing/Yandex — feeds ChatGPT-via-Bing): ping every sitemap URL after each deploy.
      # The key is public by design — ownership is proven by serving <key>.txt at the site root.
      - name: Ping IndexNow with the sitemap URLs
        run: |
          KEY="dbe2858eedf5f5dcc7adbe01db6b120d"
          URLS=$(grep -o '<loc>[^<]*</loc>' sitemap.xml | sed 's/<[^>]*>//g' | jq -R . | jq -sc .)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"komyo.online\",\"key\":\"${KEY}\",\"urlList\":${URLS}}")
          echo "IndexNow: HTTP ${HTTP} for $(echo "${URLS}" | jq length) URLs"
