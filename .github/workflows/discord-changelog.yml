name: Discord changelog

# Posts to the Discord changelog channel ONLY when changelog.js gains new entries on a
# push to main (covers batched pushes AND merges). The post mirrors the in-page changelog
# exactly — no chore/ci/docs/refactor noise. See .github/scripts/post-changelog.mjs.
#
# The webhook lives in a repo SECRET (never in this public file): add it at
# Settings → Secrets and variables → Actions → New repository secret
#   name:  DISCORD_CHANGELOG_WEBHOOK
#   value: <the changelog webhook URL>
# If the secret is missing, the job skips quietly.

on:
  push:
    branches: [main]
    paths: ['changelog.js']

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need history so we can diff changelog.js against the push base
      - name: Post new changelog entries to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          BEFORE: ${{ github.event.before }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "DISCORD_CHANGELOG_WEBHOOK not set — skipping."; exit 0; fi
          node .github/scripts/post-changelog.mjs
